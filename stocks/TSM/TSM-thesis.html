// ── Tooltip engine ────────────────────────────────────────────────────────────
let tipEl = null;
function ensureTip() {
  if (!tipEl) { tipEl = document.createElement("div"); tipEl.id = "tip-box"; document.body.appendChild(tipEl); }
  return tipEl;
}
function showTip(e, title, body, note, color) {
  const el = ensureTip();
  el.innerHTML =
    `<div class="tt" style="color:${color || '#9fb4ff'}">${title}</div>` +
    `<div class="tb">${body}</div>` +
    (note ? `<div class="tn">${note}</div>` : "");
  el.classList.add("on"); moveTip(e);
}
function moveTip(e) {
  const el = ensureTip(); const pad = 16;
  let x = e.clientX + pad, y = e.clientY + pad;
  const r = el.getBoundingClientRect();
  if (x + r.width > window.innerWidth - 8) x = e.clientX - r.width - pad;
  if (y + r.height > window.innerHeight - 8) y = e.clientY - r.height - pad;
  el.style.left = x + "px"; el.style.top = y + "px";
}
function hideTip() { if (tipEl) tipEl.classList.remove("on"); }

function tipSvg(title, body, note, color, extraClass) {

}

const PRICE_MIN = 120, PRICE_MAX = 700;
const CH_W = 760, CH_H = 420, PAD_L = 8, PAD_R = 56, PAD_T = 18, PAD_B = 34;
const plotW = CH_W - PAD_L - PAD_R, plotH = CH_H - PAD_T - PAD_B;
const yOf = (p) => PAD_T + (1 - (p - PRICE_MIN) / (PRICE_MAX - PRICE_MIN)) * plotH;

function FanChart({ c }) {
  const nHist = HISTORY.length;
  const histPts = HISTORY.map((d, i) => [PAD_L + (i / (nHist + FUTURE_Q.length - 1)) * plotW, yOf(d.p)]);
  const nowX = histPts[histPts.length - 1][0];
  const nowY = histPts[histPts.length - 1][1];
  const fwdN = FUTURE_Q.length;
  const fwdX = (i) => nowX + ((i + 1) / fwdN) * (CH_W - PAD_R - nowX);
  const end = PROJ_END[c.key];
  const mid = FUTURE_Q.map((_, i) => {
    const t = (i + 1) / fwdN;
    return [fwdX(i), yOf(NOW_PRICE + (end - NOW_PRICE) * t)];
  });
  const spread = (i) => 30 + i * 28;
  const upper = mid.map(([x, y], i) => [x, y - spread(i)]);
  const lower = mid.map(([x, y], i) => [x, y + spread(i)]);
  const bandPath = `M ${nowX} ${nowY} ` + upper.map(([x, y]) => `L ${x} ${y}`).join(" ") + " " +
    lower.slice().reverse().map(([x, y]) => `L ${x} ${y}`).join(" ") + " Z";
  const midPath = `M ${nowX} ${nowY} ` + mid.map(([x, y]) => `L ${x} ${y}`).join(" ");
  const histPath = "M " + histPts.map(([x, y]) => `${x} ${y}`).join(" L ");
  const gridP = [600, 500, 400, 300, 200];
  return (
    <svg viewBox={`0 0 ${CH_W} ${CH_H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      <defs>
        <linearGradient id={`fan-${c.key}`} x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor={c.accent} stopOpacity="0.05" />
          <stop offset="100%" stopColor={c.accent} stopOpacity="0.28" />
        </linearGradient>
        <filter id="softglow"><feGaussianBlur stdDeviation="2.2" /></filter>
      </defs>
      {gridP.map((p) => (
        <g key={p}>
          <line x1={PAD_L} y1={yOf(p)} x2={CH_W - PAD_R} y2={yOf(p)} stroke="#1c2230" strokeWidth="1" strokeDasharray="1 5" />
          <text x={CH_W - PAD_R + 8} y={yOf(p) + 3} fill="#5a6477" fontSize="11" fontFamily={FONT_MONO}>${p}</text>
        </g>
      ))}
      <line x1={nowX} y1={PAD_T} x2={nowX} y2={CH_H - PAD_B} stroke="#2f6dff" strokeWidth="1" strokeDasharray="3 4" opacity="0.7" />
      <path d={bandPath} fill={`url(#fan-${c.key})`} {...tipSvg(
        "The forecast cone",
        "This shaded fan shows the range of where TSM could trade in this scenario over the next year. It gets wider further out because the future is less certain. The dashed line is the most-likely path.",
        "Wider = more uncertainty.", c.accent, "fan-band")} />
      <path d={midPath} fill="none" stroke={c.accent} strokeWidth="2" strokeDasharray="6 5" className="fan-mid" style={{ filter: "url(#softglow)" }} />
      <path d={histPath} fill="none" stroke="#cdd5e3" strokeWidth="2" {...tipSvg(
        "Price history",
        "The solid line is TSM's actual ADR price over the past ~5 quarters. The sharp rise in April–May 2026 was the market reacting to TSMC's Q1 2026 earnings: +58% profit growth, +40% revenue growth, driven by AI chip demand.",
        "This part already happened — it's real, not a forecast.", "#cdd5e3", "hist-line")} />
      {HISTORY.map((d, i) => (
        <g key={i}>
          <circle cx={histPts[i][0]} cy={histPts[i][1]} r={i === nHist - 1 ? 4.5 : 3}
            fill={i === nHist - 1 ? "#2f6dff" : "#0a0d14"}
            stroke={i === nHist - 1 ? "#fff" : "#8a93a6"} strokeWidth="1.5"
            {...tipSvg(i === nHist - 1 ? "Where we are today" : d.q,
              i === nHist - 1
                ? `TSM ADR trades around $${NOW_PRICE} right now — near an all-time high after a 112% run in 12 months. Blue dot = today; left of it is history, right is forecast.`
                : `At the end of ${d.q}, TSM traded around $${d.p}. ${i <= 1 ? "(Estimated — exact quarterly closes not confirmed.)" : ""}`,
              null, i === nHist - 1 ? "#9fb4ff" : "#cdd5e3")} />
          {i === nHist - 1 && <text x={histPts[i][0] - 6} y={histPts[i][1] - 12} fill="#9fb4ff" fontSize="11" fontFamily={FONT_MONO} textAnchor="end">NOW ${NOW_PRICE}</text>}
        </g>
      ))}
      {mid.map(([x, y], i) => (
        <g key={i} className="diamond" style={{ animationDelay: `${0.5 + i * 0.12}s` }}>
          <rect x={x - 4} y={y - 4} width="8" height="8" transform={`rotate(45 ${x} ${y})`}

              "Hover the shaded cone to see the uncertainty range.", c.accent)} />
          <text x={x} y={y - 12} fill={c.accent} fontSize="10.5" fontFamily={FONT_MONO} textAnchor="middle">{FUTURE_Q[i]}</text>
        </g>
      ))}

        <text key={yr} x={PAD_L + (i / 2) * plotW} y={CH_H - 10} fill="#5a6477" fontSize="11" fontFamily={FONT_MONO}>{yr}</text>
      ))}
    </svg>
  );
}

function Segmented({ active, setActive, small }) {
  const explain = {
    bear: ["The pessimistic scenario", "Click to see what TSMC looks like if things go wrong — geopolitical tension spikes, AI demand cracks, and Arizona fab costs hit margins. Price would likely fall to the $180–250 range."],
    base: ["The most-likely scenario", "Click for the steady-delivery view — AI demand holds strong, margins stay 65–67%, and the US-Taiwan deal contains geopolitical risk. Price drifts toward $380–500. Note: the stock is already at the top of this range."],
    bull: ["The optimistic scenario", "Click to see the upside — AI demand exceeds all forecasts, N2 ramps early, margins expand above 68%, and the market re-rates TSMC as indispensable AI infrastructure. Price could run to $490–640."],
  };
  return (
    <div style={{ display: "flex", gap: 5 }}>
      {Object.values(CASES).map((cc) => {
        const on = active === cc.key;
        return (
          <div key={cc.key} onClick={() => setActive(cc.key)}
            onMouseEnter={(e) => showTip(e, explain[cc.key][0], explain[cc.key][1], "Tip: click to switch the whole dashboard to this scenario.", cc.accent)}
            onMouseMove={moveTip} onMouseLeave={hideTip}
            style={{
              padding: small ? "3px 12px" : "4px 14px", borderRadius: 4, fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", cursor: "pointer",
              border: `1px solid ${on ? cc.accent : "#222a38"}`, color: on ? "#06080d" : cc.accent,
              background: on ? cc.accent : "transparent", boxShadow: on ? `0 0 16px ${cc.glow}` : "none",
              transition: "all .18s ease",
            }}>{cc.label}</div>
        );
      })}
    </div>
  );
}

function KpiCol({ label, val, accentColor, baseline, delay = 0 }) {
  const h = ((val - 40) / 40) * 100;

    ? tip("Starting point (Q1 2026)", "This is the most recent real number: 61% of TSMC's revenue came from AI and high-performance computing chips in Q1 2026. The bars to the right are forecasts of where that share goes next.", "The grey dot = 'where we are now'.", "#9aa4b8")
    : tip(`Forecast: ${label}`, `In this scenario, AI/HPC chips are projected to make up about ${val}% of TSMC's revenue by ${label}. Taller bar = AI is a bigger share of the business.`, "Switch BEAR/BASE/BULL up top to see how the forecast changes.", accentColor);
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-end", height: "100%" }} {...tp}>
      <div style={{ fontSize: 11, color: accentColor, fontWeight: 700, marginBottom: 4 }}>{val}%</div>
      {baseline
        ? <div style={{ width: 9, height: 9, borderRadius: "50%", background: "#3a4252", border: "1.5px solid #7b86a0", marginBottom: `${Math.max(0, h)}%` }} />

function ReversionClock() {
  const dislocationDate = new Date(DISLOCATION_DATE);
  const today = new Date();
  const elapsed = Math.round((today - dislocationDate) / 86400000);
  const pct = Math.min(100, (elapsed / REVERSION_PRECEDENT_DAYS) * 100);
  const trough = REVERSION_TROUGH, baseFloor = REVERSION_BASEFLOOR, now = NOW_PRICE;
  const rawRecPct = ((now - trough) / (baseFloor - trough)) * 100;
  const recPct = Math.min(100, Math.max(0, rawRecPct));
  const aboveBase = rawRecPct > 100;
  return (
    <div style={{ marginTop: 12, padding: "12px 14px", background: "#0a0e15", border: "1px solid #161c28", borderRadius: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
        <div style={{ fontSize: 10.5, letterSpacing: "0.14em", color: "#5a6477" }}>REVERSION CLOCK · MAY-2025 TARIFF DISLOCATION</div>
        <div style={{ fontSize: 11, color: "#9aa4b8" }}><span style={{ color: "#e0a83b", fontWeight: 700 }}>{elapsed}d</span> elapsed / ~{REVERSION_PRECEDENT_DAYS}d to base last time</div>
      </div>
      <div style={{ marginBottom: 4, fontSize: 9.5, color: "#5a6477" }}>TIME SINCE DISLOCATION ({new Date(DISLOCATION_DATE).toLocaleDateString("en-US", { month: "short", day: "numeric" })})</div>
      <div {...tip("How much time has passed", "In May 2025, a tariff-driven geopolitical panic sent TSM from ~$210 to $190 in weeks. It took ~10 months to recover to the base floor ($338). This bar shows how far along we are in that timeline.", "Filling past 100% = recovery is already complete.", "#e0a83b")}
        style={{ position: "relative", height: 14, background: "#11161f", borderRadius: 7, overflow: "hidden", border: "1px solid #1c2230" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${pct}%`, background: "linear-gradient(90deg,#f1564b,#e0a83b)", borderRadius: 7 }} />
        <div style={{ position: "absolute", right: 0, top: -3, bottom: -3, width: 2, background: "#3fd07a" }} />
        <div style={{ position: "absolute", left: `${pct}%`, top: "50%", width: 8, height: 8, borderRadius: "50%", background: "#fff", transform: "translate(-50%,-50%)", boxShadow: "0 0 8px #fff", pointerEvents: "none" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#5a6477", marginTop: 3 }}>
        <span>day 0</span><span style={{ color: "#3fd07a" }}>base-reversion mark (~315d) →</span>
      </div>
      <div style={{ marginTop: 12, marginBottom: 4, fontSize: 9.5, color: "#5a6477" }}>PRICE RECOVERY · ${REVERSION_TROUGH} trough → ${REVERSION_BASEFLOOR} base floor</div>
      <div {...tip("How far the price has bounced back", `The stock bottomed at $${REVERSION_TROUGH} and needed to reach $${REVERSION_BASEFLOOR} to re-enter the base zone. It's at $${NOW_PRICE} now — ${aboveBase ? "well past the base floor." : `about ${Math.round(recPct)}% of the way there.`}`, aboveBase ? "Full bar = recovery complete. Price is now in base-to-bull territory." : "If this bar is fuller than the time bar above, the bounce is running faster than last time.", "#9fb4ff")}
        style={{ position: "relative", height: 14, background: "#11161f", borderRadius: 7, overflow: "hidden", border: "1px solid #1c2230" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${recPct}%`, background: "linear-gradient(90deg,#f1564b,#3fd07a)", borderRadius: 7 }} />
        <div style={{ position: "absolute", left: `${recPct}%`, top: "50%", width: 8, height: 8, borderRadius: "50%", background: "#9fb4ff", transform: "translate(-50%,-50%)", boxShadow: "0 0 8px #9fb4ff", pointerEvents: "none" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#5a6477", marginTop: 3 }}>
        <span>${REVERSION_TROUGH}</span>
        <span style={{ color: "#9fb4ff" }}>${NOW_PRICE} now · {aboveBase ? "past base floor ✓" : `${Math.round(recPct)}% of the way back`}</span>
        <span>${REVERSION_BASEFLOOR}</span>
      </div>
      <div style={{ fontSize: 10.5, color: "#9aa4b8", lineHeight: 1.55, marginTop: 10 }}>
        {aboveBase
          ? <span>Recovery from the May 2025 tariff dislocation is <span style={{ color: "#3fd07a", fontWeight: 700 }}>complete</span>. Price ($<span style={{ color: "#9fb4ff", fontWeight: 700 }}>{NOW_PRICE}</span>) has surpassed the base floor (${REVERSION_BASEFLOOR}) and now sits in the <span style={{ color: "#e0a83b", fontWeight: 700 }}>base-to-bull zone</span>. The dislocation narrative has closed. The new watch: whether <span style={{ color: "#fff", fontWeight: 700 }}>~27x forward P/E</span> can hold when H2 2026 guidance lands on <span style={{ color: "#e0a83b", fontWeight: 700 }}>July 16</span>.</span>
          : <span>The May 2025 tariff dislocation took <span style={{ color: "#e0a83b" }}>~10 months</span> trough-to-base. We're <span style={{ color: "#fff", fontWeight: 700 }}>{elapsed} days in</span> and price has retraced <span style={{ color: "#9fb4ff", fontWeight: 700 }}>{Math.round(recPct)}%</span> of the trough-to-base gap — <span style={{ color: recPct >= pct ? "#3fd07a" : "#e0a83b", fontWeight: 700 }}>{recPct >= pct ? "tracking ahead of" : "tracking behind"}</span> the precedent pace.</span>}
      </div>
    </div>
  );
}

function TrackRecord() {
  const W = 1000, H = 300, pl = 44, pr = 70, pt = 20, pb = 40;
  const pw = W - pl - pr, ph = H - pt - pb;
  const y = (p) => pt + (1 - (p - TRACK_PRICE_MIN) / (TRACK_PRICE_MAX - TRACK_PRICE_MIN)) * ph;
  const x = (i) => pl + (TRACK.length === 1 ? pw / 2 : (i / (TRACK.length - 1)) * pw);
  const grid = [600, 500, 400, 300, 200];
  const pathPts = TRACK.map((t, i) => [x(i), y(t.post)]);
  const linePath = "M " + pathPts.map(([px, py]) => `${px} ${py}`).join(" L ");
  const hits = TRACK.filter((t) => t.landed.includes("base") || t.landed.includes("bull")).length;
  return (
    <div style={{ background: "#080b11", padding: "16px 18px", borderTop: "1px solid #161c28" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <div style={{ fontSize: 11.5, letterSpacing: "0.18em", color: "#7b86a0" }}>
          <span style={{ background: "#161c28", padding: "2px 6px", borderRadius: 3, color: "#cdd5e3", marginRight: 8 }}>TR · BACKTEST</span>
          THESIS TRACK RECORD · RECONSTRUCTED BANDS vs ACTUAL PRICE
        </div>
        <div style={{ fontSize: 11, color: "#7b86a0" }}>BASE-OR-BETTER LANDINGS: <span style={{ color: "#3fd07a", fontWeight: 700 }}>{hits}/{TRACK.length}</span></div>
      </div>
      <div style={{ fontSize: 10.5, color: "#5a6477", marginBottom: 10 }}>
        Each column = one earnings date. Stacked zones are the bear / base / bull bands as they'd have been drawn then. The line is where price actually traded after.
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
        {grid.map((p) => (
          <g key={p}>
            <line x1={pl} y1={y(p)} x2={W - pr} y2={y(p)} stroke="#161c28" strokeWidth="1" strokeDasharray="1 5" />
            <text x={W - pr + 8} y={y(p) + 3} fill="#5a6477" fontSize="11" fontFamily={FONT_MONO}>${p}</text>
          </g>
        ))}
        {TRACK.map((t, i) => {
          const cx = x(i), bw = 46;
          const landWord = t.landed.includes("bull") ? "the optimistic zone" : t.landed.includes("base") ? "the middle zone" : "the pessimistic zone";
          const reactWord = t.reaction.includes("−") || t.reaction === "-" ? "the stock FELL after this report" : "the stock ROSE after this report";
          const seg = (range, color) => (
            <rect x={cx - bw / 2} y={y(range[1])} width={bw} height={Math.max(2, y(range[0]) - y(range[1]))}
              fill={color} opacity={t.conf === "med" ? 0.32 : 0.5} rx="2"
              style={{ animation: `fadeUp .5s ease ${i * 0.08}s both` }}
              {...tipSvg(`${t.q} earnings`,
                `Back at this earnings date, here's the range we'd have predicted (red=low, yellow=middle, green=high). In reality, ${reactWord} and the price ended up in ${landWord} (~$${t.post}).`,
                t.conf === "med" ? "Marked 'lower-confidence' — estimated data, treat loosely." : "Hover the white line to see the actual price path.",
                color.includes("63,208") ? "#3fd07a" : color.includes("224,168") ? "#e0a83b" : "#f1564b")} />
          );
          return (
            <g key={t.q}>
              {seg(t.bull, "rgba(63,208,122,0.55)")}
              {seg(t.base, "rgba(224,168,59,0.5)")}
              {seg(t.bear, "rgba(241,86,75,0.5)")}
              <text x={cx} y={H - 24} fill="#9aa4b8" fontSize="11" fontFamily={FONT_MONO} textAnchor="middle">{t.q}</text>
              <text x={cx} y={H - 11} fill={t.conf === "med" ? "#5a6477" : "#3a4252"} fontSize="8.5" fontFamily={FONT_MONO} textAnchor="middle">
                {t.conf === "med" ? "est. data" : t.reaction === "-" ? "↓ tariff shock" : t.reaction === "--" ? "↓↓ shock" : ""}
              </text>
            </g>
          );
        })}
        <path d={linePath} fill="none" stroke="#dde3ee" strokeWidth="2.2" className="track-line" style={{ filter: "drop-shadow(0 0 4px rgba(221,227,238,0.4))" }} />
        {TRACK.map((t, i) => {
          const isLast = i === TRACK.length - 1;
          return (
            <g key={t.q} style={{ animation: `pop .4s cubic-bezier(.2,1.4,.4,1) ${0.3 + i * 0.08}s both` }}>
              <circle cx={x(i)} cy={y(t.post)} r={isLast ? 6 : 4}
                fill={isLast ? "#2f6dff" : "#0a0d14"} stroke="#fff" strokeWidth={isLast ? 2 : 1.5}
                {...tipSvg(isLast ? "Today" : `${t.q}: actual price`,
                  isLast
                    ? `TSM is at ~$${t.post} now — the post-Q1 2026 earnings rally pushed it from $338 to $425. The stock is at the top of the base band, needing bull-case execution for further upside.`
                    : `After ${t.q} earnings, TSM actually traded around $${t.post}. Compare this dot to the colored bars to see if the prediction was right.`,
                  null, isLast ? "#9fb4ff" : "#cdd5e3")} />
              {isLast && <text x={x(i)} y={y(t.post) - 14} fill="#9fb4ff" fontSize="11" fontFamily={FONT_MONO} textAnchor="middle" fontWeight="700">NOW ${t.post}</text>}
            </g>
          );
        })}
      </svg>
      <div style={{ marginTop: 12, padding: "10px 12px", background: "#0a0e15", border: "1px solid #161c28", borderRadius: 8 }}>
        <div style={{ fontSize: 10.5, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 6 }}>READ-OUT</div>
        <div style={{ fontSize: 12, color: "#bcc6d8", lineHeight: 1.6 }}>
          Current price <span style={{ color: "#9fb4ff", fontWeight: 700 }}>${NOW_PRICE}</span> sits <span style={{ color: "#e0a83b", fontWeight: 700 }}>at the upper edge of the BASE band</span> — the Q1 2026 earnings blast (+58% profit growth, +40.6% revenue YoY) drove an ~$87 rally from the $338 Q1 close. The May 2025 geopolitical dislocation ($190 low) has <span style={{ color: "#3fd07a", fontWeight: 700 }}>fully resolved</span>. The stock has now priced in clean AI-cycle execution. <span style={{ color: "#e0a83b", fontWeight: 700 }}>Incremental upside requires bull-case delivery</span>: H2 2026 guidance hold and gross margin sustaining above 65% on July 16.
        </div>
      </div>
      <ReversionClock />
      <div style={{ fontSize: 9.5, color: "#3d4555", marginTop: 8, lineHeight: 1.5 }}>
        ⚠ Bands are reconstructed retrospectively (anchored to each date's forward EPS &amp; multiple regime), not archived in real time — Q4 2024 and Q1 2025 bands are estimated; treat as directional only. Price history Q1–Q4 2025 is estimated from earnings data; Q1 2026 close ($337.95) is confirmed. Geopolitical re-rating is not rule-based — it can move faster or slower than any precedent.
      </div>
    </div>
  );
}

                <div>
                  <div style={{ color: "#5a6477", letterSpacing: "0.12em", marginBottom: 3 }}>WHAT THIS MEASURES</div>
                  <div style={{ color: "#9aa4b8" }}>Share of TSMC total revenue from AI accelerators, HPC chips, and custom silicon — the primary driver of TSMC's premium valuation and the key test of AI demand durability.</div>
                </div>
                <div>
                  <div style={{ color: "#5a6477", letterSpacing: "0.12em", marginBottom: 3 }}>WHAT THE <span style={{ color: c.accent }}>{c.label}</span> CASE REQUIRES</div>
                  <div style={{ color: c.accent }}>
                    {active === "bull"
                      ? "AI/HPC share accelerates toward 70%+, N2 ramp adds a new margin tier, hyperscaler demand proves structurally durable beyond 2026."
                      : active === "base"
                        ? "Steady climb into the mid-60s, gross margins hold above 65%, no geopolitical shock compresses the ~27x multiple."
                        : "AI/HPC share stalls or slides back toward 55–58% as hyperscaler capex pauses, validating cyclicality fears."}
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* Right: signals */}
          <div style={{ background: "#080b11", padding: "16px 18px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontSize: 11.5, letterSpacing: "0.18em", color: "#7b86a0" }}>THESIS · ALL SIGNALS</div>
              <div style={{ fontSize: 12, color: "#7b86a0" }}>{c.label.toLowerCase()} 12M <span style={{ color: c.accent, fontWeight: 700 }}>{c.target12}</span></div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12 }}>
              <Segmented active={active} setActive={setActive} small />
              <span className="dot-track" style={{ marginLeft: 6, fontSize: 10.5, color: c.accent }}>● TRACKING</span>
            </div>
            <div className="panel" key={active + "-op"} style={{ fontSize: 12.5, lineHeight: 1.6, color: "#bcc6d8", marginBottom: 16, minHeight: 64 }}>{c.op}</div>

            <SignalGroup id="SN01" title="Demand Trajectory &amp; Guide Quality" requires={c.requires01} accent={c.accent} evidence={3}>
              {SIGNALS[active].map((s, i) => <SignalRow key={i} s={s} accent={c.accent} />)}
            </SignalGroup>
            <SignalGroup id="SN02" title="Margin &amp; Node Ramp Progress" requires={c.requires02} accent={c.accent} evidence={2}>
              {MARGIN[active].map((s, i) => <MarginRow key={i} s={s} accent={c.accent} />)}
            </SignalGroup>

            <div style={{ marginTop: 14, borderTop: "1px solid #161c28", paddingTop: 10 }}>
              <div style={{ fontSize: 10.5, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 3 }}>WHAT BREAKS THE <span style={{ color: c.accent }}>{c.label}</span> CASE</div>
              <div style={{ fontSize: 11.5, color: "#9aa4b8", lineHeight: 1.5 }}>{c.breaks}</div>
            </div>
          </div>
        </div>

        {/* Observable vs. requires-earnings bar */}
        <div style={{ padding: "10px 22px", borderTop: "1px solid #161c28", display: "flex", justifyContent: "space-between", fontSize: 10.5, color: "#4a5366" }}>
          <span>OBSERVABLE NOW: cross-strait tension · Arizona Phase 1 milestone news · N2 qualification announcements · NVDA/AMD supply-chain commentary</span>
          <span>CONFIRMS JULY 16: Q2 revenue vs. $39–40.2B guide · gross margin · AI/HPC revenue mix · full-year 2026 guidance revision</span>
        </div>

        <TrackRecord />
      </div>

      <div style={{ maxWidth: 1280, margin: "12px auto 0", fontSize: 10.5, color: "#3d4555", lineHeight: 1.5 }}>
        Illustrative scenario framing built on current consensus &amp; estimates as of May 2026 — not a prediction and not financial advice. Price ranges are scenario mid-bands; KPI positions are directional, not literal. Q1 2026 actual: revenue $35.9B (+40.6% YoY), EPS $3.49/ADR (+58.3%), GM 66.2%. Consensus 2026E EPS ~$15.64/ADR (NT$98.52). Next earnings: July 16, 2026. Valuation ruler: forward P/E on ADR EPS (~27x at $425 on 2026E). Bear/bull gap is primarily multiple-driven — 14–18x fear vs. 29–35x re-rate — with real earnings as the foundation. All price estimates for Q1–Q4 2025 history are reconstructed, not archived.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<TSMThesis />);
</script>
</body>
</html>
