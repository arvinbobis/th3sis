<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TH3SIS — Investment Thesis Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Spectral:ital,wght@0,400;0,600;1,500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #06080d; color: #cdd5e3; font-family: 'JetBrains Mono', ui-monospace, monospace; overflow: hidden; }

  /* ── Shell layout ───────────────────────────────────── */
  #shell { display: flex; flex-direction: column; height: 100vh; }

  /* ── Header ─────────────────────────────────────────── */
  #header {
    flex-shrink: 0;
    padding: 14px 28px 12px;
    border-bottom: 1px solid #161c28;
    background: linear-gradient(160deg, #0a0d14, #070a10);
  }
  #top-row { display: flex; align-items: center; gap: 20px; }
  #wordmark {
    font-family: 'Spectral', Georgia, serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.35em;
    color: #f3f5f9;
    white-space: nowrap;
  }
  #wordmark span { color: #2f6dff; }

  /* search bar */
  #search-wrap {
    display: flex; align-items: center; gap: 0;
    background: #0d1018; border: 1px solid #222a38;
    border-radius: 6px; overflow: hidden;
    transition: border-color .15s;
  }
  #search-wrap:focus-within { border-color: #2f6dff; box-shadow: 0 0 0 2px rgba(47,109,255,0.15); }
  #search-input {
    background: transparent; border: none; outline: none;
    color: #e8edf5; font-family: inherit; font-size: 13px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 7px 12px; width: 120px;
  }
  #search-input::placeholder { color: #3a4252; font-weight: 400; text-transform: none; letter-spacing: 0; }
  #search-btn {
    background: #2f6dff; border: none; cursor: pointer;
    color: #fff; font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    padding: 0 14px; height: 100%; white-space: nowrap;
    transition: background .15s;
  }
  #search-btn:hover { background: #4a84ff; }

  /* error badge */
  #not-found {
    display: none; align-items: center; gap: 6px;
    font-size: 10.5px; color: #f1564b;
  }
  #not-found.on { display: flex; }

  /* subtitle */
  #subtitle { font-size: 10px; color: #3a4252; margin-top: 2px; letter-spacing: 0.06em; }

  /* ── Chip rail ──────────────────────────────────────── */
  #chip-rail {
    display: flex; align-items: center; gap: 6px;
    margin-top: 10px; flex-wrap: wrap;
  }
  #chip-label { font-size: 9.5px; color: #3a4252; letter-spacing: 0.12em; margin-right: 2px; }
  .chip {
    display: flex; align-items: center; gap: 6px;
    background: transparent; border: 1px solid #1c2230; border-radius: 5px;
    padding: 4px 10px; cursor: pointer;
    transition: all .15s; font-family: inherit;
  }
  .chip:hover { border-color: #2f6dff; background: rgba(47,109,255,0.07); }
  .chip.active { border-color: #2f6dff; background: rgba(47,109,255,0.12); }
  .chip-ticker { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: #cdd5e3; }
  .chip.active .chip-ticker { color: #9fb4ff; }
  .chip-name { font-size: 9.5px; color: #4a5366; }
  .chip.active .chip-name { color: #5a78aa; }

  /* ── Main area ──────────────────────────────────────── */
  #main { flex: 1; position: relative; overflow: hidden; }

  /* iframe */
  #thesis-frame {
    display: none; width: 100%; height: 100%; border: none;
    background: #06080d;
  }
  #thesis-frame.on { display: block; }

  /* empty state */
  #empty {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 40px;
  }
  #empty.hidden { display: none; }
  #empty-mark {
    font-family: 'Spectral', Georgia, serif;
    font-size: 48px; font-weight: 600; letter-spacing: 0.35em;
    color: #111620;
  }
  #empty-mark span { color: #1a2540; }
  #empty-msg { font-size: 11px; color: #2a3344; letter-spacing: 0.1em; text-align: center; line-height: 1.8; }
  #empty-chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
  .empty-chip {
    background: transparent; border: 1px solid #161c28; border-radius: 5px;
    padding: 5px 14px; cursor: pointer; font-family: inherit;
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: #2a3344;
    transition: all .2s;
  }
  .empty-chip:hover { border-color: #2f6dff; color: #9fb4ff; background: rgba(47,109,255,0.07); }

  /* loading overlay inside iframe area */
  #loading {
    display: none; position: absolute; inset: 0;
    align-items: center; justify-content: center;
    background: #06080d;
  }
  #loading.on { display: flex; }
  #loading-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #2f6dff;
    animation: pulse-dot 1.2s ease-in-out infinite;
  }
  @keyframes pulse-dot { 0%,100%{opacity:.3;transform:scale(.7);} 50%{opacity:1;transform:scale(1);} }
  #loading-text { font-size: 10.5px; color: #3a4252; letter-spacing: 0.12em; margin-left: 10px; }
</style>
</head>
<body>
<div id="shell">

  <!-- ── Header ──────────────────────────────────────────────────────── -->
  <div id="header">
    <div id="top-row">
      <div id="wordmark">TH<span>3</span>SIS</div>

      <div id="search-wrap">
        <input id="search-input" type="text" placeholder="ticker symbol…" autocomplete="off" autocorrect="off" spellcheck="false" />
        <button id="search-btn">▸ LOAD</button>
      </div>

      <div id="not-found">⚠ no thesis for that ticker yet</div>
    </div>
    <div id="subtitle">investment thesis library · hover anything in a thesis for plain-english explanations</div>

    <!-- Chip rail -->
    <div id="chip-rail">
      <span id="chip-label">AVAILABLE ›</span>
    </div>
  </div>

  <!-- ── Main ────────────────────────────────────────────────────────── -->
  <div id="main">
    <div id="loading">
      <div id="loading-dot"></div>
      <div id="loading-text">LOADING THESIS…</div>
    </div>
    <iframe id="thesis-frame" title="Investment Thesis"></iframe>
    <div id="empty">
      <div id="empty-mark">TH<span>3</span>SIS</div>
      <div id="empty-msg">SELECT A TICKER ABOVE TO LOAD ITS THESIS<br>OR TYPE ANY SYMBOL AND PRESS LOAD</div>
      <div id="empty-chips"></div>
    </div>
  </div>

</div>

<script>
// ── Thesis registry ──────────────────────────────────────────────────────────
// Add new tickers here as they are built.
const REGISTRY = {
  AMZN:  { path: "AMZN/AMZN-thesis.html",   name: "Amazon.com" },
  NVDA:  { path: "NVDA/NVDA-thesis.html",   name: "NVIDIA" },
  ASML:  { path: "ASML/ASML-thesis.html",   name: "ASML Holding" },
  FICO:  { path: "FICO/FICO-thesis.html",   name: "Fair Isaac" },
  TSM:   { path: "TSM/TSM-thesis.html",    name: "Taiwan Semi" },
  GOOGL: { path: "GOOGL/GOOGL-thesis.html", name: "Alphabet" },
  ALAB:  { path: "ALAB/alab-thesis.html",   name: "Astera Labs" },
  AVGO:  { path: "avgo/avgo-thesis.html",   name: "Broadcom Inc." },
  META:  { path: "META/META-thesis.html",   name: "Meta Platforms" },
  MRVL:  { path: "mrvl/mrvl-thesis.html",  name: "Marvell Technology" },
  MU:    { path: "MU/MU-thesis.html",      name: "Micron Technology" },
  MSFT:  { path: "MSFT/MSFT-thesis.html", name: "Microsoft" },
};

// ── DOM refs ─────────────────────────────────────────────────────────────────
const input      = document.getElementById("search-input");
const btn        = document.getElementById("search-btn");
const frame      = document.getElementById("thesis-frame");
const empty      = document.getElementById("empty");
const emptyChips = document.getElementById("empty-chips");
const chipRail   = document.getElementById("chip-rail");
const notFound   = document.getElementById("not-found");
const loading    = document.getElementById("loading");

// ── Build chips ──────────────────────────────────────────────────────────────
let activeChip = null;

function makeChip(ticker, target) {
  const info = REGISTRY[ticker];
  const el = document.createElement("button");
  el.className = "chip";
  el.dataset.ticker = ticker;
  el.innerHTML = `<span class="chip-ticker">${ticker}</span><span class="chip-name">${info.name}</span>`;
  el.addEventListener("click", () => loadTicker(ticker));
  target.appendChild(el);
  return el;
}

// Header chips
const headerChips = {};
Object.keys(REGISTRY).forEach(t => {
  headerChips[t] = makeChip(t, chipRail);
});

// Empty-state chips (larger, centered)
Object.keys(REGISTRY).forEach(t => {
  const el = document.createElement("button");
  el.className = "empty-chip";
  el.textContent = t;
  el.addEventListener("click", () => loadTicker(t));
  emptyChips.appendChild(el);
});

// ── Load a thesis ─────────────────────────────────────────────────────────────
function loadTicker(ticker) {
  const t = ticker.trim().toUpperCase();
  notFound.classList.remove("on");

  if (!REGISTRY[t]) {
    notFound.classList.add("on");
    setTimeout(() => notFound.classList.remove("on"), 3000);
    return;
  }

  // Highlight active chip
  if (activeChip) activeChip.classList.remove("active");
  activeChip = headerChips[t] || null;
  if (activeChip) activeChip.classList.add("active");

  // Show loading, hide empty
  empty.classList.add("hidden");
  frame.classList.remove("on");
  loading.classList.add("on");

  input.value = t;

  // Load iframe
  frame.onload = () => {
    loading.classList.remove("on");
    frame.classList.add("on");
    frame.onload = null;
  };
  frame.src = REGISTRY[t].path;
}

// ── Search events ─────────────────────────────────────────────────────────────
function handleSearch() {
  const val = input.value.trim();
  if (val) loadTicker(val);
}

btn.addEventListener("click", handleSearch);
input.addEventListener("keydown", e => {
  if (e.key === "Enter") handleSearch();
  // clear not-found on new input
  if (e.key !== "Enter") notFound.classList.remove("on");
});

// Auto-uppercase as user types
input.addEventListener("input", () => {
  const pos = input.selectionStart;
  input.value = input.value.toUpperCase();
  input.setSelectionRange(pos, pos);
});

// Focus search on load
input.focus();
</script>
</body>
</html>
