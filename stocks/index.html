<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TH3SIS — Investment Thesis Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Spectral:ital,wght@0,400;0,600;1,500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* Shell palette — kept in sync with stocks/theme.css (teal dark / paper light, peach accent). */
  :root {
    --bg:           #051214;
    --header-bg:    linear-gradient(160deg, #0b191b, #051214);
    --bd:           #253336;
    --bd2:          #314043;
    --tx-title:     #d9ecef;
    --tx-main:      #d9ecef;
    --tx-dim:       #5f6f72;
    --tx-chip:      #798a8d;
    --accent:       #f2a26a;
    --accent-soft:  #f2a26a;
    --accent-fg:    #1a1410;
    --search-bg:    #1b292c;
    --search-tx:    #d9ecef;
    --search-ph:    #5f6f72;
    --loading-bg:   #051214;
    --empty-mark:   #1b292c;
    --empty-span:   #253336;
    --empty-msg:    #5f6f72;
    --chip-bd:      #253336;
    --chip-act-tx:  #f2a26a;
    --chip-act-nm:  #798a8d;
    --dot-go:       #66b278;
    --dot-stop:     #dd817a;
  }
  :root.light {
    --bg:           #f4ece0;
    --header-bg:    linear-gradient(160deg, #fdf8ef, #efe5d4);
    --bd:           #e2d3bf;
    --bd2:          #d6c8b4;
    --tx-title:     #211c15;
    --tx-main:      #342e25;
    --tx-dim:       #968a76;
    --tx-chip:      #756a58;
    --accent:       #ac5700;
    --accent-soft:  #ac5700;
    --accent-fg:    #fdf8ef;
    --search-bg:    #ebdcc9;
    --search-tx:    #211c15;
    --search-ph:    #968a76;
    --loading-bg:   #f4ece0;
    --empty-mark:   #ebdcc9;
    --empty-span:   #d6c8b4;
    --empty-msg:    #968a76;
    --chip-bd:      #e2d3bf;
    --chip-act-tx:  #ac5700;
    --chip-act-nm:  #756a58;
    --dot-go:       #66b278;
    --dot-stop:     #dd817a;
  }

  html, body { height: 100%; background: var(--bg); color: var(--tx-main);
    font-family: 'JetBrains Mono', ui-monospace, monospace; overflow: hidden; transition: background .2s, color .2s; }

  /* ── Shell layout ───────────────────────────────────── */
  #shell { display: flex; flex-direction: row; height: 100vh; }

  /* ── Sidebar ────────────────────────────────────────── */
  #sidebar {
    flex-shrink: 0;
    width: 244px;
    display: flex; flex-direction: column;
    padding: 18px 16px 16px;
    border-right: 1px solid var(--bd);
    background: var(--header-bg);
    transition: background .2s, border-color .2s;
  }
  #wordmark {
    font-family: 'Spectral', Georgia, serif;
    font-size: 22px; font-weight: 600;
    letter-spacing: 0.35em; color: var(--tx-title); white-space: nowrap;
  }
  #wordmark span { color: var(--accent); }

  /* subtitle */
  #subtitle { font-size: 9.5px; color: var(--tx-dim); margin-top: 7px; letter-spacing: 0.05em; line-height: 1.65; }

  /* search bar */
  #search-wrap {
    display: flex; align-items: stretch; margin-top: 14px;
    background: var(--search-bg); border: 1px solid var(--bd2);
    border-radius: 6px; overflow: hidden; transition: border-color .15s;
  }
  #search-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 22%, transparent); }
  #search-input {
    background: transparent; border: none; outline: none;
    color: var(--search-tx); font-family: inherit; font-size: 13px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 7px 12px; width: 100%; min-width: 0;
  }
  #search-input::placeholder { color: var(--search-ph); font-weight: 400; text-transform: none; letter-spacing: 0; }
  #search-btn {
    background: var(--accent); border: none; cursor: pointer;
    color: var(--accent-fg); font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    padding: 0 14px; white-space: nowrap; transition: filter .15s;
  }
  #search-btn:hover { filter: brightness(1.08); }

  /* error badge */
  #not-found { display: none; align-items: flex-start; gap: 6px; font-size: 10px; color: var(--dot-stop); margin-top: 8px; line-height: 1.4; }
  #not-found.on { display: flex; }

  /* ── Pinned overview entry ──────────────────────────── */
  #nav-label { font-size: 9.5px; color: var(--tx-dim); letter-spacing: 0.12em; margin: 16px 0 8px; flex-shrink: 0; }
  .chip.pinned { flex-shrink: 0; background: color-mix(in srgb, var(--accent) 7%, transparent); }
  .chip.pinned .chip-dot.quiet { color: var(--accent); }
  .chip.pinned.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 16%, transparent); }
  .chip.pinned.active .chip-ticker { color: var(--chip-act-tx); }

  /* ── Chip rail (vertical list) ──────────────────────── */
  #chip-label { font-size: 9.5px; color: var(--tx-dim); letter-spacing: 0.12em; margin: 16px 0 8px; flex-shrink: 0; }
  #chip-rail {
    display: flex; flex-direction: column; gap: 5px;
    flex: 1; overflow-y: auto; margin: 0 -4px; padding: 0 4px;
  }
  .chip {
    display: flex; align-items: center; gap: 8px;
    background: transparent; border: 1px solid var(--chip-bd); border-radius: 5px;
    padding: 7px 10px; cursor: pointer; transition: all .15s; font-family: inherit;
    text-align: left; flex-shrink: 0;
  }
  .chip:hover { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }
  .chip.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 14%, transparent); }
  /* buy-alert radar dot (only lit for theses with alert config) */
  .chip-dot { width: 13px; flex-shrink: 0; font-size: 12px; line-height: 1; text-align: center; color: var(--tx-chip); }
  .chip-dot.armed      { color: var(--dot-go); animation: pulse-dot 1.4s ease-in-out infinite; }  /* in zone + thesis intact → GO LOOK */
  .chip-dot.suppressed { color: var(--dot-stop); }   /* in zone but thesis flag off → do NOT add */
  .chip-dot.quiet      { color: var(--tx-chip); }       /* visible-but-muted: monitored, not triggered */
  .chip-dot.unknown    { color: var(--tx-dim); }        /* hollow ring: no live data right now */
  .chip-ticker { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: var(--tx-main); min-width: 44px; flex-shrink: 0; }
  .chip.active .chip-ticker { color: var(--chip-act-tx); }
  .chip-name { font-size: 9.5px; color: var(--tx-chip); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chip.active .chip-name { color: var(--chip-act-nm); }

  /* theme toggle */
  #theme-btn {
    margin-top: 14px; flex-shrink: 0; align-self: flex-start;
    background: transparent; border: 1px solid var(--bd); border-radius: 20px;
    padding: 6px 14px; cursor: pointer; font-family: inherit; font-size: 10px;
    color: var(--tx-dim); letter-spacing: 0.08em; white-space: nowrap;
    transition: all .15s;
  }
  #theme-btn:hover { border-color: var(--accent); color: var(--tx-main); }

  /* ── Main area ──────────────────────────────────────── */
  #main { flex: 1; position: relative; overflow: hidden; }

  /* iframe */
  #thesis-frame { display: none; width: 100%; height: 100%; border: none; background: var(--bg); }
  #thesis-frame.on { display: block; }

  /* empty state */
  #empty {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 40px;
  }
  #empty.hidden { display: none; }
  #empty-mark {
    font-family: 'Spectral', Georgia, serif;
    font-size: 48px; font-weight: 600; letter-spacing: 0.35em;
    color: var(--empty-mark);
  }
  #empty-mark span { color: var(--empty-span); }
  #empty-msg { font-size: 11px; color: var(--empty-msg); letter-spacing: 0.1em; text-align: center; line-height: 1.8; }
  #empty-chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
  .empty-chip {
    background: transparent; border: 1px solid var(--bd); border-radius: 5px;
    padding: 5px 14px; cursor: pointer; font-family: inherit;
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--empty-msg);
    transition: all .2s;
  }
  .empty-chip:hover { border-color: var(--accent); color: var(--chip-act-tx); background: color-mix(in srgb, var(--accent) 8%, transparent); }

  /* loading */
  #loading { display: none; position: absolute; inset: 0; align-items: center; justify-content: center; background: var(--loading-bg); }
  #loading.on { display: flex; }
  #loading-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse-dot 1.2s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:.3;transform:scale(.7);} 50%{opacity:1;transform:scale(1);} }
  #loading-text { font-size: 10.5px; color: var(--tx-dim); letter-spacing: 0.12em; margin-left: 10px; }
</style>
</head>
<body>
<div id="shell">

  <!-- ── Sidebar ─────────────────────────────────────────────────────── -->
  <div id="sidebar">
    <div id="wordmark">TH<span>3</span>SIS</div>
    <div id="subtitle">investment thesis library · hover anything in a thesis for plain-english explanations</div>

    <div id="search-wrap">
      <input id="search-input" type="text" placeholder="ticker symbol…" autocomplete="off" autocorrect="off" spellcheck="false" />
      <button id="search-btn">▸ LOAD</button>
    </div>

    <div id="not-found">⚠ no thesis for that ticker yet</div>

    <!-- Pinned overview -->
    <div id="nav-label">OVERVIEW ›</div>
    <button id="portfolio-chip" class="chip pinned">
      <span class="chip-dot quiet">◈</span>
      <span class="chip-ticker">FOLIO</span>
      <span class="chip-name">positions &amp; allocation</span>
    </button>
    <button id="actions-chip" class="chip pinned">
      <span class="chip-dot quiet">▸</span>
      <span class="chip-ticker">ACTIONS</span>
      <span class="chip-name">limit orders &amp; to-dos</span>
    </button>
    <button id="generator-chip" class="chip pinned">
      <span class="chip-dot quiet">▦</span>
      <span class="chip-ticker">TREE</span>
      <span class="chip-name">house-money generator</span>
    </button>
    <button id="strategy-chip" class="chip pinned">
      <span class="chip-dot quiet">◈</span>
      <span class="chip-ticker">GATE</span>
      <span class="chip-name">prescreen doctrine &amp; verdicts</span>
    </button>
    <button id="calibration-chip" class="chip pinned">
      <span class="chip-dot quiet">◎</span>
      <span class="chip-ticker">SCORE</span>
      <span class="chip-name">band coverage &amp; calibration</span>
    </button>
    <button id="radar-chip" class="chip pinned">
      <span class="chip-dot quiet">◐</span>
      <span class="chip-ticker">RADAR</span>
      <span class="chip-name">frontier themes vs. holdings</span>
    </button>

    <!-- Chip list -->
    <div id="chip-label">THESES ›</div>
    <div id="chip-rail"></div>

    <button id="theme-btn">☀ LIGHT</button>
  </div>

  <!-- ── Main ────────────────────────────────────────────────────────── -->
  <div id="main">
    <div id="loading">
      <div id="loading-dot"></div>
      <div id="loading-text">LOADING THESIS…</div>
    </div>
    <iframe id="thesis-frame" title="Investment Thesis"></iframe>
    <div id="empty">
      <div id="empty-mark">TH<span>3</span>SIS</div>
      <div id="empty-msg">SELECT A TICKER FROM THE SIDEBAR TO LOAD ITS THESIS<br>OR TYPE ANY SYMBOL AND PRESS LOAD</div>
      <div id="empty-chips"></div>
    </div>
  </div>

</div>

<script src="portfolio/portfolio-data.js"></script>
<script>
// ── Thesis registry ──────────────────────────────────────────────────────────
// Buy-alert data is NOT hand-mirrored here anymore — it's read live from
// PF_ALERTS (stocks/portfolio/portfolio-data.js), the single source of truth.
// A ticker only shows a chip-dot radar if it has a PF_ALERTS row.
const REGISTRY = {
  ALAB:  { path: "alab/alab-thesis.html",   name: "Astera Labs" },
  AMZN:  { path: "amzn/amzn-thesis.html",   name: "Amazon.com" },
  ASML:  { path: "asml/asml-thesis.html",   name: "ASML Holding" },
  AVGO:  { path: "avgo/avgo-thesis.html",   name: "Broadcom Inc." },
  FICO:  { path: "FICO/FICO-thesis.html",   name: "Fair Isaac" },
  GOOGL: { path: "GOOGL/GOOGL-thesis.html", name: "Alphabet" },
  META:  { path: "META/META-thesis.html",   name: "Meta Platforms" },
  MRVL:  { path: "mrvl/mrvl-thesis.html",  name: "Marvell Technology" },
  MSFT:  { path: "MSFT/MSFT-thesis.html",  name: "Microsoft" },
  MU:    { path: "MU/MU-thesis.html",       name: "Micron Technology" },
  NVDA:  { path: "NVDA/NVDA-thesis.html",   name: "NVIDIA" },
  TSM:   { path: "tsm/tsm-thesis.html",     name: "Taiwan Semi" },
};
for (const [t, row] of Object.entries(REGISTRY)) {
  if (typeof PF_ALERTS !== "undefined" && PF_ALERTS[t]) {
    row.alert = { buyFloor: PF_ALERTS[t].buyFloor, intact: PF_ALERTS[t].thesisIntact, nextEarnings: PF_ALERTS[t].nextEarnings };
  }
}

// ── DOM refs ─────────────────────────────────────────────────────────────────
const input      = document.getElementById('search-input');
const btn        = document.getElementById('search-btn');
const frame      = document.getElementById('thesis-frame');
const empty      = document.getElementById('empty');
const emptyChips = document.getElementById('empty-chips');
const chipRail   = document.getElementById('chip-rail');
const notFound   = document.getElementById('not-found');
const loading    = document.getElementById('loading');
const loadingTxt = document.getElementById('loading-text');
const themeBtn   = document.getElementById('theme-btn');
const portfolioChip = document.getElementById('portfolio-chip');
const actionsChip   = document.getElementById('actions-chip');
const generatorChip = document.getElementById('generator-chip');
const strategyChip  = document.getElementById('strategy-chip');
const calibrationChip = document.getElementById('calibration-chip');
const radarChip = document.getElementById('radar-chip');

// ── Theme ────────────────────────────────────────────────────────────────────
const THEME_KEY = 'th3sis_theme';
// Default is light; only switch to dark if explicitly saved as 'dark'
let isLight = localStorage.getItem(THEME_KEY) !== 'dark';

function applyTheme(light) {
  isLight = light;
  document.documentElement.classList.toggle('light', light);
  // Label shows current mode (click to toggle away from it)
  themeBtn.textContent = light ? '☀ LIGHT' : '◑ DARK';
  localStorage.setItem(THEME_KEY, light ? 'light' : 'dark');
  // postMessage is more reliable than contentDocument on file:// protocol
  try { frame.contentWindow.postMessage({ type: 'th3sis-theme', light }, '*'); } catch (_) {}
}

applyTheme(isLight);
themeBtn.addEventListener('click', () => applyTheme(!isLight));

// ── Build chips ──────────────────────────────────────────────────────────────
let activeChip = null;

function makeChip(ticker, target) {
  const info = REGISTRY[ticker];
  const el = document.createElement('button');
  el.className = 'chip';
  el.dataset.ticker = ticker;
  const dot = info.alert ? `<span class="chip-dot unknown" title="checking last close…">○</span>` : `<span class="chip-dot"></span>`;
  el.innerHTML = `${dot}<span class="chip-ticker">${ticker}</span><span class="chip-name">${info.name}</span>`;
  el.addEventListener('click', () => navigate(ticker));
  target.appendChild(el);
  return el;
}

const headerChips = {};
Object.keys(REGISTRY).sort().forEach(t => { headerChips[t] = makeChip(t, chipRail); });

Object.keys(REGISTRY).sort().forEach(t => {
  const el = document.createElement('button');
  el.className = 'empty-chip';
  el.textContent = t;
  el.addEventListener('click', () => navigate(t));
  emptyChips.appendChild(el);
});

// ── Buy-alert radar ────────────────────────────────────────────────────────────
// For each thesis that declares alert config, fetch the last daily close and light a
// sidebar dot per the pre-committed two-input gate (price AND thesis-intact):
//   ARMED      close ≤ buyFloor AND intact   → green ⚑  (GO-LOOK, not GO-BUY)
//   SUPPRESSED close ≤ buyFloor AND !intact  → red ✕    (price low because story changed)
//   QUIET      close > buyFloor               → dim ·
//   UNKNOWN    live close unavailable         → faint ·  (graceful fallback)
// Live close = Yahoo chart via a public CORS proxy; any failure leaves the dot neutral.
// Nothing cached. The flag (intact) is mirrored from each stock's config ALERT block.
const ALERT_PROXY = "https://api.allorigins.win/get?url=";

async function lastClose(symbol) {
  try {
    const y = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=5d`;
    const r = await fetch(ALERT_PROXY + encodeURIComponent(y));
    if (!r.ok) return null;
    const res = JSON.parse((await r.json()).contents).chart.result[0];
    const closes = ((res.indicators && res.indicators.quote[0].close) || []).filter(x => x != null);
    const px = closes.length ? closes[closes.length - 1] : (res.meta && res.meta.regularMarketPrice);
    return Number.isFinite(px) ? Math.round(px * 100) / 100 : null;
  } catch (_) { return null; }
}

function alertState(close, a) {
  const stale = a.nextEarnings && new Date() > new Date(a.nextEarnings);
  const staleNote = stale ? ` ⚠ Band may be stale (past ${a.nextEarnings}) — refresh the thesis before trusting this floor.` : "";
  if (close == null)
    return { cls: "unknown", glyph: "○", msg: "live close unavailable (offline/blocked) — open the thesis to check manually." };
  if (close > a.buyFloor)
    return { cls: "quiet", glyph: "●", msg: `$${close} — $${Math.round(close - a.buyFloor)} above your $${a.buyFloor} floor. Quiet.${staleNote}` };
  if (!a.intact)
    return { cls: "suppressed", glyph: "✕", msg: `$${close} — in the buy zone (≤ $${a.buyFloor}) but the THESIS FLAG IS OFF (a kill-switch tripped). Do NOT add — the price is low because the story changed. Re-underwrite first.${staleNote}` };
  return { cls: "armed", glyph: "⚑", msg: `$${close} — ENTERED your buy zone (≤ $${a.buyFloor}), thesis intact. This is a GO-LOOK, not a GO-BUY: reopen the thesis, confirm no kill-switch tripped, then act on the plan you wrote calmly.${staleNote}` };
}

async function runRadar() {
  for (const t of Object.keys(REGISTRY)) {
    const a = REGISTRY[t].alert;
    const chip = headerChips[t];
    if (!a || !chip) continue;
    const dot = chip.querySelector('.chip-dot');
    const s = alertState(await lastClose(t), a);
    if (dot) { dot.className = `chip-dot ${s.cls}`; dot.textContent = s.glyph; }
    chip.title = `${t} buy-alert — ${s.msg}`;
  }
}
runRadar();

// ── Generic frame loader (shared by theses + portfolio) ───────────────────────
// pendingTab: optional tab id (e.g. "the-future") to deep-link into once the child
// page has loaded — see the th3sis-goto postMessage below and route() further down.
function loadFrame(path, label, pendingTab) {
  empty.classList.add('hidden');
  frame.classList.remove('on');
  if (loadingTxt) loadingTxt.textContent = label || 'LOADING…';
  loading.classList.add('on');

  frame.onload = () => {
    loading.classList.remove('on');
    frame.classList.add('on');
    // Send theme to iframe — postMessage works on file:// unlike contentDocument
    try { frame.contentWindow.postMessage({ type: 'th3sis-theme', light: isLight }, '*'); } catch (_) {}
    if (pendingTab) {
      // Retry burst, not a single send: a thesis is ~250KB of JSX that Babel transpiles
      // client-side, and React's useEffect (where the tab-switch listener attaches) is
      // scheduled as a deferred "passive effect" — it does NOT run synchronously with
      // mount. Measured in practice: frame.onload can fire, and this message can arrive,
      // in the exact gap AFTER the component's initial render already read its starting
      // tab but BEFORE useEffect has attached its listener — missing a single send
      // entirely with no error. setActiveTab is idempotent, so resending the identical
      // message a few times over ~1.2s is harmless and closes that race reliably.
      [0, 150, 400, 800, 1200].forEach(delay => {
        setTimeout(() => {
          try { frame.contentWindow.postMessage({ type: 'th3sis-goto', tab: pendingTab }, '*'); } catch (_) {}
        }, delay);
      });
    }
    frame.onload = null;
  };
  // contentWindow.location.replace() instead of frame.src = path: setting .src
  // directly makes the iframe's navigation join the TOP-level document's session
  // history as its own back/forward step — on top of the hash change navigate()
  // already pushed, doubling every step and desyncing hash from displayed content
  // after one "back" press. .replace() navigates the iframe without adding a step;
  // the hash is the only thing that should move the back/forward stack.
  try { frame.contentWindow.location.replace(path); }
  catch (_) { frame.src = path; } // fallback if contentWindow is ever inaccessible
}

function setActiveChip(el) {
  if (activeChip) activeChip.classList.remove('active');
  activeChip = el || null;
  if (activeChip) activeChip.classList.add('active');
}

// ── Hash routing ───────────────────────────────────────────────────────────────
// The hash is the single source of navigation truth: every load path (chip click,
// ticker search, or a th3sis-nav message from a child page) goes through navigate(),
// which sets location.hash; the hashchange listener is what actually loads the frame.
// This gives every view a shareable URL and a working back/forward button for free.
const PAGE_ROUTES = {
  folio:   { chip: portfolioChip,   path: 'portfolio/positions.html',    label: 'LOADING PORTFOLIO…' },
  actions: { chip: actionsChip,     path: 'portfolio/action-items.html', label: 'LOADING ACTION ITEMS…' },
  tree:    { chip: generatorChip,   path: 'portfolio/generator.html',    label: 'GROWING THE TREE…' },
  gate:    { chip: strategyChip,    path: 'portfolio/strategy.html',     label: 'LOADING THE GATE…' },
  score:   { chip: calibrationChip, path: 'portfolio/calibration.html',  label: 'LOADING THE SCORECARD…' },
  radar:   { chip: radarChip,       path: 'portfolio/radar.html',        label: 'SCANNING THE FRONTIER…' },
};
// Deep-link suffix (e.g. #AVGO:future) → the TabNav id a current-convention thesis
// expects. Legacy-convention theses without TabNav simply ignore the th3sis-goto
// message (see the fallback rule each thesis's message listener already has).
const TAB_SUFFIX = { past: 'the-past', current: 'the-current', future: 'the-future' };

function route(hashRaw) {
  const hash = (hashRaw || '').replace(/^#/, '');
  if (!hash) return;
  const [keyRaw, tabSuffix] = hash.split(':');
  const key = (keyRaw || '').trim();

  const page = PAGE_ROUTES[key.toLowerCase()];
  if (page) {
    notFound.classList.remove('on');
    setActiveChip(page.chip);
    loadFrame(page.path, page.label);
    return;
  }

  const t = key.toUpperCase();
  if (REGISTRY[t]) {
    notFound.classList.remove('on');
    setActiveChip(headerChips[t] || null);
    input.value = t;
    const pendingTab = tabSuffix && TAB_SUFFIX[tabSuffix.toLowerCase()];
    loadFrame(REGISTRY[t].path, 'LOADING THESIS…', pendingTab);
    return;
  }

  notFound.classList.add('on');
  setTimeout(() => notFound.classList.remove('on'), 3000);
}

function navigate(hash) {
  // Setting an unchanged hash doesn't fire 'hashchange' — route directly in that case
  // (e.g. clicking the already-active chip again, or a child re-posting the same nav).
  if (location.hash === '#' + hash) { route(hash); return; }
  location.hash = hash;
}

window.addEventListener('hashchange', () => route(location.hash));

// A child page (FOLIO row, GATE verdict, RADAR ticker chip, etc.) can request
// navigation with { type: 'th3sis-nav', target: 'AVGO' } or 'AVGO:future'. Any page
// not sending this just doesn't — no wiring needed on pages that don't opt in.
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'th3sis-nav' && e.data.target) navigate(e.data.target);
});

portfolioChip.addEventListener('click', () => navigate('folio'));
actionsChip.addEventListener('click', () => navigate('actions'));
generatorChip.addEventListener('click', () => navigate('tree'));
strategyChip.addEventListener('click', () => navigate('gate'));
calibrationChip.addEventListener('click', () => navigate('score'));
radarChip.addEventListener('click', () => navigate('radar'));

// ── Search events ─────────────────────────────────────────────────────────────
function handleSearch() {
  const val = input.value.trim();
  if (val) navigate(val);
}

btn.addEventListener('click', handleSearch);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSearch();
  if (e.key !== 'Enter') notFound.classList.remove('on');
});
input.addEventListener('input', () => {
  const pos = input.selectionStart;
  input.value = input.value.toUpperCase();
  input.setSelectionRange(pos, pos);
});

input.focus();

// Load whatever the URL already pointed at (a shared link, a bookmark, or a
// back/forward navigation landing here on first paint) — hashchange doesn't fire for
// a hash that was already in the URL before any listener was attached.
if (location.hash) route(location.hash);
</script>
</body>
