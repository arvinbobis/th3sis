// ── Tooltip engine ─────────────────────────────────────────────────────────
let tipEl = null;
function ensureTip() {
  if (!tipEl) { tipEl = document.createElement("div"); tipEl.id = "tip-box"; document.body.appendChild(tipEl); }
  return tipEl;
}
function showTip(e, title, body, note, color) {
  const el = ensureTip();
  el.innerHTML = `<div class="tt" style="color:${color||'#9fb4ff'}">${title}</div><div class="tb">${body}</div>${note?`<div class="tn">${note}</div>`:""}`;
  el.classList.add("on"); moveTip(e);
}
function moveTip(e) {
  const el = ensureTip(); const pad = 16;
  let x = e.clientX + pad, y = e.clientY + pad;
  const r = el.getBoundingClientRect();
  if (x + r.width > window.innerWidth - 8) x = e.clientX - r.width - pad;
  if (y + r.height > window.innerHeight - 8) y = e.clientY - r.height - pad;
  el.style.left = x + "px"; el.style.top = y + "px";
}
function hideTip() { if (tipEl) tipEl.classList.remove("on"); }

  const nHist = HISTORY.length;

    const t = (i + 1) / fwdN;

  });

  const upper = mid.map(([x, y], i) => [x, y - spread(i)]);
  const lower = mid.map(([x, y], i) => [x, y + spread(i)]);
  const bandPath = `M ${nowX} ${nowY} ` + upper.map(([x, y]) => `L ${x} ${y}`).join(" ") + " " +
    lower.slice().reverse().map(([x, y]) => `L ${x} ${y}`).join(" ") + " Z";
  const midPath = `M ${nowX} ${nowY} ` + mid.map(([x, y]) => `L ${x} ${y}`).join(" ");

          <text x={x} y={y - 12} fill={i === 0 ? "#e0a83b" : c.accent} fontSize="10.5" fontFamily={FONT_MONO} textAnchor="middle">{FUTURE_Q[i]}</text>

  );
}

function tagColor(tag) {
  if (tag === "BEAT")  return "#3fd07a";

}

// ── Reversion Clock ────────────────────────────────────────────────────────
function ReversionClock() {
  const dislocationDate = new Date(DISLOCATION_DATE);
  const today = new Date();
  const elapsed = Math.round((today - dislocationDate) / 86400000);
  const pct = Math.min(100, (elapsed / REVERSION_PRECEDENT_DAYS) * 100);
  const trough = REVERSION_TROUGH, baseFloor = REVERSION_BASEFLOOR, now = NOW_PRICE;
  const rawRec = ((now - trough) / (baseFloor - trough)) * 100;
  const recPct = Math.round(Math.min(400, rawRec));
  const barFill = Math.min(100, rawRec / 4);
  return (
    <div style={{ marginTop: 12, padding: "12px 14px", background: "#0a0e15", border: "1px solid #161c28", borderRadius: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>

        <div style={{ fontSize: 11, color: "#9aa4b8" }}><span style={{ color: "#3fd07a", fontWeight: 700 }}>{elapsed}d</span> elapsed / {REVERSION_PRECEDENT_DAYS}d precedent — <span style={{ color: "#3fd07a" }}>fully resolved ✓</span></div>

      <div {...tip("How much time has passed",
        "In June 2025, MU hit $102 during a tariff/macro panic. This bar shows elapsed days vs. the ~180-day window it took to recover. The bar is maxed — we're more than double past the recovery window. The dislocation is long resolved.",
        "Fully elapsed = the dislocation narrative is closed.", "#e0a83b")}
        style={{ position: "relative", height: 14, background: "#11161f", borderRadius: 7, overflow: "hidden", border: "1px solid #1c2230" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: "100%", background: "linear-gradient(90deg,#f1564b,#3fd07a)", borderRadius: 7 }} />
        <div style={{ position: "absolute", right: 0, top: -3, bottom: -3, width: 2, background: "#3fd07a" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#5a6477", marginTop: 3 }}>
        <span>day 0</span><span style={{ color: "#3fd07a" }}>180d base-reversion mark — fully elapsed ({elapsed}d) ✓</span>
      </div>
      <div style={{ marginTop: 12, marginBottom: 4, fontSize: 9.5, color: "#5a6477" }}>PRICE RECOVERY · ${trough} trough → ${baseFloor} base floor → ${now} ATH</div>
      <div {...tip("How far the price has bounced back",
        `Stock bottomed at $${trough} in June 2025. The base floor (post-Q1 FY2026 recovery zone) was $${baseFloor}. At $${now}, the stock has recovered ${recPct}% of the trough-to-base-floor gap — it massively overshot, driven by the AI memory supercycle. The dislocation narrative is closed.`,
        "The new question: is $1,059 justified by sustainable earnings, or is it cycle-peak pricing?", "#9fb4ff")}
        style={{ position: "relative", height: 14, background: "#11161f", borderRadius: 7, overflow: "hidden", border: "1px solid #1c2230" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${barFill}%`, background: "linear-gradient(90deg,#f1564b,#3fd07a)", borderRadius: 7 }} />
        <div style={{ position: "absolute", left: `${barFill}%`, top: "50%", width: 8, height: 8, borderRadius: "50%", background: "#9fb4ff", transform: "translate(-50%,-50%)", boxShadow: "0 0 8px #9fb4ff", pointerEvents: "none" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#5a6477", marginTop: 3 }}>
        <span>${trough}</span>
        <span style={{ color: "#9fb4ff" }}>${now} now · {recPct}% of trough-to-base gap (bar scaled: full = {recPct}%)</span>

// ── Track Record ───────────────────────────────────────────────────────────
function TrackRecord() {
  const W = 1000, H = 300, pl = 44, pr = 70, pt = 20, pb = 40;
  const pw = W - pl - pr, ph = H - pt - pb;
  const y = (p) => pt + (1 - (p - TRACK_PRICE_MIN) / (TRACK_PRICE_MAX - TRACK_PRICE_MIN)) * ph;
  const x = (i) => pl + (TRACK.length === 1 ? pw / 2 : (i / (TRACK.length - 1)) * pw);
  const grid = [600, 500, 400, 300, 200, 100];
  const pathPts = TRACK.map((t, i) => [x(i), y(t.post)]);
  const linePath = "M " + pathPts.map(([px, py]) => `${px} ${py}`).join(" L ");
  const hits = TRACK.filter((t) => t.landed.includes("base") || t.landed.includes("bull")).length;
  return (
    <div style={{ background: "#080b11", padding: "16px 18px", borderTop: "1px solid #161c28" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <div style={{ fontSize: 11.5, letterSpacing: "0.18em", color: "#7b86a0" }}>
          <span style={{ background: "#161c28", padding: "2px 6px", borderRadius: 3, color: "#cdd5e3", marginRight: 8 }}>TR · BACKTEST</span>
          THESIS TRACK RECORD · RECONSTRUCTED BANDS vs ACTUAL PRICE
        </div>
        <div style={{ fontSize: 11, color: "#7b86a0" }}>BASE-OR-BETTER LANDINGS: <span style={{ color: "#3fd07a", fontWeight: 700 }}>{hits}/{TRACK.length}</span></div>
      </div>
      <div style={{ fontSize: 10.5, color: "#5a6477", marginBottom: 10 }}>
        Each column = one earnings date. Stacked zones are the scenario bands as they would have been drawn at that time. Note: Q1 FY26 and Q2 FY26 each blew completely past the bull band on PRICE; Q3 FY26 is different — fundamentals ($41.46B revenue, $100B in SCAs) blew past the old bull band too, but price landed back in the base zone. The stock, not just the story, finally paused.
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
        {grid.map((p) => (
          <g key={p}>
            <line x1={pl} y1={y(p)} x2={W - pr} y2={y(p)} stroke="#161c28" strokeWidth="1" strokeDasharray="1 5" />
            <text x={W - pr + 8} y={y(p) + 3} fill="#5a6477" fontSize="11" fontFamily={FONT_MONO}>${p}</text>
          </g>
        ))}
        {TRACK.map((t, i) => {
          const cx = x(i), bw = 46;
          const landWord = t.landed.includes("bull") ? "well above the optimistic zone" : t.landed.includes("base") ? "the middle zone" : "the pessimistic zone";
          const reactWord = (t.reaction === "--" || t.reaction === "−−") ? "the stock FELL sharply" : t.reaction === "++" ? "the stock SURGED" : "the stock ROSE";
          const seg = (range, color) => (
            <rect x={cx - bw / 2} y={y(range[1])} width={bw} height={Math.max(2, y(range[0]) - y(range[1]))}
              fill={color} opacity={t.conf === "med" ? 0.32 : 0.5} rx="2"
              style={{ animation: `fadeUp .5s ease ${i * 0.08}s both` }}
              {...tipSvg(`${t.q} earnings`,
                `At this earnings date, the scenario band would have been: red=bear, yellow=base, green=bull. In reality, ${reactWord} and the price ended up in ${landWord} (~$${t.post}).`,
                t.conf === "med" ? "Marked 'lower-confidence' — bands reconstructed in hindsight." : null,
                color.includes("63,208") ? "#3fd07a" : color.includes("224,168") ? "#e0a83b" : "#f1564b")} />
          );
          return (
            <g key={t.q}>
              {seg(t.bull, "rgba(63,208,122,0.55)")}
              {seg(t.base, "rgba(224,168,59,0.5)")}
              {seg(t.bear, "rgba(241,86,75,0.5)")}
              <text x={cx} y={H - 24} fill="#9aa4b8" fontSize="11" fontFamily={FONT_MONO} textAnchor="middle">{t.q}</text>
              <text x={cx} y={H - 11} fill={t.conf === "med" ? "#5a6477" : "#3a4252"} fontSize="8.5" fontFamily={FONT_MONO} textAnchor="middle">
                {t.conf === "med" ? "lower-conf" : ""}
              </text>
            </g>
          );
        })}
        <path d={linePath} fill="none" stroke="#dde3ee" strokeWidth="2.2" className="track-line" style={{ filter: "drop-shadow(0 0 4px rgba(221,227,238,0.4))" }} />
        {TRACK.map((t, i) => {
          const isLast = i === TRACK.length - 1;
          return (
            <g key={t.q} style={{ animation: `pop .4s cubic-bezier(.2,1.4,.4,1) ${0.3 + i * 0.08}s both` }}>
              <circle cx={x(i)} cy={y(t.post)} r={isLast ? 6 : 4} fill={isLast ? "#2f6dff" : "#0a0d14"} stroke="#fff" strokeWidth={isLast ? 2 : 1.5}
                {...tipSvg(isLast ? `Most recent quarter (${t.q})` : `${t.q}: actual price`,
                  isLast ? `After Q3 FY2026 earnings (June 24, 2026) — a blowout beat ($41.46B vs $33.5B guide) — MU settled around $${t.post}, actually BELOW the $1,059 it traded at going into the print. The fundamentals landed above the old bull band; the price landed in the base zone. Next print (Q4 FY26, ~Sep 2026) is what tells you whether the market's skepticism resolves.`
                    : `After ${t.q} earnings, MU actually traded around $${t.post}. Compare this dot to the colored bars behind it.`,
                  null, isLast ? "#9fb4ff" : "#cdd5e3")} />
              {isLast && <text x={x(i)} y={y(t.post) - 14} fill="#9fb4ff" fontSize="11" fontFamily={FONT_MONO} textAnchor="middle" fontWeight="700">{t.q} ${t.post}</text>}
            </g>
          );
        })}
      </svg>
      <div style={{ marginTop: 12, padding: "10px 12px", background: "#0a0e15", border: "1px solid #161c28", borderRadius: 8 }}>
        <div style={{ fontSize: 10.5, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 6 }}>READ-OUT</div>
        <div style={{ fontSize: 12, color: "#bcc6d8", lineHeight: 1.6 }}>
          Tracked <span style={{ color: "#3fd07a", fontWeight: 700 }}>base-or-better all {hits} of {TRACK.length} quarters</span>. Q1 FY26 and Q2 FY26 each printed <span style={{ color: "#fff", fontWeight: 700 }}>above the bull band on price</span> — the supercycle outran any reasonable forecast. Q3 FY26 broke that pattern: fundamentals ($41.46B revenue, 84.9% GM, $100B in 5-year SCAs) again blew past the old bull case, but price ($979) landed back in the <span style={{ color: "#e0a83b", fontWeight: 700 }}>base zone</span> — the first quarter where the market didn't simply chase the print. Next real test: <span style={{ color: "#e0a83b", fontWeight: 700 }}>Q4 FY26 + initial FY2027 guidance, ~Sep 2026</span>.
        </div>
      </div>
      <ReversionClock />
      <div style={{ fontSize: 9.5, color: "#3d4555", marginTop: 8, lineHeight: 1.5 }}>
        ⚠ Bands are reconstructed now — not archived in real time. Lower-confidence quarters (Q1/Q2 FY25) are pre-AI-supercycle awareness. The actual magnitude of the revenue ramp exceeded all scenario bands — this is a feature of cyclical companies at turning points, not a modeling error. Micron fiscal year ends August 31.
      </div>
    </div>
  );
}

              <div style={{ fontSize: 11.5, letterSpacing: "0.18em", color: "#7b86a0" }}>
                <span style={{ background: "#161c28", padding: "2px 6px", borderRadius: 3, color: "#cdd5e3", marginRight: 8 }}>NOW</span>

            <div className="panel" key={active + "-chart"}><FanChart c={c} /></div>
            <div style={{ marginTop: 6, display: "flex", justifyContent: "space-between", fontSize: 10.5, color: "#5a6477" }}>
              <span><span style={{ color: c.accent }}>━━</span> {c.label.toLowerCase()} mid &nbsp; <span style={{ color: "#2f6dff" }}>┊</span> now &nbsp; <span style={{ color: "#cdd5e3" }}>━</span> history &nbsp; <span style={{ color: "#e0a83b" }}>◆</span> Q4 FY26* = ~Sep 2026</span>

            </div>

            {/* KPI chart */}
            <div style={{ marginTop: 18, borderTop: "1px solid #161c28", paddingTop: 14 }}>
              <div style={{ fontSize: 11.5, letterSpacing: "0.16em", color: "#7b86a0", marginBottom: 4 }}
                {...tip("The single most important number",
                  "Quarterly revenue tells you where Micron is in the memory cycle. Q3 FY2026 actual ($41.46B) was 24% above its own $33.5B guide; Q4 is now guided to $50B±$1B. For reference, Micron's entire FY2022 annual revenue was ~$30.8B. If this run-rate is sustainable through FY2027 as management suggests, $979 looks cheap; if this is cycle-peak, the stock is expensive.",
                  "This KPI drives everything — gross margin, EPS, and the multiple all follow revenue trajectory.", "#9fb4ff")}>
                <span style={{ background: "#161c28", padding: "2px 6px", borderRadius: 3, color: "#cdd5e3", marginRight: 8 }}>KPI · K01</span>
                Quarterly Revenue
                <span style={{ color: "#5a6477", marginLeft: 8 }}>$B  ·  HIGHER BETTER</span>
                <span style={{ color: "#e0a83b", marginLeft: 8, fontSize: 10 }}>* = reports ~Sep 2026</span>
              </div>
              <div className="panel" key={active + "-kpi"} style={{ display: "flex", alignItems: "flex-end", gap: 10, height: 120, padding: "12px 4px 0" }}>
                <KpiCol label="Q3 FY26" val={KPI_HIST} baseline accentColor="#7b86a0" />
                {kpiVals.map((v, i) => <KpiCol key={i} label={FUTURE_Q[i]} val={v} accentColor={c.accent} delay={i * 0.08} />)}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginTop: 12, fontSize: 11, lineHeight: 1.5 }}>
                <div>
                  <div style={{ color: "#5a6477", letterSpacing: "0.12em", marginBottom: 3 }}>WHAT THIS MEASURES</div>
                  <div style={{ color: "#9aa4b8" }}>Total quarterly revenue across DRAM, HBM, and NAND. Q3 FY2026 actual was $41.46B (76% DRAM), already confirming HBM/AI training demand as the dominant driver. Bull case shows continued acceleration toward the SCA-implied run-rate; bear case shows deceleration on the ~70–80% of volume the $100B in contracts doesn't cover.</div>
                </div>
                <div>
                  <div style={{ color: "#5a6477", letterSpacing: "0.12em", marginBottom: 3 }}>WHAT THE <span style={{ color: c.accent }}>{c.label}</span> CASE REQUIRES</div>
                  <div style={{ color: c.accent }}>
                    {active === "bull"
                      ? "Q4 beats $50B+$1B, FY2027 initial guidance (given alongside Q4) gets raised above run-rate, and Micron holds HBM4 share despite Samsung's mass-production head start."
                      : active === "base"
                      ? "Q4 lands within the $50B±$1B guide at ~86% GM; FY2027 initial guidance confirms the cycle extending, consistent with the $100B SCA visibility through 2030."
                      : "Q4 misses the $50B±$1B guide, or FY2027 initial guidance signals deceleration on the non-SCA-covered volume; Samsung/CXMT visibly take named HBM4 design wins."}
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* Right — thesis + signals */}
          <div style={{ background: "#080b11", padding: "16px 18px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontSize: 11.5, letterSpacing: "0.18em", color: "#7b86a0" }}>THESIS · ALL SIGNALS</div>
              <div style={{ fontSize: 12, color: "#7b86a0" }}>{c.label.toLowerCase()} 12M <span style={{ color: c.accent, fontWeight: 700 }}>{c.target12}</span></div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12 }}>
              <Segmented active={active} setActive={setActive} small />
              <span className="dot-track" style={{ marginLeft: 6, fontSize: 10.5, color: c.accent }}>● TRACKING</span>
            </div>
            <div className="panel" key={active + "-op"} style={{ fontSize: 12.5, lineHeight: 1.6, color: "#bcc6d8", marginBottom: 16, minHeight: 72 }}>{c.op}</div>

            <SignalGroup id="SN01" title="Revenue Cycle &amp; Forward Guidance" requires={c.requires01} accent={c.accent} evidence={3}>
              {SIGNALS[active].map((s, i) => <SignalRow key={i} s={s} accent={c.accent} />)}
            </SignalGroup>

            <SignalGroup id="SN02" title="Structural De-risking &amp; Competitive Position" requires={c.requires02} accent={c.accent} evidence={2}>
              {MARGIN[active].map((s, i) => <MarginRow key={i} s={s} accent={c.accent} />)}
            </SignalGroup>

            <div style={{ marginTop: 14, borderTop: "1px solid #161c28", paddingTop: 10 }}>
              <div style={{ fontSize: 10.5, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 3 }}>WHAT BREAKS THE <span style={{ color: c.accent }}>{c.label}</span> CASE</div>
              <div style={{ fontSize: 11.5, color: "#9aa4b8", lineHeight: 1.5 }}>{c.breaks}</div>
            </div>

            {/* Valuation ruler */}
            <div style={{ marginTop: 14, padding: "10px 12px", background: "#0a0d14", border: "1px solid #161c28", borderRadius: 6 }}>
              <div style={{ fontSize: 10, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 4 }}>VALUATION RULER</div>
              <div {...tip("How we price this stock",
                "For a cyclical company like Micron, using peak-cycle P/E is dangerous — it always looks 'cheap' right before margins collapse, which is exactly why the market is currently applying a historically compressed ~6.4× forward P/E even after a record-blowout quarter. Metric is a judgment blend of two real anchors: Q4 FY26 guide ($31 non-GAAP EPS) annualized (~$124), and the NTM EPS the market itself implies by backing out today's reported 6.4× forward P/E at $979 (~$153) — roughly $135 blended, held loosely.",
                "Bear: ~$85 (degraded, non-SCA volume) × 8× ≈ $680 (band $550–750, narrower than before given $100B in floor-margin-protected SCA revenue). Base: ~$135 × 9× ≈ $1,215 (band $1,100–1,350). Bull: ~$150+ × 12× ≈ $1,800 (band $1,500–1,800, roughly where 45-analyst consensus — avg $1,486, high $1,600 — already sits).", "#9aa4b8")}
                style={{ fontSize: 11, color: "#9aa4b8", lineHeight: 1.5 }}>
                Cyclical normalized EPS × P/E. At $979: ~6.4× forward P/E — a historically compressed multiple despite record earnings, meaning the market is still discounting mean reversion even after Q3 blew past the old bull case. Bear: ~$85 (non-SCA volume, degraded) × 8× ≈ $680 (band $550–750). Base: ~$135 blended run-rate × 9× ≈ $1,215 (band $1,100–1,350). Bull: ~$150+ × 12× ≈ $1,800 (band $1,500–1,800, near the 45-analyst consensus average of $1,486 / high $1,600).
              </div>
            </div>

            {/* Risk / Reward */}
            <div style={{ marginTop: 10, padding: "10px 12px", background: "#0a0d14", border: "1px solid #2a1a1a", borderRadius: 6 }}>
              <div style={{ fontSize: 10, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 8 }}>RISK / REWARD AT ${NOW_PRICE}</div>
              {[
                { label: "BEAR", color: "#f1564b", lo: 550,  hi: 750  },
                { label: "BASE", color: "#e0a83b", lo: 1100, hi: 1350 },
                { label: "BULL", color: "#3fd07a", lo: 1500, hi: 1800 },
              ].map(({ label, color, lo, hi }) => {
                const mid = Math.round((lo + hi) / 2);
                const pct = Math.round(((mid - NOW_PRICE) / NOW_PRICE) * 100);
                const sign = pct >= 0 ? "+" : "";
                const barW = Math.max(4, Math.min(96, ((pct + 65) / 140) * 100));
                return (
                  <div key={label} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}
                    {...tip(`${label} scenario return`,
                      `If the ${label.toLowerCase()} case plays out over 12 months, price would land in the $${lo.toLocaleString()}–$${hi.toLocaleString()} range — roughly ${sign}${pct}% from today's $${NOW_PRICE.toLocaleString()}.`,
                      "Midpoint of range used. Memory cycles move fast — these bands are intentionally wide.", color)}>
                    <div style={{ fontSize: 9.5, color, fontWeight: 700, width: 34 }}>{label}</div>
                    <div style={{ flex: 1, position: "relative", height: 8, background: "#0d1018", borderRadius: 4, border: "1px solid #1c2230" }}>
                      <div style={{ position: "absolute", top: 0, bottom: 0, left: 0, width: `${barW}%`, background: color, opacity: 0.45, borderRadius: 4 }} />
                      <div style={{ position: "absolute", top: "50%", left: `${barW}%`, transform: "translate(-50%,-50%)", width: 6, height: 6, borderRadius: "50%", background: color, boxShadow: `0 0 6px ${color}` }} />
                    </div>
                    <div style={{ fontSize: 10.5, color, fontWeight: 700, width: 44, textAlign: "right" }}>{sign}{pct}%</div>
                    <div style={{ fontSize: 9, color: "#4a5366", width: 80 }}>${lo.toLocaleString()}–${hi.toLocaleString()}</div>
                  </div>
                );
              })}
              <div style={{ marginTop: 8, paddingTop: 8, borderTop: "1px solid #161c28", fontSize: 10.5, color: "#9aa4b8", lineHeight: 1.55 }}
                {...tip("What this asymmetry means",
                  `At $${NOW_PRICE.toLocaleString()}, base case is +25% and bull is +69% from here — both ABOVE where the stock traded going into Q3 earnings ($1,059), despite Q3 actual results already exceeding the old bull case. The $100B in 5-year SCAs is a real structural change from the classic memory-cycle setup: it floor-protects ~20% of DRAM/33% of NAND volume through 2030, which is why the bear case (−34%) is a real but narrower drawdown than a historical cyclical collapse, not a repeat of 2022–2023's 70%+ DRAM pricing crash.`,
                  "The market's ~6.4× forward P/E on record earnings shows it hasn't yet decided whether the SCAs actually break the cycle, or are still just insurance against a cycle it expects to turn.", "#9aa4b8")}>
                Bear ≈ <span style={{ color: "#f1564b", fontWeight: 700 }}>−34%</span> · Base ≈ <span style={{ color: "#e0a83b", fontWeight: 700 }}>+25%</span> · Bull ≈ <span style={{ color: "#3fd07a", fontWeight: 700 }}>+69%</span> — <span style={{ color: "#3fd07a" }}>favorable asymmetry from here,</span> a real change from the pre-earnings setup. The $100B SCA visibility narrows (doesn't eliminate) the downside case.
              </div>
            </div>
          </div>
        </div>

        {/* ── Footer ── */}
        <div style={{ padding: "10px 22px", borderTop: "1px solid #161c28", display: "flex", justifyContent: "space-between", fontSize: 10.5, color: "#4a5366" }}>
          <span>OBSERVABLE NOW: Samsung HBM4 mass-production ramp progress · SK Hynix capacity data · DRAM/NAND spot pricing indices · SCA-linked customer capex announcements</span>
          <span style={{ color: "#e0a83b", fontWeight: 700 }}>CONFIRMS ~SEP 2026: Q4 actual vs $50B±$1B guide · initial FY2027 guidance · GM vs ~86% guide · HBM4 share vs Samsung</span>
        </div>

        <TrackRecord />
      </div>

      <div style={{ maxWidth: 1280, margin: "12px auto 0", fontSize: 10.5, color: "#3d4555", lineHeight: 1.5 }}>
        Illustrative scenario framing built on public consensus &amp; estimates as of {AS_OF_DATE} — not a prediction and not financial advice. Valuation ruler: cyclical normalized EPS × P/E — using peak-cycle P/E for a memory company is misleading; the bear case uses a lower, non-SCA-covered EPS assumption. Q4 FY2026 results (~late September 2026), alongside initial FY2027 guidance, are the next major catalyst. Memory cycles move fast in both directions — the $100B in 5-year customer contracts is new evidence this one may be structurally different, held loosely until it's proven across more than one quarter.
      </div>
    </div>
  );
}
