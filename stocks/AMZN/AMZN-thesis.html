// ── Tooltip engine ──────────────────────────────────────────────────────────
let tipEl = null;
function ensureTip() {
  if (!tipEl) { tipEl = document.createElement("div"); tipEl.id = "tip-box"; document.body.appendChild(tipEl); }
  return tipEl;
}
function showTip(e, title, body, note, color) {
  const el = ensureTip();
  el.innerHTML =
    `<div class="tt" style="color:${color || '#9fb4ff'}">${title}</div>` +
    `<div class="tb">${body}</div>` +
    (note ? `<div class="tn">${note}</div>` : "");
  el.classList.add("on"); moveTip(e);
}
function moveTip(e) {
  const el = ensureTip();
  const pad = 16; let x = e.clientX + pad, y = e.clientY + pad;
  const r = el.getBoundingClientRect();
  if (x + r.width > window.innerWidth - 8) x = e.clientX - r.width - pad;
  if (y + r.height > window.innerHeight - 8) y = e.clientY - r.height - pad;
  el.style.left = x + "px"; el.style.top = y + "px";
}
function hideTip() { if (tipEl) tipEl.classList.remove("on"); }

}

const PRICE_MIN = 160, PRICE_MAX = 500;

const yOf = (p) => PAD_T + (1 - (p - PRICE_MIN) / (PRICE_MAX - PRICE_MIN)) * plotH;

// ── Components ──────────────────────────────────────────────────────────────

function FanChart({ c }) {
  const nHist = HISTORY.length;
  const histPts = HISTORY.map((d, i) => [PAD_L + (i / (nHist + FUTURE_Q.length - 1)) * plotW, yOf(d.p)]);
  const nowX = histPts[nHist - 1][0];
  const nowY = histPts[nHist - 1][1];
  const fwdN = FUTURE_Q.length;
  const fwdX = (i) => nowX + ((i + 1) / fwdN) * (CH_W - PAD_R - nowX);
  const end = PROJ_END[c.key];
  const mid = FUTURE_Q.map((_, i) => {
    const t = (i + 1) / fwdN;
    return [fwdX(i), yOf(NOW_PRICE + (end - NOW_PRICE) * t)];
  });
  const spread = (i) => 28 + i * 26;
  const upper = mid.map(([x, y], i) => [x, y - spread(i)]);
  const lower = mid.map(([x, y], i) => [x, y + spread(i)]);
  const bandPath = `M ${nowX} ${nowY} ` + upper.map(([x, y]) => `L ${x} ${y}`).join(" ") + " " +
    lower.slice().reverse().map(([x, y]) => `L ${x} ${y}`).join(" ") + " Z";
  const midPath = `M ${nowX} ${nowY} ` + mid.map(([x, y]) => `L ${x} ${y}`).join(" ");
  const histPath = "M " + histPts.map(([x, y]) => `${x} ${y}`).join(" L ");
  const gridP = [200, 260, 320, 380, 440];

  return (
    <svg viewBox={`0 0 ${CH_W} ${CH_H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      <defs>
        <linearGradient id={`fan-${c.key}`} x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor={c.accent} stopOpacity="0.05" />
          <stop offset="100%" stopColor={c.accent} stopOpacity="0.28" />
        </linearGradient>
        <filter id="softglow"><feGaussianBlur stdDeviation="2.2" /></filter>
      </defs>
      {gridP.map((p) => (
        <g key={p}>
          <line x1={PAD_L} y1={yOf(p)} x2={CH_W - PAD_R} y2={yOf(p)} stroke="#1c2230" strokeWidth="1" strokeDasharray="1 5" />
          <text x={CH_W - PAD_R + 8} y={yOf(p) + 3} fill="#5a6477" fontSize="11" fontFamily={FONT_MONO}>${p}</text>
        </g>
      ))}
      <line x1={nowX} y1={PAD_T} x2={nowX} y2={CH_H - PAD_B} stroke="#2f6dff" strokeWidth="1" strokeDasharray="3 4" opacity="0.7" />
      <path d={bandPath} fill={`url(#fan-${c.key})`}
        {...tipSvg("The forecast cone",
          "This shaded fan shows where the price could go in this scenario over the next year. It widens further out because the future is less certain. The dashed line through the middle is the most-likely path.",
          "Wider = more uncertainty.", c.accent, "fan-band")} />
      <path d={midPath} fill="none" stroke={c.accent} strokeWidth="2" strokeDasharray="6 5" className="fan-mid" style={{ filter: "url(#softglow)" }} />
      <path d={histPath} fill="none" stroke="#cdd5e3" strokeWidth="2"
        {...tipSvg("Price history",
          "The solid white line is Amazon's actual share price over the past year and a half. The big drop in early 2026 was the market reacting to tariff fears and worries about Amazon's $200B AI spending plan. The sharp jump in May is the Q1 2026 earnings beat.",
          "This part already happened — it is real, not a forecast.", "#cdd5e3", "hist-line")} />
      {HISTORY.map((d, i) => (
        <g key={i}>
          <circle
            cx={histPts[i][0]} cy={histPts[i][1]}
            r={i === nHist - 1 ? 4.5 : 3}
            fill={i === nHist - 1 ? "#2f6dff" : "#0a0d14"}
            stroke={i === nHist - 1 ? "#fff" : "#8a93a6"}
            strokeWidth="1.5"
            {...tipSvg(
              i === nHist - 1 ? "Where we are today" : d.q,
              i === nHist - 1
                ? `Amazon trades around $${NOW_PRICE} right now. The blue dot is today — everything left is history, everything right is forecast.`
                : `Around the end of ${d.q}, Amazon was trading near $${d.p}.`,
              null, i === nHist - 1 ? "#9fb4ff" : "#cdd5e3"
            )}
          />
          {i === nHist - 1 && (
            <text x={histPts[i][0] - 6} y={histPts[i][1] - 12} fill="#9fb4ff" fontSize="11" fontFamily={FONT_MONO} textAnchor="end">NOW ${NOW_PRICE}</text>
          )}
        </g>
      ))}
      {mid.map(([x, y], i) => (
        <g key={i} className="diamond" style={{ animationDelay: `${0.5 + i * 0.12}s` }}>
          <rect x={x - 4} y={y - 4} width="8" height="8" transform={`rotate(45 ${x} ${y})`}

              `A milestone on the most-likely price path in the ${c.label} scenario. Each diamond is roughly three months further into the future.`,
              "Hover the shaded cone to see the uncertainty range.", c.accent)} />
          <text x={x} y={y - 12} fill={c.accent} fontSize="10.5" fontFamily={FONT_MONO} textAnchor="middle">{FUTURE_Q[i]}</text>
        </g>
      ))}
      {["2025", "2026", "2027"].map((yr, i) => (
        <text key={yr} x={PAD_L + (i / 2) * plotW} y={CH_H - 10} fill="#5a6477" fontSize="11" fontFamily={FONT_MONO}>{yr}</text>
      ))}
    </svg>
  );
}

    ? tip("Starting point (Q1 2026 actual)",

        `In this scenario, AWS revenue is projected to grow at ${val}% year-over-year by ${label}. Taller bar = faster growth = more AI workloads choosing Amazon's cloud.`,

function ReversionClock() {
  const dislocationDate = new Date(DISLOCATION_DATE);
  const today = new Date();
  const elapsed = Math.round((today - dislocationDate) / 86400000);
  const pct = Math.min(100, (elapsed / REVERSION_PRECEDENT_DAYS) * 100);
  const recPct = Math.min(100, Math.max(0, ((NOW_PRICE - REVERSION_TROUGH) / (REVERSION_BASEFLOOR - REVERSION_TROUGH)) * 100));
  const aheadOfPace = recPct >= pct;
  return (
    <div style={{ marginTop: 12, padding: "12px 14px", background: "#0a0e15", border: "1px solid #161c28", borderRadius: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
        <div style={{ fontSize: 10.5, letterSpacing: "0.14em", color: "#5a6477" }}>REVERSION CLOCK · vs APR-2025 PRECEDENT</div>
        <div style={{ fontSize: 11, color: "#9aa4b8" }}><span style={{ color: "#3fd07a", fontWeight: 700 }}>{elapsed}d</span> elapsed / ~{REVERSION_PRECEDENT_DAYS}d to base last time</div>
      </div>
      <div style={{ marginBottom: 4, fontSize: 9.5, color: "#5a6477" }}>TIME SINCE DISLOCATION ({new Date(DISLOCATION_DATE).toLocaleDateString("en-US", { month: "short", day: "numeric" })} tariff selloff)</div>
      <div {...tip("How much time has passed",
          `Last time Amazon dislocated on fear (April 2025 weak Q1 results), it took about 4 months to recover to the middle price zone. This bar shows how far along we are this time. The green line is the 4-month mark.`,
          "Filling up = getting closer to when recovery happened last time.", "#e0a83b")}
        style={{ position: "relative", height: 14, background: "#11161f", borderRadius: 7, overflow: "hidden", border: "1px solid #1c2230" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${pct}%`, background: "linear-gradient(90deg,#f1564b,#e0a83b)", borderRadius: 7 }} />
        <div style={{ position: "absolute", left: "100%", top: -3, bottom: -3, width: 2, background: "#3fd07a", transform: "translateX(-1px)" }} />
        <div style={{ position: "absolute", left: `${pct}%`, top: "50%", width: 8, height: 8, borderRadius: "50%", background: "#fff", transform: "translate(-50%,-50%)", boxShadow: "0 0 8px #fff", pointerEvents: "none" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#5a6477", marginTop: 3 }}>
        <span>day 0</span><span style={{ color: "#3fd07a" }}>base-reversion mark (~{REVERSION_PRECEDENT_DAYS}d) →</span>
      </div>
      <div style={{ marginTop: 12, marginBottom: 4, fontSize: 9.5, color: "#5a6477" }}>PRICE RECOVERY · ${REVERSION_TROUGH} trough → ${REVERSION_BASEFLOOR} base floor</div>
      <div {...tip("How far the price has bounced back",
          `The stock bottomed at $${REVERSION_TROUGH} and the 'base zone' floor is $${REVERSION_BASEFLOOR}. It is at $${NOW_PRICE} now — already above base floor. ${Math.round(recPct)}% of the trough-to-base gap has been recovered.`,
          "If the recovery bar is fuller than the time bar, the bounce-back is running faster than the precedent. This one is.", "#9fb4ff")}
        style={{ position: "relative", height: 14, background: "#11161f", borderRadius: 7, overflow: "hidden", border: "1px solid #1c2230" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${recPct}%`, background: "linear-gradient(90deg,#f1564b,#3fd07a)", borderRadius: 7 }} />
        <div style={{ position: "absolute", left: `${recPct}%`, top: "50%", width: 8, height: 8, borderRadius: "50%", background: "#9fb4ff", transform: "translate(-50%,-50%)", boxShadow: "0 0 8px #9fb4ff", pointerEvents: "none" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#5a6477", marginTop: 3 }}>
        <span>${REVERSION_TROUGH}</span>
        <span style={{ color: "#9fb4ff" }}>${NOW_PRICE} now · {Math.round(recPct)}% of the way back</span>
        <span>${REVERSION_BASEFLOOR}</span>
      </div>
      <div style={{ fontSize: 10.5, color: "#9aa4b8", lineHeight: 1.55, marginTop: 10 }}>
        The April 2026 tariff selloff took <span style={{ color: "#3fd07a" }}>approximately 7 weeks</span> to reverse — versus ~{REVERSION_PRECEDENT_DAYS} days in the prior precedent (April 2025 weak-Q1 dislocation). We are <span style={{ color: "#fff", fontWeight: 700 }}>{elapsed} days in</span> and the stock has already cleared the base floor at ${REVERSION_BASEFLOOR}, tracking <span style={{ color: aheadOfPace ? "#3fd07a" : "#e0a83b", fontWeight: 700 }}>{aheadOfPace ? "significantly ahead of" : "behind"}</span> the prior pace. The Q1 2026 AWS beat — 28% growth, 15-quarter high — catalyzed the snap-back. The next test is the Q2 print on July 30.

function TrackRecord() {
  const W = 1000, H = 300, pl = 44, pr = 70, pt = 20, pb = 40;
  const pw = W - pl - pr, ph = H - pt - pb;
  const y = (p) => pt + (1 - (p - TRACK_PRICE_MIN) / (TRACK_PRICE_MAX - TRACK_PRICE_MIN)) * ph;
  const x = (i) => pl + (TRACK.length === 1 ? pw / 2 : (i / (TRACK.length - 1)) * pw);
  const grid = [340, 300, 260, 220, 180];
  const pathPts = TRACK.map((t, i) => [x(i), y(t.post)]);
  const linePath = "M " + pathPts.map(([px, py]) => `${px} ${py}`).join(" L ");
  const hits = TRACK.filter((t) => t.landed.includes("base") || t.landed.includes("bull")).length;
  return (
    <div style={{ background: "#080b11", padding: "16px 18px", borderTop: "1px solid #161c28" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <div style={{ fontSize: 11.5, letterSpacing: "0.18em", color: "#7b86a0" }}>
          <span style={{ background: "#161c28", padding: "2px 6px", borderRadius: 3, color: "#cdd5e3", marginRight: 8 }}>TR · BACKTEST</span>
          THESIS TRACK RECORD · RECONSTRUCTED BANDS vs ACTUAL PRICE
        </div>
        <div style={{ fontSize: 11, color: "#7b86a0" }}>BASE-OR-BETTER LANDINGS: <span style={{ color: "#3fd07a", fontWeight: 700 }}>{hits}/{TRACK.length}</span></div>
      </div>
      <div style={{ fontSize: 10.5, color: "#5a6477", marginBottom: 10 }}>
        Each column = one earnings date. Stacked zones are the bear / base / bull bands as they would have been drawn then. The line is where price actually traded after.
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
        {grid.map((p) => (
          <g key={p}>
            <line x1={pl} y1={y(p)} x2={W - pr} y2={y(p)} stroke="#161c28" strokeWidth="1" strokeDasharray="1 5" />
            <text x={W - pr + 8} y={y(p) + 3} fill="#5a6477" fontSize="11" fontFamily={FONT_MONO}>${p}</text>
          </g>
        ))}
        {TRACK.map((t, i) => {
          const cx = x(i), bw = 46;
          const landWord = t.landed.includes("bull") ? "the optimistic zone" : t.landed.includes("base") ? "the middle zone" : "the pessimistic zone";
          const reactWord = t.reaction.includes("−") ? "the stock FELL after this report" : "the stock ROSE after this report";
          const seg = (range, color) => (
            <rect x={cx - bw / 2} y={y(range[1])} width={bw}
              height={Math.max(2, y(range[0]) - y(range[1]))}
              fill={color} opacity={t.conf === "med" ? 0.32 : 0.5} rx="2"
              style={{ animation: `fadeUp .5s ease ${i * 0.08}s both` }}
              {...tipSvg(`${t.q} earnings`,
                `Back at this date, the range we would have predicted (red=low, yellow=middle, green=high). In reality, ${reactWord} and the price ended up in ${landWord} (~$${t.post}).`,
                t.conf === "med" ? "Marked lower-confidence — older reconstructed data, treat loosely." : "Higher-confidence recent data.",
                color.includes("63,208") ? "#3fd07a" : color.includes("224,168") ? "#e0a83b" : "#f1564b")} />
          );
          return (
            <g key={t.q}>
              {seg(t.bull, "rgba(63,208,122,0.55)")}
              {seg(t.base, "rgba(224,168,59,0.5)")}
              {seg(t.bear, "rgba(241,86,75,0.5)")}
              <text x={cx} y={H - 24} fill="#9aa4b8" fontSize="11" fontFamily={FONT_MONO} textAnchor="middle">{t.q}</text>
              <text x={cx} y={H - 11} fill={t.conf === "med" ? "#5a6477" : "#3a4252"} fontSize="8.5" fontFamily={FONT_MONO} textAnchor="middle">
                {t.conf === "med" ? "lower-conf" : t.reaction === "++" ? "↑ v-recovery" : t.reaction.includes("−") ? "↓ dislocation" : ""}
              </text>
            </g>
          );
        })}
        <path d={linePath} fill="none" stroke="#dde3ee" strokeWidth="2.2" className="track-line"
          style={{ filter: "drop-shadow(0 0 4px rgba(221,227,238,0.4))" }} />
        {TRACK.map((t, i) => {
          const isLast = i === TRACK.length - 1;
          return (
            <g key={t.q} style={{ animation: `pop .4s cubic-bezier(.2,1.4,.4,1) ${0.3 + i * 0.08}s both` }}>
              <circle cx={x(i)} cy={y(t.post)} r={isLast ? 6 : 4}
                fill={isLast ? "#2f6dff" : "#0a0d14"} stroke="#fff" strokeWidth={isLast ? 2 : 1.5}
                {...tipSvg(isLast ? "Today" : `${t.q}: actual price`,
                  isLast
                    ? `Amazon is at ~$${t.post} now — sitting in the base-to-bull zone, having snapped back from the April $196 trough.`
                    : `After ${t.q} earnings, Amazon actually traded around $${t.post}. Compare this dot to the colored bars to see if the prediction was right.`,
                  null, isLast ? "#9fb4ff" : "#cdd5e3")} />
              {isLast && (
                <text x={x(i)} y={y(t.post) - 14} fill="#9fb4ff" fontSize="11" fontFamily={FONT_MONO} textAnchor="middle" fontWeight="700">NOW ${t.post}</text>
              )}
            </g>
          );
        })}
      </svg>
      <div style={{ marginTop: 12, padding: "10px 12px", background: "#0a0e15", border: "1px solid #161c28", borderRadius: 8 }}>
        <div style={{ fontSize: 10.5, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 6 }}>READ-OUT</div>
        <div style={{ fontSize: 12, color: "#bcc6d8", lineHeight: 1.6 }}>
          Current price <span style={{ color: "#9fb4ff", fontWeight: 700 }}>${NOW_PRICE}</span> is in the
          <span style={{ color: "#3fd07a", fontWeight: 700 }}> base-to-bull transition zone</span>, having staged a V-shaped recovery from the $196 April trough (+39% in ~7 weeks).
          The Q1 2026 print — $181.5B revenue (+17%), AWS <span style={{ color: "#3fd07a", fontWeight: 700 }}>+28% (15-quarter high)</span>, advertising +24% — was a fundamental beat that removed the core "capex without results" uncertainty.
          The two April dislocations (2025 and 2026) both saw the stock fall on macro fear despite operational beats —
          and <span style={{ color: "#3fd07a", fontWeight: 700 }}>both recovered</span>. This one recovered faster.
        </div>
      </div>
      <ReversionClock />
      <div style={{ fontSize: 9.5, color: "#3d4555", marginTop: 8, lineHeight: 1.5 }}>
        ⚠ Bands are reconstructed (anchored to each date's forward EPS × multiple regime), not archived in real time — treat levels as directional, especially lower-confidence quarters. Reversion pattern rests on n=2 dislocations; not a strategy, a tell. Pattern breaks if a future dislocation coincides with genuine AWS deceleration rather than macro fear.
      </div>
    </div>
  );
}

                  <div style={{ color: c.accent }}>
                    {active === "bull"
                      ? "Re-acceleration above 30% as AI-native agent workloads create a compute super-cycle. Trainium absorption narrows GPU cost gap."
                      : active === "base"
                      ? "AWS holds 25–28% through 2026 as enterprise AI migrations continue. Monetization is real; the market tolerates the capex."
                      : "AWS stalls below 22% — Azure and Google Cloud capture disproportionate AI workload share. Capex fails to translate to competitive positioning."}
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* RIGHT: Signals */}
          <div style={{ background: "#080b11", padding: "16px 18px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontSize: 11.5, letterSpacing: "0.18em", color: "#7b86a0" }}>THESIS · ALL SIGNALS</div>
              <div style={{ fontSize: 12, color: "#7b86a0" }}>{c.label.toLowerCase()} 12M <span style={{ color: c.accent, fontWeight: 700 }}>{c.target12}</span></div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12 }}>
              <Segmented active={active} setActive={setActive} small />
              <span className="dot-track" style={{ marginLeft: 6, fontSize: 10.5, color: c.accent }}>● TRACKING</span>
            </div>
            <div className="panel" key={active + "-op"} style={{ fontSize: 12.5, lineHeight: 1.6, color: "#bcc6d8", marginBottom: 16, minHeight: 64 }}>{c.op}</div>
            <SignalGroup id="SN01" title="AWS &amp; Revenue Trajectory" requires={c.requires01} accent={c.accent} evidence={4}>
              {SIGNALS[active].map((s, i) => <SignalRow key={i} s={s} accent={c.accent} />)}
            </SignalGroup>
            <SignalGroup id="SN02" title="Margin &amp; Capital Discipline" requires={c.requires02} accent={c.accent} evidence={3}>
              {MARGIN[active].map((s, i) => <MarginRow key={i} s={s} accent={c.accent} />)}
            </SignalGroup>
            <div style={{ marginTop: 14, borderTop: "1px solid #161c28", paddingTop: 10 }}>
              <div style={{ fontSize: 10.5, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 3 }}>
                WHAT BREAKS THE <span style={{ color: c.accent }}>{c.label}</span> CASE
              </div>
              <div style={{ fontSize: 11.5, color: "#9aa4b8", lineHeight: 1.5 }}>{c.breaks}</div>
            </div>

            {/* Risk / Reward */}
            <div style={{ marginTop: 10, padding: "10px 12px", background: "#0a0d14", border: "1px solid #2a1a1a", borderRadius: 6 }}>
              <div style={{ fontSize: 10, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 8 }}>RISK / REWARD AT ${NOW_PRICE}</div>
              {[
                { label: "BEAR", color: "#f1564b", lo: 190, hi: 220 },
                { label: "BASE", color: "#e0a83b", lo: 290, hi: 325 },
                { label: "BULL", color: "#3fd07a", lo: 410, hi: 470 },
              ].map(({ label, color, lo, hi }) => {
                const mid = Math.round((lo + hi) / 2);
                const pct = Math.round(((mid - NOW_PRICE) / NOW_PRICE) * 100);
                const sign = pct >= 0 ? "+" : "";
                const barW = Math.max(4, Math.min(96, ((pct + 60) / 130) * 100));
                return (
                  <div key={label} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}
                    {...tip(`${label} scenario return`,
                      `If the ${label.toLowerCase()} case plays out over 12 months, price would land in the $${lo}–$${hi} range — roughly ${sign}${pct}% from today's $${NOW_PRICE}.`,
                      "Midpoint of range used. These are estimates, not targets.", color)}>
                    <div style={{ fontSize: 9.5, color, fontWeight: 700, width: 34 }}>{label}</div>
                    <div style={{ flex: 1, position: "relative", height: 8, background: "#0d1018", borderRadius: 4, border: "1px solid #1c2230" }}>
                      <div style={{ position: "absolute", top: 0, bottom: 0, left: 0, width: `${barW}%`, background: color, opacity: 0.45, borderRadius: 4 }} />
                      <div style={{ position: "absolute", top: "50%", left: `${barW}%`, transform: "translate(-50%,-50%)", width: 6, height: 6, borderRadius: "50%", background: color, boxShadow: `0 0 6px ${color}` }} />
                    </div>
                    <div style={{ fontSize: 10.5, color, fontWeight: 700, width: 44, textAlign: "right" }}>{sign}{pct}%</div>
                    <div style={{ fontSize: 9, color: "#4a5366", width: 72 }}>${lo}–${hi}</div>
                  </div>
                );
              })}
              <div style={{ marginTop: 8, paddingTop: 8, borderTop: "1px solid #161c28", fontSize: 10.5, color: "#9aa4b8", lineHeight: 1.55 }}
                {...tip("What this asymmetry means",
                  `At $${NOW_PRICE}, AMZN offers a reasonable risk/reward: the base case earns a real return (+13%), the bull adds meaningful upside (+62%), and the bear case (~−25%) is less severe than most names in this set. AWS re-acceleration and ad margin expansion are the key bull drivers.`,
                  "Midpoints of ranges used. Always hold loosely.", "#9aa4b8")}>
                Bear ≈ <span style={{ color: "#f1564b", fontWeight: 700 }}>−25%</span> · Base ≈ <span style={{ color: "#e0a83b", fontWeight: 700 }}>+13%</span> · Bull ≈ <span style={{ color: "#3fd07a", fontWeight: 700 }}>+62%</span> — base earns a real return; capex discipline and AWS re-acceleration pace are the key variables.
              </div>
            </div>
          </div>
        </div>

        {/* ── Footer: observable-now vs. requires-earnings ─────────── */}
        <div style={{ padding: "10px 22px", borderTop: "1px solid #161c28", display: "flex", justifyContent: "space-between", fontSize: 10.5, color: "#4a5366" }}>
          <span>OBSERVABLE NOW: Trainium reservation/supply news · third-party seller tariff surveys · advertising market indices · Prime Video ad inventory · FTC trial developments</span>
          <span>CONFIRMS JULY 30: Q2 revenue vs guide · AWS growth rate · AWS margin · retail NA margin · FCF trajectory · capex guidance</span>
        </div>

        {/* ── Backtest panel ──────────────────────────────────────── */}
        <TrackRecord />
      </div>

      <div style={{ maxWidth: 1280, margin: "12px auto 0", fontSize: 10.5, color: "#3d4555", lineHeight: 1.5 }}>
        Illustrative scenario framing built on current consensus estimates as of May 2026 — not a prediction and not financial advice. Price ranges are scenario mid-bands derived from forward EPS × multiple; bands are wide by design and should be held loosely. KPI markers are positional, not literal. All inputs will move with every data print between now and the July 30 2026 Q2 earnings release. Valuation ruler: forward P/E on FY2027E consensus GAAP EPS (~$9.69–$10.37). Bear ~$8.50 × 23x. Base ~$10.00 × 30x. Bull ~$12.50 × 36x.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AmazonThesis />);
</script>
</body>
</html>
