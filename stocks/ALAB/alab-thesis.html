/* ── Tooltip engine ─────────────────────────────────────────────────────────── */
let tipEl = null;
function ensureTip() {
  if (!tipEl) { tipEl = document.createElement("div"); tipEl.id = "tip-box"; document.body.appendChild(tipEl); }
  return tipEl;
}
function showTip(e, title, body, note, color) {
  const el = ensureTip();
  el.innerHTML =
    `<div class="tt" style="color:${color || '#9fb4ff'}">${title}</div>` +
    `<div class="tb">${body}</div>` +
    (note ? `<div class="tn">${note}</div>` : "");
  el.classList.add("on"); moveTip(e);
}
function moveTip(e) {
  const el = ensureTip(); const pad = 16;
  let x = e.clientX + pad, y = e.clientY + pad;
  const r = el.getBoundingClientRect();
  if (x + r.width > window.innerWidth - 8) x = e.clientX - r.width - pad;
  if (y + r.height > window.innerHeight - 8) y = e.clientY - r.height - pad;
  el.style.left = x + "px"; el.style.top = y + "px";
}
function hideTip() { if (tipEl) tipEl.classList.remove("on"); }

  };
}

/* ── Chart constants ──────────────────────────────────────────────────────── */

const plotW = CH_W - PAD_L - PAD_R, plotH = CH_H - PAD_T - PAD_B;
const yOf = (p) => PAD_T + (1 - (p - PRICE_MIN) / (PRICE_MAX - PRICE_MIN)) * plotH;

/* ── FanChart ─────────────────────────────────────────────────────────────── */
function FanChart({ c }) {
  const nHist = HISTORY.length;
  const histPts = HISTORY.map((d, i) => [PAD_L + (i / (nHist + FUTURE_Q.length - 1)) * plotW, yOf(d.p)]);
  const nowX = histPts[histPts.length - 1][0];
  const nowY = histPts[histPts.length - 1][1];
  const fwdN = FUTURE_Q.length;
  const fwdX = (i) => nowX + ((i + 1) / fwdN) * (CH_W - PAD_R - nowX);
  const end = PROJ_END[c.key];
  const mid = FUTURE_Q.map((_, i) => {
    const t = (i + 1) / fwdN;
    return [fwdX(i), yOf(NOW_PRICE + (end - NOW_PRICE) * t)];
  });
  const spread = (i) => 24 + i * 22;
  const upper   = mid.map(([x, y], i) => [x, y - spread(i)]);
  const lower   = mid.map(([x, y], i) => [x, y + spread(i)]);
  const bandPath = `M ${nowX} ${nowY} ` + upper.map(([x, y]) => `L ${x} ${y}`).join(" ") + " " +
    lower.slice().reverse().map(([x, y]) => `L ${x} ${y}`).join(" ") + " Z";
  const midPath  = `M ${nowX} ${nowY} ` + mid.map(([x, y]) => `L ${x} ${y}`).join(" ");
  const histPath = "M " + histPts.map(([x, y]) => `${x} ${y}`).join(" L ");
  const gridP = [600, 500, 400, 300, 200, 100];

  return (
    <svg viewBox={`0 0 ${CH_W} ${CH_H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      <defs>
        <linearGradient id={`fan-${c.key}`} x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor={c.accent} stopOpacity="0.05" />
          <stop offset="100%" stopColor={c.accent} stopOpacity="0.28" />
        </linearGradient>
        <filter id="softglow"><feGaussianBlur stdDeviation="2.2" /></filter>
      </defs>
      {gridP.map((p) => (
        <g key={p}>
          <line x1={PAD_L} y1={yOf(p)} x2={CH_W - PAD_R} y2={yOf(p)} stroke="#1c2230" strokeWidth="1" strokeDasharray="1 5" />
          <text x={CH_W - PAD_R + 8} y={yOf(p) + 3} fill="#5a6477" fontSize="11" fontFamily={FONT_MONO}>${p}</text>
        </g>
      ))}
      <line x1={nowX} y1={PAD_T} x2={nowX} y2={CH_H - PAD_B} stroke="#2f6dff" strokeWidth="1" strokeDasharray="3 4" opacity="0.7" />
      <path d={bandPath} fill={`url(#fan-${c.key})`} {...tipSvg(
        "The forecast 'cone'", "This shaded fan shows the range of where the price could go in this scenario over the next year. It widens further out because the future is less certain. The dashed line through the middle is the most-likely path for this scenario.",
        "Wider = more uncertainty. The fan is based on EPS × multiple math, not a guarantee.", c.accent, "fan-band")} />
      <path d={midPath} fill="none" stroke={c.accent} strokeWidth="2" strokeDasharray="6 5" className="fan-mid" style={{ filter: "url(#softglow)" }} />
      <path d={histPath} fill="none" stroke="#cdd5e3" strokeWidth="2" {...tipSvg(
        "Price history", "The solid white line is ALAB's actual share price over the past ~7 quarters. It shows the 4× journey from ~$85 in June 2025 (a macro selloff) to $343+ today. Everything left of the blue line already happened — it's real, not a forecast.",
        "The steep dip in Q2 2025 was a macro/tariff panic, not a thesis failure — the business was still growing 150% YoY.", "#cdd5e3", "hist-line")} />
      {HISTORY.map((d, i) => (
        <g key={i}>
          <circle cx={histPts[i][0]} cy={histPts[i][1]} r={i === nHist - 1 ? 4.5 : 3}
            fill={i === nHist - 1 ? "#2f6dff" : "#0a0d14"}
            stroke={i === nHist - 1 ? "#fff" : "#8a93a6"} strokeWidth="1.5"
            {...tipSvg(i === nHist - 1 ? "Where we are today" : d.q,
              i === nHist - 1
                ? `ALAB trades around $${NOW_PRICE} today — at all-time highs. Everything left of this blue dot is history; everything right is forecast. The stock is trading at ~114× forward non-GAAP EPS, pricing in Leo CXL delivery.`
                : `At the end of ${d.q}, ALAB traded around $${d.p}. ${d.q === "Q2 25" ? " This was the macro selloff trough — the business was healthy but sentiment collapsed on AI capex fears." : ""}`,
              null, i === nHist - 1 ? "#9fb4ff" : "#cdd5e3")} />
          {i === nHist - 1 && <text x={histPts[i][0] - 6} y={histPts[i][1] - 12} fill="#9fb4ff" fontSize="11" fontFamily={FONT_MONO} textAnchor="end">NOW ${NOW_PRICE}</text>}
        </g>
      ))}
      {mid.map(([x, y], i) => (
        <g key={i} className="diamond" style={{ animationDelay: `${0.5 + i * 0.12}s` }}>
          <rect x={x - 4} y={y - 4} width="8" height="8" transform={`rotate(45 ${x} ${y})`}
            fill="#0a0d14" stroke={c.accent} strokeWidth="1.6"
            {...tipSvg(`Forecast: ${FUTURE_Q[i]}`, `A milestone on the most-likely price path for the ${c.label} scenario. Each diamond is roughly one quarter further into the future. The math: forward non-GAAP EPS × the scenario's assumed multiple.`,

      ))}
    </svg>
  );
}

/* ── ReversionClock ───────────────────────────────────────────────────────── */
function ReversionClock() {
  const dislocationDate = new Date(DISLOCATION_DATE);
  const today = new Date();
  const elapsed = Math.round((today - dislocationDate) / 86400000);
  const pct = Math.min(100, (elapsed / REVERSION_PRECEDENT_DAYS) * 100);
  const trough = REVERSION_TROUGH, baseFloor = REVERSION_BASEFLOOR, now = NOW_PRICE;
  const recPct = Math.min(100, Math.max(0, ((now - trough) / (baseFloor - trough)) * 100));
  return (
    <div style={{ marginTop: 12, padding: "12px 14px", background: "#0a0e15", border: "1px solid #161c28", borderRadius: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
        <div style={{ fontSize: 10.5, letterSpacing: "0.14em", color: "#5a6477" }}>REVERSION CLOCK · JUNE 2025 DISLOCATION REFERENCE</div>
        <div style={{ fontSize: 11, color: "#9aa4b8" }}><span style={{ color: "#e0a83b", fontWeight: 700 }}>{elapsed}d</span> elapsed / ~{REVERSION_PRECEDENT_DAYS}d to base last time</div>
      </div>
      <div style={{ marginBottom: 4, fontSize: 9.5, color: "#5a6477" }}>TIME SINCE DISLOCATION ({new Date(DISLOCATION_DATE).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })})</div>
      <div {...tip("How much time has passed", `The June 2025 macro selloff drove ALAB to $${REVERSION_TROUGH}. Last time it took about ${REVERSION_PRECEDENT_DAYS} days (~6 months) to recover to the base-zone floor ($${REVERSION_BASEFLOOR}). Both bars are at 100% because the recovery is long complete — the stock is now at all-time highs. This clock is now a historical reference for the NEXT dislocation's likely recovery pace.`, "Both bars pinned at 100%: the recovery has been total. Stock is at ATH.", "#e0a83b")}
        style={{ position: "relative", height: 14, background: "#11161f", borderRadius: 7, overflow: "hidden", border: "1px solid #1c2230" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${pct}%`, background: "linear-gradient(90deg,#f1564b,#e0a83b)", borderRadius: 7 }} />
        <div style={{ position: "absolute", right: 0, top: -3, bottom: -3, width: 2, background: "#3fd07a", transform: "translateX(-1px)" }} />
        <div style={{ position: "absolute", left: `${Math.min(99, pct)}%`, top: "50%", width: 8, height: 8, borderRadius: "50%", background: "#fff", transform: "translate(-50%,-50%)", boxShadow: "0 0 8px #fff", pointerEvents: "none" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#5a6477", marginTop: 3 }}>
        <span>day 0</span><span style={{ color: "#3fd07a" }}>base-reversion mark (~{REVERSION_PRECEDENT_DAYS}d) →</span>
      </div>
      <div style={{ marginTop: 12, marginBottom: 4, fontSize: 9.5, color: "#5a6477" }}>PRICE RECOVERY · ${REVERSION_TROUGH} trough → ${REVERSION_BASEFLOOR} base floor</div>
      <div {...tip("How far the price has recovered", `The stock bottomed at $${REVERSION_TROUGH} and the base-zone floor was $${REVERSION_BASEFLOOR}. At $${NOW_PRICE}, the stock has recovered 100%+ — it blew through the base floor and is now at all-time highs. The bar is at its maximum.`, "100% means: stock has fully recovered and EXCEEDED the base floor. It's at ATH.", "#9fb4ff")}
        style={{ position: "relative", height: 14, background: "#11161f", borderRadius: 7, overflow: "hidden", border: "1px solid #1c2230" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${recPct}%`, background: "linear-gradient(90deg,#f1564b,#3fd07a)", borderRadius: 7 }} />
        <div style={{ position: "absolute", left: `${Math.min(99, recPct)}%`, top: "50%", width: 8, height: 8, borderRadius: "50%", background: "#9fb4ff", transform: "translate(-50%,-50%)", boxShadow: "0 0 8px #9fb4ff", pointerEvents: "none" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#5a6477", marginTop: 3 }}>
        <span>${REVERSION_TROUGH}</span><span style={{ color: "#9fb4ff" }}>${now} now · {Math.round(recPct)}% of the way back</span><span>${REVERSION_BASEFLOOR}</span>
      </div>
      <div style={{ fontSize: 10.5, color: "#9aa4b8", lineHeight: 1.55, marginTop: 10 }}>
        The June 2025 dislocation (trough <span style={{ color: "#f1564b", fontWeight: 700 }}>${REVERSION_TROUGH}</span>) took ~{REVERSION_PRECEDENT_DAYS} days to recover to base floor (<span style={{ color: "#e0a83b" }}>${REVERSION_BASEFLOOR}</span>). We're <span style={{ color: "#fff", fontWeight: 700 }}>{elapsed} days in</span> — recovery <span style={{ color: "#3fd07a", fontWeight: 700 }}>is long complete</span> and the stock trades at all-time highs. Both bars are pegged at 100%. The forward question: <span style={{ color: "#e0a83b" }}>what triggers the NEXT dislocation?</span> Most likely candidate: the Aug 11 Q2 2026 print, if Leo CXL guidance disappoints or the revenue guide misses below $380M for Q3.

/* ── TrackRecord / Backtest panel ─────────────────────────────────────────── */
function TrackRecord() {
  const W = 1000, H = 300, pl = 44, pr = 70, pt = 20, pb = 40;
  const pw = W - pl - pr, ph = H - pt - pb;
  const y = (p) => pt + (1 - (p - TRACK_PRICE_MIN) / (TRACK_PRICE_MAX - TRACK_PRICE_MIN)) * ph;
  const x = (i) => pl + (TRACK.length === 1 ? pw / 2 : (i / (TRACK.length - 1)) * pw);
  const grid = [400, 350, 300, 250, 200, 150, 100, 50];
  const pathPts = TRACK.map((t, i) => [x(i), y(t.post)]);
  const linePath = "M " + pathPts.map(([px, py]) => `${px} ${py}`).join(" L ");
  const hits = TRACK.filter((t) => t.landed.includes("base") || t.landed.includes("bull")).length;
  return (
    <div style={{ background: "#080b11", padding: "16px 18px", borderTop: "1px solid #161c28" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <div style={{ fontSize: 11.5, letterSpacing: "0.18em", color: "#7b86a0" }}>
          <span style={{ background: "#161c28", padding: "2px 6px", borderRadius: 3, color: "#cdd5e3", marginRight: 8 }}>TR · BACKTEST</span>
          THESIS TRACK RECORD · RECONSTRUCTED BANDS vs ACTUAL PRICE
        </div>
        <div style={{ fontSize: 11, color: "#7b86a0" }}>BASE-OR-BETTER LANDINGS: <span style={{ color: "#3fd07a", fontWeight: 700 }}>{hits}/{TRACK.length}</span></div>
      </div>
      <div style={{ fontSize: 10.5, color: "#5a6477", marginBottom: 10 }}>
        Each column = one earnings date. Stacked zones are the bear / base / bull bands as they'd have been estimated then. The line is where the actual price traded after.
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
        {grid.map((p) => (
          <g key={p}>
            <line x1={pl} y1={y(p)} x2={W - pr} y2={y(p)} stroke="#161c28" strokeWidth="1" strokeDasharray="1 5" />
            <text x={W - pr + 8} y={y(p) + 3} fill="#5a6477" fontSize="11" fontFamily={FONT_MONO}>${p}</text>
          </g>
        ))}
        {TRACK.map((t, i) => {
          const cx = x(i), bw = 46;
          const landWord = t.landed.includes("bull") ? "the optimistic zone" : t.landed.includes("base") ? "the middle zone" : "the pessimistic zone (or below it)";
          const reactWord = t.reaction.includes("−") ? "the stock FELL after this report" : "the stock ROSE after this report";
          const seg = (range, color) => (
            <rect x={cx - bw / 2} y={y(range[1])} width={bw} height={Math.max(2, y(range[0]) - y(range[1]))}
              fill={color} opacity={t.conf === "med" ? 0.32 : 0.5} rx="2"
              style={{ animation: `fadeUp .5s ease ${i * 0.08}s both` }}
              {...tipSvg(`${t.q} earnings`,
                `Back at this earnings date, here's the range the model would have estimated (red=pessimistic, yellow=middle, green=optimistic). In reality, ${reactWord} and the price ended up in ${landWord} (~$${t.post}).${t.q === "Q2 2025" ? " The stock fell BELOW the bear band — this was a macro/tariff panic event, not a thesis failure." : ""}`,
                t.conf === "med" ? "Marked 'lower-confidence' — older reconstructed data, treat loosely." : null,
                color.includes("63,208") ? "#3fd07a" : color.includes("224,168") ? "#e0a83b" : "#f1564b")} />
          );
          return (
            <g key={t.q}>
              {seg(t.bull, "rgba(63,208,122,0.55)")}
              {seg(t.base, "rgba(224,168,59,0.5)")}
              {seg(t.bear, "rgba(241,86,75,0.5)")}
              <text x={cx} y={H - 24} fill="#9aa4b8" fontSize="11" fontFamily={FONT_MONO} textAnchor="middle">{t.q}</text>
              <text x={cx} y={H - 11} fill={t.conf === "med" ? "#5a6477" : "#3a4252"} fontSize="8.5" fontFamily={FONT_MONO} textAnchor="middle">
                {t.conf === "med" ? "lower-conf" : t.reaction === "−−" ? "↓ macro panic" : ""}
              </text>
            </g>
          );
        })}
        <path d={linePath} fill="none" stroke="#dde3ee" strokeWidth="2.2" className="track-line" style={{ filter: "drop-shadow(0 0 4px rgba(221,227,238,0.4))" }} />
        {TRACK.map((t, i) => {
          const isLast = i === TRACK.length - 1;
          return (
            <g key={t.q} style={{ animation: `pop .4s cubic-bezier(.2,1.4,.4,1) ${0.3 + i * 0.08}s both` }}>
              <circle cx={x(i)} cy={y(t.post)} r={isLast ? 6 : 4}
                fill={isLast ? "#2f6dff" : "#0a0d14"} stroke="#fff" strokeWidth={isLast ? 2 : 1.5}
                {...tipSvg(isLast ? "Today (post Q1 2026 earnings)" : `${t.q}: actual price`,
                  isLast ? `After Q1 2026 earnings (May 5), ALAB traded up to ~$${t.post} — the beat (+93% YoY, $0.61 EPS vs $0.54 est) and strong Q2 guide pushed the stock into the lower bull band. This dot is the current price.` : `After ${t.q} earnings, the price actually traded around $${t.post}. Compare this dot to the colored bars behind it to see whether the scenario bands were well-calibrated.`,
                  null, isLast ? "#9fb4ff" : "#cdd5e3")} />
              {isLast && <text x={x(i)} y={y(t.post) - 14} fill="#9fb4ff" fontSize="11" fontFamily={FONT_MONO} textAnchor="middle" fontWeight="700">NOW ${t.post}</text>}
            </g>
          );
        })}
      </svg>
      <div style={{ marginTop: 12, padding: "10px 12px", background: "#0a0e15", border: "1px solid #161c28", borderRadius: 8 }}>
        <div style={{ fontSize: 10.5, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 6 }}>READ-OUT</div>
        <div style={{ fontSize: 12, color: "#bcc6d8", lineHeight: 1.6 }}>
          Current price <span style={{ color: "#9fb4ff", fontWeight: 700 }}>${NOW_PRICE}</span> sits <span style={{ color: "#3fd07a", fontWeight: 700 }}>in the lower BULL band</span>, with Q1 2026 printing <span style={{ color: "#e0a83b", fontWeight: 700 }}>bull fundamentals</span> (+93% YoY revenue, 76% gross margin, $0.61 non-GAAP EPS). The one extreme dislocation — <span style={{ color: "#f1564b" }}>Q2 2025 at $88</span> — fell completely outside the reconstructed bear band; it was a macro/tariff panic event while the business was still growing 150% YoY. The stock recovered from that trough to base zone in two quarters and has since run to ATH on Leo CXL thesis and Scorpio X momentum. The open question: at 114× forward P/E, the multiple now <span style={{ color: "#e0a83b" }}>carries the full weight</span> of Leo CXL delivery.
        </div>
      </div>
      <ReversionClock />
      <div style={{ fontSize: 9.5, color: "#3d4555", marginTop: 8, lineHeight: 1.5 }}>
        ⚠ Bands are reconstructed (anchored to each date's estimated NTM non-GAAP EPS × multiple regime), not archived in real time — treat all levels as directional. Q2 2025 price fell below the bear band entirely due to macro factors unrelated to ALAB's fundamentals; it is a limit-case calibration point, not a model failure. The reversion clock references n=1 full dislocation; not a strategy, a precedent.
      </div>
    </div>
  );
}

            </div>

            {/* KPI bar chart ── */}
            <div style={{ marginTop: 18, borderTop: "1px solid #161c28", paddingTop: 14 }}>
              <div style={{ fontSize: 11.5, letterSpacing: "0.16em", color: "#7b86a0", marginBottom: 4 }} {...tip(
                "The operating leverage gauge",
                "Astera is growing revenue at 90%+. The key question for a 114× multiple stock: is that revenue growth PROFITABLE? This chart tracks non-GAAP operating margin — how many cents of profit per dollar of revenue. If it expands as revenue scales, the business has genuine operating leverage. If it compresses, growth alone doesn't justify the valuation.",
                "Non-GAAP excludes stock-based compensation; this is how management and analysts measure the real earnings power.", "#9fb4ff")}>
                <span style={{ background: "#161c28", padding: "2px 6px", borderRadius: 3, color: "#cdd5e3", marginRight: 8 }}>KPI · K01</span>
                Non-GAAP Operating Margin
                <span style={{ color: "#5a6477", marginLeft: 8 }}>%  ·  HIGHER BETTER</span>
              </div>
              <div className="panel" key={active + "-kpi"} style={{ display: "flex", alignItems: "flex-end", gap: 10, height: 120, padding: "12px 4px 0" }}>
                <KpiCol label="Q1 26" val={KPI_HIST} baseline accentColor="#7b86a0" />
                {kpiVals.map((v, i) => <KpiCol key={i} label={FUTURE_Q[i]} val={v} accentColor={c.accent} delay={i * 0.08} />)}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginTop: 12, fontSize: 11, lineHeight: 1.5 }}>
                <div>
                  <div style={{ color: "#5a6477", letterSpacing: "0.12em", marginBottom: 3 }}>WHAT THIS MEASURES</div>
                  <div style={{ color: "#9aa4b8" }}>Profit kept per dollar of revenue after R&amp;D and sales costs, excluding stock compensation. At 36%, Astera already shows meaningful leverage for a hyper-growth company.</div>
                </div>
                <div>
                  <div style={{ color: "#5a6477", letterSpacing: "0.12em", marginBottom: 3 }}>WHAT THE <span style={{ color: c.accent }}>{c.label}</span> CASE REQUIRES</div>
                  <div style={{ color: c.accent }}>{active === "bull" ? "Operating leverage compounds as Leo CXL scales; margins expand to 44–47% as high-margin incremental revenue outpaces cost growth." : active === "base" ? "Gradual expansion to 40–42% as revenue scales faster than costs; Leo ramp adds volume without disrupting unit economics." : "Margin compresses toward 28–30% as revenue decelerates and R&D stays elevated defending the product roadmap."}</div>
                </div>
              </div>
            </div>
          </div>

          {/* Right: signal panel ── */}
          <div style={{ background: "#080b11", padding: "16px 18px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontSize: 11.5, letterSpacing: "0.18em", color: "#7b86a0" }}>THESIS · ALL SIGNALS</div>
              <div style={{ fontSize: 12, color: "#7b86a0" }}>{c.label.toLowerCase()} 12M <span style={{ color: c.accent, fontWeight: 700 }}>{c.target12}</span></div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12 }}>
              <Segmented active={active} setActive={setActive} small />
              <span className="dot-track" style={{ marginLeft: 6, fontSize: 10.5, color: c.accent }}>● TRACKING</span>
            </div>
            <div className="panel" key={active + "-op"} style={{ fontSize: 12.5, lineHeight: 1.6, color: "#bcc6d8", marginBottom: 16, minHeight: 64 }}>{c.op}</div>

            <SignalGroup id="SN01" title="Revenue Growth &amp; Design Win Velocity" requires={c.requires01} accent={c.accent} evidence={3}>
              {SIGNALS[active].map((s, i) => <SignalRow key={i} s={s} accent={c.accent} />)}
            </SignalGroup>
            <SignalGroup id="SN02" title="Margin Quality &amp; Leo CXL Progress" requires={c.requires02} accent={c.accent} evidence={3}>
              {MARGIN[active].map((s, i) => <MarginRow key={i} s={s} accent={c.accent} />)}
            </SignalGroup>

            <div style={{ marginTop: 14, borderTop: "1px solid #161c28", paddingTop: 10 }}>
              <div style={{ fontSize: 10.5, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 3 }}>WHAT BREAKS THE <span style={{ color: c.accent }}>{c.label}</span> CASE</div>
              <div style={{ fontSize: 11.5, color: "#9aa4b8", lineHeight: 1.5 }}>{c.breaks}</div>
            </div>

            {/* Risk / Reward */}
            <div style={{ marginTop: 10, padding: "10px 12px", background: "#0a0d14", border: "1px solid #2a1a1a", borderRadius: 6 }}>
              <div style={{ fontSize: 10, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 8 }}>RISK / REWARD AT ${NOW_PRICE}</div>
              {[
                { label: "BEAR", color: "#f1564b", lo: 130, hi: 185 },
                { label: "BASE", color: "#e0a83b", lo: 330, hi: 430 },
                { label: "BULL", color: "#3fd07a", lo: 530, hi: 680 },
              ].map(({ label, color, lo, hi }) => {
                const mid = Math.round((lo + hi) / 2);
                const pct = Math.round(((mid - NOW_PRICE) / NOW_PRICE) * 100);
                const sign = pct >= 0 ? "+" : "";
                const barW = Math.max(4, Math.min(96, ((pct + 60) / 130) * 100));
                return (
                  <div key={label} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}
                    {...tip(`${label} scenario return`,
                      `If the ${label.toLowerCase()} case plays out over 12 months, price would land in the $${lo}–$${hi} range — roughly ${sign}${pct}% from today's $${NOW_PRICE}.`,
                      "Midpoint of range used. These are estimates, not targets.", color)}>
                    <div style={{ fontSize: 9.5, color, fontWeight: 700, width: 34 }}>{label}</div>
                    <div style={{ flex: 1, position: "relative", height: 8, background: "#0d1018", borderRadius: 4, border: "1px solid #1c2230" }}>
                      <div style={{ position: "absolute", top: 0, bottom: 0, left: 0, width: `${barW}%`, background: color, opacity: 0.45, borderRadius: 4 }} />
                      <div style={{ position: "absolute", top: "50%", left: `${barW}%`, transform: "translate(-50%,-50%)", width: 6, height: 6, borderRadius: "50%", background: color, boxShadow: `0 0 6px ${color}` }} />
                    </div>
                    <div style={{ fontSize: 10.5, color, fontWeight: 700, width: 44, textAlign: "right" }}>{sign}{pct}%</div>
                    <div style={{ fontSize: 9, color: "#4a5366", width: 72 }}>${lo}–${hi}</div>
                  </div>
                );
              })}
              <div style={{ marginTop: 8, paddingTop: 8, borderTop: "1px solid #161c28", fontSize: 10.5, color: "#9aa4b8", lineHeight: 1.55 }}
                {...tip("What this asymmetry means",
                  `At $${NOW_PRICE}, ALAB trades at 114× forward P/E — the base case barely covers; bear is a ~−54% collapse if Leo CXL disappoints. This is a high-conviction call or nothing. Size accordingly.`,
                  "Midpoints of ranges used. Always hold loosely.", "#9aa4b8")}>
                Bear ≈ <span style={{ color: "#f1564b", fontWeight: 700 }}>−54%</span> · Base ≈ <span style={{ color: "#e0a83b", fontWeight: 700 }}>+11%</span> · Bull ≈ <span style={{ color: "#3fd07a", fontWeight: 700 }}>+76%</span> — at 114× P/E, base barely covers. <span style={{ color: "#f1564b" }}>Binary on Leo CXL delivery</span>. Size accordingly.
              </div>
            </div>
          </div>
        </div>

        {/* ── Observable-now footer strip ── */}
        <div style={{ padding: "10px 22px", borderTop: "1px solid #161c28", display: "flex", justifyContent: "space-between", fontSize: 10.5, color: "#4a5366" }}>
          <span>OBSERVABLE NOW: OCP Summit/hyperscaler roadmap announcements · Scorpio X design win press releases · in-house switch silicon disclosures</span>
          <span>CONFIRMS AUG 11: revenue vs guide · Leo CXL status · op margin · customer concentration</span>
        </div>

        <TrackRecord />
      </div>

      {/* ── Disclaimer ── */}
      <div style={{ maxWidth: 1280, margin: "12px auto 0", fontSize: 10.5, color: "#3d4555", lineHeight: 1.5 }}>
        Illustrative scenario framing built on public data and consensus estimates as of June 2026 — not a prediction and not financial advice. Price ranges are scenario mid-bands derived from non-GAAP EPS × assumed multiple; KPI markers are positional, not literal. The valuation ruler (NTM non-GAAP P/E) reflects how this stock is widely analyzed; GAAP EPS is materially lower due to SBC. All inputs will change with every quarterly print. Hold bands loosely.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ALABThesis />);
</script>
</body>
</html>
