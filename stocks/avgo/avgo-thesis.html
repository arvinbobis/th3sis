let tipEl = null;
function ensureTip() {
  if (!tipEl) { tipEl = document.createElement("div"); tipEl.id = "tip-box"; document.body.appendChild(tipEl); }
  return tipEl;
}
function showTip(e, title, body, note, color) {
  const el = ensureTip();
  el.innerHTML = `<div class="tt" style="color:${color||'#9fb4ff'}">${title}</div><div class="tb">${body}</div>${note?`<div class="tn">${note}</div>`:""}`;
  el.classList.add("on"); moveTip(e);
}
function moveTip(e) {
  const el = ensureTip(); const pad = 16;
  let x = e.clientX + pad, y = e.clientY + pad;
  const r = el.getBoundingClientRect();
  if (x + r.width > window.innerWidth - 8) x = e.clientX - r.width - pad;
  if (y + r.height > window.innerHeight - 8) y = e.clientY - r.height - pad;
  el.style.left = x + "px"; el.style.top = y + "px";
}
function hideTip() { if (tipEl) tipEl.classList.remove("on"); }

// ── Fan Chart ──────────────────────────────────────────────────────────────
function FanChart({ c }) {
  const nHist = HISTORY.length;
  const histPts = HISTORY.map((d, i) => [PAD_L + (i / (nHist + FUTURE_Q.length - 1)) * plotW, yOf(d.p)]);
  const nowX = histPts[histPts.length - 1][0];
  const nowY = histPts[histPts.length - 1][1];
  const fwdN = FUTURE_Q.length;
  const fwdX = (i) => nowX + ((i + 1) / fwdN) * (CH_W - PAD_R - nowX);
  const end = PROJ_END[c.key];
  const mid = FUTURE_Q.map((_, i) => {
    const t = (i + 1) / fwdN;
    return [fwdX(i), yOf(NOW_PRICE + (end - NOW_PRICE) * t)];
  });
  const spread = (i) => 28 + i * 28;
  const upper = mid.map(([x, y], i) => [x, y - spread(i)]);
  const lower = mid.map(([x, y], i) => [x, y + spread(i)]);
  const bandPath = `M ${nowX} ${nowY} ` + upper.map(([x, y]) => `L ${x} ${y}`).join(" ") + " " +
    lower.slice().reverse().map(([x, y]) => `L ${x} ${y}`).join(" ") + " Z";
  const midPath = `M ${nowX} ${nowY} ` + mid.map(([x, y]) => `L ${x} ${y}`).join(" ");
  const histPath = "M " + histPts.map(([x, y]) => `${x} ${y}`).join(" L ");
  const gridP = [650, 550, 450, 350, 250];

  return (
    <svg viewBox={`0 0 ${CH_W} ${CH_H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      <defs>
        <linearGradient id={`fan-${c.key}`} x1="0" y1="0" x2="1" y2="0">

          <stop offset="100%" stopColor={c.accent} stopOpacity="0.28" />
        </linearGradient>
        <filter id="softglow"><feGaussianBlur stdDeviation="2.2" /></filter>
      </defs>
      {gridP.map((p) => (
        <g key={p}>
          <line x1={PAD_L} y1={yOf(p)} x2={CH_W - PAD_R} y2={yOf(p)} stroke="var(--bd2)" strokeWidth="1" strokeDasharray="1 5" />
          <text x={CH_W - PAD_R + 8} y={yOf(p) + 3} fill="var(--tx5)" fontSize="11" fontFamily={FONT_MONO}>${p}</text>
        </g>
      ))}
      <line x1={nowX} y1={PAD_T} x2={nowX} y2={CH_H - PAD_B} stroke="#2f6dff" strokeWidth="1" strokeDasharray="3 4" opacity="0.7" />
      <path d={bandPath} fill={`url(#fan-${c.key})`} {...tipSvg(
        "The forecast 'cone'", "This shaded fan shows the range of where the price could go in this scenario over the next year. It gets wider further out because the future is less certain. The dashed line through the middle is the most-likely path.",
        "Wider = more uncertainty.", c.accent, "fan-band")} />
      <path d={midPath} fill="none" stroke={c.accent} strokeWidth="2" strokeDasharray="6 5" className="fan-mid" style={{ filter: "url(#softglow)" }} />
      <path d={histPath} fill="none" stroke="var(--tx1)" strokeWidth="2" {...tipSvg(
        "Price history", "The solid white line is AVGO's actual share price since Q4 FY2024. Note: Broadcom did a 10-for-1 stock split in July 2024 — all prices here are post-split. The big run from ~$185 to $460+ was driven almost entirely by the AI custom chip story accelerating.",

      {HISTORY.map((d, i) => (
        <g key={i}>
          <circle cx={histPts[i][0]} cy={histPts[i][1]} r={i === nHist - 1 ? 4.5 : 3}

            stroke={i === nHist - 1 ? "var(--title)" : "var(--tx3)"} strokeWidth="1.5"
            {...tipSvg(i === nHist - 1 ? "Where we are today" : d.q,
              i === nHist - 1 ? `AVGO trades around $${NOW_PRICE} right now (post Q2 FY2026 earnings). Q2 printed $10.8B AI revenue (beat), but Q3 guidance of $16B missed analyst whispers — stock dropped ~15%. Everything left of this dot is history; everything right is forecast.`
                : `At the end of ${d.q}, AVGO was around $${d.p}. All prices are post-split (10:1 in July 2024).`,
              null, i === nHist - 1 ? "var(--blue-soft)" : "var(--tx1)")} />
          {i === nHist - 1 && <text x={histPts[i][0] - 6} y={histPts[i][1] - 12} fill="var(--blue-soft)" fontSize="11" fontFamily={FONT_MONO} textAnchor="end">NOW ${NOW_PRICE}</text>}
        </g>
      ))}
      {mid.map(([x, y], i) => (
        <g key={i} className="diamond" style={{ animationDelay: `${0.5 + i * 0.12}s` }}>
          <rect x={x - 4} y={y - 4} width="8" height="8" transform={`rotate(45 ${x} ${y})`}
            fill="var(--panel-bg)" stroke={c.accent} strokeWidth="1.6"
            {...tipSvg(`Forecast: ${FUTURE_Q[i]}`,
              `A milestone on the most-likely price path for the ${c.label} scenario. Each diamond is roughly one quarter further into the future.`,
              "Hover the shaded cone around it to see the uncertainty range.", c.accent)} />
          <text x={x} y={y - 12} fill={c.accent} fontSize="10.5" fontFamily={FONT_MONO} textAnchor="middle">{FUTURE_Q[i]}</text>
        </g>
      ))}
      {["2025", "2026", "2027"].map((yr, i) => (
        <text key={yr} x={PAD_L + (i / 2) * plotW} y={CH_H - 10} fill="var(--tx5)" fontSize="11" fontFamily={FONT_MONO}>{yr}</text>
      ))}
    </svg>
  );
}

// ── Signal Bar ─────────────────────────────────────────────────────────────
function SignalBar({ pos, accent, tipProps }) {
  return (
    <div {...(tipProps || {})} style={{ position: "relative", height: 22, borderRadius: 3, overflow: "hidden", display: "flex", border: "1px solid #1c2230" }}>
      <div style={{ flex: 1, background: "rgba(241,86,75,0.22)" }} />
      <div style={{ flex: 1, background: "rgba(224,168,59,0.18)" }} />
      <div style={{ flex: 1, background: "rgba(63,208,122,0.22)" }} />
      <div style={{ position: "absolute", top: -2, bottom: -2, left: `calc(${pos * 100}% - 1px)`, width: 2, background: accent, boxShadow: `0 0 8px ${accent}`, pointerEvents: "none" }} />
      <div style={{ position: "absolute", top: "50%", left: `${pos * 100}%`, width: 7, height: 7, borderRadius: "50%", background: accent, transform: "translate(-50%,-50%)", boxShadow: `0 0 10px ${accent}`, pointerEvents: "none" }} />
    </div>
  );
}
function tagColor(tag) {
  if (tag === "BEAT")  return "#3fd07a";
  if (tag === "MATCH") return "#e0a83b";
  if (tag === "MISS")  return "#f1564b";
  return "var(--tx4)";
}

// ── Segmented Control ──────────────────────────────────────────────────────
function Segmented({ active, setActive, small }) {
  const explain = {
    bear: ["The pessimistic scenario", "Click to see what AVGO looks like if hyperscaler AI spending pulls back — XPU revenue misses guidance, VMware customers churn faster than expected, and the stock re-rates as a hardware cyclical. Price would likely fall to the $200–265 range."],
    base: ["The most-likely scenario", "Click for the base view — AI chip revenue hits guidance, VMware ARR grows steadily at 15–18%, and Broadcom keeps compounding FCF at ~20% per year. Price stays in the $420–490 range near fair value."],
    bull: ["The optimistic scenario", "Click to see the upside — Q2 AI revenue beats $10.7B guidance, a 7th hyperscaler XPU customer is announced, and the market re-rates AVGO from hardware cyclical to durable platform. Price could reach $580–700."],
  };
  return (
    <div style={{ display: "flex", gap: 5 }}>
      {Object.values(CASES).map((cc) => {
        const on = active === cc.key;
        return (
          <div key={cc.key} onClick={() => setActive(cc.key)}
            onMouseEnter={(e) => showTip(e, explain[cc.key][0], explain[cc.key][1], "Tip: click to switch the whole dashboard to this scenario.", cc.accent)}
            onMouseMove={moveTip} onMouseLeave={hideTip}
            style={{
              padding: small ? "3px 12px" : "4px 14px", borderRadius: 4, fontSize: 11,
              fontWeight: 700, letterSpacing: "0.08em", cursor: "pointer",

              background: on ? cc.accent : "transparent", boxShadow: on ? `0 0 16px ${cc.glow}` : "none",
              transition: "all .18s ease",
            }}>{cc.label}</div>
        );
      })}
    </div>
  );
}

// ── Reversion Clock ────────────────────────────────────────────────────────
function ReversionClock() {
  const dislocationDate = new Date(DISLOCATION_DATE);
  const today = new Date();
  const elapsed = Math.round((today - dislocationDate) / 86400000);
  const pct = Math.min(100, (elapsed / REVERSION_PRECEDENT_DAYS) * 100);
  const trough = REVERSION_TROUGH, baseFloor = REVERSION_BASEFLOOR, now = NOW_PRICE;
  const recPct = Math.min(138, Math.max(0, ((now - trough) / (baseFloor - trough)) * 100));
  return (
    <div style={{ marginTop: 12, padding: "12px 14px", background: "var(--panel-bg)", border: "1px solid #161c28", borderRadius: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
        <div style={{ fontSize: 10.5, letterSpacing: "0.14em", color: "var(--tx5)" }}>REVERSION CLOCK · JUN 2026 DISLOCATION</div>
        <div style={{ fontSize: 11, color: "var(--tx3)" }}><span style={{ color: "#e0a83b", fontWeight: 700 }}>{elapsed}d</span> elapsed / ~{REVERSION_PRECEDENT_DAYS}d precedent</div>
      </div>
      <div style={{ marginBottom: 4, fontSize: 9.5, color: "var(--tx5)" }}>TIME SINCE DISLOCATION ({new Date(DISLOCATION_DATE).toLocaleDateString("en-US",{month:"short",day:"numeric"})})</div>
      <div {...tip("How much time has passed",
        "In April 2026, competition fears from Marvell briefly pushed AVGO below $400. This bar shows how far along we are in the recovery cycle vs. the prior Q2 FY2025 dislocation precedent (~50 days).",
        "Filling up = getting closer to when recovery happened last time.", "#e0a83b")}
        style={{ position: "relative", height: 14, background: "var(--deep-bg)", borderRadius: 7, overflow: "hidden", border: "1px solid #1c2230" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${Math.min(100,pct)}%`, background: "linear-gradient(90deg,#f1564b,#e0a83b)", borderRadius: 7 }} />
        <div style={{ position: "absolute", right: 0, top: -3, bottom: -3, width: 2, background: "#3fd07a" }} />
        <div style={{ position: "absolute", left: `${Math.min(100,pct)}%`, top: "50%", width: 8, height: 8, borderRadius: "50%", background: "var(--title)", transform: "translate(-50%,-50%)", boxShadow: "0 0 8px #fff", pointerEvents: "none" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "var(--tx5)", marginTop: 3 }}>
        <span>day 0</span><span style={{ color: "#3fd07a" }}>base-reversion mark (~50d) →</span>
      </div>
      <div style={{ marginTop: 12, marginBottom: 4, fontSize: 9.5, color: "var(--tx5)" }}>PRICE RECOVERY · ${REVERSION_TROUGH} trough → ${REVERSION_BASEFLOOR} base floor</div>
      <div {...tip("How far the price has bounced back",
        `Stock bottomed near $${REVERSION_TROUGH} after the April competition-fear selloff and needed to reach $${REVERSION_BASEFLOOR} to re-enter the base band. At $${now} it has now shot well past the base floor.`,
        "When this bar is fuller than the time bar above, the bounce-back ran faster than the precedent. It did.", "var(--blue-soft)")}
        style={{ position: "relative", height: 14, background: "var(--deep-bg)", borderRadius: 7, overflow: "hidden", border: "1px solid #1c2230" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${Math.min(100, recPct / 1.38)}%`, background: "linear-gradient(90deg,#f1564b,#3fd07a)", borderRadius: 7 }} />
        <div style={{ position: "absolute", left: `${Math.min(100, recPct / 1.38)}%`, top: "50%", width: 8, height: 8, borderRadius: "50%", background: "var(--blue-soft)", transform: "translate(-50%,-50%)", boxShadow: "0 0 8px #9fb4ff", pointerEvents: "none" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "var(--tx5)", marginTop: 3 }}>
        <span>${REVERSION_TROUGH}</span>
        <span style={{ color: "var(--blue-soft)" }}>${now} now · {Math.round(recPct)}% of the way back (base floor cleared)</span>
        <span>${REVERSION_BASEFLOOR}</span>
      </div>
      <div style={{ fontSize: 10.5, color: "var(--tx3)", lineHeight: 1.55, marginTop: 10 }}>
        Q2 FY2026 earnings on June 3 triggered a new dislocation — AI guide miss caused a ~15% drop to ~${REVERSION_TROUGH}. Price at ${now} is recovering. The next confirmation is <span style={{ color: "#e0a83b", fontWeight: 700 }}>Q3 FY2026 earnings (~September 2026)</span> — watch whether AI revenue meets the $16B guide.
      </div>
    </div>
  );
}

// ── Track Record ───────────────────────────────────────────────────────────
function TrackRecord() {
  const W = 1000, H = 300, pl = 44, pr = 70, pt = 20, pb = 40;
  const pw = W - pl - pr, ph = H - pt - pb;
  const y = (p) => pt + (1 - (p - TRACK_PRICE_MIN) / (TRACK_PRICE_MAX - TRACK_PRICE_MIN)) * ph;
  const x = (i) => pl + (TRACK.length === 1 ? pw / 2 : (i / (TRACK.length - 1)) * pw);
  const grid = [500, 400, 300, 200, 100];
  const pathPts = TRACK.map((t, i) => [x(i), y(t.post)]);
  const linePath = "M " + pathPts.map(([px, py]) => `${px} ${py}`).join(" L ");
  const hits = TRACK.filter((t) => t.landed.includes("base") || t.landed.includes("bull")).length;
  return (
    <div style={{ background: "var(--inner-bg)", padding: "16px 18px", borderTop: "1px solid #161c28" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <div style={{ fontSize: 11.5, letterSpacing: "0.18em", color: "var(--tx4)" }}>
          <span style={{ background: "var(--bd)", padding: "2px 6px", borderRadius: 3, color: "var(--tx1)", marginRight: 8 }}>TR · BACKTEST</span>
          THESIS TRACK RECORD · RECONSTRUCTED BANDS vs ACTUAL PRICE
        </div>
        <div style={{ fontSize: 11, color: "var(--tx4)" }}>BASE-OR-BETTER LANDINGS: <span style={{ color: "#3fd07a", fontWeight: 700 }}>{hits}/{TRACK.length}</span></div>
      </div>
      <div style={{ fontSize: 10.5, color: "var(--tx5)", marginBottom: 10 }}>
        Each column = one earnings date. Stacked zones are the bear / base / bull bands as they would have been drawn at that time. The line is where price actually traded after. All prices post-split.
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
        {grid.map((p) => (
          <g key={p}>
            <line x1={pl} y1={y(p)} x2={W - pr} y2={y(p)} stroke="var(--bd)" strokeWidth="1" strokeDasharray="1 5" />
            <text x={W - pr + 8} y={y(p) + 3} fill="var(--tx5)" fontSize="11" fontFamily={FONT_MONO}>${p}</text>
          </g>
        ))}
        {TRACK.map((t, i) => {
          const cx = x(i), bw = 46;
          const landWord = t.landed.includes("bull") ? "the optimistic zone" : t.landed.includes("base") ? "the middle zone" : "the pessimistic zone";
          const reactWord = t.reaction.includes("−") || t.reaction.includes("-") ? "the stock FELL after this report" : "the stock ROSE after this report";
          const seg = (range, color) => (
            <rect x={cx - bw / 2} y={y(range[1])} width={bw} height={Math.max(2, y(range[0]) - y(range[1]))}
              fill={color} opacity={t.conf === "med" ? 0.32 : 0.5} rx="2" style={{ animation: `fadeUp .5s ease ${i * 0.08}s both` }}
              {...tipSvg(`${t.q} earnings`,
                `At this earnings date, here's the scenario band (red=bear, yellow=base, green=bull). In reality, ${reactWord} and the price ended up in ${landWord} (~$${t.post}).`,
                t.conf === "med" ? "Marked 'lower-confidence' — bands reconstructed in hindsight." : null,
                color.includes("63,208") ? "#3fd07a" : color.includes("224,168") ? "#e0a83b" : "#f1564b")} />
          );
          return (
            <g key={t.q}>
              {seg(t.bull, "rgba(63,208,122,0.55)")}
              {seg(t.base, "rgba(224,168,59,0.5)")}
              {seg(t.bear, "rgba(241,86,75,0.5)")}
              <text x={cx} y={H - 24} fill="var(--tx3)" fontSize="11" fontFamily={FONT_MONO} textAnchor="middle">{t.q}</text>
              <text x={cx} y={H - 11} fill={t.conf === "med" ? "var(--tx5)" : "var(--tx8)"} fontSize="8.5" fontFamily={FONT_MONO} textAnchor="middle">
                {t.conf === "med" ? "lower-conf" : t.reaction.includes("-") ? "↓ dislocation" : ""}
              </text>
            </g>
          );
        })}
        <path d={linePath} fill="none" stroke="var(--track-line)" strokeWidth="2.2" className="track-line" style={{ filter: "drop-shadow(0 0 4px rgba(221,227,238,0.4))" }} />
        {TRACK.map((t, i) => {
          const isLast = i === TRACK.length - 1;
          return (
            <g key={t.q} style={{ animation: `pop .4s cubic-bezier(.2,1.4,.4,1) ${0.3 + i * 0.08}s both` }}>
              <circle cx={x(i)} cy={y(t.post)} r={isLast ? 6 : 4} fill={isLast ? "#2f6dff" : "var(--panel-bg)"} stroke="var(--title)" strokeWidth={isLast ? 2 : 1.5}
                {...tipSvg(isLast ? "Most recent quarter" : `${t.q}: actual price`,
                  isLast ? `After Q2 FY2026 earnings (Jun 2026), AVGO traded around $${t.post} — a ~15% post-earnings drop on a Q3 AI guide miss vs. analyst whispers. Next dot: Q3 FY2026 earnings (~Sep 2026).`
                    : `After ${t.q} earnings, AVGO actually traded around $${t.post}. Compare this dot to the colored bars behind it to see if the predicted range was right.`,
                  null, isLast ? "var(--blue-soft)" : "var(--tx1)")} />
              {isLast && <text x={x(i)} y={y(t.post) - 14} fill="var(--blue-soft)" fontSize="11" fontFamily={FONT_MONO} textAnchor="middle" fontWeight="700">NOW ${t.post}</text>}
            </g>
          );
        })}
      </svg>
      <div style={{ marginTop: 12, padding: "10px 12px", background: "var(--panel-bg)", border: "1px solid #161c28", borderRadius: 8 }}>
        <div style={{ fontSize: 10.5, letterSpacing: "0.12em", color: "var(--tx5)", marginBottom: 6 }}>READ-OUT</div>
        <div style={{ fontSize: 12, color: "var(--tx2)", lineHeight: 1.6 }}>
          Price has tracked <span style={{ color: "#3fd07a", fontWeight: 700 }}>base-or-better in {hits} of {TRACK.length} quarters</span> since Q4 FY2024.
          The only bear landing was Q2 FY2025 ($242), which coincided with the 52-week low — a macro / valuation pause, not a business miss.
          The Q4 FY2025 catalyst was management's $100B FY2027 AI revenue target. Q2 FY2026 printed $10.8B AI revenue (beat) but Q3 guided $16B vs. ~$17.2B whisper — stock dropped ~15% to <span style={{ color: "var(--blue-soft)", fontWeight: 700 }}>${NOW_PRICE}</span>. Next directional catalyst: <span style={{ color: "#e0a83b", fontWeight: 700 }}>Q3 FY2026 earnings (~Sep 2026)</span> — AI revenue vs. the $16B guide.
        </div>
      </div>
      <ReversionClock />
      <div style={{ fontSize: 9.5, color: "var(--tx7)", marginTop: 8, lineHeight: 1.5 }}>
        ⚠ Bands are reconstructed now, anchored to each date's forward EPS &amp; multiple regime — not archived in real time. Treat levels as directional, especially "lower-conf" quarters. Post-split prices throughout (10:1 split July 2024). Customer concentration within the 6 XPU partners is undisclosed — treat AI revenue bands as wider than they appear.
      </div>
    </div>
  );
}

function PositionTab() {

  const [tranches, setTranches] = useState(() => loadPos()?.tranches  || DEFAULT_TRANCHES);

  const [portfolioK, setPortfolioK] = useState(() => loadPos()?.portfolioK || 100);
  const [posPct, setPosPct]         = useState(() => loadPos()?.posPct     || 2.0);
  const [flash, setFlash]           = useState(false);

  const toggle = key => setChecks(c => ({ ...c, [key]: !c[key] }));

  // Persist to localStorage on every change — swap this block for Supabase calls when ready
  useEffect(() => {
    localStorage.setItem(POS_KEY, JSON.stringify({ version: 1, existing, checks, tranches, portfolioK, posPct }));
    setFlash(true);
    const t = setTimeout(() => setFlash(false), 1000);
    return () => clearTimeout(t);
  }, [existing, checks, tranches, portfolioK, posPct]);

  const updateT = (id, field, val) => setTranches(ts => ts.map(t => {
    if (t.id !== id) return t;
    const u = { ...t, [field]: val };
    if (!t.date && u.price && u.shares) u.date = new Date().toISOString().slice(0, 10);
    return u;
  }));
  const addTranche    = () => setTranches(ts => [...ts, { id: Date.now(), label: `TRANCHE ${ts.length + 1}`, price: "", shares: "", date: null, note: "" }]);
  const deleteTranche = id => setTranches(ts => ts.filter(t => t.id !== id));

  const allGreen   = Object.values(checks).every(Boolean);
  const greenCount = Object.values(checks).filter(Boolean).length;

  const filled      = tranches.filter(t => +t.price > 0 && +t.shares > 0);
  const totShares   = filled.reduce((s, t) => s + +t.shares, 0);
  const totCost     = filled.reduce((s, t) => s + +t.price * +t.shares, 0);
  const blended     = totShares > 0 ? totCost / totShares : 0;

  const allCost     = totCost   + exCost;
  const blendedAll  = allShares > 0 ? allCost / allShares : 0;
  const ref         = blendedAll > 0 ? blendedAll : blended > 0 ? blended : NOW_PRICE;

  const ret = mid => ((mid - ref) / ref * 100).toFixed(1);

  const verdict = (() => {

                <div style={{ height: "100%", width: `${Math.min(100, absLossPct / 10 * 100)}%`,

              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 8.5, color: "var(--tx7)", marginTop: 3 }}>

            <div style={{ fontSize: 10.5, color: "var(--tx4)", lineHeight: 1.6 }}>

      <div style={{ marginTop: 14, fontSize: 10, color: "var(--tx9)", lineHeight: 1.5 }}>

        {/* ── Header ── */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 22px", borderBottom: "1px solid #161c28" }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 14 }}>
            <div style={{ fontFamily: FONT_DISPLAY, fontSize: 24, letterSpacing: "0.35em", color: "var(--title)", fontWeight: 600 }}>TH<span style={{ color: c.accent }}>3</span>SIS</div>
            <div {...tip("👋 New here?", "Hover your mouse over anything on this page — charts, bars, dots, labels — and a plain-English explanation will pop up. No finance degree required.", "This little hint is one too.", "#3fd07a")}
              style={{ fontSize: 10, color: "var(--tx5)", border: "1px solid #222a38", borderRadius: 20, padding: "3px 10px", cursor: "help" }}>
              ⓘ hover anything to learn what it means
            </div>
          </div>
          <div style={{ display: "flex", gap: 18, alignItems: "center", fontSize: 12.5, color: "var(--tx4)" }}>
            <button onClick={() => setDark(d => !d)} style={{
              background: "transparent", border: "1px solid var(--bd)", borderRadius: 20,
              padding: "3px 10px", cursor: "pointer", fontSize: 10, color: "var(--tx5)",
              fontFamily: FONT_MONO, letterSpacing: "0.08em", transition: "all .15s ease"
            }}>{dark ? "☀ LIGHT" : "◑ DARK"}</button>
            <span>{AS_OF_DATE}</span>
            <span style={{ color: "var(--tx1)" }}>NASDAQ:AVGO</span>
            <span style={{ fontFamily: FONT_DISPLAY, fontStyle: "italic", color: "var(--tx3)" }}>Broadcom Inc.</span>
            <span {...tip("Today's share price", `One share of AVGO costs about $${NOW_PRICE} right now (post 10:1 split, post Q2 FY2026 earnings). The stock dropped ~15% after the Q3 AI guide of $16B missed analyst whispers. Next earnings: Q3 FY2026 (~Sep 2026).`, null, "var(--title)")}
              style={{ color: "var(--title)", fontWeight: 700, fontSize: 15, cursor: "help" }}>${NOW_PRICE}.00</span>
          </div>
        </div>

        <TabNav activeTab={activeTab} setActiveTab={setActiveTab} accentColor={c.accent} />

        {activeTab === "valuation"  && <ValuationTab />}
        {activeTab === "position"   && <PositionTab />}
        {activeTab === "financials" && <FinancialsTab />}

        {activeTab === "thesis" && <>
        {/* ── Two-column body ── */}
        <div style={{ display: "grid", gridTemplateColumns: "1.05fr 1fr", gap: 1, background: "var(--bd)" }}>

          {/* Left — chart + KPI bars */}
          <div style={{ background: "var(--inner-bg)", padding: "16px 18px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontSize: 11.5, letterSpacing: "0.18em", color: "var(--tx4)" }}>
                <span style={{ background: "var(--bd)", padding: "2px 6px", borderRadius: 3, color: "var(--tx1)", marginRight: 8 }}>NOW</span>
                AVGO · PRICE &amp; RISK-REWARD
              </div>
              <Segmented active={active} setActive={setActive} />
            </div>
            <div className="panel" key={active + "-chart"}><FanChart c={c} /></div>
            <div style={{ marginTop: 6, display: "flex", justifyContent: "space-between", fontSize: 10.5, color: "var(--tx5)" }}>
              <span><span style={{ color: c.accent }}>━━</span> {c.label.toLowerCase()} mid &nbsp; <span style={{ color: "#2f6dff" }}>┊</span> now &nbsp; <span style={{ color: "var(--tx1)" }}>━</span> history</span>
              <span>12M TARGET <span style={{ color: c.accent, fontWeight: 700 }}>{c.target12}</span></span>
            </div>

            {/* KPI chart */}
            <div style={{ marginTop: 18, borderTop: "1px solid #161c28", paddingTop: 14 }}>
              <div style={{ fontSize: 11.5, letterSpacing: "0.16em", color: "var(--tx4)", marginBottom: 4 }}
                {...tip("The single most important number",
                  "Broadcom's AI semiconductor revenue is the quarterly dollar amount it earns from designing custom XPU/ASIC chips for hyperscalers. CEO Hock Tan has guided to $100B+ for all of FY2027 — roughly $25B/quarter. Whether this ramps as promised is what separates every scenario.",
                  "This is the number to watch at every earnings report.", "var(--blue-soft)")}>
                <span style={{ background: "var(--bd)", padding: "2px 6px", borderRadius: 3, color: "var(--tx1)", marginRight: 8 }}>KPI · K01</span>
                AI Semiconductor Revenue
                <span style={{ color: "var(--tx5)", marginLeft: 8 }}>$B quarterly  ·  HIGHER BETTER</span>
              </div>
              <div className="panel" key={active + "-kpi"} style={{ display: "flex", alignItems: "flex-end", gap: 10, height: 120, padding: "12px 4px 0" }}>
                <KpiCol label="Q1 FY26" val={KPI_HIST} baseline accentColor="var(--tx4)" />
                {kpiVals.map((v, i) => <KpiCol key={i} label={FUTURE_Q[i]} val={v} accentColor={c.accent} delay={i * 0.08} />)}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginTop: 12, fontSize: 11, lineHeight: 1.5 }}>
                <div>
                  <div style={{ color: "var(--tx5)", letterSpacing: "0.12em", marginBottom: 3 }}>WHAT THIS MEASURES</div>
                  <div style={{ color: "var(--tx3)" }}>Quarterly AI chip revenue from XPU/ASIC design wins at Google, Meta, Anthropic, OpenAI, and two unnamed hyperscalers. $100B+ FY2027 target = ~$25B/quarter run rate.</div>
                </div>
                <div>
                  <div style={{ color: "var(--tx5)", letterSpacing: "0.12em", marginBottom: 3 }}>WHAT THE <span style={{ color: c.accent }}>{c.label}</span> CASE REQUIRES</div>
                  <div style={{ color: c.accent }}>
                    {active === "bull" ? "AI revenue beats the $10.7B Q2 guide and keeps accelerating toward $23B+ quarterly by FY2027 — confirming the 7-customer platform re-rating."
                      : active === "base" ? "Revenue hits guidance each quarter and scales smoothly toward $16–17B by Q1 FY2027, keeping the $100B annual target credible."
                      : "AI revenue misses the $10.7B guide and plateaus below $11B for multiple quarters, signaling hyperscaler capex discipline has arrived."}
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* Right — thesis + signals */}
          <div style={{ background: "var(--inner-bg)", padding: "16px 18px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontSize: 11.5, letterSpacing: "0.18em", color: "var(--tx4)" }}>THESIS · ALL SIGNALS</div>
              <div style={{ fontSize: 12, color: "var(--tx4)" }}>{c.label.toLowerCase()} 12M <span style={{ color: c.accent, fontWeight: 700 }}>{c.target12}</span></div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12 }}>
              <Segmented active={active} setActive={setActive} small />
              <span className="dot-track" style={{ marginLeft: 6, fontSize: 10.5, color: c.accent }}>● TRACKING</span>
            </div>
            <div className="panel" key={active + "-op"} style={{ fontSize: 12.5, lineHeight: 1.6, color: "var(--tx2)", marginBottom: 16, minHeight: 72 }}>{c.op}</div>

            <SignalGroup id="SN01" title="AI Revenue &amp; Customer Momentum" requires={c.requires01} accent={c.accent} evidence={3}>
              {SIGNALS[active].map((s, i) => <SignalRow key={i} s={s} accent={c.accent} />)}
            </SignalGroup>

            <SignalGroup id="SN02" title="Margin &amp; Forward Guidance Quality" requires={c.requires02} accent={c.accent} evidence={3}>
              {MARGIN[active].map((s, i) => <MarginRow key={i} s={s} accent={c.accent} />)}
            </SignalGroup>

            <div style={{ marginTop: 14, borderTop: "1px solid #161c28", paddingTop: 10 }}>
              <div style={{ fontSize: 10.5, letterSpacing: "0.12em", color: "var(--tx5)", marginBottom: 3 }}>WHAT BREAKS THE <span style={{ color: c.accent }}>{c.label}</span> CASE</div>
              <div style={{ fontSize: 11.5, color: "var(--tx3)", lineHeight: 1.5 }}>{c.breaks}</div>
            </div>

            {/* Valuation ruler note */}
            <div style={{ marginTop: 14, padding: "10px 12px", background: "var(--panel-bg)", border: "1px solid #161c28", borderRadius: 6 }}>
              <div style={{ fontSize: 10, letterSpacing: "0.12em", color: "var(--tx5)", marginBottom: 4 }}>VALUATION RULER</div>
              <div {...tip("How we price this stock",
                "AVGO's GAAP earnings are depressed by ~$8B/year of amortization from the $69B VMware acquisition — a financing cost, not an economic one. The market uses non-GAAP adjusted EPS. We multiply that by a P/E multiple that reflects how excited or scared the market is about the AI revenue trajectory.",
                "Price = forward non-GAAP EPS × P/E multiple. Bear = 23x (cyclical discount). Base = 33x (premium AI compounder). Bull = 40x (platform re-rating).", "var(--tx3)")}
                style={{ fontSize: 11, color: "var(--tx3)", lineHeight: 1.5 }}>
                Forward non-GAAP EPS × P/E. Bear: ~$9.50 × 23x = $218. Base: ~$13.50 × 33x = $445. Bull: ~$16.50 × 40x = $660. Bands are wide — the multiple is a mood indicator.
              </div>
            </div>

            {/* Risk / Reward panel */}
            <div style={{ marginTop: 10, padding: "10px 12px", background: "var(--panel-bg)", border: "1px solid #2a1a1a", borderRadius: 6 }}>
              <div style={{ fontSize: 10, letterSpacing: "0.12em", color: "var(--tx5)", marginBottom: 8 }}>RISK / REWARD AT ${NOW_PRICE}</div>
              {[
                { label: "BEAR", color: "#f1564b", lo: 210, hi: 280 },
                { label: "BASE", color: "#e0a83b", lo: 390, hi: 460 },
                { label: "BULL", color: "#3fd07a", lo: 530, hi: 650 },
              ].map(({ label, color, lo, hi }) => {
                const mid = Math.round((lo + hi) / 2);
                const pct = Math.round(((mid - NOW_PRICE) / NOW_PRICE) * 100);
                const sign = pct >= 0 ? "+" : "";
                const barW = Math.min(100, Math.max(4, ((mid - 150) / (720 - 150)) * 100));
                return (
                  <div key={label} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}
                    {...tip(`${label} scenario return`,
                      `If the ${label.toLowerCase()} case plays out over 12 months, price would land in the $${lo}–$${hi} range — roughly ${sign}${pct}% from today's $${NOW_PRICE}. The base case is nearly flat; significant upside only arrives if the bull case fully materialises.`,
                      "Midpoint of range used. These are estimates, not targets.", color)}>
                    <div style={{ fontSize: 9.5, color, fontWeight: 700, width: 34 }}>{label}</div>
                    <div style={{ flex: 1, position: "relative", height: 8, background: "var(--tiny-bg)", borderRadius: 4, border: "1px solid #1c2230" }}>
                      <div style={{ position: "absolute", top: 0, bottom: 0, left: 0, width: `${barW}%`, background: color, opacity: 0.45, borderRadius: 4 }} />
                      <div style={{ position: "absolute", top: "50%", left: `${barW}%`, transform: "translate(-50%,-50%)", width: 6, height: 6, borderRadius: "50%", background: color, boxShadow: `0 0 6px ${color}` }} />
                    </div>
                    <div style={{ fontSize: 10.5, color, fontWeight: 700, width: 44, textAlign: "right" }}>{sign}{pct}%</div>
                    <div style={{ fontSize: 9, color: "var(--tx6)", width: 72 }}>${lo}–${hi}</div>
                  </div>
                );
              })}
              <div style={{ marginTop: 8, paddingTop: 8, borderTop: "1px solid #161c28", fontSize: 10.5, color: "var(--tx3)", lineHeight: 1.55 }}
                {...tip("What this asymmetry means",
                  `At $${NOW_PRICE}, the stock already trades near the bottom of the bull-case band. The base case is roughly flat; the bull case requires multiple execution proof points to clear. The bear case — hyperscaler AI capex discipline or VMware churn — represents ~50% downside. You are paying for execution, not buying a margin of safety.`,
                  "Wide asymmetric risk: large loss if wrong, modest gain if merely right. Only justified if conviction in the bull case is high.", "#f1564b")}>
                At <span style={{ color: "var(--title)", fontWeight: 700 }}>${NOW_PRICE}</span>, base ≈ flat and bear ≈ <span style={{ color: "#f1564b", fontWeight: 700 }}>−50%</span>. The market already prices in bull-case execution. <span style={{ color: "#f1564b", fontWeight: 700 }}>No margin of safety</span> at current levels — only enter with high conviction in the AI revenue ramp.
              </div>
            </div>
          </div>
        </div>

        {/* ── Footer bar ── */}
        <div style={{ padding: "10px 22px", borderTop: "1px solid #161c28", display: "flex", justifyContent: "space-between", fontSize: 10.5, color: "var(--tx6)" }}>
          <span>OBSERVABLE NOW: TSMC capacity news · hyperscaler CapEx announcements · Marvell/Intel custom chip progress · enterprise VMware churn data</span>
          <span>CONFIRMS SEP 2026: Q3 AI rev vs $16B guide · software ARR trend · EBITDA margin · Q4 AI guidance</span>
        </div>

        <TrackRecord />
        </>}
      </div>

      <div style={{ maxWidth: 1280, margin: "12px auto 0", fontSize: 10.5, color: "var(--tx7)", lineHeight: 1.5 }}>
        Illustrative scenario framing built on public consensus &amp; estimates as of {AS_OF_DATE} — not a prediction and not financial advice. Price ranges are scenario mid-bands; KPI markers are positional, not literal. Valuation ruler: forward non-GAAP EPS × P/E multiple (strips VMware amortization). Data inputs will move with every print. Next earnings: Q3 FY2026 (~Sep 2026).
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AvgoThesis />);
</script>
</body>
</html>
