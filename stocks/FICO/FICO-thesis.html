// ── Tooltip engine ─────────────────────────────────────────────────────────────
let tipEl = null;
function ensureTip() {
  if (!tipEl) { tipEl = document.createElement("div"); tipEl.id = "tip-box"; document.body.appendChild(tipEl); }
  return tipEl;
}
function showTip(e, title, body, note, color) {
  const el = ensureTip();
  el.innerHTML =
    `<div class="tt" style="color:${color || '#9fb4ff'}">${title}</div>` +
    `<div class="tb">${body}</div>` +
    (note ? `<div class="tn">${note}</div>` : "");
  el.classList.add("on"); moveTip(e);
}
function moveTip(e) {
  const el = ensureTip(); const pad = 16;
  let x = e.clientX + pad, y = e.clientY + pad;
  const r = el.getBoundingClientRect();
  if (x + r.width > window.innerWidth - 8) x = e.clientX - r.width - pad;
  if (y + r.height > window.innerHeight - 8) y = e.clientY - r.height - pad;
  el.style.left = x + "px"; el.style.top = y + "px";
}
function hideTip() { if (tipEl) tipEl.classList.remove("on"); }

}

// ── Chart constants ───────────────────────────────────────────────────────────
const PRICE_MIN = 380, PRICE_MAX = 2800;
const CH_W = 760, CH_H = 420, PAD_L = 8, PAD_R = 66, PAD_T = 18, PAD_B = 34;
const plotW = CH_W - PAD_L - PAD_R, plotH = CH_H - PAD_T - PAD_B;
const yOf = (p) => PAD_T + (1 - (p - PRICE_MIN) / (PRICE_MAX - PRICE_MIN)) * plotH;

function FanChart({ c }) {
  const nHist = HISTORY.length;
  const histPts = HISTORY.map((d, i) => [PAD_L + (i / (nHist + FUTURE_Q.length - 1)) * plotW, yOf(d.p)]);
  const nowX = histPts[histPts.length - 1][0];
  const nowY = histPts[histPts.length - 1][1];
  const fwdN = FUTURE_Q.length;
  const fwdX = (i) => nowX + ((i + 1) / fwdN) * (CH_W - PAD_R - nowX);
  const end = PROJ_END[c.key];
  const mid = FUTURE_Q.map((_, i) => {
    const t = (i + 1) / fwdN;
    return [fwdX(i), yOf(NOW_PRICE + (end - NOW_PRICE) * t)];
  });
  const spread = (i) => 36 + i * 34;
  const upper = mid.map(([x, y], i) => [x, y - spread(i)]);
  const lower = mid.map(([x, y], i) => [x, y + spread(i)]);
  const bandPath = `M ${nowX} ${nowY} ` + upper.map(([x, y]) => `L ${x} ${y}`).join(" ") + " " +
    lower.slice().reverse().map(([x, y]) => `L ${x} ${y}`).join(" ") + " Z";
  const midPath = `M ${nowX} ${nowY} ` + mid.map(([x, y]) => `L ${x} ${y}`).join(" ");
  const histPath = "M " + histPts.map(([x, y]) => `${x} ${y}`).join(" L ");
  const gridP = [2400, 1800, 1200, 600];
  return (
    <svg viewBox={`0 0 ${CH_W} ${CH_H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      <defs>
        <linearGradient id={`fan-${c.key}`} x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor={c.accent} stopOpacity="0.05" />
          <stop offset="100%" stopColor={c.accent} stopOpacity="0.28" />
        </linearGradient>
        <filter id="softglow"><feGaussianBlur stdDeviation="2.2" /></filter>
      </defs>
      {gridP.map((p) => (
        <g key={p}>
          <line x1={PAD_L} y1={yOf(p)} x2={CH_W - PAD_R} y2={yOf(p)} stroke="#1c2230" strokeWidth="1" strokeDasharray="1 5" />
          <text x={CH_W - PAD_R + 8} y={yOf(p) + 3} fill="#5a6477" fontSize="10.5" fontFamily={FONT_MONO}>${p}</text>
        </g>
      ))}
      <line x1={nowX} y1={PAD_T} x2={nowX} y2={CH_H - PAD_B} stroke="#2f6dff" strokeWidth="1" strokeDasharray="3 4" opacity="0.7" />
      <path d={bandPath} fill={`url(#fan-${c.key})`} {...tipSvg(
        "The forecast cone",
        "This shaded fan shows where FICO could trade in this scenario over the next year. The range is wide because the central question — whether VantageScore displaces FICO's pricing power — won't be answered by a single quarter.",
        "Wider = more uncertainty. FICO's case spread is the widest of any thesis here.", c.accent, "fan-band")} />
      <path d={midPath} fill="none" stroke={c.accent} strokeWidth="2" strokeDasharray="6 5" className="fan-mid" style={{ filter: "url(#softglow)" }} />
      <path d={histPath} fill="none" stroke="#cdd5e3" strokeWidth="2" {...tipSvg(
        "Price history",
        "FICO's actual share price over the past ~5 quarters. The dramatic drop in mid-2025 was the FHFA announcing VantageScore approval for Freddie Mac and Fannie Mae — the market feared FICO's pricing monopoly was over. Earnings have been going UP throughout, yet the stock is down 46% from its $2,382 ATH.",
        "This part already happened — it's real, not a forecast.", "#cdd5e3", "hist-line")} />
      {HISTORY.map((d, i) => (
        <g key={i}>
          <circle cx={histPts[i][0]} cy={histPts[i][1]} r={i === nHist - 1 ? 4.5 : 3}
            fill={i === nHist - 1 ? "#2f6dff" : "#0a0d14"}
            stroke={i === nHist - 1 ? "#fff" : "#8a93a6"} strokeWidth="1.5"
            {...tipSvg(i === nHist - 1 ? "Where we are today" : d.q,
              i === nHist - 1
                ? `FICO trades around $${NOW_PRICE} — down 46% from the $2,382 ATH despite record earnings. The entire decline is a multiple de-rating (from ~65x to 29x) on fears about VantageScore competition. Blue dot = today.`
                : `Around the end of ${d.q}, FICO traded near $${d.p}. ${i <= 1 ? "(Estimated close.)" : ""}`,
              null, i === nHist - 1 ? "#9fb4ff" : "#cdd5e3")} />
          {i === nHist - 1 && <text x={histPts[i][0] - 6} y={histPts[i][1] - 12} fill="#9fb4ff" fontSize="11" fontFamily={FONT_MONO} textAnchor="end">NOW ${NOW_PRICE}</text>}
        </g>
      ))}
      {mid.map(([x, y], i) => (
        <g key={i} className="diamond" style={{ animationDelay: `${0.5 + i * 0.12}s` }}>
          <rect x={x - 4} y={y - 4} width="8" height="8" transform={`rotate(45 ${x} ${y})`}
            fill="#0a0d14" stroke={c.accent} strokeWidth="1.6"
            {...tipSvg(`Forecast: ${FUTURE_Q[i]}`,
              `A milestone on the most-likely price path for the ${c.label} scenario. Each diamond is roughly one fiscal quarter further out.`,
              "Hover the shaded cone to see the uncertainty range.", c.accent)} />
          <text x={x} y={y - 12} fill={c.accent} fontSize="10.5" fontFamily={FONT_MONO} textAnchor="middle">{FUTURE_Q[i]}</text>
        </g>
      ))}
      {["2025", "2026", "2027"].map((yr, i) => (
        <text key={yr} x={PAD_L + (i / 2) * plotW} y={CH_H - 10} fill="#5a6477" fontSize="11" fontFamily={FONT_MONO}>{yr}</text>
      ))}
    </svg>
  );
}

function Segmented({ active, setActive, small }) {
  const explain = {
    bear: ["The pessimistic scenario", "Click to see what FICO looks like if things go wrong — VantageScore forces per-score price rollback from $10 to $3-5, Scores revenue craters, and the FTC caps pricing. Stock falls to $450-750 as the market prices FICO as commodity software."],
    base: ["The most-likely scenario", "Click for the steady-execution view — VantageScore adoption is slow, FICO retains pricing power with moderated growth (20-35%), Software ARR accelerates. At 29x FY2026E $44 EPS, current price ($1,278) is roughly fair value. Price drifts toward $1,100-1,700."],
    bull: ["The optimistic scenario", "Click to see the upside — VantageScore fails to displace FICO in practice, pricing holds or grows, EPS compounds 25-30%, and the market re-rates back toward 42-52x. Price could run to $1,900-2,600."],
  };
  return (
    <div style={{ display: "flex", gap: 5 }}>
      {Object.values(CASES).map((cc) => {
        const on = active === cc.key;
        return (
          <div key={cc.key} onClick={() => setActive(cc.key)}
            onMouseEnter={(e) => showTip(e, explain[cc.key][0], explain[cc.key][1], "Tip: click to switch the whole dashboard to this scenario.", cc.accent)}
            onMouseMove={moveTip} onMouseLeave={hideTip}
            style={{
              padding: small ? "3px 12px" : "4px 14px", borderRadius: 4, fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", cursor: "pointer",
              border: `1px solid ${on ? cc.accent : "#222a38"}`, color: on ? "#06080d" : cc.accent,
              background: on ? cc.accent : "transparent", boxShadow: on ? `0 0 16px ${cc.glow}` : "none",
              transition: "all .18s ease",
            }}>{cc.label}</div>
        );
      })}
    </div>
  );
}

function KpiCol({ label, val, accentColor, baseline, delay = 0 }) {
  const h = ((val + 10) / 75) * 100;
  const tp = baseline
    ? tip("Starting point (Q2 FY2026)", "FICO's Scores segment revenue grew +60% year-over-year in the most recent quarter, driven by aggressive price hikes plus recovering mortgage origination volumes. The bars to the right show where that growth rate is projected to go under each scenario.", "The grey dot = 'where we are now'. Everything right of it is a forecast.", "#9aa4b8")
    : tip(`Forecast: ${label}`, `In this scenario, FICO's Scores segment revenue is projected to grow about ${val}% year-over-year by ${label}. ${val < 0 ? "A negative number means revenue is actually shrinking — the bear case." : "Higher = pricing power is holding."}`, "Switch BEAR/BASE/BULL up top to see how the forecast changes.", accentColor);
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-end", height: "100%" }} {...tp}>
      <div style={{ fontSize: 11, color: accentColor, fontWeight: 700, marginBottom: 4 }}>{val}%</div>
      {baseline
        ? <div style={{ width: 9, height: 9, borderRadius: "50%", background: "#3a4252", border: "1.5px solid #7b86a0", marginBottom: `${Math.max(0, h)}%` }} />

      <div style={{ fontSize: 9.5, color: "#5a6477", marginTop: 6 }}>{label}</div>

}

function ReversionClock() {
  const dislocationDate = new Date(DISLOCATION_DATE);
  const today = new Date();
  const elapsed = Math.round((today - dislocationDate) / 86400000);
  const pct = Math.min(100, (elapsed / REVERSION_PRECEDENT_DAYS) * 100);
  const trough = REVERSION_TROUGH, baseFloor = REVERSION_BASEFLOOR, now = NOW_PRICE;
  const rawRecPct = ((now - trough) / (baseFloor - trough)) * 100;
  const recPct = Math.min(100, Math.max(0, rawRecPct));
  const aboveBase = rawRecPct > 100;
  return (
    <div style={{ marginTop: 12, padding: "12px 14px", background: "#0a0e15", border: "1px solid #161c28", borderRadius: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
        <div style={{ fontSize: 10.5, letterSpacing: "0.14em", color: "#5a6477" }}>REVERSION CLOCK · JULY 2025 VANTAGESCORE / FHFA DISLOCATION</div>
        <div style={{ fontSize: 11, color: "#9aa4b8" }}><span style={{ color: "#e0a83b", fontWeight: 700 }}>{elapsed}d</span> elapsed / ~{REVERSION_PRECEDENT_DAYS}d benchmark</div>
      </div>
      <div style={{ marginBottom: 4, fontSize: 9.5, color: "#5a6477" }}>TIME SINCE DISLOCATION ({new Date(DISLOCATION_DATE).toLocaleDateString("en-US", { month: "short", day: "numeric" })})</div>
      <div {...tip("How much time has passed", "On July 8, 2025, FHFA approved VantageScore for Freddie Mac and Fannie Mae mortgages. FICO crashed ~35% in the following weeks on fears its pricing monopoly was over. The clock tracks how long since that event.", "This dislocation is different from the others — it's competitive, not macro/cyclical.", "#e0a83b")}
        style={{ position: "relative", height: 14, background: "#11161f", borderRadius: 7, overflow: "hidden", border: "1px solid #1c2230" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${pct}%`, background: "linear-gradient(90deg,#f1564b,#e0a83b)", borderRadius: 7 }} />
        <div style={{ position: "absolute", right: 0, top: -3, bottom: -3, width: 2, background: "#3fd07a" }} />
        <div style={{ position: "absolute", left: `${pct}%`, top: "50%", width: 8, height: 8, borderRadius: "50%", background: "#fff", transform: "translate(-50%,-50%)", boxShadow: "0 0 8px #fff", pointerEvents: "none" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#5a6477", marginTop: 3 }}>
        <span>day 0</span><span style={{ color: "#3fd07a" }}>1-year benchmark →</span>
      </div>
      <div style={{ marginTop: 12, marginBottom: 4, fontSize: 9.5, color: "#5a6477" }}>PRICE RECOVERY · ${REVERSION_TROUGH} trough → ${REVERSION_BASEFLOOR} base floor</div>
      <div {...tip("How far the price has bounced back", `FICO's 52-week low was $${REVERSION_TROUGH} after the VantageScore shock. The base zone starts at $${REVERSION_BASEFLOOR}. At $${NOW_PRICE}, ${aboveBase ? "price is above the base floor." : `recovery is ${Math.round(recPct)}% complete.`}`, aboveBase ? "Full bar = price has re-entered the base zone. Now it needs the earnings story to confirm the bear narrative was wrong." : null, "#9fb4ff")}
        style={{ position: "relative", height: 14, background: "#11161f", borderRadius: 7, overflow: "hidden", border: "1px solid #1c2230" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${recPct}%`, background: "linear-gradient(90deg,#f1564b,#3fd07a)", borderRadius: 7 }} />
        <div style={{ position: "absolute", left: `${recPct}%`, top: "50%", width: 8, height: 8, borderRadius: "50%", background: "#9fb4ff", transform: "translate(-50%,-50%)", boxShadow: "0 0 8px #9fb4ff", pointerEvents: "none" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#5a6477", marginTop: 3 }}>
        <span>${REVERSION_TROUGH}</span>
        <span style={{ color: "#9fb4ff" }}>${NOW_PRICE} now · {aboveBase ? "above base floor ✓" : `${Math.round(recPct)}% recovered`}</span>
        <span>${REVERSION_BASEFLOOR}</span>
      </div>
      <div style={{ fontSize: 10.5, color: "#9aa4b8", lineHeight: 1.55, marginTop: 10 }}>
        {aboveBase
          ? <span>Price has re-entered the base zone from the July 2025 VantageScore shock ($870 trough). The critical next data: Q3 FY2026 earnings in <span style={{ color: "#e0a83b", fontWeight: 700 }}>late July 2026</span> — specifically <span style={{ color: "#fff", fontWeight: 700 }}>Scores revenue YoY growth</span>. If it holds above 25–30% after the bi-score requirement is live, the bear thesis is tracking slower than feared. Note: this dislocation is <span style={{ color: "#f1564b" }}>competitive, not cyclical</span> — the precedent recovery clock is less meaningful than for macro dislocations.</span>
          : <span>FICO's 52-week low was $${REVERSION_TROUGH} on the VantageScore shock. <span style={{ color: "#fff", fontWeight: 700 }}>{elapsed} days in</span> and price has retraced <span style={{ color: "#9fb4ff", fontWeight: 700 }}>{Math.round(recPct)}%</span> of the way back to the base zone.</span>}
      </div>
    </div>
  );
}

function TrackRecord() {
  const W = 1000, H = 300, pl = 54, pr = 80, pt = 20, pb = 40;
  const pw = W - pl - pr, ph = H - pt - pb;
  const y = (p) => pt + (1 - (p - TRACK_PRICE_MIN) / (TRACK_PRICE_MAX - TRACK_PRICE_MIN)) * ph;
  const x = (i) => pl + (TRACK.length === 1 ? pw / 2 : (i / (TRACK.length - 1)) * pw);
  const grid = [2400, 1800, 1200, 600];
  const pathPts = TRACK.map((t, i) => [x(i), y(t.post)]);
  const linePath = "M " + pathPts.map(([px, py]) => `${px} ${py}`).join(" L ");
  const hits = TRACK.filter((t) => t.landed.includes("base") || t.landed.includes("bull")).length;
  return (
    <div style={{ background: "#080b11", padding: "16px 18px", borderTop: "1px solid #161c28" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <div style={{ fontSize: 11.5, letterSpacing: "0.18em", color: "#7b86a0" }}>
          <span style={{ background: "#161c28", padding: "2px 6px", borderRadius: 3, color: "#cdd5e3", marginRight: 8 }}>TR · BACKTEST</span>
          THESIS TRACK RECORD · RECONSTRUCTED BANDS vs ACTUAL PRICE
        </div>
        <div style={{ fontSize: 11, color: "#7b86a0" }}>BASE-OR-BETTER LANDINGS: <span style={{ color: "#3fd07a", fontWeight: 700 }}>{hits}/{TRACK.length}</span></div>
      </div>
      <div style={{ fontSize: 10.5, color: "#5a6477", marginBottom: 10 }}>
        Each column = one FICO fiscal earnings date. Stacked zones are reconstructed bear / base / bull bands. The line is where price actually traded after. The Q3 FY25 column shows the VantageScore shock.
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
        {grid.map((p) => (
          <g key={p}>
            <line x1={pl} y1={y(p)} x2={W - pr} y2={y(p)} stroke="#161c28" strokeWidth="1" strokeDasharray="1 5" />
            <text x={W - pr + 8} y={y(p) + 3} fill="#5a6477" fontSize="11" fontFamily={FONT_MONO}>${p}</text>
          </g>
        ))}
        {TRACK.map((t, i) => {
          const cx = x(i), bw = 46;
          const landWord = t.landed.includes("bull") ? "the optimistic zone" : t.landed.includes("base") ? "the middle zone" : "the pessimistic zone";
          const reactWord = (t.reaction === "-" || t.reaction === "--") ? "the stock FELL after this report" : "the stock ROSE after this report";
          const seg = (range, color) => (
            <rect x={cx - bw / 2} y={y(range[1])} width={bw} height={Math.max(2, y(range[0]) - y(range[1]))}
              fill={color} opacity={t.conf === "med" ? 0.32 : 0.5} rx="2"
              style={{ animation: `fadeUp .5s ease ${i * 0.08}s both` }}
              {...tipSvg(`${t.q} earnings`,
                `Back at this FICO fiscal earnings date, here's the range we'd have predicted (red=low, yellow=middle, green=high). In reality, ${reactWord} and the price ended up in ${landWord} (~$${t.post}).`,
                t.conf === "med" ? "Marked 'lower-confidence' — estimated data, treat loosely." : null,
                color.includes("63,208") ? "#3fd07a" : color.includes("224,168") ? "#e0a83b" : "#f1564b")} />
          );
          return (
            <g key={t.q}>
              {seg(t.bull, "rgba(63,208,122,0.55)")}
              {seg(t.base, "rgba(224,168,59,0.5)")}
              {seg(t.bear, "rgba(241,86,75,0.5)")}
              <text x={cx} y={H - 24} fill="#9aa4b8" fontSize="10" fontFamily={FONT_MONO} textAnchor="middle">{t.q}</text>
              <text x={cx} y={H - 11} fill={t.conf === "med" ? "#5a6477" : "#3a4252"} fontSize="8.5" fontFamily={FONT_MONO} textAnchor="middle">
                {t.conf === "med" ? "est. data" : t.q === "Q3 FY25" ? "↓↓ FHFA shock" : t.q === "Q2 FY26" ? "↑ earnings beat" : ""}
              </text>
            </g>
          );
        })}
        <path d={linePath} fill="none" stroke="#dde3ee" strokeWidth="2.2" className="track-line" style={{ filter: "drop-shadow(0 0 4px rgba(221,227,238,0.4))" }} />
        {TRACK.map((t, i) => {
          const isLast = i === TRACK.length - 1;
          return (
            <g key={t.q} style={{ animation: `pop .4s cubic-bezier(.2,1.4,.4,1) ${0.3 + i * 0.08}s both` }}>
              <circle cx={x(i)} cy={y(t.post)} r={isLast ? 6 : 4}
                fill={isLast ? "#2f6dff" : "#0a0d14"} stroke="#fff" strokeWidth={isLast ? 2 : 1.5}
                {...tipSvg(isLast ? "Today" : `${t.q}: actual price`,
                  isLast
                    ? `FICO is at ~$${t.post} now. At 29x FY2026E $44 EPS, it is priced near its historical low multiple. Earnings are growing +60-70% YoY — the market believes the numbers but doesn't believe they'll persist at current prices.`
                    : `After ${t.q} earnings, FICO traded near $${t.post}. Compare this dot to the colored bands to see if the prediction was right.`,
                  null, isLast ? "#9fb4ff" : "#cdd5e3")} />
              {isLast && <text x={x(i)} y={y(t.post) - 14} fill="#9fb4ff" fontSize="11" fontFamily={FONT_MONO} textAnchor="middle" fontWeight="700">NOW ${t.post}</text>}
            </g>
          );
        })}
      </svg>
      <div style={{ marginTop: 12, padding: "10px 12px", background: "#0a0e15", border: "1px solid #161c28", borderRadius: 8 }}>
        <div style={{ fontSize: 10.5, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 6 }}>READ-OUT</div>
        <div style={{ fontSize: 12, color: "#bcc6d8", lineHeight: 1.6 }}>
          Current price <span style={{ color: "#9fb4ff", fontWeight: 700 }}>${NOW_PRICE}</span> sits in the <span style={{ color: "#e0a83b", fontWeight: 700 }}>lower-middle of the BASE band</span> — 29x FY2026E non-GAAP $43.88 EPS, historically cheap for FICO. Earnings are growing <span style={{ color: "#3fd07a", fontWeight: 700 }}>+60-70% YoY</span>; the stock is down <span style={{ color: "#f1564b", fontWeight: 700 }}>46% from ATH</span>. The entire divergence is a <span style={{ color: "#f1564b" }}>multiple de-rating</span> (from ~65x to 29x) on VantageScore competition fears. The Q3 FY25 FHFA shock (column 3) was genuinely unpredictable. The resolution path: late July Q3 FY2026 Scores revenue print either validates or disproves the near-term pricing erosion thesis.
        </div>
      </div>
      <ReversionClock />
      <div style={{ fontSize: 9.5, color: "#3d4555", marginTop: 8, lineHeight: 1.5 }}>
        ⚠ All TRACK bands are reconstructed retrospectively — Q1 and Q2 FY2025 bands are estimated from the ATH trajectory; treat as directional only. FICO's fiscal year ends September 30 — "Q3 FY25" = April–June 2025 calendar. Q3 FY25 bands use pre-VantageScore announcement expectations (the shock happened concurrent with/after earnings). This is a multiple-derating thesis, not an earnings miss thesis — bands calibrated around P/E scenarios rather than fundamental deterioration to date.
      </div>
    </div>
  );
}

              <div className="panel" key={active + "-kpi"} style={{ display: "flex", alignItems: "flex-end", gap: 10, height: 120, padding: "12px 4px 0" }}>
                <KpiCol label="Q2 FY26" val={KPI_HIST} baseline accentColor="#7b86a0" />
                {kpiVals.map((v, i) => <KpiCol key={i} label={FUTURE_Q[i]} val={v} accentColor={c.accent} delay={i * 0.08} />)}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginTop: 12, fontSize: 11, lineHeight: 1.5 }}>
                <div>
                  <div style={{ color: "#5a6477", letterSpacing: "0.12em", marginBottom: 3 }}>WHAT THIS MEASURES</div>
                  <div style={{ color: "#9aa4b8" }}>Year-over-year revenue growth in FICO's Scores segment — the royalty-fee business that generates a payment every time a FICO score is pulled for a mortgage, auto loan, or credit card application. Currently running at +60% YoY from aggressive price hikes.</div>
                </div>
                <div>
                  <div style={{ color: "#5a6477", letterSpacing: "0.12em", marginBottom: 3 }}>WHAT THE <span style={{ color: c.accent }}>{c.label}</span> CASE REQUIRES</div>
                  <div style={{ color: c.accent }}>
                    {active === "bull"
                      ? "Scores growth holds above 40% YoY as lenders stick with FICO 10T despite VantageScore availability — FICO 10T's superior predictive power confirmed in practice."
                      : active === "base"
                        ? "Scores growth moderates to 20–35% YoY as FICO moderates price hikes but doesn't reverse them — VantageScore is adopted for compliance but not as a substitute."
                        : "Scores growth falls below 15% YoY as VantageScore's near-zero price forces FICO to cut fees from $10+ to $3–5 to remain competitive — pricing moat cracking."}
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* Right: signals */}
          <div style={{ background: "#080b11", padding: "16px 18px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontSize: 11.5, letterSpacing: "0.18em", color: "#7b86a0" }}>THESIS · ALL SIGNALS</div>
              <div style={{ fontSize: 12, color: "#7b86a0" }}>{c.label.toLowerCase()} 12M <span style={{ color: c.accent, fontWeight: 700 }}>{c.target12}</span></div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12 }}>
              <Segmented active={active} setActive={setActive} small />
              <span className="dot-track" style={{ marginLeft: 6, fontSize: 10.5, color: c.accent }}>● TRACKING</span>
            </div>
            <div className="panel" key={active + "-op"} style={{ fontSize: 12.5, lineHeight: 1.6, color: "#bcc6d8", marginBottom: 16, minHeight: 64 }}>{c.op}</div>

            <SignalGroup id="SN01" title="Scores Pricing &amp; Demand" requires={c.requires01} accent={c.accent} evidence={3}>
              {SIGNALS[active].map((s, i) => <SignalRow key={i} s={s} accent={c.accent} />)}
            </SignalGroup>
            <SignalGroup id="SN02" title="Software Growth &amp; Regulatory Risk" requires={c.requires02} accent={c.accent} evidence={2}>
              {MARGIN[active].map((s, i) => <MarginRow key={i} s={s} accent={c.accent} />)}
            </SignalGroup>

            <div style={{ marginTop: 14, borderTop: "1px solid #161c28", paddingTop: 10 }}>
              <div style={{ fontSize: 10.5, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 3 }}>WHAT BREAKS THE <span style={{ color: c.accent }}>{c.label}</span> CASE</div>
              <div style={{ fontSize: 11.5, color: "#9aa4b8", lineHeight: 1.5 }}>{c.breaks}</div>
            </div>

            {/* Risk / Reward */}
            <div style={{ marginTop: 10, padding: "10px 12px", background: "#0a0d14", border: "1px solid #2a1a1a", borderRadius: 6 }}>
              <div style={{ fontSize: 10, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 8 }}>RISK / REWARD AT ${NOW_PRICE}</div>
              {[
                { label: "BEAR", color: "#f1564b", lo: 450,  hi: 750  },
                { label: "BASE", color: "#e0a83b", lo: 1100, hi: 1700 },
                { label: "BULL", color: "#3fd07a", lo: 1900, hi: 2600 },
              ].map(({ label, color, lo, hi }) => {
                const mid = Math.round((lo + hi) / 2);
                const pct = Math.round(((mid - NOW_PRICE) / NOW_PRICE) * 100);
                const sign = pct >= 0 ? "+" : "";
                const barW = Math.max(4, Math.min(96, ((pct + 60) / 130) * 100));
                return (
                  <div key={label} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}
                    {...tip(`${label} scenario return`,
                      `If the ${label.toLowerCase()} case plays out over 12 months, price would land in the $${lo}–$${hi} range — roughly ${sign}${pct}% from today's $${NOW_PRICE}.`,
                      "Midpoint of range used. These are estimates, not targets.", color)}>
                    <div style={{ fontSize: 9.5, color, fontWeight: 700, width: 34 }}>{label}</div>
                    <div style={{ flex: 1, position: "relative", height: 8, background: "#0d1018", borderRadius: 4, border: "1px solid #1c2230" }}>
                      <div style={{ position: "absolute", top: 0, bottom: 0, left: 0, width: `${barW}%`, background: color, opacity: 0.45, borderRadius: 4 }} />
                      <div style={{ position: "absolute", top: "50%", left: `${barW}%`, transform: "translate(-50%,-50%)", width: 6, height: 6, borderRadius: "50%", background: color, boxShadow: `0 0 6px ${color}` }} />
                    </div>
                    <div style={{ fontSize: 10.5, color, fontWeight: 700, width: 44, textAlign: "right" }}>{sign}{pct}%</div>
                    <div style={{ fontSize: 9, color: "#4a5366", width: 80 }}>${lo}–${hi}</div>
                  </div>
                );
              })}
              <div style={{ marginTop: 8, paddingTop: 8, borderTop: "1px solid #161c28", fontSize: 10.5, color: "#9aa4b8", lineHeight: 1.55 }}
                {...tip("What this asymmetry means",
                  `At $${NOW_PRICE}, FICO is down 46% from ATH despite earnings growing 60–70% YoY — the entire decline is multiple compression on VantageScore fear. The base case offers modest upside; the bull case (fear overblown, multiple recovers) is large; the bear (fear is right) means another ~−53%.`,
                  "Midpoints of ranges used. Always hold loosely.", "#9aa4b8")}>
                Bear ≈ <span style={{ color: "#f1564b", fontWeight: 700 }}>−53%</span> · Base ≈ <span style={{ color: "#e0a83b", fontWeight: 700 }}>+10%</span> · Bull ≈ <span style={{ color: "#3fd07a", fontWeight: 700 }}>+76%</span> — VantageScore tail is large; the <span style={{ color: "#3fd07a" }}>bull case offers real optionality</span> if the competitive threat proves overblown.
              </div>
            </div>
          </div>
        </div>

        {/* Observable vs. confirms bar */}
        <div style={{ padding: "10px 22px", borderTop: "1px solid #161c28", display: "flex", justifyContent: "space-between", fontSize: 10.5, color: "#4a5366" }}>
          <span>OBSERVABLE NOW: VantageScore lender adoption (MBA/FHFA data) · FTC/Hawley investigation · MBA weekly origination index · FICO pricing announcements</span>
          <span>CONFIRMS LATE JULY 2026: Scores revenue YoY growth · Software ARR · full-year FY2026 guidance revision</span>
        </div>

        <TrackRecord />
      </div>

      <div style={{ maxWidth: 1280, margin: "12px auto 0", fontSize: 10.5, color: "#3d4555", lineHeight: 1.5 }}>
        Illustrative scenario framing built on current consensus &amp; estimates as of May 2026 — not a prediction and not financial advice. FICO FY ends September 30; Q2 FY2026 = Jan–Mar 2026. Q2 FY2026: revenue $692M (+39% YoY), non-GAAP EPS $12.50 (+60% YoY), Scores +60% YoY, GM Scores segment 91%. Full-year FY2026 guidance: revenue $2.45-2.60B, non-GAAP EPS $40.45. Consensus FY2026E EPS $43.88, FY2027E $55.45 (21 analysts). Forward P/E at $1,278: ~29x (historically cheap for FICO; ATH P/E was ~65x). VantageScore approved for GSE mortgages by FHFA; bi-score requirement (BOTH FICO 10T AND VantageScore 4.0) means lender adoption ≠ FICO replacement. Valuation ruler: forward P/E on non-GAAP EPS. Bear/bull gap is overwhelmingly multiple-driven: the earnings are real, the argument is what they're worth. Bear 35% / Base 45% / Bull 20%.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FICOThesis />);
</script>
</body>
</html>
