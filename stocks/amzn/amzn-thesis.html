// ── Plain-language tooltip engine ────────────────────────────────────────────
let tipEl = null;
function ensureTip() { if (!tipEl) { tipEl = document.createElement("div"); tipEl.id = "tip-box"; document.body.appendChild(tipEl); } return tipEl; }
function showTip(e, title, body, note, color) {
  const el = ensureTip();
  el.innerHTML = `<div class="tt" style="color:${color || ACCENT}">${title}</div><div class="tb">${body}</div>` + (note ? `<div class="tn">${note}</div>` : "");
  el.classList.add("on"); moveTip(e);
}
function moveTip(e) { const el = ensureTip(), pad = 16; let x = e.clientX + pad, y = e.clientY + pad; const r = el.getBoundingClientRect(); if (x + r.width > window.innerWidth - 8) x = e.clientX - r.width - pad; if (y + r.height > window.innerHeight - 8) y = e.clientY - r.height - pad; el.style.left = x + "px"; el.style.top = y + "px"; }
function hideTip() { if (tipEl) tipEl.classList.remove("on"); }
function tip(title, body, note, color) { return { className: "tip-target", onMouseEnter: (e) => showTip(e, title, body, note, color), onMouseMove: moveTip, onMouseLeave: hideTip }; }
function tipSvg(title, body, note, color, extraClass) { return { className: (extraClass ? extraClass + " " : "") + "tip-target", onMouseEnter: (e) => showTip(e, title, body, note, color), onMouseMove: moveTip, onMouseLeave: hideTip }; }

const PRICE_MIN = 160, PRICE_MAX = 440;
const CH_W = 760, CH_H = 420, PAD_L = 8, PAD_R = 56, PAD_T = 18, PAD_B = 34;
const plotW = CH_W - PAD_L - PAD_R, plotH = CH_H - PAD_T - PAD_B;
const yOf = (p) => PAD_T + (1 - (p - PRICE_MIN) / (PRICE_MAX - PRICE_MIN)) * plotH;

function FanChart({ c }) {
  const nHist = HISTORY.length;
  const histPts = HISTORY.map((d, i) => [PAD_L + (i / (nHist + FUTURE_Q.length - 1)) * plotW, yOf(d.p)]);
  const nowX = histPts[histPts.length - 1][0];
  const nowY = histPts[histPts.length - 1][1];
  const fwdN = FUTURE_Q.length;
  const fwdX = (i) => nowX + ((i + 1) / fwdN) * (CH_W - PAD_R - nowX);
  const end = PROJ_END[c.key];
  const mid = FUTURE_Q.map((_, i) => { const t = (i + 1) / fwdN; return [fwdX(i), yOf(NOW_PRICE + (end - NOW_PRICE) * t)]; });
  const spread = (i) => 12 + i * 9;
  const upper = mid.map(([x, y], i) => [x, y - spread(i)]);
  const lower = mid.map(([x, y], i) => [x, y + spread(i)]);
  const bandPath = `M ${nowX} ${nowY} ` + upper.map(([x, y]) => `L ${x} ${y}`).join(" ") + " " + lower.slice().reverse().map(([x, y]) => `L ${x} ${y}`).join(" ") + " Z";
  const midPath = `M ${nowX} ${nowY} ` + mid.map(([x, y]) => `L ${x} ${y}`).join(" ");
  const histPath = "M " + histPts.map(([x, y]) => `${x} ${y}`).join(" L ");
  const gridP = [420, 360, 300, 240, 180];
  return (
    <svg viewBox={`0 0 ${CH_W} ${CH_H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      <defs>
        <linearGradient id={`fan-${c.key}`} x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor={c.accent} stopOpacity="0.05" />
          <stop offset="100%" stopColor={c.accent} stopOpacity="0.28" />
        </linearGradient>
        <filter id="softglow"><feGaussianBlur stdDeviation="2.2" /></filter>
      </defs>
      {gridP.map((p) => (
        <g key={p}>
          <line x1={PAD_L} y1={yOf(p)} x2={CH_W - PAD_R} y2={yOf(p)} style={{ stroke: T.bd }} strokeWidth="1" strokeDasharray="1 5" />
          <text x={CH_W - PAD_R + 8} y={yOf(p) + 3} style={{ fill: T.t6 }} fontSize="11" fontFamily={FONT_MONO}>${p}</text>
        </g>
      ))}
      <line x1={nowX} y1={PAD_T} x2={nowX} y2={CH_H - PAD_B} stroke={ACCENT} strokeWidth="1" strokeDasharray="3 4" opacity="0.7" />
      <path d={bandPath} fill={`url(#fan-${c.key})`} {...tipSvg("The forecast 'cone'", "This shaded fan shows the range of where the price could go in this scenario over the next year. It widens further out because the future is less certain. The dashed line through the middle is the most-likely path.", "Wider = more uncertainty.", c.accent, "fan-band")} />
      <path d={midPath} fill="none" stroke={c.accent} strokeWidth="2" strokeDasharray="6 5" className="fan-mid" style={{ filter: "url(#softglow)" }} />
      <path d={histPath} fill="none" style={{ stroke: T.t2 }} strokeWidth="2" {...tipSvg("Price history", "The solid line is Amazon's actual share price over the past year-plus — a dip to the ~$196 low, a climb through 2025, a run to a ~$279 high in May 2026, then the pullback to today on capex fears.", "This part already happened — it's real, not a forecast.", ACCENT, "hist-line")} />
      {HISTORY.map((d, i) => (
        <g key={i}>
          <circle cx={histPts[i][0]} cy={histPts[i][1]} r={i === nHist - 1 ? 4.5 : 3} fill={i === nHist - 1 ? ACCENT : "var(--page-bg)"} stroke={i === nHist - 1 ? "var(--tx1)" : "var(--tx5)"} strokeWidth="1.5"
            {...tipSvg(i === nHist - 1 ? "Where we are today" : d.q, i === nHist - 1 ? `Amazon trades around $${NOW_PRICE} right now. This dot is 'today' — everything left of it is history, everything right is forecast.` : `Around the end of ${d.q}, Amazon was near $${d.p} (approx).`, null, ACCENT)} />
          {i === nHist - 1 && <text x={histPts[i][0] - 6} y={histPts[i][1] - 12} fill={ACCENT} fontSize="11" fontFamily={FONT_MONO} textAnchor="end">NOW ${NOW_PRICE}</text>}
        </g>
      ))}
      {mid.map(([x, y], i) => (

        style={{ position: "relative", height: 14, background: T.inner, borderRadius: 7, overflow: "hidden", border: `1px solid ${T.bd}` }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${pct}%`, background: "linear-gradient(90deg,#f1564b,#e0a83b)", borderRadius: 7 }} />

function TrackRecord() {

  const grid = [400, 340, 280, 220, 160];
  const pathPts = TRACK.map((t, i) => [x(i), y(t.post)]);
  const linePath = "M " + pathPts.map(([px, py]) => `${px} ${py}`).join(" L ");
  const hits = TRACK.filter((t) => t.landed.includes("base") || t.landed === "bull").length;
  return (
    <div style={{ background: T.inner, padding: "16px 18px", borderTop: `1px solid ${T.bd}` }}>

      </div>

        {grid.map((p) => (
          <g key={p}>
            <line x1={pl} y1={y(p)} x2={W - pr} y2={y(p)} style={{ stroke: T.bd }} strokeWidth="1" strokeDasharray="1 5" />

          const seg = (range, color, tone) => (
            <rect x={cx - bw / 2} y={y(range[1])} width={bw} height={Math.max(2, y(range[0]) - y(range[1]))} fill={color} opacity={t.conf === "med" ? 0.32 : 0.5} rx="2" style={{ animation: `fadeUp .5s ease ${i * 0.08}s both` }}
              {...tipSvg(`${t.q} earnings`, `Back at this earnings date, here's the range we'd have drawn (red=low, yellow=middle, green=high). In reality, ${reactWord} and price ended up in ${landWord} (~$${t.post}).`, t.conf === "med" ? "Marked 'lower-confidence' — older/approximate data, treat loosely." : "Hover the line to see the actual price path.", tone)} />
          );
          return (
            <g key={t.q}>
              {seg(t.bull, "rgba(63,208,122,0.55)", GAIN)}

        </div>
      </div>
      <ReversionClock />
      <div style={{ fontSize: 9.5, color: T.t7, marginTop: 8, lineHeight: 1.5 }}>
        ⚠ Bands are reconstructed now (anchored to each date's forward-EPS &amp; multiple regime), not archived in real time — and historical quarter-end prices are approximate. Treat levels as directional, especially "lower-conf" quarters. The reversion read rests on n=1 for Amazon specifically; it's a tell, not a strategy. Pattern breaks if the pullback coincides with genuine AWS deceleration rather than capex fear.

    </div>
  );

                <KpiCol label="Q1 26" val={KPI_HIST} baseline accentColor={T.t5} />
                {kpiVals.map((v, i) => <KpiCol key={i} label={FUTURE_Q[i]} val={v} accentColor={c.accent} delay={i * 0.08} />)}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginTop: 12, fontSize: 11, lineHeight: 1.5 }}>
                <div>
                  <div style={{ color: T.t6, letterSpacing: "0.12em", marginBottom: 3 }}>WHAT THIS MEASURES</div>
                  <div style={{ color: T.t3 }}>AWS year-over-year revenue growth — the cleanest read on whether the $200B capex is converting into real, sold-out AI demand.</div>
                </div>
                <div>
                  <div style={{ color: T.t6, letterSpacing: "0.12em", marginBottom: 3 }}>WHAT THE <span style={{ color: c.accent }}>{c.label}</span> CASE REQUIRES</div>
                  <div style={{ color: c.accent }}>{active === "bull" ? "AWS holds the high-20s and re-accelerates as AI services inflect; FCF turns up." : active === "base" ? "AWS holds the mid-to-high 20s; margins intact through the capex ramp." : "AWS fades toward ~20% as new depreciation lands faster than revenue."}</div>
                </div>
              </div>
            </div>
          </div>
          <div style={{ background: T.inner, padding: "16px 18px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, flexWrap: "wrap", gap: 8 }}>
              <div style={{ fontSize: 11.5, letterSpacing: "0.18em", color: T.t5 }}>THESIS · ALL SIGNALS</div>
              <div style={{ fontSize: 12, color: T.t5 }}>{c.label.toLowerCase()} 12M <span style={{ color: c.accent, fontWeight: 700 }}>{c.target12}</span></div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12 }}>
              <Segmented active={active} setActive={setActive} small />
              <span className="dot-track" style={{ marginLeft: 6, fontSize: 10.5, color: c.accent }}>● TRACKING</span>
            </div>
            <div className="panel" key={active + "-op"} style={{ fontSize: 12.5, lineHeight: 1.6, color: T.t2, marginBottom: 16, minHeight: 64 }}>{c.op}</div>
            <SignalGroup id="SN01" title="AWS &amp; Demand Trajectory" requires={c.requires01} accent={c.accent} evidence={4}>
              {SIGNALS[active].map((s, i) => <SignalRow key={i} s={s} accent={c.accent} />)}
            </SignalGroup>
            <SignalGroup id="SN02" title="Margin, Capex &amp; Cash" requires={c.requires02} accent={c.accent} evidence={3}>
              {MARGIN[active].map((s, i) => <MarginRow key={i} s={s} accent={c.accent} />)}
            </SignalGroup>
            <div style={{ marginTop: 14, borderTop: `1px solid ${T.bd}`, paddingTop: 10 }}>
              <div style={{ fontSize: 10.5, letterSpacing: "0.12em", color: T.t6, marginBottom: 3 }}>WHAT BREAKS THE <span style={{ color: c.accent }}>{c.label}</span> CASE (kill-switch)</div>
              <div style={{ fontSize: 11.5, color: T.t3, lineHeight: 1.5 }}>{c.breaks}</div>
            </div>
          </div>
        </div>
        <div style={{ padding: "10px 22px", borderTop: `1px solid ${T.bd}`, display: "flex", justifyContent: "space-between", fontSize: 10.5, color: T.t6, flexWrap: "wrap", gap: 8 }}>
          <span>OBSERVABLE NOW: price/multiple vs history · FTC ad-suit headlines · 3rd-party cloud-spend checks · ad-pricing data</span>
          <span>CONFIRMS {NEXT_EARNINGS}: AWS growth vs guide · AWS &amp; consolidated margin · capex trajectory · free cash flow · ad growth</span>
        </div>
        <TrackRecord />
      </div>
      <div style={{ maxWidth: 1280, margin: "12px auto 0", fontSize: 10.5, color: T.t7, lineHeight: 1.5 }}>
        Illustrative scenario framing built on current consensus &amp; estimates as of {AS_OF_DATE} — not a prediction and not financial advice. Price ranges are scenario mid-bands; KPI markers are positional, not literal. Historical quarter-end prices are approximate. Generator note: the 2× trim trigger off a ~$203 cost basis is ~$405 — bull-case territory, likely 3–5 years out, so AMZN reads as a steady compounder, not a fast generator seed. Data inputs will move with every print through the {NEXT_EARNINGS} earnings release.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AmznThesis />);
</script>
