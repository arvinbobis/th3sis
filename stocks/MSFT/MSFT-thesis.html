// ── Tooltip engine ─────────────────────────────────────────────────────────
let tipEl = null;
function ensureTip() {
  if (!tipEl) { tipEl = document.createElement("div"); tipEl.id = "tip-box"; document.body.appendChild(tipEl); }
  return tipEl;
}
function showTip(e, title, body, note, color) {
  const el = ensureTip();
  el.innerHTML = `<div class="tt" style="color:${color||'#9fb4ff'}">${title}</div><div class="tb">${body}</div>${note?`<div class="tn">${note}</div>`:""}`;
  el.classList.add("on"); moveTip(e);
}
function moveTip(e) {
  const el = ensureTip(); const pad = 16;
  let x = e.clientX + pad, y = e.clientY + pad;
  const r = el.getBoundingClientRect();
  if (x + r.width > window.innerWidth - 8) x = e.clientX - r.width - pad;
  if (y + r.height > window.innerHeight - 8) y = e.clientY - r.height - pad;
  el.style.left = x + "px"; el.style.top = y + "px";
}
function hideTip() { if (tipEl) tipEl.classList.remove("on"); }

}

// ── Fan Chart ──────────────────────────────────────────────────────────────
function FanChart({ c }) {
  const nHist = HISTORY.length;
  const histPts = HISTORY.map((d, i) => [PAD_L + (i / (nHist + FUTURE_Q.length - 1)) * plotW, yOf(d.p)]);
  const nowX = histPts[histPts.length - 1][0];
  const nowY = histPts[histPts.length - 1][1];
  const fwdN = FUTURE_Q.length;
  const fwdX = (i) => nowX + ((i + 1) / fwdN) * (CH_W - PAD_R - nowX);
  const end = PROJ_END[c.key];
  const mid = FUTURE_Q.map((_, i) => {
    const t = (i + 1) / fwdN;
    return [fwdX(i), yOf(NOW_PRICE + (end - NOW_PRICE) * t)];
  });
  const spread = (i) => 24 + i * 26;
  const upper = mid.map(([x, y], i) => [x, y - spread(i)]);
  const lower = mid.map(([x, y], i) => [x, y + spread(i)]);
  const bandPath = `M ${nowX} ${nowY} ` + upper.map(([x, y]) => `L ${x} ${y}`).join(" ") + " " +
    lower.slice().reverse().map(([x, y]) => `L ${x} ${y}`).join(" ") + " Z";
  const midPath = `M ${nowX} ${nowY} ` + mid.map(([x, y]) => `L ${x} ${y}`).join(" ");
  const histPath = "M " + histPts.map(([x, y]) => `${x} ${y}`).join(" L ");
  const gridP = [700, 600, 500, 400, 300];

  return (
    <svg viewBox={`0 0 ${CH_W} ${CH_H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      <defs>
        <linearGradient id={`fan-${c.key}`} x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor={c.accent} stopOpacity="0.05" />
          <stop offset="100%" stopColor={c.accent} stopOpacity="0.28" />
        </linearGradient>
        <filter id="softglow"><feGaussianBlur stdDeviation="2.2" /></filter>
      </defs>
      {gridP.map((p) => (
        <g key={p}>
          <line x1={PAD_L} y1={yOf(p)} x2={CH_W - PAD_R} y2={yOf(p)} stroke="#1c2230" strokeWidth="1" strokeDasharray="1 5" />
          <text x={CH_W - PAD_R + 8} y={yOf(p) + 3} fill="#5a6477" fontSize="11" fontFamily={FONT_MONO}>${p}</text>
        </g>
      ))}
      <line x1={nowX} y1={PAD_T} x2={nowX} y2={CH_H - PAD_B} stroke="#2f6dff" strokeWidth="1" strokeDasharray="3 4" opacity="0.7" />
      <path d={bandPath} fill={`url(#fan-${c.key})`} {...tipSvg(
        "The forecast 'cone'", "This shaded fan shows the range of where the price could go in this scenario. Note the bear cone still lands above $300 — MSFT's quality floor limits the downside even in a disappointment scenario.",
        "Wider = more uncertainty further out.", c.accent, "fan-band")} />
      <path d={midPath} fill="none" stroke={c.accent} strokeWidth="2" strokeDasharray="6 5" className="fan-mid" style={{ filter: "url(#softglow)" }} />
      <path d={histPath} fill="none" stroke="#cdd5e3" strokeWidth="2" {...tipSvg(
        "Price history", "MSFT's actual share price over the past year. The stock peaked at $538 in October 2025 (Q1 FY2026 ATH), then sold off ~20% as the $190B annual capex plan was revealed on April 29, 2026. The current price ($441) sits below that peak, creating base-case upside not visible in most of this portfolio.",
        "This part already happened — it's real, not a forecast.", "#cdd5e3", "hist-line")} />
      {HISTORY.map((d, i) => (
        <g key={i}>
          <circle cx={histPts[i][0]} cy={histPts[i][1]} r={i === nHist - 1 ? 4.5 : 3}
            fill={i === nHist - 1 ? "#2f6dff" : "#0a0d14"}
            stroke={i === nHist - 1 ? "#fff" : "#8a93a6"} strokeWidth="1.5"
            {...tipSvg(i === nHist - 1 ? "Where we are today" : d.q,
              i === nHist - 1
                ? `MSFT trades at $${NOW_PRICE} — about 20% below its $538 all-time high. Q3 FY2026 beat estimates but the $190B capex plan announced April 29 triggered a selloff. Q4 FY2026 earnings on July 28.`
                : `At the end of ${d.q}, MSFT was around $${d.p}. ${d.q === "Q1 FY26" ? "The stock hit an all-time high of $538 on October 28 after Q1 FY2026 beat estimates and Copilot adoption data showed strong momentum." : ""}`,
              null, i === nHist - 1 ? "#9fb4ff" : "#cdd5e3")} />
          {i === nHist - 1 && <text x={histPts[i][0] - 6} y={histPts[i][1] - 12} fill="#9fb4ff" fontSize="11" fontFamily={FONT_MONO} textAnchor="end">NOW ${NOW_PRICE}</text>}
        </g>

      {mid.map(([x, y], i) => (

          <rect x={x - 4} y={y - 4} width="8" height="8" transform={`rotate(45 ${x} ${y})`}

}

// ── Reversion Clock ────────────────────────────────────────────────────────
function ReversionClock() {
  const dislocationDate = new Date(DISLOCATION_DATE);
  const today = new Date();
  const elapsed = Math.round((today - dislocationDate) / 86400000);
  const pct = Math.min(100, (elapsed / REVERSION_PRECEDENT_DAYS) * 100);
  const trough = REVERSION_TROUGH, baseFloor = REVERSION_BASEFLOOR, now = NOW_PRICE;
  const recPct = Math.min(100, Math.max(0, ((now - trough) / (baseFloor - trough)) * 100));
  return (
    <div style={{ marginTop: 12, padding: "12px 14px", background: "#0a0e15", border: "1px solid #161c28", borderRadius: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
        <div style={{ fontSize: 10.5, letterSpacing: "0.14em", color: "#5a6477" }}>REVERSION CLOCK · APR 29 CAPEX SELLOFF</div>
        <div style={{ fontSize: 11, color: "#9aa4b8" }}><span style={{ color: "#e0a83b", fontWeight: 700 }}>{elapsed}d</span> elapsed / ~{REVERSION_PRECEDENT_DAYS}d precedent</div>
      </div>
      <div style={{ marginBottom: 4, fontSize: 9.5, color: "#5a6477" }}>TIME SINCE DISLOCATION ({new Date(DISLOCATION_DATE).toLocaleDateString("en-US",{month:"short",day:"numeric"})} — capex announcement drop)</div>
      <div {...tip("How much time has passed",
        "On April 29, 2026, Microsoft revealed a $190B annual capex plan (vs. $154B analyst consensus), and the stock fell to ~$424. This bar shows elapsed days vs. the ~90-day window typical for a macro/sentiment-driven selloff to revert. Prior MSFT dislocations (April 2024 capex concern, Jan 2025 DeepSeek scare) reverted in 60–90 days.",
        "Filling up = approaching the typical recovery window.", "#e0a83b")}
        style={{ position: "relative", height: 14, background: "#11161f", borderRadius: 7, overflow: "hidden", border: "1px solid #1c2230" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${pct}%`, background: "linear-gradient(90deg,#f1564b,#e0a83b)", borderRadius: 7 }} />
        <div style={{ position: "absolute", right: 0, top: -3, bottom: -3, width: 2, background: "#3fd07a" }} />
        <div style={{ position: "absolute", left: `${pct}%`, top: "50%", width: 8, height: 8, borderRadius: "50%", background: "#fff", transform: "translate(-50%,-50%)", boxShadow: "0 0 8px #fff", pointerEvents: "none" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#5a6477", marginTop: 3 }}>
        <span>day 0</span><span style={{ color: "#3fd07a" }}>base-reversion mark (~90d) →</span>
      </div>
      <div style={{ marginTop: 12, marginBottom: 4, fontSize: 9.5, color: "#5a6477" }}>PRICE RECOVERY · ${trough} trough → ${baseFloor} base floor</div>
      <div {...tip("How far the price has bounced back",
        `Stock trough was $${trough} after the April 29 capex announcement. The 'base zone' floor is $${baseFloor}. At $${now}, about ${Math.round(recPct)}% of the trough-to-base-floor gap has been recovered. Prior MSFT dislocations (AI concerns in 2024, DeepSeek scare in Jan 2025) fully resolved within 60–90 days once the next earnings print confirmed fundamentals.`,
        "If this bar is fuller than the time bar above, recovery is running faster than precedent.", "#9fb4ff")}
        style={{ position: "relative", height: 14, background: "#11161f", borderRadius: 7, overflow: "hidden", border: "1px solid #1c2230" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${recPct}%`, background: "linear-gradient(90deg,#f1564b,#3fd07a)", borderRadius: 7 }} />
        <div style={{ position: "absolute", left: `${recPct}%`, top: "50%", width: 8, height: 8, borderRadius: "50%", background: "#9fb4ff", transform: "translate(-50%,-50%)", boxShadow: "0 0 8px #9fb4ff", pointerEvents: "none" }} />

        <span>${trough}</span><span style={{ color: "#9fb4ff" }}>${now} now · {Math.round(recPct)}% of the way back</span><span>${baseFloor}</span>

      <div style={{ fontSize: 10.5, color: "#9aa4b8", lineHeight: 1.55, marginTop: 10 }}>
        The April 29 capex-driven selloff is <span style={{ color: "#e0a83b", fontWeight: 700 }}>35 days old</span> and price has recovered <span style={{ color: "#9fb4ff", fontWeight: 700 }}>{Math.round(recPct)}%</span> of the trough-to-base gap. Prior MSFT dislocations on capex/AI fears resolved within <span style={{ color: "#e0a83b" }}>60–90 days</span> once subsequent earnings confirmed monetization. The <span style={{ color: "#3fd07a", fontWeight: 700 }}>July 28</span> Q4 FY2026 print is the <span style={{ color: "#fff" }}>key confirmation gate</span> — if Azure holds ≥39%, the reversion completes.

// ── Track Record ───────────────────────────────────────────────────────────
function TrackRecord() {
  const W = 1000, H = 300, pl = 44, pr = 70, pt = 20, pb = 40;
  const pw = W - pl - pr, ph = H - pt - pb;
  const y = (p) => pt + (1 - (p - TRACK_PRICE_MIN) / (TRACK_PRICE_MAX - TRACK_PRICE_MIN)) * ph;
  const x = (i) => pl + (TRACK.length === 1 ? pw / 2 : (i / (TRACK.length - 1)) * pw);
  const grid = [600, 500, 400, 300];
  const pathPts = TRACK.map((t, i) => [x(i), y(t.post)]);
  const linePath = "M " + pathPts.map(([px, py]) => `${px} ${py}`).join(" L ");
  const hits = TRACK.filter((t) => t.landed.includes("base") || t.landed.includes("bull")).length;
  return (
    <div style={{ background: "#080b11", padding: "16px 18px", borderTop: "1px solid #161c28" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <div style={{ fontSize: 11.5, letterSpacing: "0.18em", color: "#7b86a0" }}>
          <span style={{ background: "#161c28", padding: "2px 6px", borderRadius: 3, color: "#cdd5e3", marginRight: 8 }}>TR · BACKTEST</span>
          THESIS TRACK RECORD · RECONSTRUCTED BANDS vs ACTUAL PRICE
        </div>
        <div style={{ fontSize: 11, color: "#7b86a0" }}>BASE-OR-BETTER LANDINGS: <span style={{ color: "#3fd07a", fontWeight: 700 }}>{hits}/{TRACK.length}</span></div>
      </div>
      <div style={{ fontSize: 10.5, color: "#5a6477", marginBottom: 10 }}>
        Each column = one earnings date. Stacked zones are the bear / base / bull bands as they would have been drawn at that time. The line is where price actually traded after.
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
        {grid.map((p) => (
          <g key={p}>
            <line x1={pl} y1={y(p)} x2={W - pr} y2={y(p)} stroke="#161c28" strokeWidth="1" strokeDasharray="1 5" />
            <text x={W - pr + 8} y={y(p) + 3} fill="#5a6477" fontSize="11" fontFamily={FONT_MONO}>${p}</text>
          </g>
        ))}
        {TRACK.map((t, i) => {
          const cx = x(i), bw = 46;
          const landWord = t.landed.includes("bull") ? "the optimistic zone" : t.landed.includes("base") ? "the middle zone" : "the pessimistic zone";
          const reactWord = (t.reaction === "--" || t.reaction === "−−") ? "the stock FELL sharply" : t.reaction === "++" ? "the stock SURGED" : t.reaction === "-" ? "the stock FELL" : "the stock ROSE";
          const seg = (range, color) => (
            <rect x={cx - bw / 2} y={y(range[1])} width={bw} height={Math.max(2, y(range[0]) - y(range[1]))}
              fill={color} opacity={t.conf === "med" ? 0.32 : 0.5} rx="2"
              style={{ animation: `fadeUp .5s ease ${i * 0.08}s both` }}
              {...tipSvg(`${t.q} earnings`,
                `At this earnings date, the scenario band would have been: red=bear, yellow=base, green=bull. In reality, ${reactWord} and the price ended up in ${landWord} (~$${t.post}).`,
                t.conf === "med" ? "Marked 'lower-confidence' — bands reconstructed in hindsight." : null,
                color.includes("63,208") ? "#3fd07a" : color.includes("224,168") ? "#e0a83b" : "#f1564b")} />
          );
          return (
            <g key={t.q}>
              {seg(t.bull, "rgba(63,208,122,0.55)")}
              {seg(t.base, "rgba(224,168,59,0.5)")}
              {seg(t.bear, "rgba(241,86,75,0.5)")}
              <text x={cx} y={H - 24} fill="#9aa4b8" fontSize="11" fontFamily={FONT_MONO} textAnchor="middle">{t.q}</text>
              <text x={cx} y={H - 11} fill={t.conf === "med" ? "#5a6477" : "#3a4252"} fontSize="8.5" fontFamily={FONT_MONO} textAnchor="middle">
                {t.conf === "med" ? "lower-conf" : t.reaction === "-" ? "↓ capex shock" : ""}
              </text>
            </g>
          );
        })}
        <path d={linePath} fill="none" stroke="#dde3ee" strokeWidth="2.2" className="track-line" style={{ filter: "drop-shadow(0 0 4px rgba(221,227,238,0.4))" }} />
        {TRACK.map((t, i) => {
          const isLast = i === TRACK.length - 1;
          return (
            <g key={t.q} style={{ animation: `pop .4s cubic-bezier(.2,1.4,.4,1) ${0.3 + i * 0.08}s both` }}>
              <circle cx={x(i)} cy={y(t.post)} r={isLast ? 6 : 4} fill={isLast ? "#2f6dff" : "#0a0d14"} stroke="#fff" strokeWidth={isLast ? 2 : 1.5}
                {...tipSvg(isLast ? "Now (post Q3 FY26)" : `${t.q}: actual price`,
                  isLast ? `After Q3 FY2026 earnings (Apr 29), MSFT traded around $${t.post}. The earnings beat — but the $190B capex announcement sent the stock down from pre-earnings ~$445 to $424, recovering to $${t.post} since. Q4 results on July 28.`
                    : `After ${t.q} earnings, MSFT actually traded around $${t.post}.`,
                  null, isLast ? "#9fb4ff" : "#cdd5e3")} />
              {isLast && <text x={x(i)} y={y(t.post) - 14} fill="#9fb4ff" fontSize="11" fontFamily={FONT_MONO} textAnchor="middle" fontWeight="700">NOW ${t.post}</text>}
            </g>
          );
        })}
      </svg>
      <div style={{ marginTop: 12, padding: "10px 12px", background: "#0a0e15", border: "1px solid #161c28", borderRadius: 8 }}>
        <div style={{ fontSize: 10.5, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 6 }}>READ-OUT</div>
        <div style={{ fontSize: 12, color: "#bcc6d8", lineHeight: 1.6 }}>
          Tracked <span style={{ color: "#3fd07a", fontWeight: 700 }}>base-or-better in {hits} of {TRACK.length} quarters</span>. The Q1 FY2026 bull landing ($535 ATH) was driven by Copilot seat momentum and Azure acceleration. The Q3 FY2026 capex shock pulled the price back into the <span style={{ color: "#e0a83b" }}>bear-to-base transition zone</span> — the business fundamentals were strong (Azure +40%, EPS $4.27 beat), but the $190B capex number reset investor expectations. Current price <span style={{ color: "#9fb4ff", fontWeight: 700 }}>${NOW_PRICE}</span> sits below the base band of Q3 FY2026 ($452–532), creating genuine upside in the base case if Q4 confirms the monetization trajectory on <span style={{ color: "#e0a83b", fontWeight: 700 }}>July 28</span>.
        </div>
      </div>
      <ReversionClock />
      <div style={{ fontSize: 9.5, color: "#3d4555", marginTop: 8, lineHeight: 1.5 }}>
        ⚠ Bands are reconstructed now, anchored to each date's forward EPS and multiple regime — not archived in real time. The Q2 FY2025 and Q3 FY2025 quarters are "lower confidence" as the AI monetization story was less developed then. Microsoft fiscal year ends June 30; quarters labeled by Microsoft's convention.
      </div>
    </div>
  );
}

                  <div style={{ color: "#5a6477", letterSpacing: "0.12em", marginBottom: 3 }}>WHAT THIS MEASURES</div>
                  <div style={{ color: "#9aa4b8" }}>Year-over-year growth of Azure cloud services — the primary monetization vehicle for the $190B AI capex. Q4 FY2026 is guided at 39–40%. A beat would be the strongest possible base-to-bull signal.</div>
                </div>
                <div>
                  <div style={{ color: "#5a6477", letterSpacing: "0.12em", marginBottom: 3 }}>WHAT THE <span style={{ color: c.accent }}>{c.label}</span> CASE REQUIRES</div>
                  <div style={{ color: c.accent }}>
                    {active === "bull"
                      ? "Azure reaccelerates above 42% as Copilot agents drive a new category of compute consumption, and the market re-rates MSFT toward 28–30× FY2027 EPS."
                      : active === "base"
                      ? "Azure holds 39–40% growth through FY2027, confirming the AI tailwind is durable. Each quarter at 39%+ validates that the $190B capex is earning a return."
                      : "Azure decelerates sharply to 25–28%, signaling that enterprise AI workloads are plateauing and the open-source alternatives are eroding pricing power."}
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* Right — thesis + signals */}
          <div style={{ background: "#080b11", padding: "16px 18px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontSize: 11.5, letterSpacing: "0.18em", color: "#7b86a0" }}>THESIS · ALL SIGNALS</div>
              <div style={{ fontSize: 12, color: "#7b86a0" }}>{c.label.toLowerCase()} 12M <span style={{ color: c.accent, fontWeight: 700 }}>{c.target12}</span></div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12 }}>
              <Segmented active={active} setActive={setActive} small />
              <span className="dot-track" style={{ marginLeft: 6, fontSize: 10.5, color: c.accent }}>● TRACKING</span>
            </div>
            <div className="panel" key={active + "-op"} style={{ fontSize: 12.5, lineHeight: 1.6, color: "#bcc6d8", marginBottom: 16, minHeight: 72 }}>{c.op}</div>

            <SignalGroup id="SN01" title="Azure &amp; AI Revenue Momentum" requires={c.requires01} accent={c.accent} evidence={3}>
              {SIGNALS[active].map((s, i) => <SignalRow key={i} s={s} accent={c.accent} />)}
            </SignalGroup>

            <SignalGroup id="SN02" title="Margin &amp; Capital Efficiency" requires={c.requires02} accent={c.accent} evidence={2}>
              {MARGIN[active].map((s, i) => <MarginRow key={i} s={s} accent={c.accent} />)}
            </SignalGroup>

            <div style={{ marginTop: 14, borderTop: "1px solid #161c28", paddingTop: 10 }}>
              <div style={{ fontSize: 10.5, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 3 }}>WHAT BREAKS THE <span style={{ color: c.accent }}>{c.label}</span> CASE</div>
              <div style={{ fontSize: 11.5, color: "#9aa4b8", lineHeight: 1.5 }}>{c.breaks}</div>
            </div>

            {/* Valuation ruler */}
            <div style={{ marginTop: 14, padding: "10px 12px", background: "#0a0d14", border: "1px solid #161c28", borderRadius: 6 }}>
              <div style={{ fontSize: 10, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 4 }}>VALUATION RULER</div>
              <div {...tip("How we price this stock",
                "Forward P/E on non-GAAP EPS. At $441 and FY2027E ~$20.50: ~22× — reasonable, not cheap. MSFT historically traded 25–32× when the market saw it as a 'compounding platform.' The question: does $190B capex earn that premium back, or does the market re-rate toward 18–20× 'infrastructure company'?",
                "Bear: $17.50 × 19× = $332. Base: $20.50 × 25× = $512. Bull: $24 × 29× = $696. The multiple is the argument here as much as the EPS.", "#9aa4b8")}
                style={{ fontSize: 11, color: "#9aa4b8", lineHeight: 1.5 }}>
                Forward non-GAAP EPS × P/E. Bear: ~$17.50 × 19× = $332. Base: ~$20.50 × 25× = $512. Bull: ~$24 × 29× = $696. At $441: ~22× FY2027E — purgatory between platform premium and infrastructure discount.
              </div>
            </div>

            {/* Risk / Reward */}
            <div style={{ marginTop: 10, padding: "10px 12px", background: "#0a0d14", border: "1px solid #2a1a1a", borderRadius: 6 }}>
              <div style={{ fontSize: 10, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 8 }}>RISK / REWARD AT ${NOW_PRICE}</div>
              {[
                { label: "BEAR", color: "#f1564b", lo: 310, hi: 395 },
                { label: "BASE", color: "#e0a83b", lo: 460, hi: 560 },
                { label: "BULL", color: "#3fd07a", lo: 620, hi: 720 },
              ].map(({ label, color, lo, hi }) => {
                const mid = Math.round((lo + hi) / 2);
                const pct = Math.round(((mid - NOW_PRICE) / NOW_PRICE) * 100);
                const sign = pct >= 0 ? "+" : "";
                const barW = Math.max(4, Math.min(96, ((pct + 60) / 130) * 100));
                return (
                  <div key={label} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}
                    {...tip(`${label} scenario return`,
                      `If the ${label.toLowerCase()} case plays out over 12 months, price would land in the $${lo}–$${hi} range — roughly ${sign}${pct}% from today's $${NOW_PRICE}.`,
                      "Midpoint of range used. These are estimates, not targets.", color)}>
                    <div style={{ fontSize: 9.5, color, fontWeight: 700, width: 34 }}>{label}</div>
                    <div style={{ flex: 1, position: "relative", height: 8, background: "#0d1018", borderRadius: 4, border: "1px solid #1c2230" }}>
                      <div style={{ position: "absolute", top: 0, bottom: 0, left: 0, width: `${barW}%`, background: color, opacity: 0.45, borderRadius: 4 }} />
                      <div style={{ position: "absolute", top: "50%", left: `${barW}%`, transform: "translate(-50%,-50%)", width: 6, height: 6, borderRadius: "50%", background: color, boxShadow: `0 0 6px ${color}` }} />
                    </div>
                    <div style={{ fontSize: 10.5, color, fontWeight: 700, width: 44, textAlign: "right" }}>{sign}{pct}%</div>
                    <div style={{ fontSize: 9, color: "#4a5366", width: 72 }}>${lo}–${hi}</div>
                  </div>
                );
              })}
              <div style={{ marginTop: 8, paddingTop: 8, borderTop: "1px solid #161c28", fontSize: 10.5, color: "#9aa4b8", lineHeight: 1.55 }}
                {...tip("What this asymmetry means",
                  `At $${NOW_PRICE}, MSFT has the best risk/reward in this portfolio after META. The 20% pullback from ATH means the bear case is mild (~−20%), the base earns real upside (+16%), and the bull is large (+52%). The capex selloff has created an entry point not available at the $538 ATH.`,
                  "Bear is muted because MSFT's quality floor limits downside even in disappointment. But don't ignore it — $190B capex is a real risk.", "#9aa4b8")}>
                Bear ≈ <span style={{ color: "#f1564b", fontWeight: 700 }}>−20%</span> · Base ≈ <span style={{ color: "#e0a83b", fontWeight: 700 }}>+16%</span> · Bull ≈ <span style={{ color: "#3fd07a", fontWeight: 700 }}>+52%</span> — <span style={{ color: "#3fd07a" }}>best asymmetry after META.</span> Capex selloff created a real entry point; base case has genuine upside.
              </div>
            </div>
          </div>
        </div>

        {/* ── Footer ── */}
        <div style={{ padding: "10px 22px", borderTop: "1px solid #161c28", display: "flex", justifyContent: "space-between", fontSize: 10.5, color: "#4a5366" }}>
          <span>OBSERVABLE NOW: Copilot NPS surveys · enterprise AI contract news · open-source model adoption · Azure capacity announcements</span>
          <span>CONFIRMS JUL 28: Azure growth vs 39–40% · Copilot seat count · AI ARR · Q1 FY27 guidance · operating margin</span>
        </div>

        <TrackRecord />
      </div>

      <div style={{ maxWidth: 1280, margin: "12px auto 0", fontSize: 10.5, color: "#3d4555", lineHeight: 1.5 }}>
        Illustrative scenario framing built on public consensus &amp; estimates as of June 2026 — not a prediction and not financial advice. Valuation ruler: forward non-GAAP P/E. Microsoft fiscal year ends June 30. $190B calendar-2026 capex plan announced April 29, 2026 — the capex ROI timeline is the central uncertainty. Q4 FY2026 earnings: July 28, 2026.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MsftThesis />);
</script>
</body>
</html>
