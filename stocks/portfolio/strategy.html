<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TH3SIS · STRATEGY — the prescreen gate</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Spectral:ital,wght@0,400;0,600;1,500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../theme.css" />
<script>
function cdnFail(lib) {
  var el = document.getElementById('root');
  if (!el) return;
  el.style.cssText = 'display:flex;align-items:center;justify-content:center;height:100vh;background:#06080d';
  el.innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;padding:20px;font-family:\'JetBrains Mono\',monospace">'
    + '<div style="font-size:22px;font-family:Georgia,serif;letter-spacing:0.35em;color:#1c2230">TH<span style="color:#46aad9">3</span>SIS</div>'
    + '<div style="font-size:11px;letter-spacing:0.18em;color:#dd817a">FAILED TO LOAD · ' + lib + '</div>'
    + '<div style="font-size:10px;letter-spacing:0.12em;color:#3a4252">No internet connection — check your network and reload.</div>'
    + '<a href="javascript:location.reload()" style="margin-top:4px;color:#46aad9;text-decoration:none;border:1px solid #46aad933;border-radius:20px;padding:4px 14px;font-size:9px;letter-spacing:0.14em">↺ RELOAD</a>'
    + '</div>';
}
</script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" onerror="cdnFail('REACT')"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" onerror="cdnFail('REACT-DOM')"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" onerror="cdnFail('BABEL')"></script>
<style>
  html, body { margin: 0; padding: 0; background: var(--page-bg); }
  * { box-sizing: border-box; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(10px);} to {opacity:1; transform:none;} }
  @keyframes pulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }
  .panel { animation: fadeUp .55s ease both; }
  .tip-target { cursor: help; border-bottom: 1px dotted var(--bd3); }
  #tip-box {
    position: fixed; z-index: 9999; max-width: 340px; pointer-events: none;
    background: var(--tip-bg); border: 1px solid var(--tip-bd);
    border-radius: 10px; padding: 12px 14px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.28); opacity: 0; transition: opacity .14s ease;
    font-family: 'JetBrains Mono', monospace;
  }
  #tip-box.on { opacity: 1; }
  #tip-box .tt { font-size: 11px; font-weight: 700; letter-spacing: .08em; margin-bottom: 5px; }
  #tip-box .tb { font-size: 11.5px; line-height: 1.55; color: var(--tx2); }
  .ld-dot { width:5px; height:5px; border-radius:50%; background:#46aad9; display:inline-block; animation:pulse 1.2s ease-in-out infinite; }
  .row-hover:hover { filter: brightness(1.06); }
  ::-webkit-scrollbar { height: 8px; width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 8px; }
  @media (max-width: 820px) {
    .resp-2 { grid-template-columns: 1fr !important; }
    .resp-3 { grid-template-columns: 1fr 1fr !important; }
    .resp-summary { grid-template-columns: 1fr 1fr !important; }
  }
</style>
</head>
<body>
<noscript>
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#06080d;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;padding:20px;font-family:'JetBrains Mono',monospace;">
      <div style="font-size:22px;font-family:Georgia,serif;letter-spacing:0.35em;color:#1c2230;">TH<span style="color:#46aad9">3</span>SIS</div>
      <div style="font-size:11px;letter-spacing:0.18em;color:#dd817a;">JAVASCRIPT REQUIRED</div>
    </div>
  </div>
</noscript>
<div id="root" style="display:flex;align-items:safe center;justify-content:safe center;min-height:100vh;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.18em;color:#3a4252;">
  <div style="display:flex;flex-direction:column;align-items:center;gap:14px;">
    <div style="font-size:22px;font-family:Georgia,serif;letter-spacing:0.35em;color:#1c2230;">TH<span style="color:#46aad9">3</span>SIS</div>
    <div style="display:flex;gap:5px;"><span class="ld-dot" style="animation-delay:0s"></span><span class="ld-dot" style="animation-delay:.2s"></span><span class="ld-dot" style="animation-delay:.4s"></span></div>
    <div>LOADING THE GATE…</div>
  </div>
</div>
<script>
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'th3sis-theme') {
    document.documentElement.classList.toggle('light', !!e.data.light);
    localStorage.setItem('th3sis_theme', e.data.light ? 'light' : 'dark');
  }
});
(function() {
  if (localStorage.getItem('th3sis_theme') !== 'dark') {
    document.documentElement.classList.add('light');
  }
})();
</script>
<script src="portfolio-data.js"></script>
<script type="text/babel">
const FONT_MONO = "'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace";
const FONT_DISPLAY = "'Spectral', Georgia, serif";

const GAIN = "#3fd07a", LOSS = "#f1564b", WARN = "#e0a83b", BLUE = "#2f6dff";
const ACCENT = "var(--blue-soft)";

// shared snapshot + strategy (single source of truth — portfolio-data.js)
const ASOF = PF_ASOF, LIVE = PF_LIVE;
const QUESTIONS = PF_GATE.QUESTIONS, GATE_UPDATED = PF_GATE.updated;
const SCREENED = PF_PRESCREEN;

const usd = (v, d=2) => (v<0?"-":"") + "$" + Math.abs(v).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});

const VERDICT_COLOR = { PASS: GAIN, WATCH: WARN, FAIL: LOSS };
const VERDICT_GLYPH = { PASS: "✓", WATCH: "◐", FAIL: "✕" };

// ── tooltip engine ───────────────────────────────────────────────────────────
let tipEl = null;
function tip(){ if(!tipEl){ tipEl=document.createElement("div"); tipEl.id="tip-box"; document.body.appendChild(tipEl);} return tipEl; }
function showTip(e,title,body,color){ const el=tip(); el.innerHTML=`<div class="tt" style="color:${color||ACCENT}">${title}</div><div class="tb">${body}</div>`; el.classList.add("on"); moveTip(e); }
function moveTip(e){ const el=tip(),p=16; let x=e.clientX+p,y=e.clientY+p; const r=el.getBoundingClientRect(); if(x+r.width>window.innerWidth-8)x=e.clientX-r.width-p; if(y+r.height>window.innerHeight-8)y=e.clientY-r.height-p; el.style.left=x+"px"; el.style.top=y+"px"; }
function hideTip(){ tip().classList.remove("on"); }

// ── cross-page nav ───────────────────────────────────────────────────────────
// Ask the parent (stocks/index.html) to load a ticker's thesis. No-ops harmlessly if
// this file is opened directly (no parent frame) or if the ticker has no thesis built
// yet (the parent's existing not-found flow handles that exactly like a bad search).
function navigateToTicker(e, ticker) {
  e.stopPropagation();
  try { window.parent.postMessage({ type: "th3sis-nav", target: ticker }, "*"); } catch (_) {}
}

// ── derived ──────────────────────────────────────────────────────────────────
const counts = { PASS:0, WATCH:0, FAIL:0 };
SCREENED.forEach(s => counts[s.verdict]++);
const buckets = {};
SCREENED.forEach(s => { if (s.bucket) (buckets[s.bucket] = buckets[s.bucket]||[]).push(s); });
const sorted = [...SCREENED].sort((a,b) => ({PASS:0,WATCH:1,FAIL:2}[a.verdict] - {PASS:0,WATCH:1,FAIL:2}[b.verdict]));

// ── atoms ──────────────────────────────────────────────────────────────────
const Panel = ({children, style, delay=0}) => (
  <div className="panel" style={{ background:"var(--panel-bg)", border:"1px solid var(--bd)", borderRadius:14, padding:20, animationDelay:delay+"s", ...style }}>{children}</div>
);
const Eyebrow = ({children, note, color}) => (
  <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", marginBottom:14, gap:12, flexWrap:"wrap" }}>
    <div style={{ fontSize:10.5, letterSpacing:"0.2em", color:color||"var(--tx5)", textTransform:"uppercase", fontWeight:700 }}>{children}</div>
    {note && <div style={{ fontSize:10, color:"var(--tx5)", letterSpacing:"0.04em" }}>{note}</div>}
  </div>
);
const Badge = ({verdict}) => (
  <span style={{ fontSize:9.5, fontWeight:700, letterSpacing:"0.1em", color:VERDICT_COLOR[verdict],
    border:`1px solid ${VERDICT_COLOR[verdict]}`, borderRadius:5, padding:"3px 8px", whiteSpace:"nowrap" }}>
    {VERDICT_GLYPH[verdict]} {verdict}
  </span>
);

// ── sections ──────────────────────────────────────────────────────────────
function StatStrip() {
  const cells = [
    { n: counts.PASS, l: "pass — cleared the gate", c: GAIN },
    { n: counts.WATCH, l: "watch — revisit later", c: WARN },
    { n: counts.FAIL, l: "fail — no fresh capital", c: LOSS },
    { n: SCREENED.length, l: "tickers screened to date", c: "var(--tx2)" },
  ];
  return (
    <Panel style={{ padding:"16px 20px" }}>
      <div className="resp-summary" style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:1, background:"var(--bd)", border:"1px solid var(--bd)", borderRadius:10, overflow:"hidden" }}>
        {cells.map((c,i)=>(
          <div key={i} style={{ background:"var(--panel-bg)", padding:"13px 15px" }}>
            <div style={{ fontSize:22, fontWeight:700, color:c.c, fontFamily:FONT_MONO }}>{c.n}</div>
            <div style={{ fontSize:9, color:"var(--tx5)", letterSpacing:"0.1em", marginTop:4, textTransform:"uppercase" }}>{c.l}</div>
          </div>
        ))}
      </div>
    </Panel>
  );
}

function GatePanel() {
  return (
    <Panel delay={.04}>
      <Eyebrow note="Q1–Q2 unconditional · fail either → automatic FAIL · Q3–Q6 can offset each other">The gate — six questions before any full /thesis build</Eyebrow>
      <div className="resp-3" style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10 }}>
        {QUESTIONS.map(q=>(
          <div key={q.n} className="row-hover" style={{ border:"1px solid var(--bd)", borderLeft:`3px solid ${q.unconditional?LOSS:"var(--bd3)"}`, borderRadius:9, background:"var(--inner-bg)", padding:"12px 13px", cursor:"help" }}
            onMouseEnter={(e)=>showTip(e, `Q${q.n} · ${q.label}`, `<b>Fails when:</b> ${q.fail}`, q.unconditional?LOSS:ACCENT)} onMouseMove={moveTip} onMouseLeave={hideTip}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:6 }}>
              <span style={{ fontSize:9, fontWeight:700, color:q.unconditional?LOSS:"var(--tx5)", letterSpacing:"0.1em" }}>
                Q{q.n} {q.unconditional && "· UNCONDITIONAL"}
              </span>
            </div>
            <div style={{ fontSize:11.5, fontWeight:700, color:"var(--tx1)", marginBottom:5 }}>{q.label}</div>
            <div style={{ fontSize:10.5, color:"var(--tx3)", lineHeight:1.55 }}>{q.q}</div>
          </div>
        ))}
      </div>
    </Panel>
  );
}

function VerdictBoard() {
  return (
    <Panel delay={.08}>
      <Eyebrow note={`updated ${GATE_UPDATED} · hover a row for the chokepoint + cushion reasoning`}>Verdict board — every ticker run through /prescreen</Eyebrow>
      <div style={{ display:"flex", flexDirection:"column", gap:9 }}>
        {sorted.map(s=>{
          const live = LIVE[s.t];
          const color = VERDICT_COLOR[s.verdict];
          return (
            <div key={s.t} className="row-hover" style={{ display:"flex", gap:13, padding:"12px 14px", border:"1px solid var(--bd)", borderLeft:`3px solid ${color}`, borderRadius:9, background:"var(--inner-bg)", cursor:"help" }}
              onMouseEnter={(e)=>showTip(e, `${s.t} · chokepoint + cushion`,
                `<b>Chokepoint:</b> ${s.chokepoint}<br/><br/><b>Cushion:</b> ${s.cushion}<br/><br/><b>Note:</b> ${s.note}`, color)}
              onMouseMove={moveTip} onMouseLeave={hideTip}>
              <Badge verdict={s.verdict} />
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", justifyContent:"space-between", gap:10, alignItems:"baseline", flexWrap:"wrap" }}>
                  <span style={{ fontSize:12.5, fontWeight:700, color:"var(--tx1)", letterSpacing:"0.02em" }}>
                    <span data-nav-ticker={s.t} onClick={(e)=>navigateToTicker(e, s.t)} style={{ cursor:"pointer", borderBottom:"1px dotted currentColor" }} title={`Open ${s.t}'s thesis, if one is built`}>{s.t}</span>
                    {live ? ` — ${live.name}` : ""}
                    {s.bucket && <span style={{ marginLeft:8, fontSize:8.5, color:ACCENT, border:`1px solid ${ACCENT}`, borderRadius:4, padding:"2px 6px", letterSpacing:"0.06em" }}>BUCKET: {s.bucket}</span>}
                    {!s.held && <span style={{ marginLeft:8, fontSize:8.5, color:"var(--tx5)", border:"1px solid var(--bd3)", borderRadius:4, padding:"2px 6px", letterSpacing:"0.06em" }}>NOT HELD</span>}
                  </span>
                  {live && <span style={{ fontSize:10.5, color:"var(--tx4)", flexShrink:0 }}>{usd(live.px)}</span>}
                </div>
                <div style={{ fontSize:10.5, color:"var(--tx3)", lineHeight:1.55, marginTop:5 }}>{s.note}</div>
              </div>
            </div>
          );
        })}
      </div>
    </Panel>
  );
}

function BucketCallout() {
  const bucketKeys = Object.keys(buckets);
  if (!bucketKeys.length) return null;
  return (
    <Panel delay={.12}>
      <Eyebrow color={ACCENT} note="correlated bets sized as ONE idea, never as two independent passes">Correlated buckets — a PASS on each ticker isn't a PASS for both</Eyebrow>
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {bucketKeys.map(key=>{
          const members = buckets[key];
          return (
            <div key={key} style={{ border:`1px solid ${ACCENT}55`, borderRadius:9, background:"var(--inner-bg)", padding:"12px 14px" }}>
              <div style={{ fontSize:11, fontWeight:700, color:ACCENT, letterSpacing:"0.06em", marginBottom:6 }}>
                {key.toUpperCase().replace("-", " ")} — {members.map(m=>m.t).join(" + ")}
              </div>
              <div style={{ fontSize:10.5, color:"var(--tx3)", lineHeight:1.6 }}>
                Same chokepoint, same regulatory risk, same disruption narrative — owning both is one bet sized as two, not diversification. Same treatment as the SPCX + TSLA Musk bucket: size any <i>future</i> incremental capital to the pair as a whole.
              </div>
            </div>
          );
        })}
      </div>
    </Panel>
  );
}

function App() {
  return (
    <div style={{ width:"100%", maxWidth:1000, margin:"0 auto", padding:"26px 22px 60px", fontFamily:FONT_MONO }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:20, flexWrap:"wrap", gap:14 }}>
        <div>
          <div style={{ fontFamily:FONT_DISPLAY, fontSize:26, fontWeight:600, letterSpacing:"0.3em", color:"var(--tx1)" }}>
            TH<span style={{color:ACCENT}}>3</span>SIS · STRATEGY
          </div>
          <div style={{ fontSize:9.5, color:"var(--tx5)", letterSpacing:"0.08em", marginTop:7 }}>
            the /prescreen gate itself — every ticker run through it, and why · hover any card or row for the full reasoning
          </div>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ fontSize:9, color:"var(--tx5)", letterSpacing:"0.14em" }}>AS OF</div>
          <div style={{ fontSize:12, color:"var(--tx2)", fontWeight:700 }}>{ASOF}</div>
        </div>
      </div>

      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <StatStrip />
        <GatePanel />
        <VerdictBoard />
        <BucketCallout />
      </div>

      <div style={{ marginTop:22, padding:"14px 18px", border:"1px dashed var(--bd2)", borderRadius:10, fontSize:9.5, color:"var(--tx5)", lineHeight:1.7 }}>
        ⚠ <b style={{color:"var(--tx4)"}}>Not financial advice.</b> A FAIL here doesn't trigger a sell — existing legacy holdings stay long-horizon holds per STRATEGY.md §2; it means "wouldn't buy this today at this price," not "must exit now." A PASS means the ticker cleared the same chokepoint+cushion bar new capital is held to — it isn't a recommendation to add, just a candidate worth a full <code>/thesis</code>. Source of truth for this page and its reasoning is <code>STRATEGY.md §7</code> and <code>portfolio-data.js → PF_GATE / PF_PRESCREEN</code>. Run <code>/prescreen &lt;TICKER&gt;</code> to add more rows.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
