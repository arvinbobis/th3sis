<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TH3SIS · RADAR — frontier themes vs. holdings</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Spectral:ital,wght@0,400;0,600;1,500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../theme.css" />
<script>
function cdnFail(lib) {
  var el = document.getElementById('root');
  if (!el) return;
  el.style.cssText = 'display:flex;align-items:center;justify-content:center;height:100vh;background:#06080d';
  el.innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;padding:20px;font-family:\'JetBrains Mono\',monospace">'
    + '<div style="font-size:22px;font-family:Georgia,serif;letter-spacing:0.35em;color:#1c2230">TH<span style="color:#46aad9">3</span>SIS</div>'
    + '<div style="font-size:11px;letter-spacing:0.18em;color:#dd817a">FAILED TO LOAD · ' + lib + '</div>'
    + '<div style="font-size:10px;letter-spacing:0.12em;color:#3a4252">No internet connection — check your network and reload.</div>'
    + '<a href="javascript:location.reload()" style="margin-top:4px;color:#46aad9;text-decoration:none;border:1px solid #46aad933;border-radius:20px;padding:4px 14px;font-size:9px;letter-spacing:0.14em">↺ RELOAD</a>'
    + '</div>';
}
</script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" onerror="cdnFail('REACT')"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" onerror="cdnFail('REACT-DOM')"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" onerror="cdnFail('BABEL')"></script>
<style>
  html, body { margin: 0; padding: 0; background: var(--page-bg); }
  * { box-sizing: border-box; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(10px);} to {opacity:1; transform:none;} }
  @keyframes pulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }
  .panel { animation: fadeUp .55s ease both; }
  #tip-box {
    position: fixed; z-index: 9999; max-width: 360px; pointer-events: none;
    background: var(--tip-bg); border: 1px solid var(--tip-bd);
    border-radius: 10px; padding: 12px 14px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.28); opacity: 0; transition: opacity .14s ease;
    font-family: 'JetBrains Mono', monospace;
  }
  #tip-box.on { opacity: 1; }
  #tip-box .tt { font-size: 11px; font-weight: 700; letter-spacing: .08em; margin-bottom: 5px; }
  #tip-box .tb { font-size: 11.5px; line-height: 1.55; color: var(--tx2); }
  .ld-dot { width:5px; height:5px; border-radius:50%; background:#46aad9; display:inline-block; animation:pulse 1.2s ease-in-out infinite; }
  .row-hover:hover { filter: brightness(1.06); }
  ::-webkit-scrollbar { height: 8px; width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 8px; }
  @media (max-width: 820px) {
    .resp-2 { grid-template-columns: 1fr !important; }
    .resp-3 { grid-template-columns: 1fr 1fr !important; }
    .resp-summary { grid-template-columns: 1fr 1fr !important; }
  }
</style>
</head>
<body>
<noscript>
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#06080d;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;padding:20px;font-family:'JetBrains Mono',monospace;">
      <div style="font-size:22px;font-family:Georgia,serif;letter-spacing:0.35em;color:#1c2230;">TH<span style="color:#46aad9">3</span>SIS</div>
      <div style="font-size:11px;letter-spacing:0.18em;color:#dd817a;">JAVASCRIPT REQUIRED</div>
    </div>
  </div>
</noscript>
<div id="root" style="display:flex;align-items:safe center;justify-content:safe center;min-height:100vh;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.18em;color:#3a4252;">
  <div style="display:flex;flex-direction:column;align-items:center;gap:14px;">
    <div style="font-size:22px;font-family:Georgia,serif;letter-spacing:0.35em;color:#1c2230;">TH<span style="color:#46aad9">3</span>SIS</div>
    <div style="display:flex;gap:5px;"><span class="ld-dot" style="animation-delay:0s"></span><span class="ld-dot" style="animation-delay:.2s"></span><span class="ld-dot" style="animation-delay:.4s"></span></div>
    <div>SCANNING THE FRONTIER…</div>
  </div>
</div>
<script>
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'th3sis-theme') {
    document.documentElement.classList.toggle('light', !!e.data.light);
    localStorage.setItem('th3sis_theme', e.data.light ? 'light' : 'dark');
  }
});
(function() {
  if (localStorage.getItem('th3sis_theme') !== 'dark') {
    document.documentElement.classList.add('light');
  }
})();
</script>
<script src="portfolio-data.js"></script>
<script type="text/babel">
const FONT_MONO = "'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace";
const FONT_DISPLAY = "'Spectral', Georgia, serif";

const GAIN = "#3fd07a", LOSS = "#f1564b", WARN = "#e0a83b", BLUE = "#2f6dff";
const ACCENT = "var(--blue-soft)";

const ASOF = PF_ASOF, LIVE = PF_LIVE;
const THEMES = PF_RADAR.THEMES, RADAR_UPDATED = PF_RADAR.updated;

const DIRECTION_COLOR = { threatens: LOSS, enables: GAIN, watch: WARN };
const DIRECTION_GLYPH = { threatens: "▼", enables: "▲", watch: "◐" };
const COVERAGE_LABEL = {
  "thesis-covered": { l: "COVERED", c: GAIN },
  "thesis-gap":      { l: "GAP", c: LOSS },
  "prescreen-only":  { l: "PRESCREEN ONLY", c: WARN },
  "n/a":             { l: "NOT HELD", c: "var(--tx5)" },
};

let tipEl = null;
function tip(){ if(!tipEl){ tipEl=document.createElement("div"); tipEl.id="tip-box"; document.body.appendChild(tipEl);} return tipEl; }
function showTip(e,title,body,color){ const el=tip(); el.innerHTML=`<div class="tt" style="color:${color||ACCENT}">${title}</div><div class="tb">${body}</div>`; el.classList.add("on"); moveTip(e); }
function moveTip(e){ const el=tip(),p=16; let x=e.clientX+p,y=e.clientY+p; const r=el.getBoundingClientRect(); if(x+r.width>window.innerWidth-8)x=e.clientX-r.width-p; if(y+r.height>window.innerHeight-8)y=e.clientY-r.height-p; el.style.left=x+"px"; el.style.top=y+"px"; }
function hideTip(){ tip().classList.remove("on"); }
const usd = (v, d=2) => (v<0?"-":"") + "$" + Math.abs(v).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});

const gapThemes = THEMES.filter(t => t.coverage === "thesis-gap");
const heldTickers = [...new Set(THEMES.flatMap(t => t.holdings))].sort();

const Panel = ({children, style, delay=0}) => (
  <div className="panel" style={{ background:"var(--panel-bg)", border:"1px solid var(--bd)", borderRadius:14, padding:20, animationDelay:delay+"s", ...style }}>{children}</div>
);
const Eyebrow = ({children, note, color}) => (
  <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", marginBottom:14, gap:12, flexWrap:"wrap" }}>
    <div style={{ fontSize:10.5, letterSpacing:"0.2em", color:color||"var(--tx5)", textTransform:"uppercase", fontWeight:700 }}>{children}</div>
    {note && <div style={{ fontSize:10, color:"var(--tx5)", letterSpacing:"0.04em" }}>{note}</div>}
  </div>
);

function StatStrip() {
  const cells = [
    { n: THEMES.length, l: "frontier themes tracked", c: "var(--tx2)" },
    { n: THEMES.filter(t=>t.direction==="threatens").length, l: "threaten a current holding", c: LOSS },
    { n: THEMES.filter(t=>t.direction==="enables").length, l: "upside optionality (enables)", c: GAIN },
    { n: gapThemes.length, l: "thesis gaps to close", c: gapThemes.length ? WARN : GAIN },
  ];
  return (
    <Panel style={{ padding:"16px 20px" }}>
      <div className="resp-summary" style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:1, background:"var(--bd)", border:"1px solid var(--bd)", borderRadius:10, overflow:"hidden" }}>
        {cells.map((c,i)=>(
          <div key={i} style={{ background:"var(--panel-bg)", padding:"13px 15px" }}>
            <div style={{ fontSize:22, fontWeight:700, color:c.c, fontFamily:FONT_MONO }}>{c.n}</div>
            <div style={{ fontSize:9, color:"var(--tx5)", letterSpacing:"0.1em", marginTop:4, textTransform:"uppercase" }}>{c.l}</div>
          </div>
        ))}
      </div>
    </Panel>
  );
}

function GapCallout() {
  if (!gapThemes.length) return null;
  return (
    <Panel delay={.04} style={{ border:`1px solid ${WARN}55`, background:"var(--inner-bg)" }}>
      <Eyebrow color={WARN} note="worth closing at that stock's next /update-thesis">Thesis gaps — a real theme with no kill-switch or bull-case line yet</Eyebrow>
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {gapThemes.map(t => (
          <div key={t.id} style={{ fontSize:11, color:"var(--tx2)", lineHeight:1.6, borderLeft:`3px solid ${WARN}`, paddingLeft:12 }}>
            <b style={{color:"var(--tx1)"}}>{t.holdings.join(", ")}</b> — {t.note}
          </div>
        ))}
      </div>
    </Panel>
  );
}

function ThemeCards() {
  return (
    <Panel delay={.08}>
      <Eyebrow note={`updated ${RADAR_UPDATED} · hover a card for the tripwire`}>Frontier themes — cross-cutting, not single-ticker</Eyebrow>
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {THEMES.map(t => {
          const dirColor = DIRECTION_COLOR[t.direction];
          const cov = COVERAGE_LABEL[t.coverage];
          return (
            <div key={t.id} className="row-hover" style={{ border:"1px solid var(--bd)", borderLeft:`3px solid ${dirColor}`, borderRadius:9, background:"var(--inner-bg)", padding:"13px 15px", cursor:"help" }}
              onMouseEnter={(e)=>showTip(e, `${t.label} · tripwire`, t.tripwire, dirColor)} onMouseMove={moveTip} onMouseLeave={hideTip}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", gap:10, flexWrap:"wrap", marginBottom:6 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontSize:11, color:dirColor, fontWeight:700 }}>{DIRECTION_GLYPH[t.direction]}</span>
                  <span style={{ fontSize:12.5, fontWeight:700, color:"var(--tx1)" }}>{t.label}</span>
                </div>
                <span style={{ fontSize:8.5, fontWeight:700, letterSpacing:"0.1em", color:cov.c, border:`1px solid ${cov.c}`, borderRadius:4, padding:"2px 7px" }}>{cov.l}</span>
              </div>
              <div style={{ fontSize:10.5, color:"var(--tx3)", lineHeight:1.6, marginBottom:6 }}>{t.evidence}</div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {t.holdings.length ? t.holdings.map(h => (
                  <span key={h} style={{ fontSize:9.5, fontWeight:700, color:"var(--tx2)", background:"var(--deep-bg)", borderRadius:4, padding:"2px 7px" }}>
                    {h}{LIVE[h] ? ` · ${usd(LIVE[h].px)}` : ""}
                  </span>
                )) : <span style={{ fontSize:9.5, color:"var(--tx5)" }}>no current holding</span>}
              </div>
            </div>
          );
        })}
      </div>
    </Panel>
  );
}

function HoldingsSnapshot() {
  return (
    <Panel delay={.12}>
      <Eyebrow note="a ticker can appear more than once if multiple themes touch it">Holdings currently touched by a tracked theme</Eyebrow>
      <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
        {heldTickers.map(t => {
          const themes = THEMES.filter(th => th.holdings.includes(t));
          const worst = themes.some(th=>th.coverage==="thesis-gap") ? LOSS : themes.some(th=>th.coverage==="prescreen-only") ? WARN : GAIN;
          return (
            <div key={t} className="row-hover" style={{ border:`1px solid ${worst}`, borderRadius:8, padding:"6px 11px", cursor:"help" }}
              onMouseEnter={(e)=>showTip(e, t, themes.map(th=>`<b>${th.label}</b> (${th.direction})`).join("<br/>"), worst)}
              onMouseMove={moveTip} onMouseLeave={hideTip}>
              <span style={{ fontSize:11, fontWeight:700, color:"var(--tx1)" }}>{t}</span>
              <span style={{ fontSize:9, color:"var(--tx5)", marginLeft:6 }}>×{themes.length}</span>
            </div>
          );
        })}
      </div>
    </Panel>
  );
}

function App() {
  return (
    <div style={{ width:"100%", maxWidth:1000, margin:"0 auto", padding:"26px 22px 60px", fontFamily:FONT_MONO }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:20, flexWrap:"wrap", gap:14 }}>
        <div>
          <div style={{ fontFamily:FONT_DISPLAY, fontSize:26, fontWeight:600, letterSpacing:"0.3em", color:"var(--tx1)" }}>
            TH<span style={{color:ACCENT}}>3</span>SIS · RADAR
          </div>
          <div style={{ fontSize:9.5, color:"var(--tx5)", letterSpacing:"0.08em", marginTop:7 }}>
            cross-cutting frontiers that can move MULTIPLE holdings at once · the anti-"late to semis" instrument
          </div>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ fontSize:9, color:"var(--tx5)", letterSpacing:"0.14em" }}>AS OF</div>
          <div style={{ fontSize:12, color:"var(--tx2)", fontWeight:700 }}>{ASOF}</div>
        </div>
      </div>

      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <StatStrip />
        <GapCallout />
        <ThemeCards />
        <HoldingsSnapshot />
      </div>

      <div style={{ marginTop:22, padding:"14px 18px", border:"1px dashed var(--bd2)", borderRadius:10, fontSize:9.5, color:"var(--tx5)", lineHeight:1.7 }}>
        ⚠ <b style={{color:"var(--tx4)"}}>Not financial advice.</b> A "threatens" row is a reason to watch a
        kill-switch more closely, not a reason to sell — see STRATEGY.md §2 on existing losers staying long-horizon
        holds. This page is distinct from the GATE: GATE gates NEW ideas one ticker at a time;{' '}
        RADAR watches the portfolio you already own for themes that cut across several holdings at once. Source of
        truth is <code>PF_RADAR</code> in <code>portfolio-data.js</code> — hand-maintained (there's no mechanical
        way to check whether a dashboard's kill-switches mention a theme), updated via the <code>/radar</code> skill.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
