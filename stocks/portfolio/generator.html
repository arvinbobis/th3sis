  el.style.cssText = 'display:flex;align-items:center;justify-content:center;height:100vh;background:#06080d';
  el.innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;padding:20px;font-family:\'JetBrains Mono\',monospace">'
    + '<div style="font-size:22px;font-family:Georgia,serif;letter-spacing:0.35em;color:#1c2230">TH<span style="color:#46aad9">3</span>SIS</div>'
    + '<div style="font-size:11px;letter-spacing:0.18em;color:#dd817a">FAILED TO LOAD · ' + lib + '</div>'
    + '<div style="font-size:10px;letter-spacing:0.12em;color:#3a4252">No internet connection — check your network and reload.</div>'
    + '<a href="javascript:location.reload()" style="margin-top:4px;color:#46aad9;text-decoration:none;border:1px solid #46aad933;border-radius:20px;padding:4px 14px;font-size:9px;letter-spacing:0.14em">↺ RELOAD</a>'
    + '</div>';
}
</script>

<style>
  html, body { margin: 0; padding: 0; background: var(--page-bg); }
  * { box-sizing: border-box; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(10px);} to {opacity:1; transform:none;} }
  @keyframes pulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }
  @keyframes tileIn { from { opacity:0; transform: scale(.96);} to {opacity:1; transform:none;} }

  .ld-dot { width:5px; height:5px; border-radius:50%; background:#46aad9; display:inline-block; animation:pulse 1.2s ease-in-out infinite; }
  ::-webkit-scrollbar { height: 8px; width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 8px; }
  @media (max-width: 820px) {
    .resp-2 { grid-template-columns: 1fr !important; }
    .resp-summary { grid-template-columns: 1fr 1fr !important; }
  }

  <div style="display:flex;flex-direction:column;align-items:center;gap:14px;">

<script>
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'th3sis-theme') {
    document.documentElement.classList.toggle('light', !!e.data.light);
    localStorage.setItem('th3sis_theme', e.data.light ? 'light' : 'dark');
  }
});
(function() {
  if (localStorage.getItem('th3sis_theme') !== 'dark') {
    document.documentElement.classList.add('light');
  }
})();

<script src="portfolio-data.js"></script>
<script type="text/babel">
const FONT_MONO = "'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace";
const FONT_DISPLAY = "'Spectral', Georgia, serif";

const GAIN = "#3fd07a", LOSS = "#f1564b", WARN = "#e0a83b", BLUE = "#2f6dff";
const ACCENT = "var(--blue-soft)";

// shared snapshot + strategy (single source of truth — portfolio-data.js)
const ASOF = PF_ASOF, LIVE = PF_LIVE, GEN_MULTIPLE = PF_STRAT.GEN_MULTIPLE;
const TRIMMED = PF_STRAT.TRIMMED || {};
const SEEDED  = PF_STRAT.SEEDED  || {};

const usd = (v, d=2) => (v<0?"-":"") + "$" + Math.abs(v).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const pct = (v, d=0) => (v>=0?"+":"") + v.toFixed(d) + "%";

// ── tooltip engine ───────────────────────────────────────────────────────────
let tipEl = null;
function tip(){ if(!tipEl){ tipEl=document.createElement("div"); tipEl.id="tip-box"; document.body.appendChild(tipEl);} return tipEl; }
function showTip(e,title,body,color){ const el=tip(); el.innerHTML=`<div class="tt" style="color:${color||ACCENT}">${title}</div><div class="tb">${body}</div>`; el.classList.add("on"); moveTip(e); }
function moveTip(e){ const el=tip(),p=16; let x=e.clientX+p,y=e.clientY+p; const r=el.getBoundingClientRect(); if(x+r.width>window.innerWidth-8)x=e.clientX-r.width-p; if(y+r.height>window.innerHeight-8)y=e.clientY-r.height-p; el.style.left=x+"px"; el.style.top=y+"px"; }
function hideTip(){ tip().classList.remove("on"); }

// ── cross-page nav ───────────────────────────────────────────────────────────
function navigateToTicker(e, ticker) {
  e.stopPropagation();
  try { window.parent.postMessage({ type: "th3sis-nav", target: ticker }, "*"); } catch (_) {}
}

// ── derive house-money branches from the generator ledger ──────────────────────
const branches = Object.keys(TRIMMED).map(t => {
  const x = TRIMMED[t], live = LIVE[t] || {};
  const freeMV = (live.mv != null) ? live.mv : x.freeMV;        // current free-roll value
  return {
    t, name: live.name || t, date: x.date,
    banked: x.realized, proceeds: x.proceeds, soldQty: x.soldQty, soldPx: x.soldPx,
    freeMV, freeUp: (live.up != null) ? live.up : null,
    mult: (live.px && live.avg) ? live.px/live.avg : null,
    qty: live.qty, avg: live.avg, px: live.px,
  };
}).sort((a,b)=>b.freeMV-a.freeMV);

// deployed-but-not-yet-harvested seeds (the recycled ~$1,000 living in its next idea)
const seededStations = Object.keys(SEEDED).map(t => {
  const x = SEEDED[t], live = LIVE[t] || {};
  return {
    seeded:true, t, name: live.name || t, date: x.date, from: x.from,
    planted: x.planted, fillPx: x.fillPx, fillQty: x.fillQty, note: x.note,
    mv: live.mv, up: live.up,
    mult: (live.px && live.avg) ? live.px/live.avg : null,
    trigger: (live.avg != null) ? live.avg*GEN_MULTIPLE : null,
  };
});

const totalBanked = branches.reduce((s,b)=>s+b.banked,0);
const totalRiding = branches.reduce((s,b)=>s+b.freeMV,0);
const totalFreeUp = branches.reduce((s,b)=>s+(b.freeUp||0),0);
const latestProceeds = branches.length ? branches[branches.length-1].proceeds : 0;
const activeSeed = seededStations.length ? seededStations[seededStations.length-1] : null;

// ── Sankey "link" band: a filled bezier ribbon from (x0,y0) of thickness w0 to
//    (x1,y1) of thickness w1. Ribbon THICKNESS encodes dollars. Used for the
//    recycled-seed trunk (horizontal) and each house-money branch (rising).
const band = (x0,y0,w0,x1,y1,w1) => {
  const xc = (x0+x1)/2, yc = (y0+y1)/2;
  // control points: bend horizontally for trunk, vertically for branches
  const vert = Math.abs(y1-y0) > Math.abs(x1-x0);
  const c0 = vert ? [x0, yc] : [xc, y0];
  const c1 = vert ? [x1, yc] : [xc, y1];
  return `M${x0-(vert?w0/2:0)},${y0-(vert?0:w0/2)} `
       + `C${c0[0]-(vert?w0/2:0)},${c0[1]-(vert?0:w0/2)} ${c1[0]-(vert?w1/2:0)},${c1[1]-(vert?0:w1/2)} ${x1-(vert?w1/2:0)},${y1-(vert?0:w1/2)} `
       + `L${x1+(vert?w1/2:0)},${y1+(vert?0:w1/2)} `
       + `C${c1[0]+(vert?w1/2:0)},${c1[1]+(vert?0:w1/2)} ${c0[0]+(vert?w0/2:0)},${c0[1]+(vert?0:w0/2)} ${x0+(vert?w0/2:0)},${y0+(vert?0:w0/2)} Z`;
};

// ── atoms ──────────────────────────────────────────────────────────────────
const Panel = ({children, style, delay=0}) => (
  <div className="panel" style={{ background:"var(--panel-bg)", border:"1px solid var(--bd)", borderRadius:14, padding:20, animationDelay:delay+"s", ...style }}>{children}</div>
);
const Eyebrow = ({children, note, color}) => (
  <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", marginBottom:14, gap:12, flexWrap:"wrap" }}>
    <div style={{ fontSize:10.5, letterSpacing:"0.2em", color:color||"var(--tx5)", textTransform:"uppercase", fontWeight:700 }}>{children}</div>
    {note && <div style={{ fontSize:10, color:"var(--tx5)", letterSpacing:"0.04em" }}>{note}</div>}
  </div>
);

// ── sections ──────────────────────────────────────────────────────────────
function StatStrip() {
  const cells = [
    { n: branches.length, l: "harvested ideas · root nodes", c: ACCENT },
    { n: usd(totalRiding,0), l: `house money riding · ${(totalFreeUp>=0?"+":"")}${usd(totalFreeUp,0)} unrealized`, c: GAIN },
    { n: usd(totalBanked,0), l: "capital banked · recovered to cash", c: GAIN },
    activeSeed
      ? { n: usd(activeSeed.mv!=null?activeSeed.mv:activeSeed.planted,0), l: `seed deployed → ${activeSeed.t} (${String(activeSeed.date).slice(5)})${activeSeed.mult?` · ${activeSeed.mult.toFixed(2)}× → ${GEN_MULTIPLE}×`:""}`, c: WARN }
      : { n: usd(latestProceeds,0), l: "seed recycling → next idea", c: WARN },
  ];
  return (
    <Panel style={{ padding:"16px 20px" }}>
      <div className="resp-summary" style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:1, background:"var(--bd)", border:"1px solid var(--bd)", borderRadius:10, overflow:"hidden" }}>
        {cells.map((c,i)=>(
          <div key={i} style={{ background:"var(--panel-bg)", padding:"13px 15px" }}>
            <div style={{ fontSize:22, fontWeight:700, color:c.c, fontFamily:FONT_MONO }}>{c.n}</div>
            <div style={{ fontSize:9, color:"var(--tx5)", letterSpacing:"0.08em", marginTop:4, textTransform:"uppercase" }}>{c.l}</div>
          </div>
        ))}
      </div>
    </Panel>
  );
}

function SankeyFlow() {
  const VBW=960, VBH=384, base=266, canopyY=104, seedX=58;
  const nodeX0=212, nodeX1=806, NW=112, NH=54, edgeX=918;
  const S=0.021, wpx=d=>Math.max(8, Math.min(40, d*S));   // dollars → ribbon px
  const IDEAL=1000, GHOST_RIDE=900;

  const real = branches.map(b=>({
    real:true, ...b,
    origCost:(b.avg!=null && b.qty!=null && b.soldQty!=null) ? b.avg*(b.qty+b.soldQty) : b.proceeds,
  }));
  const ghosts = seededStations.length
    ? [{ghost:true,label:"next stock"}]
    : [{ghost:true,label:"next stock #1"},{ghost:true,label:"next stock #2"}];
  const stations = [...real, ...seededStations, ...ghosts];
  const n = stations.length;
  const X = i => n===1 ? Math.round((nodeX0+nodeX1)/2) : Math.round(nodeX0 + i*(nodeX1-nodeX0)/(n-1));
  const inW  = s => wpx(s.real ? s.origCost : s.seeded ? s.planted : IDEAL);
  const outW = s => wpx(s.real ? s.proceeds : s.seeded ? s.planted : IDEAL);

  // trunk: seed source → each station → trailing edge
  const segs = [];
  segs.push({ d:band(seedX+16, base, inW(stations[0]), X(0)-NW/2, base, inW(stations[0])), ghost:!stations[0].real });
  for (let i=0;i<n;i++){
    const rx = (i<n-1) ? X(i+1)-NW/2 : edgeX;
    segs.push({ d:band(X(i)+NW/2, base, outW(stations[i]), rx, base, outW(stations[i])),
                ghost:!stations[i].real, rec:(stations[i].real?stations[i].proceeds:IDEAL),
                mid:(X(i)+NW/2 + rx)/2, real:stations[i].real });
  }
  // house-money branches rising to the canopy
  const ups = stations.map((s,i)=>({ x:X(i), w:wpx(s.real?s.freeMV:GHOST_RIDE), ghost:!s.real, s }));

  const Sfill = (c,o)=>({ fill:c, fillOpacity:o, stroke:"none" });

  return (
    <svg viewBox={`0 0 ${VBW} ${VBH}`} width="100%" style={{ display:"block", fontFamily:FONT_MONO }}>
      {/* trunk (recycled seed) */}
      {segs.map((g,i)=>(
        <path key={"t"+i} d={g.d}
          style={g.ghost ? { fill:WARN, fillOpacity:0.13, stroke:WARN, strokeOpacity:0.35, strokeDasharray:"5 4" }
                         : { fill:WARN, fillOpacity:0.5 }} />
      ))}
      {/* house-money branches */}
      {ups.map((u,i)=>(
        <path key={"u"+i} d={band(u.x, base-NH/2+3, u.w, u.x, canopyY+24, u.w)}
          style={u.ghost ? { fill:GAIN, fillOpacity:0.12, stroke:GAIN, strokeOpacity:0.32, strokeDasharray:"5 4" }
                         : { fill:GAIN, fillOpacity:0.5, cursor:"help" }}
          onMouseEnter={u.ghost?undefined:(e)=>showTip(e, `${u.s.t} · house money`, `${usd(u.s.freeMV,0)} riding free${u.s.mult?` (${u.s.mult.toFixed(2)}× cost)`:""}, ${usd(u.s.freeUp,0)} unrealized. Detached from the seed the day you trimmed — it rides until the thesis breaks; never re-trimmed on price alone.`, GAIN)}
          onMouseMove={u.ghost?undefined:moveTip} onMouseLeave={u.ghost?undefined:hideTip} />
      ))}

      {/* seed source pill */}
      <rect x={seedX-46} y={base-17} width={94} height={34} rx={17} style={{ fill:"var(--inner-bg)", stroke:WARN, strokeOpacity:0.6 }} />
      <text x={seedX+1} y={base-1} textAnchor="middle" style={{ fill:WARN, fontSize:12, fontWeight:700 }}>~$1,000</text>
      <text x={seedX+1} y={base+11} textAnchor="middle" style={{ fill:"var(--tx5)", fontSize:8, letterSpacing:"1.5px" }}>SEED</text>

      {/* recover labels above each real out-segment */}
      {segs.map((g,i)=> (g.real && i>0) ? (
        <text key={"rl"+i} x={g.mid} y={base-wpx(g.rec)/2-7} textAnchor="middle" style={{ fill:"var(--tx4)", fontSize:9.5 }}>recover {usd(g.rec,0)} →</text>
      ) : null)}

      {/* canopy pills */}
      {ups.map((u,i)=> u.s && u.s.seeded ? (
        <g key={"c"+i} data-nav-ticker={u.s.t} style={{cursor:"pointer"}}
           onClick={(e)=>navigateToTicker(e, u.s.t)}
           onMouseEnter={(e)=>showTip(e, `${u.s.t} · seed growing`, `${usd(u.s.planted,0)} planted from ${u.s.from}${u.s.mv!=null?`, now ${usd(u.s.mv,0)}`:""}${u.s.up!=null?` (${u.s.up>=0?"+":""}${usd(u.s.up,0)} unrealized on the whole position)`:""}. Still seed capital, not house money — the branch detaches only at ${GEN_MULTIPLE}× with the thesis intact.`, WARN)} onMouseMove={moveTip} onMouseLeave={hideTip}>
          <rect x={u.x-68} y={canopyY-25} width={136} height={50} rx={10} style={{ fill:WARN, fillOpacity:0.08, stroke:WARN, strokeOpacity:0.45, strokeDasharray:"4 4" }} />
          <text x={u.x} y={canopyY-8} textAnchor="middle" style={{ fill:"var(--tx1)", fontSize:10.5, fontWeight:700 }}>{u.s.t} seed growing</text>
          <text x={u.x} y={canopyY+8} textAnchor="middle" style={{ fill:WARN, fontSize:13, fontWeight:700 }}>{u.s.mv!=null?usd(u.s.mv,0):usd(u.s.planted,0)}{u.s.up!=null?` · ${u.s.up>=0?"+":""}${usd(u.s.up,0)}`:""}</text>
          <text x={u.x} y={canopyY+19} textAnchor="middle" style={{ fill:"var(--tx5)", fontSize:7.5, letterSpacing:"0.4px" }}>{u.s.mult?`${u.s.mult.toFixed(2)}× · `:""}branch at {GEN_MULTIPLE}× (thesis-gated)</text>
        </g>
      ) : u.ghost ? (
        <g key={"c"+i}>
          <rect x={u.x-50} y={canopyY-20} width={100} height={40} rx={9} style={{ fill:"var(--inner-bg)", stroke:"var(--bd3)", strokeDasharray:"4 4" }} />
          <text x={u.x} y={canopyY-2} textAnchor="middle" style={{ fill:"var(--tx5)", fontSize:9.5 }}>rides free</text>
          <text x={u.x} y={canopyY+12} textAnchor="middle" style={{ fill:"var(--tx6)", fontSize:8.5 }}>(future)</text>
        </g>
      ) : (
        <g key={"c"+i} data-nav-ticker={u.s.t} style={{cursor:"pointer"}}
           onClick={(e)=>navigateToTicker(e, u.s.t)}
           onMouseEnter={(e)=>showTip(e, `${u.s.t} · house money`, `${usd(u.s.freeMV,0)} riding free, ${usd(u.s.freeUp,0)} unrealized. Rides until the thesis breaks.`, GAIN)} onMouseMove={moveTip} onMouseLeave={hideTip}>
          <rect x={u.x-68} y={canopyY-25} width={136} height={50} rx={10} style={{ fill:GAIN, fillOpacity:0.1, stroke:GAIN, strokeOpacity:0.5 }} />
          <text x={u.x} y={canopyY-8} textAnchor="middle" style={{ fill:"var(--tx1)", fontSize:10.5, fontWeight:700 }}>{u.s.t} house money</text>
          <text x={u.x} y={canopyY+8} textAnchor="middle" style={{ fill:GAIN, fontSize:13, fontWeight:700 }}>{usd(u.s.freeMV,0)} ▲</text>
          <text x={u.x} y={canopyY+19} textAnchor="middle" style={{ fill:"var(--tx5)", fontSize:7.5, letterSpacing:"0.4px" }}>rides until thesis breaks</text>
        </g>
      ))}

      {/* station nodes */}
      {stations.map((s,i)=> s.seeded ? (
        <g key={"n"+i} data-nav-ticker={s.t} style={{cursor:"pointer"}}
           onClick={(e)=>navigateToTicker(e, s.t)}
           onMouseEnter={(e)=>showTip(e, `${s.t} · ${s.name} — the seed lives here`, `Reseeded from ${s.from} ${s.date}: ${usd(s.planted,0)} planted (${s.fillQty} sh @ ${usd(s.fillPx)})${s.mv!=null?`, now worth ${usd(s.mv,0)}`:""}${s.mult?` (${s.mult.toFixed(2)}× avg cost)`:""}. Harvest at ${GEN_MULTIPLE}×${s.trigger?` (≈${usd(s.trigger,0)}/sh)`:""} AND thesis intact — then this node peels its own house-money branch and the seed moves on.`, WARN)} onMouseMove={moveTip} onMouseLeave={hideTip}>
          <rect x={X(i)-NW/2} y={base-NH/2} width={NW} height={NH} rx={11} style={{ fill:"var(--panel-bg)", stroke:WARN }} />
          <text x={X(i)} y={base-7} textAnchor="middle" style={{ fill:"var(--tx1)", fontSize:19, fontWeight:600, fontFamily:FONT_DISPLAY }}>{s.t}</text>
          <text x={X(i)} y={base+9} textAnchor="middle" style={{ fill:"var(--tx4)", fontSize:8.5 }}>{s.mult?s.mult.toFixed(2)+"× · ":""}seeded {String(s.date).slice(5)}</text>
          <text x={X(i)} y={base+NH/2+14} textAnchor="middle" style={{ fill:WARN, fontSize:9, fontWeight:700 }}>growing → {GEN_MULTIPLE}×</text>
        </g>
      ) : s.ghost ? (
        <g key={"n"+i}>
          <rect x={X(i)-NW/2} y={base-NH/2} width={NW} height={NH} rx={11} style={{ fill:"var(--inner-bg)", stroke:"var(--bd3)", strokeDasharray:"5 4" }} />
          <text x={X(i)} y={base-2} textAnchor="middle" style={{ fill:"var(--tx4)", fontSize:10.5, fontWeight:700 }}>{s.label}</text>
          <text x={X(i)} y={base+14} textAnchor="middle" style={{ fill:"var(--tx5)", fontSize:9.5 }}>~$1,000 in</text>
        </g>
      ) : (
        <g key={"n"+i} data-nav-ticker={s.t} style={{cursor:"pointer"}}
           onClick={(e)=>navigateToTicker(e, s.t)}
           onMouseEnter={(e)=>showTip(e, `${s.t} · ${s.name}`, `Seed deployed ≈ ${usd(s.origCost,0)} → grew to ${s.mult?s.mult.toFixed(2)+"× cost":"its trim trigger"}. Trimmed ${s.date}: sold ${s.soldQty} sh @ ${usd(s.soldPx)}, pulling ${usd(s.proceeds,0)} back out (banked ${usd(s.banked,0)}). The rest rides as house money above.`, ACCENT)} onMouseMove={moveTip} onMouseLeave={hideTip}>
          <rect x={X(i)-NW/2} y={base-NH/2} width={NW} height={NH} rx={11} style={{ fill:"var(--panel-bg)", stroke:ACCENT }} />
          <text x={X(i)} y={base-7} textAnchor="middle" style={{ fill:"var(--tx1)", fontSize:19, fontWeight:600, fontFamily:FONT_DISPLAY }}>{s.t}</text>
          <text x={X(i)} y={base+9} textAnchor="middle" style={{ fill:"var(--tx4)", fontSize:8.5 }}>{s.mult?s.mult.toFixed(2)+"× · ":""}trim {String(s.date).slice(5)}</text>
          <text x={X(i)} y={base+NH/2+14} textAnchor="middle" style={{ fill:GAIN, fontSize:9, fontWeight:700 }}>banked {usd(s.banked,0)}</text>
        </g>
      ))}

      {/* trailing ellipsis */}
      <text x={edgeX+14} y={base+5} textAnchor="middle" style={{ fill:"var(--tx5)", fontSize:17 }}>…</text>
    </svg>
  );
}

function SankeyPanel() {
  return (
    <Panel delay={.04}>
      <Eyebrow color={ACCENT} note="ribbon width ∝ dollars · amber = recycled seed · green = house money">The flow — one recycled seed, a branch per harvest</Eyebrow>
      <div style={{ width:"100%", overflowX:"auto" }}>
        <div style={{ minWidth:660 }}><SankeyFlow/></div>
      </div>
      <div style={{ fontSize:9.5, color:"var(--tx6)", marginTop:6, lineHeight:1.6 }}>
        The <b style={{color:WARN}}>amber trunk</b> is your ~$1,000 seed — recovered whole at each trim and replanted in the next stock. Every stock it passes through peels off a <b style={{color:GAIN}}>green house-money branch</b> that rises and keeps riding until its thesis breaks. Ribbon thickness scales with dollars. <b style={{color:"var(--tx3)"}}>ASML</b> is harvested; the seed now lives in <b style={{color:WARN}}>MU</b> (solid amber node — growing toward its {GEN_MULTIPLE}×); dashed stations are the plan. (The node is where the money <i>grows</i> — so out-flow &gt; in-flow; this isn't a conserved Sankey, it's a compounding one.)
      </div>
    </Panel>
  );
}

function Mechanic() {
  const steps = [
    ["①", "Plant", `Deploy a clean ~$1,000 into ONE high-conviction chokepoint — a bottleneck nobody routes around, bought with a valuation cushion in the cost basis.`],
    ["②", "Let it double", `Hold while it compounds toward ${GEN_MULTIPLE}× cost. Don't trim early, don't add at highs — patience is the position.`],
    ["③", "Harvest (thesis-gated)", `At ≥${GEN_MULTIPLE}× AND only if the thesis still holds, trim just enough to recover the original seed. Never trim on price alone.`],
    ["④", "Let the rest ride", `The remaining shares become a free-rolling house-money branch — it rises off the trunk and compounds at ~zero cost-basis risk until the thesis breaks.`],
    ["⑤", "Reseed", `The recovered ~$1,000 becomes the seed for the next idea. Repeat — on and on. The tree grows one branch per harvest.`],
  ];
  return (
    <Panel delay={.1}>
      <Eyebrow>How the generator grows the tree</Eyebrow>
      <div className="resp-2" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px 22px" }}>
        {steps.map((s,i)=>(
          <div key={i} style={{ display:"flex", gap:11, alignItems:"baseline" }}>
            <span style={{ fontSize:13, fontWeight:700, color:ACCENT, flexShrink:0, fontFamily:FONT_MONO }}>{s[0]}</span>
            <div>
              <div style={{ fontSize:11.5, fontWeight:700, color:"var(--tx1)", marginBottom:3 }}>{s[1]}</div>
              <div style={{ fontSize:10.5, color:"var(--tx3)", lineHeight:1.55 }}>{s[2]}</div>
            </div>
          </div>
        ))}
      </div>
    </Panel>
  );
}

function App() {
  return (
    <div style={{ width:"100%", maxWidth:1000, margin:"0 auto", padding:"26px 22px 60px", fontFamily:FONT_MONO }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:20, flexWrap:"wrap", gap:14 }}>
        <div>
          <div style={{ fontFamily:FONT_DISPLAY, fontSize:26, fontWeight:600, letterSpacing:"0.3em", color:"var(--tx1)" }}>
            TH<span style={{color:ACCENT}}>3</span>SIS · GENERATOR
          </div>
          <div style={{ fontSize:9.5, color:"var(--tx5)", letterSpacing:"0.08em", marginTop:7 }}>
            the "$1,000 generator" as a flow — one recycled seed threading idea→idea, a house-money branch per harvest · hover any node or ribbon for the why
          </div>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ fontSize:9, color:"var(--tx5)", letterSpacing:"0.14em" }}>AS OF</div>
          <div style={{ fontSize:12, color:"var(--tx2)", fontWeight:700 }}>{ASOF}</div>
        </div>
      </div>

      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <StatStrip />
        <SankeyPanel />
        <Mechanic />
      </div>

      <div style={{ marginTop:22, padding:"14px 18px", border:"1px dashed var(--bd2)", borderRadius:10, fontSize:9.5, color:"var(--tx5)", lineHeight:1.7 }}>
        ⚠ <b style={{color:"var(--tx4)"}}>Not financial advice.</b> The flow is mechanically drawn from the generator ledger (<code>PF_STRAT.TRIMMED</code>) and a static IBKR snapshot as of {ASOF}. "House money" is a framing, not a guarantee — a free-rolling branch can still fall. Every harvest is thesis-gated; every reseed needs a fresh chokepoint + cushion.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
