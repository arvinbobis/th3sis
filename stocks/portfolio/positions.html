function tip() { if(!tipEl){ tipEl=document.createElement("div"); tipEl.id="tip-box"; document.body.appendChild(tipEl);} return tipEl; }
function showTip(e,title,body,color){ const el=tip(); el.innerHTML=`<div class="tt" style="color:${color||ACCENT}">${title}</div><div class="tb">${body}</div>`; el.classList.add("on"); moveTip(e); }

function hideTip(){ tip().classList.remove("on"); }

// ── derived portfolio math ──────────────────────────────────────────────────
function useStats() {
  return useMemo(() => {
    const investedMV = POS.reduce((s,p)=>s+p.mv,0);
    const totalUp    = POS.reduce((s,p)=>s+p.up,0);
    const totalDay   = POS.reduce((s,p)=>s+p.day,0);
    const costBasis  = investedMV - totalUp;
    const totalRet   = totalUp / costBasis * 100;
    const cashPct    = ACCT.cash / ACCT.netLiq * 100;

    // theme rollup
    const themeMap = {};
    POS.forEach(p => {
      const m = themeMap[p.theme] || (themeMap[p.theme] = { key:p.theme, mv:0, up:0, n:0, names:[] });
      m.mv += p.mv; m.up += p.up; m.n += 1; m.names.push(p.t);
    });
    const themes = Object.values(themeMap)
      .map(m => ({ ...m, wt:m.mv/investedMV*100, ret:m.up/(m.mv-m.up)*100 }))
      .sort((a,b)=>b.mv-a.mv);

    // concentration
    const byMV = [...POS].sort((a,b)=>b.mv-a.mv);
    const top5  = byMV.slice(0,5).reduce((s,p)=>s+p.mv,0);
    const top10 = byMV.slice(0,10).reduce((s,p)=>s+p.mv,0);

    // thesis coverage
    const coveredMV = POS.filter(p=>p.thesis).reduce((s,p)=>s+p.mv,0);
    const coveredN  = POS.filter(p=>p.thesis).length;

    // attention signals
    const worst = [...POS].sort((a,b)=>a.ret-b.ret)[0];
    const bigUnwritten = POS.filter(p=>!p.thesis).sort((a,b)=>b.mv-a.mv)[0];
    const weakTheme = [...themes].sort((a,b)=>a.ret-b.ret)[0];

    return { investedMV, totalUp, totalDay, costBasis, totalRet, cashPct, themes,
             top5, top10, coveredMV, coveredN, worst, bigUnwritten, weakTheme, byMV };
  }, []);
}

  return (
    <Panel delay={.1}>

}

function Scoreboard({ s }) {

      <Eyebrow note="unrealized · sorted best → worst">The scoreboard — paper P&L by position</Eyebrow>
      <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
        {sorted.map(p=>{
          const w = Math.abs(p.up)/maxAbs*50; // % of half-width

            <div key={p.t} className="row-hover" style={{ display:"flex", alignItems:"center", gap:8, padding:"2px 6px", borderRadius:5,
                 cursor:"help" }}
                 onMouseEnter={(e)=>showTip(e, `${p.t} · ${p.name}`, `${usd(p.up,0)} unrealized (${pct(p.ret)}). Cost ${usd(p.avg)} → now ${usd(p.px)}. Position ${usd(p.mv,0)}.`, pc(p.up))}

      return (av-bv)*sort.dir;
    });
    return r;

  const click = (key)=> setSort(s => s.key===key ? {key, dir:-s.dir} : {key, dir:key==="t"||key==="theme"?1:-1});

        <tbody>
          {rows.map(p=>(

              <td style={{ padding:"9px 10px", textAlign:"right", fontSize:10.5, color:"var(--tx2)" }}>{usd(p.px)}</td>
              <td style={{ padding:"9px 10px", textAlign:"right", fontSize:11, fontWeight:700, color:pc(p.up) }}>{usd(p.up,0)}</td>

}

function Generator({ s }) {
  const corePct = POS.filter(p=>CORE_TICKERS.includes(p.t)).reduce((a,p)=>a+p.mv,0) / s.investedMV * 100;
  const gens = POS
    .filter(p => !CORE_TICKERS.includes(p.t))
    .map(p => ({ ...p, prog:(p.px/p.avg - 1)*100, past: p.px >= GEN_MULTIPLE*p.avg, orig: p.avg*p.qty }))
    .filter(p => p.prog >= GEN_MIN_PROG)
    .sort((a,b)=>b.prog-a.prog);
  return (
    <Panel delay={.13}>
      <Eyebrow note={`trim trigger = 2× cost · thesis-gated`}>The generator — capital recycling engine</Eyebrow>
      <div style={{ fontSize:10.5, color:"var(--tx3)", lineHeight:1.6, marginBottom:14 }}>
        Each bar fills from your <b style={{color:"var(--tx2)"}}>cost</b> (left) to <b style={{color:"var(--tx2)"}}>2× cost</b> (right edge = the trim trigger).
        At the edge — <i>and only if the thesis still holds</i> — trim to recover your original capital and let the rest ride as house money.
        <Tip title="CORE vs SATELLITE" body={`Strategy target: ~${TARGET_CORE_PCT}% in a broad-market core (IUSG + QQQ, weekly DCA), ~${100-TARGET_CORE_PCT}% in 1–3 high-conviction satellites. Today core is ${corePct.toFixed(1)}% — the simplify/focus shift is still early.`} color={WARN}>
          <span style={{ color:"var(--tx5)" }}> &nbsp;Core today: <b style={{color:WARN}}>{corePct.toFixed(1)}%</b> vs ~{TARGET_CORE_PCT}% target.</span>
        </Tip>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
        {gens.map(p=>{
          const fill = Math.min(p.prog, 100);
          return (
            <div key={p.t} className="row-hover" style={{ display:"flex", alignItems:"center", gap:10, padding:"3px 6px", borderRadius:5, cursor:"help" }}
              onMouseEnter={(e)=>showTip(e, `${p.t} · ${p.name}`, p.past
                ? `PAST 2×: up ${pct(p.ret)} on a ${usd(p.avg)} basis. Generator move (thesis permitting): trim ~${usd(p.orig,0)} to recover original capital, let ~${usd(p.mv-p.orig,0)} ride free as house money.`
                : `${p.prog.toFixed(0)}% of the way to the 2× trim trigger (needs ${usd(p.avg*2)}, now ${usd(p.px)}). Let it compound — don't trim early, don't add at highs.`,
                p.past?GAIN:ACCENT)}
              onMouseMove={moveTip} onMouseLeave={hideTip}>
              <span style={{ width:46, fontSize:10.5, fontWeight:700, color:"var(--tx2)", flexShrink:0 }}>{p.t}</span>
              <div style={{ position:"relative", flex:1, height:16, background:"var(--inner-bg)", border:"1px solid var(--bd)", borderRadius:4, overflow:"hidden" }}>
                <div className="seg-grow" style={{ height:"100%", width:fill+"%", background: p.past?GAIN:ACCENT, opacity: p.past?.9:.7 }} />
                {p.past && <span style={{ position:"absolute", right:7, top:0, lineHeight:"15px", fontSize:8.5, fontWeight:700, letterSpacing:"0.1em", color:"var(--page-bg)" }}>● TRIM ZONE</span>}
              </div>
              <span style={{ width:108, textAlign:"right", fontSize:10, flexShrink:0, color: p.past?GAIN:"var(--tx4)" }}>
                {p.past ? `recover ${usd(p.orig,0)}` : `${p.prog.toFixed(0)}% to 2×`}
              </span>
            </div>
          );
        })}
      </div>
      <div style={{ fontSize:9, color:"var(--tx6)", marginTop:11 }}>Names &lt;{GEN_MIN_PROG}% of the way to 2× are hidden. Core ETFs (IUSG, QQQ) compound passively and aren't generators.</div>
    </Panel>
  );
}

function LimitLadder() {
  const muskNames = LIMITS.filter(l=>l.musk).map(l=>l.t).join(" + ");
  return (
    <Panel delay={.15}>
      <Eyebrow note="manual · GTC · below market">Deployment ladder — pending limit orders</Eyebrow>
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {LIMITS.map(l=>{
          const live = liveByT[l.t];
          let status, sc = "var(--tx5)";
          if (l.limit == null) { status = "ride / trim plan — no new capital"; }
          else if (live) {
            const above = (live.px/l.limit - 1)*100;
            if (live.px > l.limit) { status = `live ${usd(live.px)} · ${above.toFixed(0)}% above limit — won't fill, don't chase`; sc = WARN; }
            else { status = `live ${usd(live.px)} · at/below limit — would fill`; sc = GAIN; }
          } else { status = l.watch ? "watchlist — not armed" : "awaiting — not held"; }
          return (
            <div key={l.t} className="row-hover" style={{ display:"flex", alignItems:"center", gap:12, padding:"8px 10px", border:"1px solid var(--bd)", borderRadius:8, cursor:"help" }}
              onMouseEnter={(e)=>showTip(e, `${l.t} — ${l.size}`, l.anchor, l.musk?WARN:ACCENT)} onMouseMove={moveTip} onMouseLeave={hideTip}>
              <span style={{ width:54, fontSize:12, fontWeight:700, color:"var(--tx1)", flexShrink:0 }}>{l.t}</span>
              <span style={{ width:78, fontSize:11, color: l.limit?ACCENT:"var(--tx5)", fontWeight:700, flexShrink:0 }}>{l.limit?usd(l.limit,0):"—"}</span>
              <span style={{ width:96, fontSize:10, color:"var(--tx4)", flexShrink:0 }}>{l.size}</span>
              <span style={{ flex:1, fontSize:10, color:sc, textAlign:"right" }}>{status}{l.musk && " · Musk bucket"}</span>
            </div>
          );
        })}
      </div>
      <div style={{ marginTop:12, padding:"10px 12px", border:"1px solid var(--bd2)", borderLeft:`2px solid ${WARN}`, borderRadius:8, background:"var(--inner-bg)", fontSize:10, color:"var(--tx3)", lineHeight:1.6 }}>
        <b style={{color:WARN}}>Correlation cap:</b> {muskNames} are sized as <b>one</b> ~{usd(MUSK_BUCKET_CAP,0)} bet, not two — shared CEO, narrative, and a possible 12–18mo merger. Post-merger they could collapse into a single ticker's worth of risk.
      </div>
    </Panel>
  );
}

        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <button className="pill" onClick={()=>setShowDaily(v=>!v)}
            style={{ background: showDaily?ACCENT:"transparent", color: showDaily?"var(--page-bg)":"var(--tx4)",
                     border:"1px solid "+(showDaily?ACCENT:"var(--bd2)"), borderRadius:20, padding:"6px 13px",
                     fontFamily:FONT_MONO, fontSize:9.5, fontWeight:700, letterSpacing:"0.1em" }}>
            {showDaily ? "● DAILY NOISE: ON" : "○ DAILY NOISE: OFF"}
          </button>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:9, color:"var(--tx5)", letterSpacing:"0.14em" }}>AS OF</div>
            <div style={{ fontSize:12, color:"var(--tx2)", fontWeight:700 }}>{ASOF}</div>
          </div>
        </div>
      </div>

      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <Hero s={s} showDaily={showDaily} />
        <ThemeAllocation s={s} />
        <ConvictionConcentration s={s} />
        <Scoreboard s={s} />
        <Generator s={s} />
        <LimitLadder />
        <PositionsTable s={s} showDaily={showDaily} />
        <Attention s={s} />
        <DisciplineStrip />
      </div>

      <div style={{ marginTop:22, padding:"14px 18px", border:"1px dashed var(--bd2)", borderRadius:10, fontSize:9.5, color:"var(--tx5)", lineHeight:1.7 }}>
        ⚠ <b style={{color:"var(--tx4)"}}>Not financial advice.</b> A static snapshot of an IBKR account as of {ASOF} — prices, weights and P&L drift every session; re-pull before acting.
        Returns are unrealized and measured on cost basis, not time-weighted. Daily P&L is muted by default on purpose: over a 5-year horizon it's noise, not signal.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
