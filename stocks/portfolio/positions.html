// ── formatters ──────────────────────────────────────────────────────────────
const usd = (v, d=2) => (v<0?"-":"") + "$" + Math.abs(v).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const k   = (v) => "$" + (v/1000).toFixed(1) + "k";
const pct = (v, d=1) => (v>=0?"+":"") + v.toFixed(d) + "%";
const pc  = (v) => v>=0 ? GAIN : LOSS;

// ── tooltip engine ──────────────────────────────────────────────────────────
let tipEl = null;
function tip() { if(!tipEl){ tipEl=document.createElement("div"); tipEl.id="tip-box"; document.body.appendChild(tipEl);} return tipEl; }
function showTip(e,title,body,color){ const el=tip(); el.innerHTML=`<div class="tt" style="color:${color||ACCENT}">${title}</div><div class="tb">${body}</div>`; el.classList.add("on"); moveTip(e); }
function moveTip(e){ const el=tip(),p=16; let x=e.clientX+p,y=e.clientY+p; const r=el.getBoundingClientRect(); if(x+r.width>window.innerWidth-8)x=e.clientX-r.width-p; if(y+r.height>window.innerHeight-8)y=e.clientY-r.height-p; el.style.left=x+"px"; el.style.top=y+"px"; }
function hideTip(){ tip().classList.remove("on"); }
function Tip({ title, body, color, children, style }) {
  return <span className="tip-target" style={style}
    onMouseEnter={(e)=>showTip(e,title,body,color)} onMouseMove={moveTip} onMouseLeave={hideTip}>{children}</span>;
}

// ── small UI atoms ──────────────────────────────────────────────────────────
const Panel = ({children, style, delay=0}) => (
  <div className="panel" style={{ background:"var(--panel-bg)", border:"1px solid var(--bd)", borderRadius:14, padding:20, animationDelay:delay+"s", ...style }}>{children}</div>
);
const Eyebrow = ({children, note}) => (
  <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", marginBottom:14, gap:12, flexWrap:"wrap" }}>
    <div style={{ fontSize:10, letterSpacing:"0.22em", color:"var(--tx5)", textTransform:"uppercase" }}>{children}</div>
    {note && <div style={{ fontSize:10, color:"var(--tx5)", letterSpacing:"0.04em" }}>{note}</div>}
  </div>
);

// ── derived portfolio math ──────────────────────────────────────────────────
function useStats() {
  return useMemo(() => {
    const investedMV = POS.reduce((s,p)=>s+p.mv,0);
    const totalUp    = POS.reduce((s,p)=>s+p.up,0);
    const totalDay   = POS.reduce((s,p)=>s+p.day,0);
    const costBasis  = investedMV - totalUp;
    const totalRet   = totalUp / costBasis * 100;
    const cashPct    = ACCT.cash / ACCT.netLiq * 100;

    // theme rollup
    const themeMap = {};
    POS.forEach(p => {
      const m = themeMap[p.theme] || (themeMap[p.theme] = { key:p.theme, mv:0, up:0, n:0, names:[] });
      m.mv += p.mv; m.up += p.up; m.n += 1; m.names.push(p.t);
    });
    const themes = Object.values(themeMap)
      .map(m => ({ ...m, wt:m.mv/investedMV*100, ret:m.up/(m.mv-m.up)*100 }))
      .sort((a,b)=>b.mv-a.mv);

    // concentration
    const byMV = [...POS].sort((a,b)=>b.mv-a.mv);
    const top5  = byMV.slice(0,5).reduce((s,p)=>s+p.mv,0);
    const top10 = byMV.slice(0,10).reduce((s,p)=>s+p.mv,0);

    // thesis coverage
    const coveredMV = POS.filter(p=>p.thesis).reduce((s,p)=>s+p.mv,0);
    const coveredN  = POS.filter(p=>p.thesis).length;

    // attention signals
    const worst = [...POS].sort((a,b)=>a.ret-b.ret)[0];
    const bigUnwritten = POS.filter(p=>!p.thesis).sort((a,b)=>b.mv-a.mv)[0];
    const weakTheme = [...themes].sort((a,b)=>a.ret-b.ret)[0];

    return { investedMV, totalUp, totalDay, costBasis, totalRet, cashPct, themes,
             top5, top10, coveredMV, coveredN, worst, bigUnwritten, weakTheme, byMV };
  }, []);
}

            <Tip title="DRY POWDER" body={`Cash sitting ready to deploy: ${usd(ACCT.cash)} (${s.cashPct.toFixed(1)}% of the book). For a 5-year holder, dry powder is optionality — ammo to buy great businesses when they go on sale. Thin powder means a drawdown finds you fully invested with nothing to add.`} color={WARN}>

            </Tip>

        <Stat label="THESIS-BACKED" value={`${(s.coveredMV/s.investedMV*100).toFixed(0)}%`} sub={`${s.coveredN} of ${POS.length} names`} tipB={`Share of invested dollars that have a written TH3SIS on file (${s.coveredN} names). The rest is conviction you haven't documented — the first place a long-term holder should look.`} />
        <Stat label="TOP-5 WEIGHT" value={`${(s.top5/s.investedMV*100).toFixed(0)}%`} sub={`top-10 ${(s.top10/s.investedMV*100).toFixed(0)}%`} tipB={`Your five largest positions are ${(s.top5/s.investedMV*100).toFixed(1)}% of the book. Concentration compounds faster — and hurts faster. Know your number.`} />

          : <Stat label="DIV. ACCRUED" value={usd(ACCT.dividends)} sub="awaiting payout" />}
      </div>

  );
}
const Stat = ({label, value, sub, color, tipB}) => {
  const inner = (
    <div style={{ background:"var(--panel-bg)", padding:"14px 16px" }}>
      <div style={{ fontSize:9, letterSpacing:"0.18em", color:"var(--tx5)" }}>{label}</div>

      <div style={{ fontSize:9.5, color:"var(--tx5)", marginTop:3 }}>{sub}</div>
    </div>
  );
  return tipB
    ? <Tip title={label} body={tipB} style={{ borderBottom:"none", display:"block" }}>{inner}</Tip>
    : inner;
};

function ThemeAllocation({ s }) {
  // monochrome peach opacity tiers, ordered by weight (terminal-restrained, theme-safe)
  const tiers = [1, .82, .66, .52, .40, .30, .22];
  const [hover, setHover] = useState(null);
  return (
    <Panel delay={.05}>
      <Eyebrow note={`${s.themes.length} themes · ${usd(s.investedMV,0)} invested`}>Where the money sleeps — allocation by theme</Eyebrow>

      <div style={{ display:"flex", width:"100%", height:34, borderRadius:8, overflow:"hidden", gap:2, background:"var(--inner-bg)" }}>
        {s.themes.map((th,i)=>(
          <div key={th.key} className="seg-grow"
            onMouseEnter={(e)=>{setHover(th.key); showTip(e, THEMES[th.key].label, `${th.wt.toFixed(1)}% of the book · ${usd(th.mv,0)} · ${th.n} holdings · ${pct(th.ret)} unrealized. ${THEMES[th.key].blurb}`);}}
            onMouseMove={moveTip} onMouseLeave={()=>{setHover(null);hideTip();}}
            style={{ width:th.wt+"%", background:ACCENT, opacity: hover&&hover!==th.key?.18:tiers[i], cursor:"help",
                     animationDelay:(i*.05)+"s", transition:"opacity .15s", minWidth:3 }} />

        {s.themes.map((th,i)=>(
          <div key={th.key} onMouseEnter={()=>setHover(th.key)} onMouseLeave={()=>setHover(null)}
            style={{ border:"1px solid var(--bd)", borderRadius:10, padding:"12px 13px",
                     background: hover===th.key ? "var(--row-hl)" : "transparent", transition:"background .12s" }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
              <span style={{ width:9, height:9, borderRadius:2, background:ACCENT, opacity:tiers[i], flexShrink:0 }} />
              <span style={{ fontSize:11, fontWeight:700, color:"var(--tx1)", letterSpacing:"0.04em" }}>{THEMES[th.key].label}</span>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline" }}>
              <span style={{ fontSize:21, fontWeight:700, fontFamily:FONT_MONO, color:"var(--tx1)" }}>{th.wt.toFixed(1)}<span style={{fontSize:12,color:"var(--tx5)"}}>%</span></span>
              <span style={{ fontSize:11, fontWeight:700, color:pc(th.up) }}>{pct(th.ret)}</span>
            </div>
            <div style={{ fontSize:9.5, color:"var(--tx5)", marginTop:5, display:"flex", justifyContent:"space-between" }}>
              <span>{usd(th.mv,0)}</span><span>{th.names.join(" · ")}</span>
            </div>
          </div>
        ))}
      </div>
    </Panel>
  );
}

function ConvictionConcentration({ s }) {
  const coveredPct = s.coveredMV/s.investedMV*100;
  const next5 = s.top10 - s.top5;
  const rest  = s.investedMV - s.top10;
  const seg = (v,fill,op) => <div style={{ width:(v/s.investedMV*100)+"%", background:fill, opacity:op }} className="seg-grow" />;
  return (
    <Panel delay={.1}>
      <Eyebrow>Conviction &amp; concentration — the long-game checks</Eyebrow>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:22 }} className="resp-grid-3">

        <div>
          <div style={{ fontSize:11, color:"var(--tx2)", marginBottom:10, lineHeight:1.5 }}>
            <Tip title="THESIS COVERAGE" body="How much of your invested capital is backed by a documented, falsifiable thesis (with a kill-switch). Uncovered size is where conviction is implicit — fine for an index fund, riskier for a single stock.">
              <b style={{color:"var(--tx1)"}}>Thesis coverage</b></Tip> — {coveredPct.toFixed(0)}% of dollars written up
          </div>
          <div style={{ display:"flex", height:26, borderRadius:7, overflow:"hidden", background:"var(--inner-bg)", border:"1px solid var(--bd)" }}>
            <div className="seg-grow" style={{ width:coveredPct+"%", background:ACCENT, display:"flex", alignItems:"center", paddingLeft:9 }}>
              <span style={{ fontSize:9.5, fontWeight:700, color:"var(--page-bg)" }}>WRITTEN {coveredPct.toFixed(0)}%</span>
            </div>
            <div className="seg-grow" style={{ width:(100-coveredPct)+"%", background:"var(--ghost)", display:"flex", alignItems:"center", justifyContent:"flex-end", paddingRight:9, animationDelay:".12s" }}>
              <span style={{ fontSize:9.5, fontWeight:700, color:"var(--tx4)" }}>UNWRITTEN {(100-coveredPct).toFixed(0)}%</span>
            </div>
          </div>
          <div style={{ fontSize:10, color:"var(--tx5)", marginTop:9, lineHeight:1.6 }}>
            {s.coveredN} of {POS.length} names carry a TH3SIS. The unwritten {(100-coveredPct).toFixed(0)}% — led by <b style={{color:"var(--tx3)"}}>{s.bigUnwritten.t}</b> at {usd(s.bigUnwritten.mv,0)} — is implicit conviction.
          </div>
        </div>

        <div>
          <div style={{ fontSize:11, color:"var(--tx2)", marginBottom:10, lineHeight:1.5 }}>
            <Tip title="CONCENTRATION" body="What fraction of the book sits in your biggest bets. Concentration is how fortunes are made and unmade — it's neither good nor bad, but it must be intentional, not accidental.">
              <b style={{color:"var(--tx1)"}}>Concentration</b></Tip> — top 5 = {(s.top5/s.investedMV*100).toFixed(0)}%, top 10 = {(s.top10/s.investedMV*100).toFixed(0)}%
          </div>
          <div style={{ display:"flex", height:26, borderRadius:7, overflow:"hidden", background:"var(--inner-bg)", border:"1px solid var(--bd)" }}>
            {seg(s.top5, ACCENT, 1)}
            {seg(next5, ACCENT, .5)}
            {seg(rest, "var(--ghost)", 1)}
          </div>
          <div style={{ display:"flex", gap:16, fontSize:10, color:"var(--tx5)", marginTop:9 }}>
            <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:ACCENT,marginRight:5}}/>Top 5 · {usd(s.top5,0)}</span>
            <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:ACCENT,opacity:.5,marginRight:5}}/>Next 5</span>
            <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:"var(--ghost)",marginRight:5}}/>Tail {POS.length-10}</span>
          </div>
        </div>
      </div>
    </Panel>
  );
}

function Scoreboard({ s }) {
  const sorted = [...POS].sort((a,b)=>b.up-a.up);
  const maxAbs = Math.max(...POS.map(p=>Math.abs(p.up)));
  return (
    <Panel delay={.12}>
      <Eyebrow note="unrealized · sorted best → worst">The scoreboard — paper P&L by position</Eyebrow>
      <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
        {sorted.map(p=>{
          const w = Math.abs(p.up)/maxAbs*50; // % of half-width
          const gain = p.up>=0;
          return (
            <div key={p.t} className="row-hover" style={{ display:"flex", alignItems:"center", gap:8, padding:"2px 6px", borderRadius:5,
                 cursor:"help" }}
                 onMouseEnter={(e)=>showTip(e, `${p.t} · ${p.name}`, `${usd(p.up,0)} unrealized (${pct(p.ret)}). Cost ${usd(p.avg)} → now ${usd(p.px)}. Position ${usd(p.mv,0)}.`, pc(p.up))}
                 onMouseMove={moveTip} onMouseLeave={hideTip}>
              <span style={{ width:46, fontSize:10.5, fontWeight:700, color:"var(--tx2)", letterSpacing:"0.06em", flexShrink:0 }}>{p.t}</span>
              <div style={{ position:"relative", flex:1, height:15, display:"flex", alignItems:"center" }}>
                <div style={{ position:"absolute", left:"50%", top:0, bottom:0, width:1, background:"var(--bd2)" }} />
                <div className="seg-grow" style={{ position:"absolute", height:11, borderRadius:3,
                  background: gain?GAIN:LOSS, opacity:.85,
                  left: gain?"50%":`calc(50% - ${w}%)`, width:w+"%",
                  transformOrigin: gain?"left center":"right center" }} />
              </div>
              <span style={{ width:74, textAlign:"right", fontSize:10.5, fontWeight:700, color:pc(p.up), flexShrink:0 }}>{usd(p.up,0)}</span>
              <span className="hide-narrow" style={{ width:52, textAlign:"right", fontSize:10, color:"var(--tx5)", flexShrink:0 }}>{pct(p.ret,0)}</span>
            </div>
          );
        })}
      </div>
    </Panel>
  );
}

function PositionsTable({ s, showDaily }) {
  const [sort, setSort] = useState({ key:"mv", dir:-1 });
  const rows = useMemo(()=>{
    const r=[...POS];
    r.sort((a,b)=>{
      let av=a[sort.key], bv=b[sort.key];
      if(typeof av==="string") return av.localeCompare(bv)*sort.dir;
      return (av-bv)*sort.dir;
    });
    return r;
  },[sort]);
  const click = (key)=> setSort(s => s.key===key ? {key, dir:-s.dir} : {key, dir:key==="t"||key==="theme"?1:-1});
  const arrow = (key)=> sort.key===key ? (sort.dir<0?" ▾":" ▴") : "";
  const H = ({k:key, children, align="right", w}) => (
    <th className="sort-h" onClick={()=>click(key)} style={{ textAlign:align, padding:"0 10px 9px", fontSize:9, letterSpacing:"0.12em",
        color: sort.key===key?ACCENT:"var(--tx5)", fontWeight:700, whiteSpace:"nowrap", width:w }}>{children}{arrow(key)}</th>
  );
  return (
    <Panel delay={.14} style={{ padding:"20px 14px 14px", overflowX:"auto" }}>
      <div style={{ padding:"0 6px" }}><Eyebrow note="click any header to sort">Every position</Eyebrow></div>
      <table style={{ width:"100%", borderCollapse:"collapse", minWidth:680 }}>
        <thead><tr style={{ borderBottom:"1px solid var(--bd)" }}>
          <H k="t" align="left">Ticker</H>
          <th className="hide-narrow" style={{ textAlign:"left", padding:"0 10px 9px", fontSize:9, letterSpacing:"0.12em", color:"var(--tx5)", fontWeight:700 }}>Theme</th>
          <H k="mv">Mkt Val</H>
          <H k="mv">Weight</H>
          <H k="avg">Avg Cost</H>
          <H k="px">Last</H>
          <H k="up">P&L $</H>
          <H k="ret">P&L %</H>
          {showDaily && <H k="day">Today</H>}
          <th style={{ textAlign:"center", padding:"0 8px 9px", fontSize:9, letterSpacing:"0.1em", color:"var(--tx5)", fontWeight:700 }}>TH3SIS</th>
        </tr></thead>
        <tbody>
          {rows.map(p=>(
            <tr key={p.t} className="row-hover" style={{ borderBottom:"1px solid var(--bd)" }}>
              <td style={{ padding:"9px 10px", textAlign:"left" }}>
                <div style={{ fontSize:11.5, fontWeight:700, color:"var(--tx1)", letterSpacing:"0.05em" }}>{p.t}</div>
                <div style={{ fontSize:9, color:"var(--tx5)", marginTop:1 }}>{p.name}</div>
              </td>
              <td className="hide-narrow" style={{ padding:"9px 10px", textAlign:"left" }}>
                <span style={{ fontSize:9, color:"var(--tx3)", border:"1px solid var(--bd2)", borderRadius:20, padding:"2px 9px", whiteSpace:"nowrap" }}>{THEMES[p.theme].short}</span>
              </td>
              <td style={{ padding:"9px 10px", textAlign:"right", fontSize:11, color:"var(--tx1)", fontWeight:600 }}>{usd(p.mv,0)}</td>
              <td style={{ padding:"9px 10px", textAlign:"right", fontSize:10.5, color:"var(--tx3)" }}>{(p.mv/s.investedMV*100).toFixed(1)}%</td>
              <td style={{ padding:"9px 10px", textAlign:"right", fontSize:10.5, color:"var(--tx4)" }}>{usd(p.avg)}</td>
              <td style={{ padding:"9px 10px", textAlign:"right", fontSize:10.5, color:"var(--tx2)" }}>{usd(p.px)}</td>
              <td style={{ padding:"9px 10px", textAlign:"right", fontSize:11, fontWeight:700, color:pc(p.up) }}>{usd(p.up,0)}</td>
              <td style={{ padding:"9px 10px", textAlign:"right", fontSize:10.5, fontWeight:700, color:pc(p.up) }}>{pct(p.ret)}</td>
              {showDaily && <td style={{ padding:"9px 10px", textAlign:"right", fontSize:10, color:pc(p.day) }}>{usd(p.day,0)}</td>}
              <td style={{ padding:"9px 8px", textAlign:"center" }}>
                {p.thesis
                  ? <span title="Documented thesis on file" style={{ color:ACCENT, fontSize:12 }}>◆</span>
                  : <span title="No written thesis" style={{ color:"var(--tx6)", fontSize:12 }}>◇</span>}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </Panel>
  );
}

function Attention({ s }) {
  const cards = [
    { tag:"DEEPEST DRAWDOWN", color:LOSS, head:`${s.worst.t} · ${pct(s.worst.ret,0)}`,
      body:`${s.worst.name} is your worst holding from cost (${usd(s.worst.up,0)}). ${s.worst.thesis?"You have a thesis — re-read the kill-switch and decide if it tripped.":"No written thesis. Decide: durable compounder on sale, or a value trap you're anchoring to?"}` },
    { tag:"WEAKEST THEME", color:WARN, head:`${THEMES[s.weakTheme.key].short} · ${pct(s.weakTheme.ret)}`,
      body:`${THEMES[s.weakTheme.key].label} is ${s.weakTheme.wt.toFixed(0)}% of the book (${usd(s.weakTheme.mv,0)}) and your weakest theme. Large weight + weak performance is the combination worth interrogating first.` },
    { tag:"BIGGEST UNWRITTEN BET", color:ACCENT, head:`${s.bigUnwritten.t} · ${usd(s.bigUnwritten.mv,0)}`,
      body:`Your largest position with no documented thesis (${(s.bigUnwritten.mv/s.investedMV*100).toFixed(1)}% of the book). Size without a written, falsifiable case is the first gap a 5-year holder should close.` },
    { tag:"DRY POWDER", color:WARN, head:`${s.cashPct.toFixed(1)}% · ${usd(ACCT.cash,0)}`,
      body:`Cash is thin. The whole point of a long horizon is buying quality during panics — but that needs ammo. Consider where new savings (or trims of weak theses) rebuild the reserve.` },
  ];
  return (
    <Panel delay={.16}>
      <Eyebrow>What a long-term holder should look at next</Eyebrow>
      <div className="resp-grid-4" style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12 }}>
        {cards.map((c,i)=>(
          <div key={i} style={{ border:"1px solid var(--bd)", borderLeft:`2px solid ${c.color}`, borderRadius:9, padding:"13px 14px", background:"var(--inner-bg)" }}>
            <div style={{ fontSize:8.5, letterSpacing:"0.16em", color:"var(--tx5)" }}>{c.tag}</div>
            <div style={{ fontSize:15, fontWeight:700, color:c.color, margin:"7px 0 8px", fontFamily:FONT_MONO }}>{c.head}</div>
            <div style={{ fontSize:10, color:"var(--tx3)", lineHeight:1.6 }}>{c.body}</div>
          </div>
        ))}
      </div>
    </Panel>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
function App() {
  const s = useStats();
  const [showDaily, setShowDaily] = useState(false);
  return (
    <div style={{ width:"100%", maxWidth:1180, margin:"0 auto", padding:"26px 22px 60px", fontFamily:FONT_MONO }}>

      {/* header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:20, flexWrap:"wrap", gap:14 }}>
        <div>
          <div style={{ fontFamily:FONT_DISPLAY, fontSize:26, fontWeight:600, letterSpacing:"0.32em", color:"var(--tx1)" }}>
            TH<span style={{color:ACCENT}}>3</span>SIS · FOLIO
          </div>
          <div style={{ fontSize:9.5, color:"var(--tx5)", letterSpacing:"0.08em", marginTop:7 }}>
            live positions · Interactive Brokers · built for a 5-year horizon — hover anything for plain-english context
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <button className="pill" onClick={()=>setShowDaily(v=>!v)}
            style={{ background: showDaily?ACCENT:"transparent", color: showDaily?"var(--page-bg)":"var(--tx4)",
                     border:"1px solid "+(showDaily?ACCENT:"var(--bd2)"), borderRadius:20, padding:"6px 13px",
                     fontFamily:FONT_MONO, fontSize:9.5, fontWeight:700, letterSpacing:"0.1em" }}>
            {showDaily ? "● DAILY NOISE: ON" : "○ DAILY NOISE: OFF"}
          </button>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:9, color:"var(--tx5)", letterSpacing:"0.14em" }}>AS OF</div>
            <div style={{ fontSize:12, color:"var(--tx2)", fontWeight:700 }}>{ASOF}</div>
          </div>
        </div>
      </div>

      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <Hero s={s} showDaily={showDaily} />
        <ThemeAllocation s={s} />
        <ConvictionConcentration s={s} />
        <Scoreboard s={s} />
        <PositionsTable s={s} showDaily={showDaily} />
        <Attention s={s} />
      </div>

      <div style={{ marginTop:22, padding:"14px 18px", border:"1px dashed var(--bd2)", borderRadius:10, fontSize:9.5, color:"var(--tx5)", lineHeight:1.7 }}>
        ⚠ <b style={{color:"var(--tx4)"}}>Not financial advice.</b> A static snapshot of an IBKR account as of {ASOF} — prices, weights and P&L drift every session; re-pull before acting.
        Returns are unrealized and measured on cost basis, not time-weighted. Daily P&L is muted by default on purpose: over a 5-year horizon it's noise, not signal.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
