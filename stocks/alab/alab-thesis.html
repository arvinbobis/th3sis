let tipEl = null;
function ensureTip() {
  if (!tipEl) { tipEl = document.createElement("div"); tipEl.id = "tip-box"; document.body.appendChild(tipEl); }
  return tipEl;
}
function showTip(e, title, body, note, color) {
  const el = ensureTip();
  el.innerHTML = `<div class="tt" style="color:${color||'var(--blue-soft)'}">${title}</div><div class="tb">${body}</div>${note?`<div class="tn">${note}</div>`:""}`;
  el.classList.add("on"); moveTip(e);
}
function moveTip(e) {
  const el = ensureTip(); const pad = 16;
  let x = e.clientX + pad, y = e.clientY + pad;
  const r = el.getBoundingClientRect();
  if (x + r.width > window.innerWidth - 8) x = e.clientX - r.width - pad;
  if (y + r.height > window.innerHeight - 8) y = e.clientY - r.height - pad;
  el.style.left = x + "px"; el.style.top = y + "px";
}

// ── Live-price config (prototype) ─────────────────────────────────────────────
//   enabled:false → behaves exactly like the old static file (uses FALLBACK_PRICE only).
//   Default provider "yahoo" is keyless: it reads Yahoo Finance's chart endpoint through

//   so any failure silently falls back to FALLBACK_PRICE. For a first-party, dependency-free
//   feed set provider:"finnhub" and paste a free token from finnhub.io (CORS-friendly).
//   Nothing is cached (the no-browser-storage rule holds): each load fetches once or falls back.
const LIVE_PRICE = {
  enabled: true,
  symbol: "ALAB",
  provider: "yahoo",                                  // "yahoo" (keyless, proxied) | "finnhub"
  corsProxy: "https://api.allorigins.win/get?url=",   // must return {contents:"<body>"} + ACAO:*

// Resolves to a clean number, or null on ANY problem. Never throws — null ⇒ keep fallback.
async function fetchLivePrice() {
  if (!LIVE_PRICE.enabled) return null;
  try {
    let price = null;
    if (LIVE_PRICE.provider === "finnhub" && LIVE_PRICE.finnhubToken) {
      const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${LIVE_PRICE.symbol}&token=${LIVE_PRICE.finnhubToken}`);
      if (!r.ok) return null;
      price = Number((await r.json()).c);               // c = current price
    } else {
      // Yahoo chart endpoint via CORS proxy. allorigins /get wraps the body in {contents:"..."}.
      const yahoo = `https://query1.finance.yahoo.com/v8/finance/chart/${LIVE_PRICE.symbol}?interval=1d&range=1d`;
      const r = await fetch(LIVE_PRICE.corsProxy + encodeURIComponent(yahoo));
      if (!r.ok) return null;
      const inner = JSON.parse((await r.json()).contents);
      price = Number(inner.chart.result[0].meta.regularMarketPrice);
    }
    // Sanity gate: reject NaN / non-positive / wildly-off values (bad parse, wrong symbol,
    // un-split-adjusted feed). Loose bounds — a genuine move still passes; only garbage is
    // rejected so a broken feed can never corrupt the dashboard's math.
    if (!Number.isFinite(price) || price <= 0) return null;
    if (price < FALLBACK_PRICE * 0.2 || price > FALLBACK_PRICE * 5) return null;
    return Math.round(price * 100) / 100;
  } catch (_) {
    return null;   // offline / CORS / DNS / parse all land here → fallback
  }
}

// Chart geometry
const PRICE_MIN = 150, PRICE_MAX = 720;
const CH_W = 760, CH_H = 420, PAD_L = 8, PAD_R = 56, PAD_T = 18, PAD_B = 34;
const plotW = CH_W - PAD_L - PAD_R, plotH = CH_H - PAD_T - PAD_B;
const yOf = (p) => PAD_T + (1 - (p - PRICE_MIN) / (PRICE_MAX - PRICE_MIN)) * plotH;

// ── Fan Chart ──────────────────────────────────────────────────────────────
function FanChart({ c }) {
  const nHist = HISTORY.length;
  const histPts = HISTORY.map((d, i) => [PAD_L + (i / (nHist + FUTURE_Q.length - 1)) * plotW, yOf(d.p)]);
  const nowX = histPts[histPts.length - 1][0];
  const nowY = histPts[histPts.length - 1][1];
  const fwdN = FUTURE_Q.length;
  const fwdX = (i) => nowX + ((i + 1) / fwdN) * (CH_W - PAD_R - nowX);
  const end = PROJ_END[c.key];
  const mid = FUTURE_Q.map((_, i) => {
    const t = (i + 1) / fwdN;
    return [fwdX(i), yOf(NOW_PRICE + (end - NOW_PRICE) * t)];
  });
  const spread = (i) => 28 + i * 28;
  const upper = mid.map(([x, y], i) => [x, y - spread(i)]);
  const lower = mid.map(([x, y], i) => [x, y + spread(i)]);
  const bandPath = `M ${nowX} ${nowY} ` + upper.map(([x, y]) => `L ${x} ${y}`).join(" ") + " " +
    lower.slice().reverse().map(([x, y]) => `L ${x} ${y}`).join(" ") + " Z";
  const midPath = `M ${nowX} ${nowY} ` + mid.map(([x, y]) => `L ${x} ${y}`).join(" ");
  const histPath = "M " + histPts.map(([x, y]) => `${x} ${y}`).join(" L ");
  const gridP = [650, 550, 450, 350, 250];

  return (
    <svg viewBox={`0 0 ${CH_W} ${CH_H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      <defs>
        <linearGradient id={`fan-${c.key}`} x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor={c.accent} stopOpacity="0.05" />
          <stop offset="100%" stopColor={c.accent} stopOpacity="0.28" />
        </linearGradient>
        <filter id="softglow"><feGaussianBlur stdDeviation="2.2" /></filter>
      </defs>
      {gridP.map((p) => (
        <g key={p}>
          <line x1={PAD_L} y1={yOf(p)} x2={CH_W - PAD_R} y2={yOf(p)} stroke="var(--bd2)" strokeWidth="1" strokeDasharray="1 5" />
          <text x={CH_W - PAD_R + 8} y={yOf(p) + 3} fill="var(--tx5)" fontSize="11" fontFamily={FONT_MONO}>${p}</text>
        </g>
      ))}
      <line x1={nowX} y1={PAD_T} x2={nowX} y2={CH_H - PAD_B} stroke="#46aad9" strokeWidth="1" strokeDasharray="3 4" opacity="0.7" />
      <path d={bandPath} fill={`url(#fan-${c.key})`} {...tipSvg(
        "The forecast 'cone'", "This shaded fan shows the range of where the price could go in this scenario over the next year. It gets wider further out because the future is less certain. The dashed line through the middle is the most-likely path.",
        "Wider = more uncertainty.", c.accent, "fan-band")} />
      <path d={midPath} fill="none" stroke={c.accent} strokeWidth="2" strokeDasharray="6 5" className="fan-mid" style={{ filter: "url(#softglow)" }} />
      <path d={histPath} fill="none" stroke="var(--tx1)" strokeWidth="2" {...tipSvg(
        "Price history", "The solid white line is ALAB's actual share price since Q1 FY2025. Astera Labs IPO'd in March 2024 at $36/share; no stock split has occurred. The big run from ~$70 to $300+ was driven almost entirely by the Scorpio/Leo connectivity ramp and repeated upside revenue prints.",
        "This part already happened — it's real, not a forecast.", "var(--tx1)", "hist-line")} />
      {HISTORY.map((d, i) => (
        <g key={i}>
          <circle cx={histPts[i][0]} cy={histPts[i][1]} r={i === nHist - 1 ? 4.5 : 3}
            fill={i === nHist - 1 ? "#46aad9" : "var(--panel-bg)"}
            stroke={i === nHist - 1 ? "var(--title)" : "var(--tx3)"} strokeWidth="1.5"
            {...tipSvg(i === nHist - 1 ? "Where we are today" : d.q,
              i === nHist - 1 ? `ALAB trades around $${NOW_PRICE} right now (post Q1 FY2026 earnings). Q1 printed $308.4M revenue (+93% YoY, a beat), and Q2 guidance of $355–365M came in above consensus. Everything left of this dot is history; everything right is forecast.`
                : `At the end of ${d.q}, ALAB was around $${d.p}.`,
              null, i === nHist - 1 ? "var(--blue-soft)" : "var(--tx1)")} />
          {i === nHist - 1 && <text x={histPts[i][0] - 6} y={histPts[i][1] - 12} fill="var(--blue-soft)" fontSize="11" fontFamily={FONT_MONO} textAnchor="end">NOW ${NOW_PRICE}</text>}
        </g>
      ))}
      {mid.map(([x, y], i) => (
        <g key={i} className="diamond" style={{ animationDelay: `${0.5 + i * 0.12}s` }}>
          <rect x={x - 4} y={y - 4} width="8" height="8" transform={`rotate(45 ${x} ${y})`}
            fill="var(--panel-bg)" stroke={c.accent} strokeWidth="1.6"
            {...tipSvg(`Forecast: ${FUTURE_Q[i]}`,
              `A milestone on the most-likely price path for the ${c.label} scenario. Each diamond is roughly one quarter further into the future.`,
              "Hover the shaded cone around it to see the uncertainty range.", c.accent)} />
          <text x={x} y={y - 12} fill={c.accent} fontSize="10.5" fontFamily={FONT_MONO} textAnchor="middle">{FUTURE_Q[i]}</text>
        </g>
      ))}
      {["2025", "2026", "2027"].map((yr, i) => (
        <text key={yr} x={PAD_L + (i / 2) * plotW} y={CH_H - 10} fill="var(--tx5)" fontSize="11" fontFamily={FONT_MONO}>{yr}</text>
      ))}
    </svg>
  );
}

function tagColor(tag) {
  if (tag === "BEAT")  return "#66b278";
  if (tag === "MATCH") return "#c59542";
  if (tag === "MISS")  return "#dd817a";
  return "var(--tx4)";
}

function Segmented({ active, setActive, small }) {
  const explain = {
    bear: ["The pessimistic scenario", "Click to see what ALAB looks like if the Scorpio X-Series ramp slips, a hyperscaler standardizes on an in-house or competing connectivity stack, or 2026 growth decelerates well below the ~81% guide. The multiple compresses hard on a hyper-growth name repriced as merely growing. Price would likely fall to the $160–210 range."],
    base: ["The most-likely scenario", "Click for the base view — Scorpio's X-Series fabric switch becomes the largest product line on schedule, Leo CXL keeps ramping on Azure, and full-year growth holds near the ~81% guide. Price stays in the $300–390 range — modestly below where the stock trades today."],
    bull: ["The optimistic scenario", "Click to see the upside — Scorpio beats its ramp, a second or third hyperscaler scale-up design win is disclosed, and Leo CXL inflects, pushing 2026 growth above ~81% and lifting 2027 estimates. Price could reach $450–560."],
  };
  return (
    <div style={{ display: "flex", gap: 5 }}>
      {Object.values(CASES).map((cc) => {
        const on = active === cc.key;
        return (
          <div key={cc.key} onClick={() => setActive(cc.key)}
            onMouseEnter={(e) => showTip(e, explain[cc.key][0], explain[cc.key][1], "Tip: click to switch the whole dashboard to this scenario.", cc.accent)}
            onMouseMove={moveTip} onMouseLeave={hideTip}
            style={{
              padding: small ? "3px 12px" : "4px 14px", borderRadius: 4, fontSize: 11,
              fontWeight: 700, letterSpacing: "0.08em", cursor: "pointer",
              border: `1px solid ${on ? cc.accent : "var(--bd)"}`, color: on ? "var(--page-bg)" : cc.accent,
              background: on ? cc.accent : "transparent", boxShadow: on ? `0 0 16px ${cc.glow}` : "none",
              transition: "all .18s ease",
            }}>{cc.label}</div>
        );
      })}
    </div>
  );
}

// ── Reversion Clock ────────────────────────────────────────────────────────
function ReversionClock() {
  const dislocationDate = new Date(DISLOCATION_DATE);
  const today = new Date();
  const elapsed = Math.round((today - dislocationDate) / 86400000);
  const pct = Math.min(100, (elapsed / REVERSION_PRECEDENT_DAYS) * 100);
  const trough = REVERSION_TROUGH, baseFloor = REVERSION_BASEFLOOR, now = NOW_PRICE;
  const recPct = Math.min(138, Math.max(0, ((now - trough) / (baseFloor - trough)) * 100));
  return (
    <div style={{ marginTop: 12, padding: "12px 14px", background: "var(--panel-bg)", border: "1px solid var(--bd)", borderRadius: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
        <div style={{ fontSize: 10.5, letterSpacing: "0.14em", color: "var(--tx5)" }}>REVERSION CLOCK · APR 2025 DISLOCATION</div>
        <div style={{ fontSize: 11, color: "var(--tx3)" }}><span style={{ color: "#c59542", fontWeight: 700 }}>{elapsed}d</span> elapsed / ~{REVERSION_PRECEDENT_DAYS}d precedent</div>
      </div>
      <div style={{ marginBottom: 4, fontSize: 9.5, color: "var(--tx5)" }}>TIME SINCE DISLOCATION ({new Date(DISLOCATION_DATE).toLocaleDateString("en-US",{month:"short",day:"numeric"})})</div>
      <div {...tip("How much time has passed",
        "In April 2025, the broad tariff selloff that hit every AI-semiconductor name pushed ALAB down toward its post-IPO lows (~$90). This bar shows how far along the stock is in the recovery cycle vs. that ~60-day precedent — ALAB has since recovered well past this floor, but it's the most recent real fear-driven dislocation on record for a stock this young.",
        "Filling up = getting closer to when recovery happened last time.", "#c59542")}
        style={{ position: "relative", height: 14, background: "var(--deep-bg)", borderRadius: 7, overflow: "hidden", border: "1px solid #1c2230" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${Math.min(100,pct)}%`, background: "linear-gradient(90deg,#dd817a,#c59542)", borderRadius: 7 }} />
        <div style={{ position: "absolute", right: 0, top: -3, bottom: -3, width: 2, background: "#66b278" }} />
        <div style={{ position: "absolute", left: `${Math.min(100,pct)}%`, top: "50%", width: 8, height: 8, borderRadius: "50%", background: "var(--title)", transform: "translate(-50%,-50%)", boxShadow: "0 0 8px #fff", pointerEvents: "none" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "var(--tx5)", marginTop: 3 }}>

function TrackRecord() {
  const W = 1000, H = 300, pl = 44, pr = 70, pt = 20, pb = 40;
  const pw = W - pl - pr, ph = H - pt - pb;
  const y = (p) => pt + (1 - (p - TRACK_PRICE_MIN) / (TRACK_PRICE_MAX - TRACK_PRICE_MIN)) * ph;
  const x = (i) => pl + (TRACK.length === 1 ? pw / 2 : (i / (TRACK.length - 1)) * pw);
  const grid = [500, 400, 300, 200, 100];
  const pathPts = TRACK.map((t, i) => [x(i), y(t.post)]);
  const linePath = "M " + pathPts.map(([px, py]) => `${px} ${py}`).join(" L ");
  const hits = TRACK.filter((t) => t.landed.includes("base") || t.landed.includes("bull")).length;
  return (
    <div style={{ background: "var(--inner-bg)", padding: "16px 18px", borderTop: "1px solid var(--bd)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>

          <span style={{ background: "var(--bd)", padding: "2px 6px", borderRadius: 3, color: "var(--tx1)", marginRight: 8 }}>TR · BACKTEST</span>
          THESIS TRACK RECORD · RECONSTRUCTED BANDS vs ACTUAL PRICE
        </div>
        <div style={{ fontSize: 11, color: "var(--tx4)" }}>BASE-OR-BETTER LANDINGS: <span style={{ color: "#66b278", fontWeight: 700 }}>{hits}/{TRACK.length}</span></div>
      </div>
      <div style={{ fontSize: 10.5, color: "var(--tx5)", marginBottom: 10 }}>
        Each column = one earnings date. Stacked zones are the bear / base / bull bands as they would have been drawn at that time. The line is where price actually traded after. All prices post-split.
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
        {grid.map((p) => (
          <g key={p}>
            <line x1={pl} y1={y(p)} x2={W - pr} y2={y(p)} stroke="var(--bd)" strokeWidth="1" strokeDasharray="1 5" />
            <text x={W - pr + 8} y={y(p) + 3} fill="var(--tx5)" fontSize="11" fontFamily={FONT_MONO}>${p}</text>
          </g>
        ))}
        {TRACK.map((t, i) => {
          const cx = x(i), bw = 46;
          const landWord = t.landed.includes("bull") ? "the optimistic zone" : t.landed.includes("base") ? "the middle zone" : "the pessimistic zone";
          const reactWord = t.reaction.includes("−") || t.reaction.includes("-") ? "the stock FELL after this report" : "the stock ROSE after this report";
          const seg = (range, color) => (
            <rect x={cx - bw / 2} y={y(range[1])} width={bw} height={Math.max(2, y(range[0]) - y(range[1]))}
              fill={color} opacity={t.conf === "med" ? 0.32 : 0.5} rx="2" style={{ animation: `fadeUp .5s ease ${i * 0.08}s both` }}
              {...tipSvg(`${t.q} earnings`,
                `At this earnings date, here's the scenario band (red=bear, yellow=base, green=bull). In reality, ${reactWord} and the price ended up in ${landWord} (~$${t.post}).`,
                t.conf === "med" ? "Marked 'lower-confidence' — bands reconstructed in hindsight." : null,
                color.includes("63,208") ? "#66b278" : color.includes("224,168") ? "#c59542" : "#dd817a")} />
          );
          return (
            <g key={t.q}>
              {seg(t.bull, "rgba(63,208,122,0.55)")}
              {seg(t.base, "rgba(224,168,59,0.5)")}
              {seg(t.bear, "rgba(241,86,75,0.5)")}
              <text x={cx} y={H - 24} fill="var(--tx3)" fontSize="11" fontFamily={FONT_MONO} textAnchor="middle">{t.q}</text>
              <text x={cx} y={H - 11} fill={t.conf === "med" ? "var(--tx5)" : "var(--tx8)"} fontSize="8.5" fontFamily={FONT_MONO} textAnchor="middle">
                {t.conf === "med" ? "lower-conf" : t.reaction.includes("-") ? "↓ dislocation" : ""}
              </text>
            </g>
          );
        })}
        <path d={linePath} fill="none" stroke="var(--track-line)" strokeWidth="2.2" className="track-line" style={{ filter: "drop-shadow(0 0 4px rgba(221,227,238,0.4))" }} />
        {TRACK.map((t, i) => {
          const isLast = i === TRACK.length - 1;
          return (
            <g key={t.q} style={{ animation: `pop .4s cubic-bezier(.2,1.4,.4,1) ${0.3 + i * 0.08}s both` }}>
              <circle cx={x(i)} cy={y(t.post)} r={isLast ? 6 : 4} fill={isLast ? "#46aad9" : "var(--panel-bg)"} stroke="var(--title)" strokeWidth={isLast ? 2 : 1.5}
                {...tipSvg(isLast ? "Most recent quarter" : `${t.q}: actual price`,
                  isLast ? `After Q1 FY2026 earnings (May 2026), ALAB traded around $${t.post} — a beat-and-raise print (revenue +93% YoY, Q2 guide above consensus). Next dot: Q2 FY2026 earnings (~Aug 2026).`
                    : `After ${t.q} earnings, ALAB actually traded around $${t.post}. Compare this dot to the colored bars behind it to see if the predicted range was right.`,
                  null, isLast ? "var(--blue-soft)" : "var(--tx1)")} />
              {isLast && <text x={x(i)} y={y(t.post) - 14} fill="var(--blue-soft)" fontSize="11" fontFamily={FONT_MONO} textAnchor="middle" fontWeight="700">NOW ${t.post}</text>}
            </g>
          );
        })}
      </svg>
      <div style={{ marginTop: 12, padding: "10px 12px", background: "var(--panel-bg)", border: "1px solid var(--bd)", borderRadius: 8 }}>
        <div style={{ fontSize: 10.5, letterSpacing: "0.12em", color: "var(--tx5)", marginBottom: 6 }}>READ-OUT</div>
        <div style={{ fontSize: 12, color: "var(--tx2)", lineHeight: 1.6 }}>
          Price has tracked <span style={{ color: "#66b278", fontWeight: 700 }}>base-or-better in {hits} of {TRACK.length} quarters</span> since Q4 FY2024.
          The only bear landing was Q2 FY2025 ($242), which coincided with the 52-week low — a macro / valuation pause, not a business miss.
          The Q4 FY2025 catalyst was management's $100B FY2027 AI revenue target. Q2 FY2026 printed $10.8B AI revenue (beat) but Q3 guided $16B vs. ~$17.2B whisper — stock dropped ~15% to <span style={{ color: "var(--blue-soft)", fontWeight: 700 }}>${NOW_PRICE}</span>. Next directional catalyst: <span style={{ color: "#c59542", fontWeight: 700 }}>Q3 FY2026 earnings (~Sep 2026)</span> — AI revenue vs. the $16B guide.
        </div>
      </div>
      <ReversionClock />
      <div style={{ fontSize: 9.5, color: "var(--tx7)", marginTop: 8, lineHeight: 1.5 }}>
        ⚠ Bands are reconstructed now, anchored to each date's forward EPS &amp; multiple regime — not archived in real time. Treat levels as directional, especially "lower-conf" quarters. Post-split prices throughout (10:1 split July 2024). Customer concentration within the 6 XPU partners is undisclosed — treat AI revenue bands as wider than they appear.
      </div>
    </div>
  );
}

// Generic localStorage loader — clears stale data on schema version mismatch
function loadStorage(key, version, fallback) {
  try {
    const d = JSON.parse(localStorage.getItem(key));
    if (!d || d.version !== version) { localStorage.removeItem(key); return fallback; }
    return d;
  } catch { return fallback; }
}

  const fcfYield = ((v.fcf_ntm_b * 1e9) / (NOW_PRICE * v.shares_b * 1e9) * 100).toFixed(1);
  const bearLo   = parseInt(CASES.bear.target12.split("—")[0].replace(/[$,\s]/g,""));
  const bullHi   = parseInt(CASES.bull.target12.split("—")[1].replace(/[$,\s]/g,""));
  const baseLo   = parseInt(CASES.base.target12.split("—")[0].replace(/[$,\s]/g,""));
  const baseHi   = parseInt(CASES.base.target12.split("—")[1].replace(/[$,\s]/g,""));
  const inBase    = NOW_PRICE >= baseLo && NOW_PRICE <= baseHi;
  const belowBase = NOW_PRICE < baseLo;
  const verdictColor = belowBase ? "#66b278" : inBase ? "#c59542" : "#dd817a";

  const allSigs = [...SIGNALS[active], ...MARGIN[active]];
  const beats   = allSigs.filter(s => s.tag === "BEAT").length;
  const misses  = allSigs.filter(s => s.tag === "MISS").length;
  const matches = allSigs.filter(s => s.tag === "MATCH").length;
  const thesisStatus = misses >= 3
    ? { label: "BROKEN",  desc: "ACT ON KILL-SWITCH",       col: "#dd817a" }
    : misses >= 2
    ? { label: "WATCH",   desc: "MIXED SIGNALS",             col: "#c59542" }
    : { label: "INTACT",  desc: "TRACKING AS EXPECTED",      col: "#66b278" };

  const currentPE = (NOW_PRICE / v.ntm_eps).toFixed(1);
  const pePos     = (NOW_PRICE / v.ntm_eps - v.pe_trough) / (v.pe_peak - v.pe_trough);

  const bearDown  = (((NOW_PRICE - bearLo) / NOW_PRICE) * 100).toFixed(0);
  const bullUp    = (((bullHi - NOW_PRICE) / NOW_PRICE) * 100).toFixed(0);
  const asymRatio = (bullHi - NOW_PRICE) / (NOW_PRICE - bearLo);
  const asymStatus = asymRatio >= 2
    ? { label: "FAVORABLE",   desc: `${asymRatio.toFixed(1)}× UP PER UNIT DOWN`, col: "#66b278" }
    : asymRatio >= 1
    ? { label: "BALANCED",    desc: `${asymRatio.toFixed(1)}× UP PER UNIT DOWN`, col: "#c59542" }
    : { label: "UNFAVORABLE", desc: `${asymRatio.toFixed(1)}× UP PER UNIT DOWN`, col: "#dd817a" };

                { label: "PORTFOLIO ($K)", val: portfolioK, set: setPortfolioK, min: 10, max: 5000, step: 10, fmt: v => `$${v.toLocaleString()}K` },

            <div style={{ fontSize: 10, color: "var(--tx4)", lineHeight: 1.6 }}>
              {posAbsLoss > 5 ? "Bear case hits hard — consider halving the position size."

          {/* Thesis check toggles */}

            <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>

                  <div key={key} onClick={() => toggle(key)}

                    <div style={{ width: 15, height: 15, borderRadius: 3, flexShrink: 0, marginTop: 2,

                      background: on ? "#66b278" : "transparent",
                      display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {on && <span style={{ color: "var(--page-bg)", fontSize: 9, fontWeight: 900 }}>✓</span>}

                      <div style={{ fontSize: 10.5, color: on ? "#66b278" : "var(--tx3)", fontWeight: on ? 600 : 400 }}>{label}</div>

            </div>

        <Footnote text={`War chest = sum of 'Saved' entries across all logged cycles. Deployed = sum of 'Deployed' entries. Global across all tickers — future portfolio page will read this same key (th3sis_portfolio).`} />
      </div>
    );
  };

  // ── Render ────────────────────────────────────────────────────────────────
  return (
    <div style={{ padding: "0 0 24px" }}>
      {/* ── Top scorecard grid ── */}
      <div style={{ maxWidth: 1280, margin: "0 auto", padding: "20px 22px 0" }}>
        <div style={{ fontSize: 9, letterSpacing: "0.14em", color: "var(--tx7)", marginBottom: 10 }}>
          THE FUTURE · SHOULD I DEPLOY CAPITAL TO ALAB THIS CYCLE?
        </div>

        {/* 2×2 scorecards */}
        <div style={{ display: "flex", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
          <ScoreCard
            tipTitle="If I'm right, what do I make?"
            tipBody={`Bull case: $${bullLo}–$${bullHi} range (+${bullPct}%). Base case: $${baseLo}–$${baseHi} range (${basePct >= 0 ? "+" : ""}${basePct}%). These are 12-month estimates based on EPS × multiple — hold loosely. Use the position calculator below to translate % returns into real dollar amounts based on your share count.`}
            question="IF I'M RIGHT, WHAT DO I MAKE?"
            answer={`BULL +${bullPct}% · BASE ${basePct >= 0 ? "+" : ""}${basePct}%`}
            detail={`Bull $${bullLo}–${bullHi} · Base $${baseLo}–${baseHi} · Bear $${bearLo}–${bearHi}`}
            col="#66b278"
            panelKey="outcomes"
          />
          <ScoreCard
            tipTitle="If I'm wrong, how much do I lose?"
            tipBody={`Bear case: $${bearLo}–$${bearHi} range (${bearPct}% from $${NOW_PRICE}). This assumes multiple compression to ~50–60× on the same ~$${VAL_CONFIG.ntm_eps} NTM EPS — triggered by a Scorpio ramp slip or a hyperscaler in-sourcing connectivity, not an earnings cut. Use the portfolio loss calculator in this panel to see the dollar impact on your specific position size.`}
            question="IF I'M WRONG, HOW MUCH DO I LOSE?"
            answer={`BEAR ${bearPct}% — $${bearLo}–${bearHi}`}
            detail={`Bear case: Scorpio ramp slips · Hyperscaler in-sources connectivity · Multiple compresses to ~50–60×`}
            col="#dd817a"
            panelKey="downside"
          />
          <ScoreCard
            tipTitle="Is today's price a gift or a trap?"
            tipBody={`At ${currentPE}× NTM P/E, ALAB trades ${parseFloat(currentPE) <= VAL_CONFIG.pe_normal_lo ? `below its typical fair-value range (${VAL_CONFIG.pe_normal_lo}–${VAL_CONFIG.pe_normal_hi}×)` : parseFloat(currentPE) <= VAL_CONFIG.pe_normal_hi ? `inside its typical fair-value range (${VAL_CONFIG.pe_normal_lo}–${VAL_CONFIG.pe_normal_hi}×)` : `above its typical fair-value range (${VAL_CONFIG.pe_normal_lo}–${VAL_CONFIG.pe_normal_hi}×)`}. The most recent real dislocation was the April 2025 tariff selloff — ${dislocDays} days ago — since resolved; the stock has since compounded well past the base floor of $${REVERSION_BASEFLOOR}. That precedent resolved in ~${REVERSION_PRECEDENT_DAYS} days when the thesis stayed intact.`}
            question="IS TODAY'S PRICE A GIFT OR A TRAP?"
            answer={`${parseFloat(currentPE)}× NTM P/E — ${parseFloat(currentPE) <= VAL_CONFIG.pe_normal_lo ? "BELOW FAIR" : parseFloat(currentPE) <= VAL_CONFIG.pe_normal_hi ? "FAIR VALUE" : "ABOVE FAIR"}`}
            detail={`${dislocSignal.label}: ${dislocDays}d since Jun 3 drop · Base floor $${REVERSION_BASEFLOOR}`}
            col={dislocSignal.col}
            panelKey="signal"
          />
          <ScoreCard
            tipTitle="What is my war chest?"
            tipBody={`War chest = cumulative 'Saved' capital from cycle log entries. Current: $${warChest.toLocaleString()} undeployed. Deployment mode: ${deployMode.label}${deployMode.range ? " (" + deployMode.range + ")" : ""} — ${deployMode.sub}. Modes: EXPLORE ($100–200, pre-conviction), NIBBLE ($200–400, thesis forming), ADD ($400–600, thesis intact), DEPLOY ($600–800+, dislocation + high conviction).`}
            question="WHAT IS MY WAR CHEST?"
            answer={`$${warChest.toLocaleString()} SAVED · MODE: ${deployMode.label}${deployMode.range ? " " + deployMode.range : ""}${blendedAll > 0 ? " · BASIS $" + blendedAll.toFixed(0) : ""}`}
            detail={blendedAll > 0 ? `${allShares.toFixed(0)} shares · avg $${blendedAll.toFixed(2)} · ${deployMode.sub}` : deployMode.sub}
            col={deployMode.col}
            panelKey="capital"
          />
        </div>

        {/* Verdict bar */}
        <div {...tip("THE FUTURE · Final Call", `The deployment verdict is driven by three inputs: (1) thesis health — are the buy reasons still true? (2) price zone — is NOW_PRICE below the base floor? (3) war chest — do you have dry powder to deploy? DEPLOY requires all three favourable. NIBBLE if price is right but thesis is WATCH. WAIT if price is stretched. EXIT if thesis is BROKEN.`, `Current mode: ${deployMode.label}. ${deployMode.sub}.`, deployMode.col)} style={{ padding: "14px 18px", borderRadius: 8, marginBottom: 16,
          background: `${deployMode.col}18`, border: `1px solid ${deployMode.col}55`,
          boxShadow: `0 0 20px ${deployMode.col}22` }}>
          <div style={{ fontSize: 8.5, letterSpacing: "0.14em", color: "var(--tx6)", marginBottom: 5 }}>
            THE FUTURE · FINAL CALL
          </div>
          <div style={{ fontSize: 18, fontWeight: 700, color: deployMode.col, letterSpacing: "0.08em", marginBottom: 4 }}>
            {deployMode.label}{deployMode.range ? ` — ${deployMode.range}` : ""}
          </div>
          <div style={{ fontSize: 10.5, color: "var(--tx4)", lineHeight: 1.55, marginBottom: 10 }}>
            {deployMode.sub}
          </div>
          {/* Chips */}
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {[
              { label: `KILL-SWITCH: Q3 AI REV < $15B → EXIT`, col: "#dd817a" },
              { label: `REGRET IF: Q3 BEATS + 7TH CUSTOMER`, col: "#66b278" },
              { label: `NEXT CHECK: SEP 2026 EARNINGS`, col: "#46aad9" },
            ].map(({ label, col }) => (
              <div key={label} style={{ padding: "3px 8px", borderRadius: 20, fontSize: 8.5,
                background: `${col}18`, border: `1px solid ${col}44`, color: col,
                letterSpacing: "0.08em", fontWeight: 600 }}>
                {label}
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ── Chevron nav ── */}
      <div style={{ maxWidth: 1280, margin: "0 auto", padding: "0 22px", marginBottom: 14 }}>
        <div style={{ display: "flex", gap: 0 }}>
          {chevrons.map(({ key, label, col, tipBody }, i) => {
            const on      = panel === key;
            const isFirst = i === 0;
            const isLast  = i === chevrons.length - 1;
            const clip    = isFirst
              ? "polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%)"
              : "polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%, 14px 50%)";
            return (
              <div key={key} onClick={() => setPanel(key)}
                {...(tipBody ? tip(label, tipBody, null, col) : {})}
                style={{ flex: 1, clipPath: clip, cursor: "pointer", transition: "background .15s",
                  background: on ? `${col}28` : "var(--inner-bg)",
                  border: on ? `1px solid ${col}66` : "1px solid var(--bd2)",
                  padding: isFirst ? "8px 26px 8px 16px" : "8px 26px 8px 30px",

                <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.1em",

      {/* ── Evidence panel ── */}

        <div style={{ background: "var(--panel-bg)", border: "1px solid var(--bd2)",
          borderRadius: 8, padding: "16px 18px", minHeight: 320 }}>

        fontSize: 10.5, color: "var(--tx7)", lineHeight: 1.5 }}>
        Scenario returns are estimates based on consensus EPS × multiple. Not financial advice — hold all bands loosely. As of {AS_OF_DATE}.

// ── THE PAST Tab ────────────────────────────────────────────────────────────────
function PastTab() {
  const [panel, setPanel] = useState("durability");
  const v = VAL_CONFIG;

  // ── Explorer (Financials) state ──────────────────────────────────────────
  const finSaved  = loadFinState();
  const [period,  setPeriod]  = useState(finSaved?.period  || "quarterly");
  const [pinned,  setPinned]  = useState(finSaved?.pinned  || ["Revenue", "Free Cash Flow", "EBITDA Margin"]);
  const [finQuery, setFinQuery] = useState("");
  const [finOpen,  setFinOpen]  = useState(false);

  useEffect(() => {
    localStorage.setItem(FIN_STORE_KEY, JSON.stringify({ version: 1, period, pinned }));
  }, [period, pinned]);

  const unpinned   = React.useMemo(() => FIN_METRICS.filter(m => !pinned.includes(m.name)), [pinned]);
  const suggestions = React.useMemo(() => {
    if (!finQuery) return unpinned;
    const q = finQuery.toLowerCase();
    return unpinned.filter(m => m.name.toLowerCase().includes(q) || m.group.toLowerCase().includes(q)).slice(0, 12);
  }, [unpinned, finQuery]);
  const FIN_GROUPS = React.useMemo(() => [...new Set(FIN_METRICS.map(m => m.group))], []);
  const grouped    = React.useMemo(() => FIN_GROUPS.map(g => ({ group: g, items: suggestions.filter(m => m.group === g) })).filter(g => g.items.length > 0), [FIN_GROUPS, suggestions]);
  const addMetric    = name => { setPinned(p => [...p, name]); setFinQuery(""); setFinOpen(false); };
  const removeMetric = name => setPinned(p => p.filter(x => x !== name));

  // ── Derived verdicts ──────────────────────────────────────────────────────
  // Only 2 full fiscal years exist (FY2024, FY2025) — this is YoY growth, not a CAGR.
  // PAST_REV[2] (Q1 FY26) is a single quarter and deliberately excluded from this calc.
  const revCAGR    = PAST_REV[1] / PAST_REV[0] - 1;
  const latestGM   = PAST_GM[2];
  const latestOPM  = PAST_OPM[2];
  const latestEPS  = PAST_EPS[2];
  const currentPE  = (NOW_PRICE / v.ntm_eps).toFixed(1);

  const durabilityStatus = revCAGR > 0.5 && latestGM > 65
    ? { label: "STRONG",   desc: `${(revCAGR * 100).toFixed(0)}% FY24→FY25 REVENUE GROWTH · ${latestGM}% GROSS MARGIN`, col: "#66b278" }
    : revCAGR > 0.2
    ? { label: "ADEQUATE", desc: `${(revCAGR * 100).toFixed(0)}% FY24→FY25 REVENUE GROWTH`,                              col: "#c59542" }
    : { label: "WEAK",     desc: "GROWTH DECELERATING",                                                                   col: "#dd817a" };

  const valueStatus = latestOPM > 35
    ? { label: "STRONG",   desc: `NON-GAAP OP MARGIN ${latestOPM}% · EPS $${latestEPS} (Q1 FY26)`,   col: "#66b278" }
    : latestOPM > 20
    ? { label: "ADEQUATE", desc: `NON-GAAP OP MARGIN ${latestOPM}% · SCALING`,                        col: "#c59542" }
    : { label: "WATCH",    desc: `NON-GAAP OP MARGIN ${latestOPM}% · STILL RAMPING`,                  col: "#dd817a" };

  // ALAB has made no acquisitions and carries no debt — this is a real-time snapshot,
  // not a leverage-cycle history (there is no leverage cycle to show).
  const leverageStatus = BALANCE_SHEET.netCash > 0
    ? { label: "DEBT-FREE", desc: `$${BALANCE_SHEET.netCash.toFixed(2)}B NET CASH · NO BORROWINGS`,  col: "#66b278" }
    : { label: "WATCH",     desc: "NET DEBT POSITION",                                                col: "#dd817a" };

  const moodStatus = currentPE <= v.pe_normal_lo
    ? { label: "BELOW NORMAL RANGE", desc: `${currentPE}× NTM P/E · BELOW ${v.pe_normal_lo}–${v.pe_normal_hi}× ZONE`, col: "#66b278" }
    : currentPE <= v.pe_normal_hi
    ? { label: "FAIRLY VALUED",      desc: `${currentPE}× NTM P/E · INSIDE ${v.pe_normal_lo}–${v.pe_normal_hi}× ZONE`, col: "#c59542" }
    : { label: "ELEVATED",           desc: `${currentPE}× NTM P/E · ABOVE ${v.pe_normal_lo}–${v.pe_normal_hi}× ZONE`,  col: "#dd817a" };

  // moodStatus (valuation/price) is deliberately excluded from the BUSINESS quality
  // verdict below — the verdict tooltip is explicit that this is about the business, not
  // today's price, so an expensive-but-strong business shouldn't read as a "concern."
  const scores = [durabilityStatus, valueStatus, leverageStatus];
  const reds   = scores.filter(s => s.col === "#dd817a").length;
  const ambers = scores.filter(s => s.col === "#c59542").length;
  const overallBiz = reds > 0
    ? { label: "FUNDAMENTAL CONCERN", sub: "One or more areas need investigation",    col: "#dd817a" }
    : ambers > 1
    ? { label: "GOOD BUSINESS",       sub: "Strong core with concerns to monitor",    col: "#c59542" }
    : { label: "STRONG BUSINESS",     sub: "Track record supports long-term ownership", col: "#66b278" };

  // ── ScoreCard (click → switch panel) ─────────────────────────────────────
  const ScoreCard = ({ question, answer, desc, col, panelKey, tipTitle, tipBody }) => (
    <div onClick={() => setPanel(panelKey)} {...(tipTitle ? tip(tipTitle, tipBody, "Click to view the evidence below", col) : {})} style={{
      background: "var(--inner-bg)", border: `1px solid ${col}44`,
      borderLeft: `3px solid ${col}`, borderRadius: 8, padding: "14px 16px",
      cursor: "pointer", transition: "background .15s",
    }}>
      <div style={{ fontSize: 8, letterSpacing: "0.14em", color: "var(--tx6)", marginBottom: 5 }}>{question}</div>
      <div style={{ fontSize: 11.5, fontWeight: 700, color: col, marginBottom: 4, letterSpacing: "0.06em" }}>{answer}</div>
      <div style={{ fontSize: 9.5, color: "var(--tx5)", lineHeight: 1.5 }}>{desc}</div>
      <div style={{ marginTop: 6, fontSize: 8, color: col, opacity: 0.7, letterSpacing: "0.1em" }}>VIEW EVIDENCE ›</div>
    </div>
  );

  const PANELS = [
    { key: "durability", label: "① DURABILITY",     sub: "revenue · margin",          tipBody: "Revenue and gross margin since the March 2024 IPO — only 2 full fiscal years exist, plus the latest quarter. Are the numbers growing consistently, or was FY2025 a one-time spike?" },
    { key: "value",      label: "② VALUE CREATION", sub: "op margin · EPS",           tipBody: "Non-GAAP operating margin and EPS trajectory since IPO. ROIC isn't a meaningful lens yet — the balance sheet is still mostly IPO cash, not reinvested capital. Is growth actually converting to profit as the company scales?" },
    { key: "leverage",   label: "③ BALANCE SHEET",  sub: "cash · no debt",            tipBody: "A snapshot, not a history — ALAB has made no acquisitions and carries no debt. Real question: how much dry powder does the balance sheet give it to keep funding growth without external capital?" },
    { key: "mood",       label: "④ MOOD HISTORY",   sub: "price · drawdown · P/E",    tipBody: "Monthly price and drawdown from rolling ATH since IPO, plus where today's forward P/E sits vs. its typical range. When has the market been too fearful or too greedy on this name — and what happened next?" },
    { key: "explorer",   label: "⑤ EXPLORER",       sub: "search · pin · dig deeper", tipBody: "Raw financials explorer. Real, sourced metrics only — deliberately smaller than a mature company's explorer since ALAB has ~2 years of public financial history, not 10. Pin any metric to see its trend." },
  ];

  // ── Inline SVG bar chart ──────────────────────────────────────────────────
  const BarChart = ({ data, labels, colorFn, unit = "", height = 110, note }) => {
    const valid = data.filter(v => v !== null);
    const maxV  = Math.max(...valid);
    const minV  = Math.min(...valid, 0);
    const range = maxV - minV || 1;
    const W = 560, H = height, pad = 28, barW = Math.floor((W - pad * 2) / data.length) - 2;
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${H + 28}`} preserveAspectRatio="xMidYMid meet"
        style={{ fontFamily: FONT_MONO }}>
        {/* zero line */}
        {minV < 0 && (
          <line x1={pad} x2={W - pad} y1={H - (0 - minV) / range * H} y2={H - (0 - minV) / range * H}
            stroke="var(--tx7)" strokeWidth={0.5} strokeDasharray="2,2" />
        )}
        {data.map((v, i) => {
          if (v === null) return null;
          const col = colorFn ? colorFn(v) : "#66b278";
          const x   = pad + i * ((W - pad * 2) / data.length) + 1;
          const zeroY = H - (0 - minV) / range * H;
          const barH  = Math.abs(v) / range * H;
          const y     = v >= 0 ? zeroY - barH : zeroY;
          return (
            <g key={i}>
              <rect x={x} y={y} width={barW} height={Math.max(barH, 1)} fill={col + "bb"} rx={1}
                {...tipSvg(labels[i], `Value: ${v}${unit}`, null, col)} />
              <text x={x + barW / 2} y={H + 18} textAnchor="middle" fontSize={7.5}
                fill="var(--tx6)">{labels[i]}</text>
              {i === data.length - 1 && (
                <text x={x + barW / 2} y={y - 3} textAnchor="middle" fontSize={8}
                  fill={col} fontWeight="700">{v}{unit}</text>
              )}
            </g>
          );
        })}
      </svg>
    );
  };

  // ── Price line chart (monthly, 10Y) ───────────────────────────────────────
  const PriceLineChart = () => {
    const W = 640, H = 160, pad = { l: 40, r: 16, t: 16, b: 24 };
    const iW = W - pad.l - pad.r, iH = H - pad.t - pad.b;
    const maxP = Math.max(...PRICE_M), minP = Math.min(...PRICE_M);
    const rng  = maxP - minP;
    const n    = PRICE_M.length;
    const xOf  = i => pad.l + (i / (n - 1)) * iW;
    const yOf  = p => pad.t + (1 - (p - minP) / rng) * iH;

    const pts = PRICE_M.map((p, i) => `${xOf(i).toFixed(1)},${yOf(p).toFixed(1)}`).join(" ");
    const areaBase = pad.t + iH;
    const areaPts  = `${xOf(0)},${areaBase} ` + pts + ` ${xOf(n - 1)},${areaBase}`;

    const nowIdx = n - 1;

    // Year tick labels (Jan of each year)
    const yearTicks = PRICE_M_LABELS
      .map((l, i) => ({ i, label: l }))
      .filter(({ label }) => label.endsWith("-01") || label === PRICE_M_LABELS[0]);

    return (
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet"
        style={{ fontFamily: FONT_MONO }}>
        <defs>
          <linearGradient id="priceGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#66b278" stopOpacity="0.18" />
            <stop offset="100%" stopColor="#66b278" stopOpacity="0.01" />
          </linearGradient>
        </defs>
        {/* Area fill */}
        <polygon points={areaPts} fill="url(#priceGrad)" />
        {/* Price line */}
        <polyline points={pts} fill="none" stroke="#66b278" strokeWidth={1.5} />
        {/* Year ticks */}
        {yearTicks.map(({ i, label }) => (
          <g key={label}>
            <line x1={xOf(i)} x2={xOf(i)} y1={pad.t + iH} y2={pad.t + iH + 4}
              stroke="var(--tx7)" strokeWidth={0.5} />
            <text x={xOf(i)} y={H - 4} textAnchor="middle" fontSize={7.5} fill="var(--tx7)">
              {label.slice(0, 4)}
            </text>
          </g>
        ))}
        {/* Event annotations */}
        {PAST_EVENTS.map(({ idx, label, note }) => {
          const x = xOf(idx);
          const y = yOf(PRICE_M[idx]);
          return (
            <g key={label} {...tipSvg(label, note || label, null, "var(--tx5)")}>
              <line x1={x} x2={x} y1={pad.t} y2={pad.t + iH} stroke="var(--tx6)"
                strokeWidth={0.8} strokeDasharray="3,2" opacity={0.5} />
              <text x={x} y={pad.t - 2} textAnchor="middle" fontSize={7} fill="var(--tx5)">{label}</text>
            </g>
          );
        })}
        {/* NOW dot */}
        <circle cx={xOf(nowIdx)} cy={yOf(PRICE_M[nowIdx])} r={3} fill="#46aad9"
          {...tipSvg("Current price", `$${PRICE_M[nowIdx]} — where ALAB trades today. Since the March 2024 IPO ($36.00), the stock has compounded rapidly on repeated Scorpio/Leo revenue beats, with one sharp drawdown during the April 2025 tariff selloff and a pullback off the June 2026 all-time high ($499.48) set on Nasdaq-100 inclusion.`, null, "#46aad9")} />
        <text x={xOf(nowIdx) - 6} y={yOf(PRICE_M[nowIdx]) - 6} textAnchor="end"
          fontSize={8} fill="#46aad9" fontWeight="700">${PRICE_M[nowIdx]}</text>
        {/* ATH label */}
        {(() => {
          const athIdx = PRICE_M.indexOf(Math.max(...PRICE_M));
          return (
            <g>
              <circle cx={xOf(athIdx)} cy={yOf(PRICE_M[athIdx])} r={2.5} fill="#c59542"
                {...tipSvg("All-Time High", `$${PRICE_M[athIdx]} — reached Jun 30, 2026, days after Nasdaq-100 inclusion broadened the buyer base. The stock has since pulled back to around $${NOW_PRICE}.`, null, "#c59542")} />
              <text x={xOf(athIdx) + 4} y={yOf(PRICE_M[athIdx]) - 4} fontSize={7.5}
                fill="#c59542">ATH ${PRICE_M[athIdx]}</text>
            </g>
          );
        })()}
        {/* Y-axis labels */}
        {[minP, (minP + maxP) / 2, maxP].map(val => (
          <text key={val} x={pad.l - 4} y={yOf(val) + 3} textAnchor="end"
            fontSize={7.5} fill="var(--tx6)">${Math.round(val)}</text>
        ))}
      </svg>
    );
  };

  // ── Drawdown chart ────────────────────────────────────────────────────────
  const DrawdownChart = () => {
    const W = 640, H = 70, pad = { l: 40, r: 16, t: 8, b: 20 };
    const iW = W - pad.l - pad.r, iH = H - pad.t - pad.b;
    const minDD = Math.min(...PRICE_M_DD);
    const n = PRICE_M_DD.length;
    const xOf = i => pad.l + (i / (n - 1)) * iW;
    const yOf = d => pad.t + (d / minDD) * iH;  // d is negative, minDD is most negative
    const pts = PRICE_M_DD.map((d, i) => `${xOf(i).toFixed(1)},${yOf(d).toFixed(1)}`).join(" ");
    const areaBase = pad.t;
    const areaPts  = `${xOf(0)},${areaBase} ` + pts + ` ${xOf(n - 1)},${areaBase}`;
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet"
        style={{ fontFamily: FONT_MONO }}>
        <polygon points={areaPts} fill="#dd817a" opacity={0.12} />
        <polyline points={pts} fill="none" stroke="#dd817a" strokeWidth={1} />
        {/* Zero line */}
        <line x1={pad.l} x2={W - pad.r} y1={pad.t} y2={pad.t} stroke="var(--tx7)" strokeWidth={0.5} />
        {/* Max drawdown label */}
        {(() => {
          const wIdx = PRICE_M_DD.indexOf(minDD);
          return (
            <text x={xOf(wIdx)} y={yOf(minDD) + 10} textAnchor="middle"
              fontSize={7.5} fill="#dd817a"
              {...tipSvg("Maximum Drawdown", `${minDD}% — the deepest drop from a prior all-time high since the March 2024 IPO. This occurred in the aftermath of the April 2025 tariff selloff. ALAB recovered and went on to make new highs. Drawdown charts help you visualize what holding through a bad period actually felt like.`, null, "#dd817a")}>{minDD}%</text>
          );
        })()}
        <text x={pad.l - 4} y={pad.t + 3} textAnchor="end" fontSize={7} fill="var(--tx7)">0%</text>
        <text x={pad.l - 4} y={pad.t + iH} textAnchor="end" fontSize={7} fill="var(--tx6)">{minDD}%</text>
      </svg>
    );
  };

  const Banner = ({ status, desc, col, summary }) => (
    <div style={{ display: "flex", alignItems: "flex-start", gap: 14, padding: "10px 14px",
      background: col + "12", border: `1px solid ${col}44`, borderLeft: `3px solid ${col}`,
      borderRadius: 7, marginBottom: 18 }}>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.16em", color: col, marginBottom: 3 }}>
          {status} — {desc}
        </div>
        <div style={{ fontSize: 11, color: "var(--tx3)", lineHeight: 1.6 }}>{summary}</div>
      </div>
    </div>
  );

  const ChartBox = ({ title, sub, children }) => (
    <div style={{ background: "var(--inner-bg)", border: "1px solid var(--bd)",
      borderRadius: 8, padding: "14px 16px", marginBottom: 12 }}>
      <div style={{ fontSize: 8.5, letterSpacing: "0.14em", color: "var(--tx6)", marginBottom: 2 }}>{title}</div>
      {sub && <div style={{ fontSize: 9, color: "var(--tx7)", marginBottom: 10 }}>{sub}</div>}
      {children}
    </div>
  );

  const Footnote = ({ text }) => (
    <div style={{ fontSize: 9.5, color: "var(--tx6)", lineHeight: 1.65, marginTop: 10,
      padding: "8px 12px", background: "var(--inner-bg)", borderRadius: 6,
      borderLeft: "2px solid var(--bd)" }}>{text}</div>
  );

  return (
    <div style={{ padding: "0 22px 40px", fontFamily: FONT_MONO }}>

      {/* ══ VERDICT BLOCK (TOP) ════════════════════════════════════════════ */}
      <div style={{ marginTop: 18, background: "var(--panel-bg)",
        border: `1px solid ${overallBiz.col}33`, borderRadius: 10, padding: "18px 18px 14px" }}>

        <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.22em",
          color: "var(--tx6)", marginBottom: 14 }}>THE PAST — IS THIS WORTH OWNING?</div>

        <div className="resp-2col" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
          <ScoreCard question="DOES IT GROW CONSISTENTLY?"
            answer={durabilityStatus.label} desc={durabilityStatus.desc}
            col={durabilityStatus.col} panelKey="durability"
            tipTitle="Does it grow consistently?"
            tipBody={`Revenue and gross margin since the March 2024 IPO — only 2 full fiscal years exist. ALAB grew revenue ${(revCAGR * 100).toFixed(0)}% from FY2024 ($${PAST_REV[0]}M) to FY2025 ($${PAST_REV[1]}M), and non-GAAP gross margin has held ${PAST_GM[0]}–${latestGM}% throughout — genuinely high for a semiconductor company. One data point of deceleration (Q1 FY26 growth was "only" 93% YoY vs FY25's 115%) is worth watching, not yet a trend.`} />
          <ScoreCard question="IS GROWTH CONVERTING TO PROFIT?"
            answer={valueStatus.label} desc={valueStatus.desc}
            col={valueStatus.col} panelKey="value"
            tipTitle="Is growth converting to profit?"
            tipBody={`Non-GAAP operating margin measures how much of each new revenue dollar falls to the bottom line as the business scales. ROIC isn't used here — the balance sheet is still mostly unspent IPO cash, which would make ROIC look artificially poor and isn't a meaningful signal yet. Operating margin expanded from ${PAST_OPM[0]}% (Q4 FY24) to ${PAST_OPM[1]}% (FY25) before easing to ${latestOPM}% in Q1 FY26 — non-GAAP EPS of $${latestEPS} is up from $${PAST_EPS[0]} for all of FY2024.`} />
          <ScoreCard question="IS THE BALANCE SHEET STRONG?"
            answer={leverageStatus.label} desc={leverageStatus.desc}
            col={leverageStatus.col} panelKey="leverage"
            tipTitle="Is the balance sheet strong?"
            tipBody={`ALAB has made no acquisitions and carries no debt — as of ${BALANCE_SHEET.asOf}, it holds $${BALANCE_SHEET.cashAndSecurities}B in cash and marketable securities against just $${BALANCE_SHEET.totalLiabilities}B in total liabilities, for roughly $${BALANCE_SHEET.netCash}B in net cash. This is a real-time snapshot, not a leverage cycle — there's nothing to delever from.`} />
          <ScoreCard question="DOES THE MARKET OVER/UNDERPRICE IT?"
            answer={moodStatus.label} desc={moodStatus.desc}
            col={moodStatus.col} panelKey="mood"
            tipTitle="Does the market over/underprice it?"
            tipBody={`Forward P/E vs. its typical range tells you whether the market is paying a premium or discount for this business today. Not a buy/sell signal on its own. At ${currentPE}× NTM P/E against a typical ${v.pe_normal_lo}–${v.pe_normal_hi}× range, ALAB is priced for a hyper-growth name executing well — there's little room for a stumble.`} />
        </div>

        <div {...tip("THE PAST · Business Quality Verdict", "Synthesises all four dimensions: durability (consistent growth), value creation (ROIC > WACC), leverage (debt control), and market mood (EV/EBITDA vs history). All green = business earns the right to a premium multiple. Any red = investigate before deploying capital. This is about the BUSINESS, not today's price.", "Hover each quadrant above for what it measures.", overallBiz.col)} style={{ padding: "14px 16px", background: overallBiz.col + "12",
          border: `1px solid ${overallBiz.col}44`, borderRadius: 8 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
            <div>
              <div style={{ fontSize: 9, letterSpacing: "0.18em", color: overallBiz.col, fontWeight: 700, marginBottom: 4 }}>
                THE PAST · BUSINESS QUALITY VERDICT
              </div>
              <div style={{ fontSize: 15, fontWeight: 700, color: overallBiz.col, letterSpacing: "0.06em" }}>
                {overallBiz.label}
              </div>
              <div style={{ fontSize: 10.5, color: "var(--tx4)", marginTop: 4 }}>{overallBiz.sub}</div>
            </div>
            <div style={{ fontSize: 9.5, color: "var(--tx5)", textAlign: "right", lineHeight: 1.8 }}>
              <div {...tip("Revenue since IPO", "Astera Labs grew total revenue from $396M (FY2024) to $853M (FY2025) — +115% — with Q1 FY2026 running at $308M for the quarter alone (+93% YoY). No acquisitions; this is entirely organic, driven by Scorpio/Leo/Aries design wins ramping at hyperscalers.", null, "#66b278")}>Revenue <span style={{ color: "#66b278", fontWeight: 700 }}>$396M → $853M</span> (FY24→FY25)</div>
              <div {...tip("Non-GAAP EPS since IPO", "Non-GAAP diluted EPS grew from $0.37 (all of FY2024) to $1.84 (all of FY2025) — roughly 5×. Q1 FY2026 alone printed $0.61, already a third of all of FY2025's total. This is the clearest single signal that scale is translating to real per-share profit, not just top-line growth.", null, "#66b278")}>EPS <span style={{ color: "#66b278", fontWeight: 700 }}>$0.37 → $1.84</span> (FY24→FY25)</div>
              <div {...tip("Total price return since IPO", `From the $36.00 IPO price (Mar 2024) to ~$${NOW_PRICE} today = +${Math.round((NOW_PRICE/36-1)*100)}%, off an all-time high of $499.48 reached Jun 30, 2026 on Nasdaq-100 inclusion. Compounding at this rate over ~2 years is exceptional — but it's a very short track record for a single-digit-year-old public company, not a multi-cycle history.`, null, "#66b278")}>Price <span style={{ color: "#66b278", fontWeight: 700 }}>+{Math.round((NOW_PRICE/36-1)*100)}%</span> (Mar 2024 → now)</div>
            </div>
          </div>
          <div style={{ fontSize: 11, color: "var(--tx4)", lineHeight: 1.75, marginTop: 10 }}>
            ALAB has compounded revenue +115% (FY2024→FY2025) entirely organically — no acquisitions, no debt — while non-GAAP gross margin held 74–76% and non-GAAP EPS grew roughly 5×. This is a ~2-year public track record, not a decade of proof across cycles: real and strong so far, but the business hasn't yet been tested by a genuine downturn the way a mature compounder has. The question is whether today's ~{currentPE}× multiple already prices in a continuation of this pace.
          </div>
        </div>
      </div>

      {/* ══ CHEVRON NAV ════════════════════════════════════════════════════ */}
      <div style={{ display: "flex", alignItems: "stretch", gap: 0, margin: "18px 0 0" }}>
        {PANELS.map(({ key, label, sub, tipBody }, i) => {
          const isActive = panel === key;
          const colMap = { durability: durabilityStatus.col, value: valueStatus.col,
                           leverage: leverageStatus.col, mood: moodStatus.col };
          const col = colMap[key];
          const isFirst = i === 0, isLast = i === PANELS.length - 1;
          // Every segment points right (incl. the last); first is flat-left, the rest notch-left.
          const clip = isFirst
            ? "polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%)"
            : "polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%, 14px 50%)";
          return (
            <div key={key} onClick={() => setPanel(key)} {...(tipBody ? tip(label, tipBody, null, col) : {})} style={{
              flex: 1, clipPath: clip,
              marginLeft: isFirst ? 0 : "14px",                  // gap between chevrons (breadcrumb style)
              background: isActive ? col + "22" : "var(--panel-bg)",
              borderTop:    `2px solid ${isActive ? col : "var(--bd)"}`,
              borderBottom: `2px solid ${isActive ? col : "var(--bd)"}`,
              padding: isFirst ? "12px 26px 12px 18px" : "12px 26px 12px 32px",
              cursor: "pointer", transition: "background .15s", outline: "none",
            }}>
              <div style={{ fontSize: 9.5, fontWeight: 700, letterSpacing: "0.14em",
                color: isActive ? col : "var(--tx4)", marginBottom: 3, whiteSpace: "nowrap" }}>{label}</div>
              <div style={{ fontSize: 8.5, color: isActive ? col : "var(--tx7)",
                whiteSpace: "nowrap", opacity: 0.85 }}>{sub}</div>
            </div>
          );
        })}
      </div>

      {/* ══ EVIDENCE PANEL ════════════════════════════════════════════════ */}
      <div style={{ background: "var(--panel-bg)", border: "1px solid var(--bd)",
        borderRadius: 10, padding: "20px 18px", marginTop: 14 }}>

        {/* ─ ① DURABILITY ─ */}
        {panel === "durability" && (
          <div>
            <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.2em",
              color: "var(--tx5)", marginBottom: 18, paddingBottom: 8, borderBottom: "1px solid var(--bd)" }}>
              DOES IT GROW CONSISTENTLY?
            </div>
            <Banner status={durabilityStatus.label} desc={durabilityStatus.desc}
              col={durabilityStatus.col}
              summary={`Revenue grew ${(revCAGR * 100).toFixed(0)}% from $${PAST_REV[0]}M (FY2024) to $${PAST_REV[1]}M (FY2025) — with Q1 FY2026 alone printing $${PAST_REV[2]}M (+93% YoY). Gross margin held ${PAST_GM[0]}–${latestGM}% throughout — a durability signal: pricing power holding as the company scales, not eroding. Only ~2 years of public data exists; there's no downturn in this record yet.`} />

            <div className="resp-2col" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <ChartBox title="TOTAL REVENUE ($M) · SINCE IPO" sub="FY24/FY25 = full year · Q1 FY26 = one quarter, not annualized">
                <BarChart
                  data={PAST_REV} labels={PAST_YEARS} unit="M"
                  colorFn={v => "#66b278"} height={110} />
                <div style={{ display: "flex", gap: 16, marginTop: 8, fontSize: 9, color: "var(--tx6)" }}>
                  <span>No acquisitions <span style={{ color: "var(--tx3)" }}>— 100% organic growth</span></span>
                </div>
              </ChartBox>

              <ChartBox title="NON-GAAP GROSS MARGIN (%) · SINCE IPO" sub="Measures pricing power and product mix quality">
                <BarChart
                  data={PAST_GM} labels={PAST_YEARS} unit="%"
                  colorFn={v => v > 65 ? "#66b278" : v > 55 ? "#c59542" : "#dd817a"}
                  height={110} />
              </ChartBox>
            </div>

            <Footnote text="Only 2 full fiscal years of public data exist (Astera Labs IPO'd March 2024) — this is a short, strong track record, not a multi-cycle history. Revenue growth decelerated slightly from FY25's +115% to Q1 FY26's +93% YoY: worth watching as a trend, not yet a red flag. Sources: Q4/FY2024 and Q4/FY2025 earnings releases, Q1 FY2026 10-Q." />
          </div>
        )}

        {/* ─ ② VALUE CREATION ─ */}
        {panel === "value" && (
          <div>
            <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.2em",
              color: "var(--tx5)", marginBottom: 18, paddingBottom: 8, borderBottom: "1px solid var(--bd)" }}>
              IS GROWTH CONVERTING TO PROFIT?
            </div>
            <Banner status={valueStatus.label} desc={valueStatus.desc}
              col={valueStatus.col}
              summary={`Non-GAAP operating margin expanded from ${PAST_OPM[0]}% (Q4 FY2024) to ${PAST_OPM[1]}% (all of FY2025) before easing to ${latestOPM}% in Q1 FY2026 — a real signal of operating leverage as the business scales, with one recent data point of margin softening (Q2 FY26 guide of ~73% gross margin reflects a similar mix shift) worth watching. Non-GAAP EPS grew from $${PAST_EPS[0]} (FY2024) to $${PAST_EPS[1]} (FY2025) — roughly 5×.`} />

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <ChartBox title="NON-GAAP OPERATING MARGIN (%) · SINCE IPO" sub="How much of each new revenue dollar reaches the bottom line">
                <BarChart
                  data={PAST_OPM} labels={PAST_YEARS} unit="%"
                  colorFn={v => v > 35 ? "#66b278" : v > 20 ? "#c59542" : "#dd817a"}
                  height={110} />
                <div style={{ fontSize: 9, color: "var(--tx6)", marginTop: 8 }}>
                  ROIC isn't shown here — invested capital is still mostly unspent IPO cash, which would make it look artificially poor.
                </div>
              </ChartBox>

              <ChartBox title="NON-GAAP DILUTED EPS ($) · SINCE IPO" sub="FY24/FY25 = full year · Q1 FY26 = one quarter">
                <BarChart
                  data={PAST_EPS} labels={PAST_YEARS} unit=""
                  colorFn={v => "#66b278"}
                  height={110} />
                <div style={{ fontSize: 9, color: "var(--tx6)", marginTop: 8 }}>
                  Q1 FY26's $0.61 alone is already a third of all of FY2025's $1.84.
                </div>
              </ChartBox>
            </div>

            <Footnote text="Non-GAAP figures strip stock-based compensation, standard for a recently-IPO'd growth company — ALAB has made no acquisitions, so there's no amortization distortion to remove, unlike a serial-acquirer. FY2024 operating margin uses the Q4 FY24 print since a full-year figure at this detail wasn't cleanly disclosed pre-2025." />
          </div>
        )}

        {/* ─ ③ BALANCE SHEET ─ */}
        {panel === "leverage" && (
          <div>
            <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.2em",
              color: "var(--tx5)", marginBottom: 18, paddingBottom: 8, borderBottom: "1px solid var(--bd)" }}>
              IS THE BALANCE SHEET STRONG?
            </div>
            <Banner status={leverageStatus.label} desc={leverageStatus.desc}
              col={leverageStatus.col}
              summary={`As of ${BALANCE_SHEET.asOf}, ALAB holds $${BALANCE_SHEET.cashAndSecurities}B in cash and marketable securities against just $${BALANCE_SHEET.totalLiabilities}B in total liabilities — roughly $${BALANCE_SHEET.netCash}B in net cash, funded by the March 2024 IPO plus since-positive operating cash flow. No acquisitions, no borrowings. This is a real-time snapshot, not a leverage-cycle history — there's no debt story to tell yet.`} />

            <ChartBox title="CASH &amp; SECURITIES VS. TOTAL LIABILITIES ($B)" sub={`Single snapshot as of ${BALANCE_SHEET.asOf} — not a multi-year trend`}>
              <BarChart
                data={[BALANCE_SHEET.cashAndSecurities, BALANCE_SHEET.totalLiabilities]}
                labels={["CASH + SECURITIES", "TOTAL LIABILITIES"]} unit="B"
                colorFn={(v, i) => "#66b278"}
                height={110} />
              <div style={{ display: "flex", gap: 20, marginTop: 8, fontSize: 9, color: "var(--tx6)" }}>
                <span>Net cash: <span style={{ color: "#66b278" }}>${BALANCE_SHEET.netCash}B</span></span>
                <span>Debt: <span style={{ color: "#66b278" }}>$0</span></span>
              </div>
            </ChartBox>

            <Footnote text="Source: Astera Labs Q1 FY2026 10-Q (period ended March 31, 2026). This balance sheet gives ALAB real optionality — it can keep funding Scorpio/Leo/Aries R&D and capacity commitments entirely from its own cash, with no need to raise debt or dilute shareholders in a downturn." />
          </div>
        )}

        {/* ─ ⑤ EXPLORER ─ */}
        {panel === "explorer" && (
          <div>
            {/* Header row */}
            <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap", gap: 10, marginBottom: 16 }}>
              <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.2em",
                color: "var(--tx5)", paddingBottom: 0, flex: 1 }}>
                DIG DEEPER · 35 METRICS · SOURCE: WISE Q2 FY2026
              </div>
              <div style={{ display: "flex", gap: 4 }}>
                {["annual", "quarterly"].map(p => (
                  <button key={p} aria-label={`Show ${p} data`} aria-pressed={period === p} onClick={() => setPeriod(p)} style={{
                    background: period === p ? "var(--blue-soft)" : "transparent",
                    color: period === p ? "var(--page-bg)" : "var(--tx4)",
                    border: `1px solid ${period === p ? "var(--blue-soft)" : "var(--bd)"}`,
                    borderRadius: 4, padding: "3px 14px", cursor: "pointer",
                    fontFamily: FONT_MONO, fontSize: 10, letterSpacing: "0.1em", fontWeight: 700,
                    textTransform: "uppercase", transition: "all .15s"
                  }}>{p}</button>
                ))}
              </div>
            </div>

            {/* Search */}
            <div style={{ position: "relative", marginBottom: 16 }}>
              <div style={{ display: "flex", alignItems: "center",
                border: `1px solid ${finOpen ? "var(--blue-soft)" : "var(--bd)"}`,
                borderRadius: finOpen && suggestions.length > 0 ? "6px 6px 0 0" : 6,
                overflow: "hidden", background: "var(--inner-bg)",
                boxShadow: finOpen ? "0 0 0 2px rgba(12,159,206,0.12)" : "none",
                transition: "box-shadow .15s" }}>
                <span style={{ padding: "0 10px", color: "var(--tx5)", fontSize: 14 }}>⌕</span>
                <input value={finQuery}

const FIN_STORE_KEY      = `th3sis_fin_${TICKER_META.ticker}`;
const FIN_SCHEMA_VERSION = 1;
function loadFinState() { return loadStorage(FIN_STORE_KEY, FIN_SCHEMA_VERSION, null); }

function fmtFinVal(v, fmt) {
  if (v === null || v === undefined) return "—";
  if (fmt === "B") return (v < 0 ? "-$" : "$") + Math.abs(v) + "B";
  if (fmt === "%") return (v > 0 ? "+" : "") + v + "%";
  if (fmt === "$") return "$" + v;
  if (fmt === "x") return v + "×";
  return String(v);
}

function generateInsight(metric, period) {
  const allVals = metric[period];
  const allLbls = FIN_LABELS[period];
  const { name, fmt } = metric;
  const pts = allVals.map((v, i) => v !== null ? { v, l: allLbls[i] } : null).filter(Boolean);
  if (pts.length < 3) return "Not enough data points to generate an insight.";

  const first = pts[0], last = pts[pts.length - 1], n = pts.length;
  const allV = pts.map(p => p.v);
  const minV = Math.min(...allV), maxV = Math.max(...allV);
  const totalPct = ((last.v - first.v) / Math.abs(first.v)) * 100;
  const years = period === "annual" ? n - 1 : (n - 1) / 4;
  const cagr = years > 0 ? (Math.pow(Math.abs(last.v) / Math.abs(first.v), 1 / years) - 1) * 100 * (last.v > first.v ? 1 : -1) : null;

  const back = period === "quarterly" ? 4 : 1;
  const yoys = pts.map((pt, i) => {
    const pi = i - back; if (pi < 0 || pts[pi].v === 0) return null;
    return ((pt.v - pts[pi].v) / Math.abs(pts[pi].v)) * 100;
  }).filter(v => v !== null);

  const win = period === "quarterly" ? 4 : 3;
  const recentY = yoys.slice(-win), priorY = yoys.slice(-win * 2, -win);
  const avgR = recentY.length ? recentY.reduce((a, b) => a + b, 0) / recentY.length : null;
  const avgP = priorY.length ? priorY.reduce((a, b) => a + b, 0) / priorY.length : null;
  const latestYoy = yoys.length ? yoys[yoys.length - 1] : null;

  const f = v => fmtFinVal(v, fmt);
  const pct = v => (v >= 0 ? "+" : "") + v.toFixed(0) + "%";
  const sentences = [];

  if (fmt === "B" || fmt === "$") {
    const dir = totalPct >= 0 ? "grown" : "declined";
    sentences.push(`${name} has ${dir} from ${f(first.v)} to ${f(last.v)} — a total of ${pct(totalPct)}${cagr !== null ? ` (${Math.abs(cagr).toFixed(0)}% per year)` : ""} over ${n} ${period === "quarterly" ? "quarters" : "years"}.`);
  } else if (fmt === "%") {
    const chg = last.v - first.v;
    const dir = chg >= 0 ? "expanded" : "compressed";
    sentences.push(`${name} has ${dir} from ${f(first.v)} to ${f(last.v)} — a shift of ${chg >= 0 ? "+" : ""}${chg.toFixed(1)} percentage points over ${n} ${period === "quarterly" ? "quarters" : "years"}.`);
  } else if (fmt === "x") {
    const pos = (last.v - minV) / ((maxV - minV) || 1);
    const where = pos >= 0.67 ? "near the high end" : pos <= 0.33 ? "near the low end" : "around the middle";
    sentences.push(`${name} has ranged from ${f(minV)} to ${f(maxV)} across the tracked period. The current ${f(last.v)} sits ${where} of that range.`);
  }

  if (avgR !== null && avgP !== null && Math.abs(avgR - avgP) > 3) {
    const word = avgR > avgP ? "accelerating" : "decelerating";
    sentences.push(`Growth has been ${word}: the last ${win} ${period === "quarterly" ? "quarters" : "years"} averaged ${pct(avgR)} YoY vs ${pct(avgP)} in the prior ${win}.`);
  } else if (avgR !== null && avgP !== null) {
    sentences.push(`The pace has been consistent: last ${win} ${period === "quarterly" ? "quarters" : "years"} averaged ${pct(avgR)} YoY, in line with the prior ${win} at ${pct(avgP)}.`);
  }

  if (fmt === "%") {
    const pos = (last.v - minV) / ((maxV - minV) || 1);
    const where = pos >= 0.67 ? "near the top" : pos <= 0.33 ? "near the bottom" : "around the middle";
    sentences.push(`The current ${f(last.v)} is ${where} of the ${f(minV)}–${f(maxV)} range seen in this period.`);
  } else if (latestYoy !== null && (fmt === "B" || fmt === "$")) {
    const qual = Math.abs(latestYoy) > 40 ? "standout" : Math.abs(latestYoy) > 20 ? "strong" : "modest";
    sentences.push(`The latest period (${last.l}) posted a ${qual} ${pct(latestYoy)} YoY ${latestYoy >= 0 ? "gain" : "decline"}.`);
  }

  return sentences.join(" ");
}

function MetricCard({ metric, period, onRemove }) {
  const { name, group, fmt, desc } = metric;
  const [showInsight, setShowInsight] = useState(false);
  const insight = React.useMemo(() => generateInsight(metric, period), [metric.name, period]);
  const allVals = metric[period];
  const allLbls = FIN_LABELS[period];
  const maxShow = period === "quarterly" ? 12 : 10;
  const vals = allVals.slice(-maxShow);
  const lbls = allLbls.slice(-maxShow);
  const offset = allVals.length - vals.length;

  const nonNull = vals.filter(v => v !== null);
  const maxAbs  = nonNull.length ? Math.max(...nonNull.map(Math.abs)) : 1;
  const minV    = nonNull.length ? Math.min(...nonNull) : 0;
  const maxV    = nonNull.length ? Math.max(...nonNull) : 0;
  const hasMixed = minV < 0 && maxV > 0;
  const BAR_H   = 220;

  const latest = vals[vals.length - 1];
  const back   = period === "quarterly" ? 4 : 1;
  const prevIdx = offset + vals.length - 1 - back;
  const prevLat = prevIdx >= 0 ? allVals[prevIdx] : null;
  const latYoY  = (prevLat != null && latest != null && prevLat !== 0)
    ? ((latest - prevLat) / Math.abs(prevLat)) * 100 : null;

  return (
    <div style={{ padding: "14px 16px", background: "var(--panel-bg)", border: "1px solid var(--bd)", borderRadius: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: "var(--title)" }}>{name}</span>
            <span style={{ fontSize: 8.5, border: "1px solid var(--bd2)", borderRadius: 3,
              padding: "2px 7px", color: "var(--tx5)", letterSpacing: "0.08em" }}>{group.toUpperCase()}</span>
            <span style={{ fontSize: 8.5, color: "var(--tx6)" }}>
              {fmt === "B" ? "USD billions" : fmt === "%" ? "percent" : fmt === "x" ? "multiple" : "per share"}
            </span>
          </div>
          <div style={{ fontSize: 10, color: "var(--tx5)", marginTop: 3 }}>{desc}</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12, flexShrink: 0, marginLeft: 12 }}>
          {latest != null && (
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 16, fontWeight: 700, color: "var(--title)" }}>{fmtFinVal(latest, fmt)}</div>
              {latYoY != null && (
                <div style={{ fontSize: 10, fontWeight: 700, color: latYoY >= 0 ? "#66b278" : "#dd817a" }}>
                  YoY {latYoY >= 0 ? "+" : ""}{latYoY.toFixed(1)}%
                </div>
              )}
              <div style={{ fontSize: 9, color: "var(--tx6)" }}>{lbls[lbls.length - 1]}</div>
            </div>
          )}
          <button aria-label={showInsight ? "Hide plain-English insight" : "Show plain-English insight"} onClick={() => setShowInsight(s => !s)} style={{
            background: showInsight ? "var(--blue-soft)" : "transparent",
            color: showInsight ? "var(--page-bg)" : "var(--tx5)",
            border: `1px solid ${showInsight ? "var(--blue-soft)" : "var(--bd)"}`,
            borderRadius: 4, cursor: "pointer", fontFamily: FONT_MONO,
            fontSize: 9, padding: "3px 9px", letterSpacing: "0.08em",
            transition: "all .15s", whiteSpace: "nowrap" }}>▸ EXPLAIN</button>
          <button aria-label={`Remove ${metric.name} from dashboard`} onClick={onRemove} style={{ background: "transparent", border: "none",
            cursor: "pointer", color: "var(--tx6)", fontSize: 18, padding: "0 2px",
            fontFamily: FONT_MONO, lineHeight: 1 }}>×</button>
        </div>
      </div>

      {/* Insight panel */}
      {showInsight && (
        <div style={{ margin: "0 0 14px", padding: "12px 14px",
          background: "var(--inner-bg)", border: "1px solid var(--bd)",
          borderRadius: 6, borderLeft: "3px solid var(--blue-soft)" }}>
          <div style={{ fontSize: 8.5, letterSpacing: "0.12em", color: "var(--blue-soft)",
            marginBottom: 6, fontWeight: 700 }}>▸ PLAIN ENGLISH</div>
          <div style={{ fontSize: 11.5, color: "var(--tx2)", lineHeight: 1.75 }}>
            {insight}
          </div>
        </div>
      )}

      {/* Bar chart */}
      <div style={{ overflowX: "auto", paddingBottom: 24 }}>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 3,
          minWidth: vals.length * 46, position: "relative", height: BAR_H + 36 }}>
          {hasMixed && (
            <div style={{ position: "absolute", bottom: 24, left: 0, right: 0,
              height: 1, background: "var(--bd2)", zIndex: 1, opacity: 0.7 }} />
          )}
          {vals.map((v, i) => {
            if (v === null) return <div key={i} style={{ flex: 1 }} />;
            const isPos  = v >= 0;
            const barCol = isPos ? "var(--blue-soft)" : "#dd817a";
            const barH   = maxAbs > 0 ? Math.max(3, (Math.abs(v) / maxAbs) * BAR_H) : 3;
            const isLast = i === vals.length - 1;

            const prevI  = offset + i - back;
            const prevV  = prevI >= 0 ? allVals[prevI] : null;
            const yoy    = (prevV != null && prevV !== 0)
              ? ((v - prevV) / Math.abs(prevV)) * 100 : null;

            const barBottom = hasMixed
              ? (isPos ? 24 : 24 + barH)
              : 24;

            return (
              <div key={i} style={{ flex: 1, minWidth: 36, position: "relative", height: "100%" }}
                {...tip(name, `${lbls[i]}: ${fmtFinVal(v, fmt)}${yoy != null ? "  ·  YoY " + (yoy >= 0 ? "+" : "") + yoy.toFixed(1) + "%" : ""}`, desc, "var(--blue-soft)")}>
                {/* YoY badge */}
                {yoy != null && (
                  <div style={{ position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)",
                    fontSize: 7.5, fontWeight: 700, whiteSpace: "nowrap",
                    color: yoy >= 0 ? "#66b278" : "#dd817a" }}>
                    {yoy >= 0 ? "+" : ""}{Math.round(yoy)}%
                  </div>
                )}
                {/* Value */}
                <div style={{ position: "absolute", top: 12, left: "50%", transform: "translateX(-50%)",
                  fontSize: 7.5, color: isLast ? "var(--tx2)" : "var(--tx5)", whiteSpace: "nowrap",
                  fontWeight: isLast ? 700 : 400 }}>
                  {fmtFinVal(v, fmt)}
                </div>
                {/* Bar */}
                <div style={{
                  position: "absolute", left: "10%", right: "10%",
                  bottom: barBottom, height: barH,
                  background: barCol,
                  opacity: isLast ? 1 : 0.4,
                  borderRadius: isPos ? "2px 2px 0 0" : "0 0 2px 2px",
                  transition: "height .3s ease",
                }} />
                {/* Period label */}
                <div style={{ position: "absolute", bottom: 2, left: "50%",
                  transform: "translateX(-50%) rotate(-40deg)",
                  transformOrigin: "top center", fontSize: 7.5,
                  color: isLast ? "var(--tx3)" : "var(--tx6)", whiteSpace: "nowrap" }}>
                  {lbls[i]}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}
