// ── Plain-language tooltip engine ────────────────────────────────────────────
// One floating box, moved to the cursor. Works for both <div> and SVG elements.
let tipEl = null;
function ensureTip() {
  if (!tipEl) {
    tipEl = document.createElement("div");
    tipEl.id = "tip-box";
    document.body.appendChild(tipEl);
  }
  return tipEl;
}
function showTip(e, title, body, note, color) {
  const el = ensureTip();
  el.innerHTML =
    `<div class="tt" style="color:${color || '#9fb4ff'}">${title}</div>` +
    `<div class="tb">${body}</div>` +
    (note ? `<div class="tn">${note}</div>` : "");
  el.classList.add("on");
  moveTip(e);
}
function moveTip(e) {
  const el = ensureTip();
  const pad = 16;
  let x = e.clientX + pad, y = e.clientY + pad;
  const r = el.getBoundingClientRect();
  if (x + r.width > window.innerWidth - 8) x = e.clientX - r.width - pad;
  if (y + r.height > window.innerHeight - 8) y = e.clientY - r.height - pad;
  el.style.left = x + "px";
  el.style.top = y + "px";
}
function hideTip() { if (tipEl) tipEl.classList.remove("on"); }

// Plain-language explanations for each KPI / signal name

  "Subscription Revenue Disclosure": "Meta recently started charging for ad-free apps and a paid AI assistant. This watches whether they reveal real money coming in from subscriptions — a brand-new income stream beyond ads.",
  "Adjusted Operating Margin": "Same idea as profit margin — how much of each sales dollar becomes profit — adjusted to strip out one-off items. Higher is healthier.",

};

// helper: spread these props onto any element to give it a tooltip
function tip(title, body, note, color) {
  return {
    className: "tip-target",
    onMouseEnter: (e) => showTip(e, title, body, note, color),
    onMouseMove: (e) => moveTip(e),
    onMouseLeave: hideTip,
  };
}
// SVG version (adds class without clobbering existing ones)
function tipSvg(title, body, note, color, extraClass) {
  return {
    className: (extraClass ? extraClass + " " : "") + "tip-target",
    onMouseEnter: (e) => showTip(e, title, body, note, color),
    onMouseMove: (e) => moveTip(e),
    onMouseLeave: hideTip,
  };
}

/* ╔══════════════════════════════════════════════════════════════════════════╗

const PRICE_MIN = 440, PRICE_MAX = 1040;
const CH_W = 760, CH_H = 420, PAD_L = 8, PAD_R = 56, PAD_T = 18, PAD_B = 34;
const plotW = CH_W - PAD_L - PAD_R, plotH = CH_H - PAD_T - PAD_B;
const yOf = (p) => PAD_T + (1 - (p - PRICE_MIN) / (PRICE_MAX - PRICE_MIN)) * plotH;

function FanChart({ c }) {
  const nHist = HISTORY.length;
  const histPts = HISTORY.map((d, i) => [PAD_L + (i / (nHist + FUTURE_Q.length - 1)) * plotW, yOf(d.p)]);
  const nowX = histPts[histPts.length - 1][0];
  const nowY = histPts[histPts.length - 1][1];
  const fwdN = FUTURE_Q.length;
  const fwdX = (i) => nowX + ((i + 1) / fwdN) * (CH_W - PAD_R - nowX);
  const end = PROJ_END[c.key];
  const mid = FUTURE_Q.map((_, i) => {
    const t = (i + 1) / fwdN;
    return [fwdX(i), yOf(NOW_PRICE + (end - NOW_PRICE) * t)];
  });
  const spread = (i) => 28 + i * 26;
  const upper = mid.map(([x, y], i) => [x, y - spread(i)]);
  const lower = mid.map(([x, y], i) => [x, y + spread(i)]);
  const bandPath = `M ${nowX} ${nowY} ` + upper.map(([x, y]) => `L ${x} ${y}`).join(" ") + " " +
    lower.slice().reverse().map(([x, y]) => `L ${x} ${y}`).join(" ") + " Z";
  const midPath = `M ${nowX} ${nowY} ` + mid.map(([x, y]) => `L ${x} ${y}`).join(" ");
  const histPath = "M " + histPts.map(([x, y]) => `${x} ${y}`).join(" L ");
  const gridP = [1000, 900, 800, 700, 600, 500];

  return (
    <svg viewBox={`0 0 ${CH_W} ${CH_H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      <defs>
        <linearGradient id={`fan-${c.key}`} x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor={c.accent} stopOpacity="0.05" />
          <stop offset="100%" stopColor={c.accent} stopOpacity="0.28" />
        </linearGradient>
        <filter id="softglow"><feGaussianBlur stdDeviation="2.2" /></filter>
      </defs>
      {gridP.map((p) => (
        <g key={p}>
          <line x1={PAD_L} y1={yOf(p)} x2={CH_W - PAD_R} y2={yOf(p)} stroke="#1c2230" strokeWidth="1" strokeDasharray="1 5" />
          <text x={CH_W - PAD_R + 8} y={yOf(p) + 3} fill="#5a6477" fontSize="11" fontFamily={FONT_MONO}>${p}</text>
        </g>
      ))}
      <line x1={nowX} y1={PAD_T} x2={nowX} y2={CH_H - PAD_B} stroke="#2f6dff" strokeWidth="1" strokeDasharray="3 4" opacity="0.7" />
      <path d={bandPath} fill={`url(#fan-${c.key})`} {...tipSvg(
        "The forecast 'cone'", "This shaded fan shows the range of where the price could go in this scenario over the next year. It gets wider further out because the future is less certain. The dashed line through the middle is the most-likely path.",
        "Wider = more uncertainty.", c.accent, "fan-band")} />
      <path d={midPath} fill="none" stroke={c.accent} strokeWidth="2" strokeDasharray="6 5" className="fan-mid" style={{ filter: "url(#softglow)" }} />
      <path d={histPath} fill="none" stroke="#cdd5e3" strokeWidth="2" {...tipSvg(
        "Price history", "The solid white line is META's actual share price over the past year and a bit. You can see the big drop in early 2026 — that was the market reacting to Meta announcing it would spend even more on AI.",
        "This part already happened — it's real, not a forecast.", "#cdd5e3", "hist-line")} />
      {HISTORY.map((d, i) => (
        <g key={i}>
          <circle cx={histPts[i][0]} cy={histPts[i][1]} r={i === nHist - 1 ? 4.5 : 3} fill={i === nHist - 1 ? "#2f6dff" : "#0a0d14"} stroke={i === nHist - 1 ? "#fff" : "#8a93a6"} strokeWidth="1.5"
            {...tipSvg(i === nHist - 1 ? "Where we are today" : d.q,
              i === nHist - 1 ? `META trades around $${NOW_PRICE} right now. This blue dot is 'today' — everything left of it is history, everything right is forecast.` : `At the end of ${d.q}, META was around $${d.p}.`,
              null, i === nHist - 1 ? "#9fb4ff" : "#cdd5e3")} />
          {i === nHist - 1 && <text x={histPts[i][0] - 6} y={histPts[i][1] - 12} fill="#9fb4ff" fontSize="11" fontFamily={FONT_MONO} textAnchor="end">NOW ${NOW_PRICE}</text>}
        </g>
      ))}
      {mid.map(([x, y], i) => (
        <g key={i} className="diamond" style={{ animationDelay: `${0.5 + i * 0.12}s` }}>
          <rect x={x - 4} y={y - 4} width="8" height="8" transform={`rotate(45 ${x} ${y})`} fill="#0a0d14" stroke={c.accent} strokeWidth="1.6"
            {...tipSvg(`Forecast: ${FUTURE_Q[i]}`, `A milestone on the most-likely price path for the ${c.label} scenario. Each diamond is roughly three months further into the future.`,
              "Hover the shaded cone around it to see the uncertainty range.", c.accent)} />
          <text x={x} y={y - 12} fill={c.accent} fontSize="10.5" fontFamily={FONT_MONO} textAnchor="middle">{FUTURE_Q[i]}</text>
        </g>
      ))}
      {["2025", "2026", "2027"].map((yr, i) => (
        <text key={yr} x={PAD_L + (i / 2) * plotW} y={CH_H - 10} fill="#5a6477" fontSize="11" fontFamily={FONT_MONO}>{yr}</text>
      ))}
    </svg>
  );
}

    <div style={{ display: "flex", gap: 5 }}>
      {Object.values(CASES).map((cc) => {

          <div key={cc.key} onClick={() => setActive(cc.key)}

            style={{
              padding: small ? "3px 12px" : "4px 14px", borderRadius: 4, fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", cursor: "pointer",
              border: `1px solid ${on ? cc.accent : "#222a38"}`, color: on ? "#06080d" : cc.accent,
              background: on ? cc.accent : "transparent", boxShadow: on ? `0 0 16px ${cc.glow}` : "none",
              transition: "all .18s ease",
            }}>{cc.label}</div>
        );
      })}

  );
}

function KpiCol({ label, val, accentColor, baseline, delay = 0 }) {

function ReversionClock() {
  const PRECEDENT_DAYS = REVERSION_PRECEDENT_DAYS;
  const dislocationDate = new Date(DISLOCATION_DATE);
  const today = new Date();
  const elapsed = Math.round((today - dislocationDate) / 86400000);
  const pct = Math.min(100, (elapsed / PRECEDENT_DAYS) * 100);
  const trough = REVERSION_TROUGH, baseFloor = REVERSION_BASEFLOOR, now = NOW_PRICE;
  const recPct = Math.min(100, Math.max(0, ((now - trough) / (baseFloor - trough)) * 100));
  return (
    <div style={{ marginTop: 12, padding: "12px 14px", background: "#0a0e15", border: "1px solid #161c28", borderRadius: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
        <div style={{ fontSize: 10.5, letterSpacing: "0.14em", color: "#5a6477" }}>REVERSION CLOCK · vs Q3-2025 PRECEDENT</div>
        <div style={{ fontSize: 11, color: "#9aa4b8" }}><span style={{ color: "#e0a83b", fontWeight: 700 }}>{elapsed}d</span> elapsed / ~{PRECEDENT_DAYS}d to base last time</div>
      </div>
      <div style={{ marginBottom: 4, fontSize: 9.5, color: "#5a6477" }}>TIME SINCE DISLOCATION ({new Date(DISLOCATION_DATE).toLocaleDateString("en-US",{month:"short",day:"numeric"})})</div>
      <div {...tip("How much time has passed", "Last time the stock crashed on spending fears (Oct 2025), it took about 3 months to recover to the 'middle' price zone. This bar shows how far along we are this time. The green line is the 3-month mark.", "Filling up = getting closer to when recovery happened last time.", "#e0a83b")}
        style={{ position: "relative", height: 14, background: "#11161f", borderRadius: 7, overflow: "hidden", border: "1px solid #1c2230" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${pct}%`, background: "linear-gradient(90deg,#f1564b,#e0a83b)", borderRadius: 7 }} />
        <div style={{ position: "absolute", left: "100%", top: -3, bottom: -3, width: 2, background: "#3fd07a", transform: "translateX(-1px)" }} />
        <div style={{ position: "absolute", left: `${pct}%`, top: "50%", width: 8, height: 8, borderRadius: "50%", background: "#fff", transform: "translate(-50%,-50%)", boxShadow: "0 0 8px #fff", pointerEvents: "none" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#5a6477", marginTop: 3 }}>
        <span>day 0</span><span style={{ color: "#3fd07a" }}>base-reversion mark (~91d) →</span>
      </div>
      <div style={{ marginTop: 12, marginBottom: 4, fontSize: 9.5, color: "#5a6477" }}>PRICE RECOVERY · ${REVERSION_TROUGH} trough → ${REVERSION_BASEFLOOR} base floor</div>
      <div {...tip("How far the price has bounced back", `The stock bottomed at $${REVERSION_TROUGH} and needs to reach $${REVERSION_BASEFLOOR} to be back in the 'middle' zone. It's at $${NOW_PRICE} now — about ${Math.round(recPct)}% of the way there.`, "If this bar is fuller than the time bar above, the bounce-back is running faster than last time. Good sign.", "#9fb4ff")}
        style={{ position: "relative", height: 14, background: "#11161f", borderRadius: 7, overflow: "hidden", border: "1px solid #1c2230" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${recPct}%`, background: "linear-gradient(90deg,#f1564b,#3fd07a)", borderRadius: 7 }} />
        <div style={{ position: "absolute", left: `${recPct}%`, top: "50%", width: 8, height: 8, borderRadius: "50%", background: "#9fb4ff", transform: "translate(-50%,-50%)", boxShadow: "0 0 8px #9fb4ff", pointerEvents: "none" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#5a6477", marginTop: 3 }}>
        <span>${REVERSION_TROUGH}</span><span style={{ color: "#9fb4ff" }}>${NOW_PRICE} now · {Math.round(recPct)}% of the way back</span><span>${REVERSION_BASEFLOOR}</span>
      </div>
      <div style={{ fontSize: 10.5, color: "#9aa4b8", lineHeight: 1.55, marginTop: 10 }}>
        Last dislocation took <span style={{ color: "#e0a83b" }}>~3 months</span> report-to-base-reversion. We're <span style={{ color: "#fff", fontWeight: 700 }}>{elapsed} days in</span> and price has retraced <span style={{ color: "#9fb4ff", fontWeight: 700 }}>{Math.round(recPct)}%</span> of the trough-to-base gap — <span style={{ color: recPct >= pct ? "#3fd07a" : "#e0a83b", fontWeight: 700 }}>{recPct >= pct ? "tracking ahead of" : "tracking behind"}</span> the Q3-2025 pace. The reversion window into the July 29 print is the watch zone.
      </div>
    </div>
  );
}

function TrackRecord() {
  const W = 1000, H = 300, pl = 44, pr = 70, pt = 20, pb = 40;
  const pw = W - pl - pr, ph = H - pt - pb;
  const y = (p) => pt + (1 - (p - TRACK_PRICE_MIN) / (TRACK_PRICE_MAX - TRACK_PRICE_MIN)) * ph;
  const x = (i) => pl + (TRACK.length === 1 ? pw / 2 : (i / (TRACK.length - 1)) * pw);
  const grid = [1000, 900, 800, 700, 600, 500];
  const pathPts = TRACK.map((t, i) => [x(i), y(t.post)]);
  const linePath = "M " + pathPts.map(([px, py]) => `${px} ${py}`).join(" L ");
  const hits = TRACK.filter((t) => t.landed.includes("base") || t.landed === "bull").length;
  return (
    <div style={{ background: "#080b11", padding: "16px 18px", borderTop: "1px solid #161c28" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <div style={{ fontSize: 11.5, letterSpacing: "0.18em", color: "#7b86a0" }}>
          <span style={{ background: "#161c28", padding: "2px 6px", borderRadius: 3, color: "#cdd5e3", marginRight: 8 }}>TR · BACKTEST</span>
          THESIS TRACK RECORD · RECONSTRUCTED BANDS vs ACTUAL PRICE
        </div>
        <div style={{ fontSize: 11, color: "#7b86a0" }}>BASE-OR-BETTER LANDINGS: <span style={{ color: "#3fd07a", fontWeight: 700 }}>{hits}/{TRACK.length}</span></div>
      </div>
      <div style={{ fontSize: 10.5, color: "#5a6477", marginBottom: 10 }}>
        Each column = one earnings date. Stacked zones are the bear / base / bull bands as they'd have been drawn then. The line is where price actually traded after.
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
        {grid.map((p) => (
          <g key={p}>
            <line x1={pl} y1={y(p)} x2={W - pr} y2={y(p)} stroke="#161c28" strokeWidth="1" strokeDasharray="1 5" />
            <text x={W - pr + 8} y={y(p) + 3} fill="#5a6477" fontSize="11" fontFamily={FONT_MONO}>${p}</text>
          </g>
        ))}
        {TRACK.map((t, i) => {
          const cx = x(i), bw = 46;
          const landWord = t.landed.includes("bull") ? "the optimistic zone" : t.landed.includes("base") ? "the middle zone" : "the pessimistic zone";
          const reactWord = t.reaction.includes("−") ? "the stock FELL after this report" : "the stock ROSE after this report";
          const seg = (range, color) => (
            <rect x={cx - bw / 2} y={y(range[1])} width={bw} height={Math.max(2, y(range[0]) - y(range[1]))}
              fill={color} opacity={t.conf === "med" ? 0.32 : 0.5} rx="2" style={{ animation: `fadeUp .5s ease ${i * 0.08}s both` }}
              {...tipSvg(`${t.q} earnings`,
                `Back at this earnings date, here's the range we'd have predicted (red=low, yellow=middle, green=high). In reality, ${reactWord} and the price ended up in ${landWord} (~$${t.post}).`,
                t.conf === "med" ? "Marked 'lower-confidence' — older data, so treat loosely." : "Hover the white line to see the actual price path.",
                color.includes("63,208") ? "#3fd07a" : color.includes("224,168") ? "#e0a83b" : "#f1564b")} />
          );
          return (
            <g key={t.q}>
              {seg(t.bull, "rgba(63,208,122,0.55)")}
              {seg(t.base, "rgba(224,168,59,0.5)")}
              {seg(t.bear, "rgba(241,86,75,0.5)")}
              <text x={cx} y={H - 24} fill="#9aa4b8" fontSize="11" fontFamily={FONT_MONO} textAnchor="middle">{t.q}</text>
              <text x={cx} y={H - 11} fill={t.conf === "med" ? "#5a6477" : "#3a4252"} fontSize="8.5" fontFamily={FONT_MONO} textAnchor="middle">
                {t.conf === "med" ? "lower-conf" : t.reaction.includes("−") ? "↓ dislocation" : ""}
              </text>
            </g>
          );
        })}
        <path d={linePath} fill="none" stroke="#dde3ee" strokeWidth="2.2" className="track-line" style={{ filter: "drop-shadow(0 0 4px rgba(221,227,238,0.4))" }} />
        {TRACK.map((t, i) => {
          const isLast = i === TRACK.length - 1;
          return (
            <g key={t.q} style={{ animation: `pop .4s cubic-bezier(.2,1.4,.4,1) ${0.3 + i * 0.08}s both` }}>
              <circle cx={x(i)} cy={y(t.post)} r={isLast ? 6 : 4} fill={isLast ? "#2f6dff" : "#0a0d14"} stroke="#fff" strokeWidth={isLast ? 2 : 1.5}
                {...tipSvg(isLast ? "Today" : `${t.q}: actual price`,
                  isLast ? `META is at ~$${t.post} now — sitting in the pessimistic (red) zone even though the business is doing well. That gap is the whole point of this dashboard.` : `After ${t.q} earnings, the price actually traded around $${t.post}. Compare this dot to the colored bars behind it to see if the prediction was right.`,
                  null, isLast ? "#9fb4ff" : "#cdd5e3")} />
              {isLast && <text x={x(i)} y={y(t.post) - 14} fill="#9fb4ff" fontSize="11" fontFamily={FONT_MONO} textAnchor="middle" fontWeight="700">NOW ${t.post}</text>}
            </g>
          );
        })}
      </svg>
      <div style={{ marginTop: 12, padding: "10px 12px", background: "#0a0e15", border: "1px solid #161c28", borderRadius: 8 }}>
        <div style={{ fontSize: 10.5, letterSpacing: "0.12em", color: "#5a6477", marginBottom: 6 }}>READ-OUT</div>
        <div style={{ fontSize: 12, color: "#bcc6d8", lineHeight: 1.6 }}>
          Current price <span style={{ color: "#9fb4ff", fontWeight: 700 }}>${NOW_PRICE}</span> sits <span style={{ color: "#f1564b", fontWeight: 700 }}>in the upper BEAR band</span>, while the Q1 2026 business printed
          <span style={{ color: "#e0a83b", fontWeight: 700 }}> base-to-bull</span> fundamentals (33% rev growth, ad price +12%, margin 41%).
          The two prior capex-driven <span style={{ color: "#f1564b" }}>dislocations</span> (Q3 2025, Q1 2026) both saw price fall into the bear band on revenue beats — and the Q3 one
          <span style={{ color: "#3fd07a", fontWeight: 700 }}> reverted to base within one quarter</span>. Same configuration now: base business, near-bear price.
        </div>
      </div>
      <ReversionClock />
      <div style={{ fontSize: 9.5, color: "#3d4555", marginTop: 8, lineHeight: 1.5 }}>
        ⚠ Bands are reconstructed now (anchored to each date's forward EPS &amp; multiple regime), not archived in real time — treat levels as directional, especially "lower-conf" quarters. Reversion pattern rests on n=2 dislocations; not a strategy, a tell. Pattern breaks if a future dislocation coincides with genuine ad deceleration rather than capex fear.
      </div>
    </div>
  );
}
